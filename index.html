<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 学习知识库 · 小A精选</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card-hover: #263347;
      --border: #334155;
      --primary: #6366f1;
      --secondary: #22d3ee;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --success: #10b981;
      --tag: #1e3a5f;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
      border-bottom: 1px solid var(--border);
      padding: 32px 24px 24px;
      text-align: center;
    }
    .header h1 { font-size: 2rem; font-weight: 700; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header p { color: var(--text-muted); margin-top: 8px; font-size: 0.9rem; }
    .stats { display: flex; gap: 24px; justify-content: center; margin-top: 16px; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-num { font-size: 1.6rem; font-weight: 700; color: var(--secondary); }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); }

    /* ===== SEARCH ===== */
    .search-bar {
      max-width: 600px;
      margin: 24px auto 0;
      position: relative;
    }
    .search-bar input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: var(--primary); }
    .search-bar .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.1rem; }

    /* ===== MAIN LAYOUT ===== */
    .main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* ===== CATEGORY GRID ===== */
    #home-view h2 { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 16px; font-weight: 500; }
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .cat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .cat-card:hover { background: var(--card-hover); border-color: var(--primary); transform: translateY(-2px); }
    .cat-emoji { font-size: 2rem; }
    .cat-name { font-size: 1rem; font-weight: 600; }
    .cat-badge { display: inline-block; background: var(--primary); color: #fff; border-radius: 20px; padding: 2px 10px; font-size: 0.78rem; font-weight: 600; }
    .cat-arrow { margin-left: auto; color: var(--text-muted); }

    /* ===== LESSON LIST ===== */
    #list-view, #detail-view { display: none; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-muted); cursor: pointer; font-size: 0.9rem;
      margin-bottom: 20px; transition: color 0.2s;
    }
    .back-btn:hover { color: var(--text); }
    .list-header { margin-bottom: 20px; }
    .list-header h2 { font-size: 1.4rem; font-weight: 700; }
    .list-header p { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }
    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 14px;
    }
    .lesson-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lesson-card:hover { background: var(--card-hover); border-color: var(--primary); }
    .lesson-title { font-size: 0.9rem; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }
    .lesson-summary { font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .lesson-meta { margin-top: 10px; display: flex; gap: 8px; align-items: center; }
    .lesson-wc { font-size: 0.72rem; color: var(--text-muted); }

    /* ===== DETAIL VIEW ===== */
    .detail-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      max-width: 800px;
    }
    .detail-title { font-size: 1.4rem; font-weight: 700; line-height: 1.4; margin-bottom: 16px; }
    .detail-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .detail-tag { background: var(--tag); color: var(--secondary); border-radius: 6px; padding: 3px 10px; font-size: 0.75rem; }
    .douyin-link {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(90deg, #fe2c55, #ff6b81);
      color: #fff; border-radius: 8px; padding: 6px 14px;
      font-size: 0.82rem; font-weight: 600; text-decoration: none;
      transition: opacity 0.2s; margin-bottom: 24px; display: inline-block;
    }
    .douyin-link:hover { opacity: 0.85; }
    .section-title { font-size: 0.85rem; font-weight: 700; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.05em; margin: 20px 0 10px; }
    .section-content { font-size: 0.9rem; line-height: 1.8; color: #cbd5e1; }
    .ext-list { list-style: none; }
    .ext-list li { padding: 6px 0; color: var(--text-muted); font-size: 0.88rem; }
    .ext-list li::before { content: "→ "; color: var(--primary); }

    /* ===== SEARCH RESULTS ===== */
    #search-view { display: none; }
    .search-results { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
    .search-item {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; cursor: pointer; transition: all 0.2s;
    }
    .search-item:hover { background: var(--card-hover); border-color: var(--primary); }
    .search-item-cat { font-size: 0.72rem; color: var(--primary); margin-bottom: 4px; }
    .search-item-title { font-size: 0.9rem; font-weight: 600; }
    .search-item-summary { font-size: 0.78rem; color: var(--text-muted); margin-top: 4px; }

    /* ===== FOOTER ===== */
    .footer { text-align: center; padding: 32px; color: var(--text-muted); font-size: 0.8rem; }
    .footer a { color: var(--primary); text-decoration: none; }
  </style>
</head>

种部署策略：蓝绿部署、金丝雀发布、滚动更新。针对 AI 大模型服务，可以配置基于流量权重的灰度发布，在新版本模型上线时逐步切流，降低线上风险。\n\n**3. AI 大模型工程化部署**\n在 AI 大模型场景下，Harness 的价值体现在：\n- **模型版本管理**：与 MLflow、DVC 集成，追踪模型版本与实验指标\n- **自动化评", "ext": "- Harness 与传统 Jenkins/GitHub Actions 的核心区别？Harness 以\"软件交付平台\"为定位，内置部署策略、合规审计、AI 辅助等企业级能力，而 Jenkins/GitHub Actions 更偏向构建工具，企业级能力依赖插件生态拼装。\n- AI大模型工程化部署的挑战与解决方案？核心挑战在于模型版本追踪、资源调度、评估门禁和灰度发布，Harness 通过与 MLflow/K8s 深度集成，配合内置的金丝雀发布策略，系统性解决这些问题。\n- 架构师如何评估 CI/CD 工具选型？需综合考虑团队现状、AI 工作负载比例、运维 TCO 和与现有基础设施的集成成本，避免\"最新 = 最好\"的陷阱。", "word_count": 0, "douyin_url": "https://www.douyin.com/video/7639300730813156659", "file": "lesson_7639300730813156659.md"}, {"id": "7639306284101160207", "title": "850字节 Agent 算法面，Transformer 问到底 字节大模型 Agent 算法面经偏难！这期拆解 Transformer、LoRA、RAG 和 A", "summary": "一起來看看自己的大模型AZENT算法面驚看看你能達上來幾道這套體整體難度偏難但是前面是基礎後面才是真正區分水平的地方我是校哲點贊收藏家關注我們馬上開始第一道題Transformer的結構組成和各部分作...", "core": "一起來看看自己的大模型AZENT算法面驚看看你能達上來幾道這套體整體難度偏難但是前面是基礎後面才是真正區分水平的地方我是校哲點贊收藏家關注我們馬上開始第一道題Transformer的結構組成和各部分作用是什麼這題先講清楚主幹核心是Inbiting位置編碼多頭注意力前饋網絡殘差連接和Layer Norm注意力負責建模上下文關係前饋網絡做非線性變換殘差和規一化保證深層訓練穩定第二道題怎麼降低Transformer的計算複雜度關鍵是注意力的複雜度來自訓練長度平方工程上可以用吸輸注意力局部窗口注意力滑動窗口低置進四或者Flash的貪身這類優化面試重點不是被名字而是知道長文本場景怎麼降延遲和現存第三道題Lora微調的原理是什麼至二怎麼選Lora的核心是凍結原模型參數只在部分線性層旁邊加低置增量舉證二月大表達能力越強但顯存訓練成本和過你和風險也更高一般先從小二做機線再看任務複雜度和驗證機效果條第四道題KVCASH是什麼為什麼能提升推理速度KVCASH換存的是歷史偷懇計算出的KVVALUE聲稱下一個偷懇時就不用反覆重算前面所有上下文只算新增部分它主要優化自回歸推理延遲但會增加顯存占用長上下文要考慮淘", "ext": "- 本视频提到的概念如何与现有知识体系结合？\n- 有哪些实际应用场景？\n- 与同类视频相比，有哪些独特观点？", "word_count": 1310, "douyin_url": "https://www.douyin.com/video/7639306284101160207", "file": "lesson_7639306284101160207.md"}, {"id": "7639591804182023470", "title": "553VibeCoding大赏 |用AI做个人网站 现阶段最强实践教程，这可能是目前做个人网站最高效的方式", "summary": "我发现现在用于做个人网站的最佳时间就是用Codex从头做到尾这是我第一次做个人网站然后我是用Codex从头做到尾用自然语言来给他表述的这是已经做好的一个效果你会发现这里面的动态然后这里面的世界效果这里...", "core": "我发现现在用于做个人网站的最佳时间就是用Codex从头做到尾这是我第一次做个人网站然后我是用Codex从头做到尾用自然语言来给他表述的这是已经做好的一个效果你会发现这里面的动态然后这里面的世界效果这里面的这种交互都是往往全然能达到我的一个预期并且满足我的这种需求的所以我们今天就分三步给大家上教程手把手叫大家做出自己风格的个人网站第一步给Codex提需求我们很多人找个人做个人网站都是别告诉他 个版材这里可以说是Codex的一大斤水所在再过来说Codex是一个集合了Chat帮stID1 榴栏器自动化工具等等等等的一个大一统的工作台所以你可以给他安装插件Skill以及创建自动化任务这里的插件市场可以让你来随时扩展更多的功能比方说这里的Codex的Yos和Belz-Yos在我们后半部分的造成中就会用到这两个功能在网上看可以看到项目和对话两个分来在项目中你可以点击添加新项目来将你创建", "ext": "- 本视频提到的概念如何与现有知识体系结合？\n- 有哪些实际应用场景？\n- 与同类视频相比，有哪些独特观点？", "word_count": 2206, "douyin_url": "https://www.douyin.com/video/7638447340403166499", "file": "lesson_7638447340403166499.md"}, {"id": "7639300730813156659", "title": "Harness Engineering 从入门到精通", "summary": "Harness 是新一代智能化 CI/CD 平台，通过 AI 驱动的流水线管理和自动化部署，帮助架构师和工程师高效完成 AI 大模型的工程化落地。", "core": "### 什么是 Harness？\n\nHarness 是一个面向企业级的现代 CI/CD 平台，核心定位是\"软件交付平台\"（Software Delivery Platform）。它不仅覆盖传统的持续集成与持续部署，还将 AI/ML 模型训练、评估、部署纳入统一的工程化流程，是 MLOps 领域的重要工具之一。\n\n### 核心模块\n\n**1. CI（持续集成）**\nHarness CI 基于 Drone CI 演进而来，采用容器原生架构，每个 Step 运行在独立容器中，天然隔离、可复现。相比 Jenkins，Harness CI 无需维护复杂的插件体系，配置即代码（YAML），上手门槛更低。\n\n**2. CD（持续部署）**\nHarness CD 支持多种部署策略：蓝绿部署、金丝雀发布、滚动更新。针对 AI 大模型服务，可以配置基于流量权重的灰度发布，在新版本模型上线时逐步切流，降低线上风险。\n\n**3. AI 大模型工程化部署**\n在 AI 大模型场景下，Harness 的价值体现在：\n- **模型版本管理**：与 MLflow、DVC 集成，追踪模型版本与实验指标\n- **自动化评", "ext": "- Harness 与传统 Jenkins/GitHub Actions 的核心区别？Harness 以\"软件交付平台\"为定位，内置部署策略、合规审计、AI 辅助等企业级能力，而 Jenkins/GitHub Actions 更偏向构建工具，企业级能力依赖插件生态拼装。\n- AI大模型工程化部署的挑战与解决方案？核心挑战在于模型版本追踪、资源调度、评估门禁和灰度发布，Harness 通过与 MLflow/K8s 深度集成，配合内置的金丝雀发布策略，系统性解决这些问题。\n- 架构师如何评估 CI/CD 工具选型？需综合考虑团队现状、AI 工作负载比例、运维 TCO 和与现有基础设施的集成成本，避免\"最新 = 最好\"的陷阱。", "word_count": 0, "douyin_url": "https://www.douyin.com/video/7639300730813156659", "file": "lesson_7639300730813156659.md"}, {"id": "7639591804182023470", "title": "553VibeCoding大赏 |用AI做个人网站 现阶段最强实践教程，这可能是目前做个人网站最高效的方式", "summary": "我发现现在用于做个人网站的最佳时间就是用Codex从头做到尾这是我第一次做个人网站然后我是用Codex从头做到尾用自然语言来给他表述的这是已经做好的一个效果你会发现这里面的动态然后这里面的世界效果这里...", "core": "我发现现在用于做个人网站的最佳时间就是用Codex从头做到尾这是我第一次做个人网站然后我是用Codex从头做到尾用自然语言来给他表述的这是已经做好的一个效果你会发现这里面的动态然后这里面的世界效果这里面的这种交互都是往往全然能达到我的一个预期并且满足我的这种需求的所以我们今天就分三步给大家上教程手把手叫大家做出自己风格的个人网站第一步给Codex提需求我们很多人找个人做个人网站都是别告诉他我想要什么样的一个风格他就直接给你了这样他给你的大概是一个通用的模板我具给他提的需求我可以给     grid.appendChild(card);
  }
}

// ===== SHOW LIST =====
function showList(catId) {
  currentCat = catId;
  const cat = KB[catId];
  document.getElementById('list-title').textContent = cat.emoji + ' ' + cat.name;
  document.getElementById('list-subtitle').textContent = `共 ${cat.count} 篇教案`;
  
  const grid = document.getElementById('lesson-grid');
  grid.innerHTML = '';
  cat.lessons.forEach((lesson, idx) => {
    const card = document.createElement('div');
    card.className = 'lesson-card';
    card.innerHTML = `
      <div class="lesson-title">${lesson.title || '（无标题）'}</div>
      <div class="lesson-summary">${lesson.summary || lesson.core || '暂无摘要'}</div>
      <div class="lesson-meta">
        <span class="lesson-wc">📝 ${lesson.word_count > 0 ? lesson.word_count + ' 字' : ''}</span>
      </div>
    `;
    card.onclick = () => showDetail(catId, idx);
    grid.appendChild(card);
  });

  showView('list-view');
}

// ===== SHOW DETAIL =====
function showDetail(catId, idx) {
  currentCat = catId;
  const lesson = KB[catId].lessons[idx];
  const cat = KB[catId];

  // 延伸思考处理
  const extItems = lesson.ext ? lesson.ext.split('\n').filter(l => l.trim().startsWith('-')).map(l => l.replace(/^-\s*/, '')) : [];
  const extHtml = extItems.length > 0
    ? '<ul class="ext-list">' + extItems.map(i => `<li>${i}</li>`).join('') + '</ul>'
    : '<p class="section-content" style="color:var(--text-muted)">暂无</p>';

  document.getElementById('detail-card').innerHTML = `
    <div class="detail-title">${lesson.title || '（无标题）'}</div>
    <div class="detail-meta">
      <span class="detail-tag">${cat.emoji} ${cat.name}</span>
      ${lesson.word_count > 0 ? '<span class="detail-tag">📝 ' + lesson.word_count + ' 字</span>' : ''}
    </div>
    ${lesson.douyin_url ? '<a class="douyin-link" href="' + lesson.douyin_url + '" target="_blank" rel="noopener">▶ 观看原视频（抖音）</a>' : ''}
    <div class="section-title">📌 一句话总结</div>
    <div class="section-content">${lesson.summary || '暂无'}</div>
    <div class="section-title">📝 核心内容</div>
    <div class="section-content">${lesson.core || '暂无'}</div>
    <div class="section-title">🔄 延伸思考</div>
    ${extHtml}
  `;

  showView('detail-view');
}

// ===== NAVIGATION =====
function showHome() {
  currentCat = null;
  document.getElementById('search-input').value = '';
  showView('home-view');
}

function goBackFromDetail() {
  if (currentCat) {
    showList(currentCat);
  } else {
    showHome();
  }
}

function showView(id) {
  ['home-view','list-view','detail-view','search-view'].forEach(v => {
    document.getElementById(v).style.display = v === id ? 'block' : 'none';
  });
}

// ===== SEARCH =====
function handleSearch(q) {
  q = q.trim();
  if (!q) {
    showView('home-view');
    return;
  }
  const ql = q.toLowerCase();
  const results = [];
  for (const [catId, cat] of Object.entries(KB)) {
    cat.lessons.forEach((lesson, idx) => {
      const haystack = (lesson.title + ' ' + lesson.summary + ' ' + lesson.core).toLowerCase();
      if (haystack.includes(ql)) {
        results.push({ catId, idx, lesson, catName: cat.name, catEmoji: cat.emoji });
      }
    });
  }
  
  document.getElementById('search-title').textContent = `搜索 "${q}" · 找到 ${results.length} 篇`;
  const container = document.getElementById('search-results');
  container.innerHTML = '';
  results.forEach(r => {
    const item = document.createElement('div');
    item.className = 'search-item';
    item.innerHTML = `
      <div class="search-item-cat">${r.catEmoji} ${r.catName}</div>
      <div class="search-item-title">${r.lesson.title}</div>
      <div class="search-item-summary">${r.lesson.summary?.slice(0,120) || ''}</div>
    `;
    item.onclick = () => showDetail(r.catId, r.idx);
    container.appendChild(item);
  });
  showView('search-view');
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  showHome();
}

// ===== INIT =====
renderHome();
showView('home-view');
</script>
