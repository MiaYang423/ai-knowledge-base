的想法录下来，豆包自动转成文字，回到工位直接整理成文档，省去大量手动记录时间。","table":"| 场景 | 推荐工具 | 国内平替 | 是否免费 | 核心理由 |\n|------|----------|----------|----------|----------|\n| 文案创作 | Claude 3.5 | 无（博主未提） | 否 | AI味最低，语感接近真人 |\n| 日常问答 | GPT 4.5 | 豆包 | 豆包免费 | 幻觉率低 / 快且够用 |\n| 界面设计 | Claude（MXL） | 无 | 否 | 真正懂设计，非单纯生图 |\n| 代码开发 | Claude Opus + Codex | 无 | 否 | 分工组合，各用其长 |\n| 视频提炼/会议纪要 | Gad笔记 | 通义听悟 | 通义免费 | 省去重复观看/手动记录 |\n| 大文件转录 | 通义听悟 | — | 完全免费 | 准确率高，支持大文件 |\n| 图像生成 | GPT Image | 即梦 | 即梦免费 | 质感强，接近人工水准 |\n| 高分辨率出图 | Magnific Pro | — | 否 | GPT Image分辨率补充 |\n| 私有知识库问答 | NotebookLM | — | 免费 | 只基于上传内容，幻觉率低 |\n| 笔记管理 | Obsidian | — | 基础免费 | 接入Claude，Markdown友好 |\n| 语音转文字 | 豆包录音转文字 | — | 完全免费 | 准确率高，最顺手 |\n| 健康咨询 | Claude | — | — | 比搜索引擎更专业科学 |","thinking":"1. **博主提到Claude Opus + Codex的组合\"国内目前没有平替\"，这个判断背后的核心差距是什么？** 是模型的语言理解能力本身，还是工具链的整合方式？如果国内模型在理解能力上追上来，这个组合的优势还能保持多久？\n\n2. **视频里有多个场景都推荐了Claude（文案、代码、健康顾问），但日常问答又推荐了GPT和豆包。** 这背后的选择逻辑是什么？是成本考量、响应速度，还是不同任务对\"可靠性\"的定义本身就不同？\n\n3. **NotebookLM被博主认为\"严重被低估\"，但它的核心价值——只基于上传内容回答——其实是一种能力限制。** 在什么场景下这种\"限制\"反而是优势？什么场景下它会成为真正的瓶颈？","remember":"别问哪个AI最强，问自己在哪个场景、需要什么——每个场景找一个最顺手的，比用一个\"万能工具\"凑合强得多。","is_new":true},{"id":"7644347037009366326","title":"AI Agent全链路接管自媒体运营","cat":"ai-programming","video_url":"https://www.douyin.com/video/7644347037009366326","audience":"有自媒体运营需求、希望用 AI 工具提升内容创作效率的创作者","summary":"作者开源了一个名为 Hermes 的 AI Agent 项目，能自动完成自媒体数据采集、实时监控、可视化仪表盘和评论获客四大核心任务，帮助创作者用 AI 接管 40% 的运营工作。","raw_preview":"大家现在看到的是我的 AI Agent，也就是 Hermes，现在接入我的自媒体硬于 SGO，在我的评论区对网友进行回复，并且委婉地推荐我的财富自由团。自从我用上他之后，我的专属会员入群率猛增，所以这应该也是一个自媒体获客的一把好手。\n\n他除了这个功能以外还有其他几个核心功能，从数据获取到数据可视化，再到数据分析、选题分析，再到平台获客，这全链路他现在都做得非常好。他目前已经把自媒体平台 40% ","knowledge_map":"Hermes AI Agent：自媒体全链路自动化\n│\n├── 核心功能一：数据获取与本地数据库\n│   ├── 自动下载作品列表数据\n│   ├── 本地建立数据库\n│   ├── 连接手机，定时推送关键数据\n│   └── 支持对话式横向对比分析\n│       └── 示例：16条破10万视频的三条规律\n│           ├── 完播率需超过40%\n│           ├── 分享+收藏是10万→百万的关键\n│           └── AI教程+商业案例组合效果最强\n│\n├── 核心功能二：新视频实时监控与播放量预测\n│   ├── 每30分钟监控一次\n│   ├── 自带预测模型（同时间节点横向对比）\n│   └── 样本库越大，预测越准（自主学习）\n│\n├── 核心功能三：飞书数据可视化仪表盘\n│   ├── 调用飞书 API 上传数据\n│   ├── 三张多维表格\n│   │   ├── 近14天视频数据总览\n│   │   ├── 最新视频数据详情\n│   │   └── 账号粉丝增长总览\n│   └── 仪表盘关键指标\n│       ├── 总播放量 & 实时增速\n│       ├── 完播率 & 平均播放时长\n│       ├── 点赞 & 评论数量\n│       └── 粉丝数 & 近期视频粉丝增量排名\n│\n└── 核心功能四：评论区自动回复 + 获客\n    ├── 自动回复网友评论\n    └── 可定制化：委婉引导加入付费社群","concepts":"#### 概念一：AI Agent（智能代理）\n\n**是什么**：一种能够自主执行多步骤任务的 AI 程序，视频中的 Hermes 就是一个 AI Agent。\n\n**为什么重要**：普通 AI 工具需要人每次手动触发，而 AI Agent 可以按计划自动运行，持续完成数据采集、分析、推送等一系列任务，真正解放人力。\n\n**详细解释**：\n- Hermes 在无需人工干预的情况下，可以定时爬取数据、定时推送报告、定时更新飞书表格、自动回复评论\n- 其\"自我进化\"能力体现在：随着数据库样本积累，预测模型会持续校准，准确率越来越高\n\n**实际应用场景**：\n- 每小时自动把最新视频数据推送到你手机\n- 新视频发布后每30分钟自动监控并预测最终播放量\n\n---\n\n#### 概念二：数据驱动的爆款规律分析\n\n**是什么**：通过对历史视频数据的横向对比，归纳出影响视频爆发的关键指标规律。\n\n**为什么重要**：创作者往往凭感觉做内容，而数据分析可以把\"什么样的内容会爆\"变成可量化、可复用的规律。\n\n**详细解释**：\n\n作者通过 Hermes 分析 16 条破 10 万播放的视频，得出以下规律：\n\n| 规律 | 核心指标 | 结论 |\n|------|----------|------|\n| 规律一 | 完播率 | 完播率低于 40%，基本无缘 10 万播放 |\n| 规律二 | 分享 + 收藏 | 这两个指标是区分 10 万和百万爆款的关键 |\n| 规律三 | 内容品类 | AI 教程 + 商业案例组合，数据表现最强 |\n\n**实际应用场景**：\n- 发布新视频前，用历史数据验证选题方向\n- 发布后对比完播率，判断是否有爆发潜力\n\n---\n\n#### 概念三：实时预测模型\n\n**是什么**：一种基于\"同时间节点横向对比\"的播放量预测机制——用当前视频发布第 N 小时的数据，对比历史所有视频第 N 小时的数据，从而预测最终播放量区间。\n\n**为什么重要**：视频爆发往往有滞后性（抖音推荐机制可能让一条视频很久后才突然爆），实时预测模型能帮助创作者早期判断视频潜力，减少流量焦虑。\n\n**详细解释**：\n- 每30分钟触发一次预测\n- 预测基准：历史数据库中所有视频在相同发布时长下的表现\n- 自学习机制：数据库样本越多，预测越精准\n\n**实际应用场景**：\n- 视频发布4小时后，系统自动告知\"预计最终播放量在X万～Y万区间\"\n- 帮助创作者决定是否需要调整运营策略（如是否投流）\n\n---\n\n#### 概念四：飞书仪表盘数据可视化\n\n**是什么**：通过调用飞书 API，将 Hermes 采集的数据实时同步到飞书多维表格，并生成可视化仪表盘。\n\n**为什么重要**：把分散在各平台后台的数据集中到一个界面，让创作者不用反复切换网页，一眼掌握账号全局动态。\n\n**详细解释**：\n\n仪表盘包含三个底层数据表：\n\n| 表格 | 内容 |\n|------|------|\n| 近14天视频数据总览 | 近期所有发布视频的综合表现 |\n| 最新视频数据详情 | 播放量、增速、完播率、均播时长、点赞、评论 |\n| 账号粉丝增长总览 | 粉丝总数、近期各视频带来的粉丝增量排名 |\n\n**实际应用场景**：\n- 每天打开飞书，一个页面看清所有核心指标\n- 对比近期视频粉丝增量，快速判断哪条视频获客效果最好","table":"| 功能模块 | 核心能力 | 关键指标/工具 | 解决的问题 |\n|----------|----------|---------------|------------|\n| 数据获取与数据库 | 自动下载作品数据，本地存储，手机推送 | 每小时推送 | 手动查数据费时费力 |\n| 实时监控与预测 | 每30分钟监控，同时间节点预测播放量 | 完播率、播放量预测区间 | 创作者的流量焦虑 |\n| 飞书数据可视化 | 调用飞书 API，生成多维表格+仪表盘 | 播放量、增速、完播率、粉丝增量 | 数据分散、难以总览 |\n| 评论区自动回复+获客 | 自动回复评论，可定制引导加入付费社群 | 入群率 | 人工回复效率低，获客成本高 |\n| 爆款规律分析 | 横向对比历史数据，归纳规律 | 完播率>40%、分享+收藏 | 凭感觉做内容，缺乏数据支撑 |","thinking":"1. **预测模型的边界在哪里？** Hermes 的播放量预测依赖历史数据库的样本量，对于新账号或内容风格转型期的账号，样本不足时预测准确率会有多大偏差？如何设计冷启动阶段的预测策略？\n\n2. **获客定制化的边界与风险是什么？** 在评论区自动引导用户加入付费社群，这种方式在提升入群率的同时，是否可能影响评论区的真实互动氛围，进而反向影响平台推荐权重？如何在获客和用户体验之间找到平衡？\n\n3. **这套工具的可迁移性如何？** Hermes 目前针对抖音平台设计，如果要迁移到 B 站、小红书或 YouTube，数据结构和 API 接口差异会带来哪些改造成本？哪些模块是平台无关的通用能力？","remember":"与其每天手动刷后台焦虑数据，不如让 AI Agent 替你盯着，还能告诉你下一条视频该怎么做。","is_new":true},{"id":"7644564918734373733","title":"lesson_7644564918734373733.md","cat":"ai-programming","video_url":"https://www.douyin.com/video/7644564918734373733","audience":"","summary":"","raw_preview":"","knowledge_map":"","concepts":"","table":"","thinking":"","remember":"","is_new":false},{"id":"7644947494979374351","title":"三步打造 OpenClaude 自我进化系统","cat":"ai-programming","video_url":"https://www.douyin.com/video/7644947494979374351","audience":"已经在用 Claude 但还停留在手动提问阶段、想让 AI 真正自动化工作的内容创作者或效率工具爱好者","summary":"通过 Standing Orders 长驻指令、Heartbeat/Cron 自动调度、外接工具对接三步，把 Claude 从一个问答工具升级成能自主运转的个人 AI 操作系统。","raw_preview":"大家好，我是奔走。走在各种 AI 软件神仙打架的时代，Claude 好像在慢慢被大家遗忘了，很多人对它的印象还停留在几个老问题上——记忆烂、上下文短、文件管理像个垃圾堆。\n\n事实是，大家的认知已经配不上它的进化速度了。上期视频我们讲了 Claude 的一些使用技巧，今天我用三条干货，手把手带你打造自我进化的 Claude。来，走着学着进化。\n\n**第一步，学会用 Standing Orders 长","knowledge_map":"打造 Claude 自我进化系统\n│\n├── 第一步：Standing Orders 长驻指令\n│   ├── 是什么：把重复 Prompt 固化成持久指令\n│   ├── 怎么做\n│   │   ├── 给目标（描述需求）\n│   │   ├── 给资料（提供文档链接，让 Claude 自学）\n│   │   └── 看成品（复用模式写新指令）\n│   └── 案例：Humanizer Standing Order（自动去 AI 味检查清单）\n│\n├── 第二步：Heartbeat & Cron 自动调度\n│   ├── Heartbeat\n│   │   ├── 特点：间隔触发，最短 30 分钟，可并发多任务\n│   │   └── 适用：多任务并行、非精确时间场景\n│   ├── Cron\n│   │   ├── 特点：精确到秒，定点触发，单任务单坑\n│   │   └── 适用：分钟级响应、强时间精度场景\n│   └── 使用方式：直接用自然语言告诉 Claude，让它自己写配置\n│\n└── 第三步：外接专业软件（四种接入方式）\n    ├── MCP（标准接口）\n    │   ├── 适用软件：Notion / GitHub / Airtable / Figma / Canva / Slack\n    │   └── 适合场景：查资料、管项目、跨上下文操作数据库\n    ├── CLI 工具（如 OpenCLI）\n    │   ├── 适用场景：无 MCP 的平台（自媒体、实时数据）\n    │   └── 能力：抓评论、字幕、热榜、创作者数据\n    ├── Harness（Agent 协作）\n    │   ├── Claude：接任务 → 拆任务 → 判断逻辑 → 收结果\n    │   └── Codex：进仓库 → 改代码 → 跑测试\n    └── 内置工具\n        └── 浏览器、文件读写、终端命令、搜索、自 Agent 系统","concepts":"#### 概念一：Standing Orders 长驻指令\n\n**是什么**：把你反复对 Claude 说的同类 Prompt，提炼成一条持久生效的结构化指令，让 Claude 每次执行任务时自动遵守，无需重复说明。\n\n**为什么重要**：\n重复写 Prompt 是效率黑洞。Standing Orders 相当于给 Claude \"预装规则\"，一次配置，长期生效，把人从重复劳动中解放出来。\n\n**详细解释**：\n\n| 步骤 | 操作 | 说明 |\n|------|------|------|\n| 第一步：给目标 | 用自然语言描述你的需求 | 例：\"帮我写一个 Standing Order，用 OpenCLI 收集多平台 AI 信息\" |\n| 第二步：给资料 | 把相关工具的文档链接发给 Claude | Claude 自动抓取、消化、提炼关键命令和最佳实践 |\n| 第三步：看成品 | 审阅 Claude 生成的 Standing Order | 质量满意后，可作为模板让 Claude 参考写其他指令 |\n\n**实际应用场景**：\n- 内容创作：写一条\"文风去 AI 味\"的 Humanizer 指令，之后所有输出自动过滤 AI 腔\n- 信息收集：写一条\"每日 AI 资讯聚合\"指令，自动抓取多平台内容\n\n---\n\n#### 概念二：Heartbeat 与 Cron 自动调度机制\n\n**是什么**：Claude 中两种让任务按时间自动触发执行的机制，无需人工手动启动。\n\n**为什么重要**：\n有了自动调度，Claude 才能真正\"自己跑\"，从被动回答变成主动执行，实现无人值守的自动化工作流。\n\n**详细解释**：\n\n| 维度 | Heartbeat | Cron |\n|------|-----------|------|\n| 触发方式 | 间隔触发（轮询） | 定点触发（精确时间） |\n| 最小间隔 | 30 分钟 | 精确到秒 |\n| 并发能力 | 支持多任务叠加运行 | 一条任务一个坑 |\n| 适用场景 | 多任务并行、对时间精度要求不高 | 分钟级响应、强时间精度需求 |\n| 典型案例 | 每天自动查播放量+点赞数 | 整点准时触发某个操作 |\n\n**实际应用场景**：\n- 用 Heartbeat 每天自动监控自媒体账号数据（播放量、点赞数）\n- 不需要手写配置语法，直接用自然语言告诉 Claude，它会自己读文档、写 Heartbeat.md 并跑通\n\n---\n\n#### 概念三：四种外接工具接入方式\n\n**是什么**：Claude 连接外部软件和数据源的四种标准化方式，让 Claude 从\"只能聊天\"变成\"真的能操作\"。\n\n**为什么重要**：\n真实工作中大量任务需要操作文件、网页、数据库、代码仓库。没有外接工具，Claude 只是一个问答机器；有了外接工具，它才是一个能干活的 Agent。\n\n**详细解释**：\n\n| 接入方式 | 适用场景 | 代表软件/工具 | 核心能力 |\n|----------|----------|---------------|----------|\n| MCP | 有标准接口的主流软件 | Notion、GitHub、Airtable、Figma、Canva、Slack | 查资料、管项目、跨上下文操作数据库 |\n| CLI（如 OpenCLI） | 无 MCP 的平台（自媒体、实时数据） | 各类自媒体平台、热榜数据源 | 抓评论、字幕、热榜、创作者数据 |\n| Harness | 需要专业 Agent 协作的复杂任务 | Codex（代码执行） | Claude 拆任务，Codex 进仓库改代码跑测试 |\n| 内置工具 | 通用文件/网页/系统操作 | — | 浏览器、文件读写、终端命令、搜索、自 Agent |\n\n**实际应用场景**：\n- 做选题调研：OpenCLI 搜英文趋势 → 找同类视频 → 看高赞回答和用户痛点 → 汇总结果\n- 做内容视频全流程：OpenCLI 抓数据 + 浏览器读文档 + Airtable 管选题 + Codex 写代码 Demo + Canva 做封面","table":"| 功能需求 | 推荐方案 | 关键特点 |\n|----------|----------|----------|\n| 重复 Prompt 太多 | Standing Orders | 一次配置，长期生效 |\n| 任务需要定时自动执行 | Heartbeat 或 Cron | 无需人工触发 |\n| 多任务并行、时间不敏感 | Heartbeat | 最短 30 分钟间隔，可叠加 |\n| 精确定点触发、分钟级响应 | Cron | 精确到秒，单任务单坑 |\n| 对接 Notion/GitHub/Figma 等主流软件 | MCP | 标准接口，功能调用 |\n| 抓取自媒体平台数据/热榜 | CLI（OpenCLI） | 把手动操作变成可调用命令 |\n| 代码任务、进仓库改代码 | Harness + Codex | Claude 拆任务，Codex 执行 |\n| 操作文件/网页/终端 | 内置工具 | 无需额外配置 |","thinking":"1. **Standing Orders 和系统 Prompt 有什么本质区别？** 视频中 Standing Orders 强调\"让 Claude 自己读文档来生成指令\"，这种自学式配置和人工手写系统 Prompt 在可维护性和准确性上各有什么优劣？\n\n2. **Heartbeat 和 Cron 的并发设计背后意味着什么？** Heartbeat 支持多任务叠加、Cron 一条任务一个坑，这种设计选择对于构建复杂自动化工作流时会带来哪些架构上的取舍？\n\n3. **当 Claude 通过 Harness 调度 Codex 这类专业 Agent 时，\"Claude 负责判断逻辑、Codex 负责执行\"的分工模式，是否会成为未来 AI 协作的标准范式？这种分层 Agent 架构有哪些潜在的风险和边界？**","remember":"别再每次手动提问了——用 Standing Orders 固化规则、用 Heartbeat/Cron 让任务自动跑、用 MCP 和 CLI 打通外部工具，Claude 才能真正替你干活而不是陪你聊天。","is_new":true},{"id":"7602603747088443257","title":"Coding 模型分层选用策略","cat":"vibecoding","video_url":"https://www.douyin.com/video/7602603747088443257","audience":"有一定 AI 编程工具使用经验、希望降低成本并提升效率的开发者或 Vibe Coding 实践者","summary":"不同 AI coding 模型各有专长，用\"分层选模型\"策略——前端原型、架构设计、具体编码分别选用最合适的模型——可以在控制成本的同时大幅提升开发效率。","raw_preview":"这么多 coding 模型到底应该怎么去选？2025 年人人都在玩 vibe coding，但用对模型才是关键。模型选错了效果不好，又分分钟烧光你的钱包。\n\n很多人都用 AI 写代码还停留在一个模型从头写到尾的阶段，但这样做真的效率非常低。毕竟模型也有术业有专攻的问题。我现在用的是分层写作模式，让不同的模型做自己最擅长的内容。\n\n第一层，我的前端 Demo 使用 Gemini 2.0 Flash ","knowledge_map":"Coding 模型分层选用策略\n├── 问题背景\n│   ├── 模型众多，选错浪费钱\n│   └── 单一模型从头写到尾，效率低\n│\n├── 分层写作模式（三层）\n│   ├── 第一层：前端原型\n│   │   ├── 推荐模型：Gemini 2.0 Pro\n│   │   ├── 优势：UI 美观、出效果快\n│   │   └── 局限：复杂后端逻辑易出错\n│   │\n│   ├── 第二层：架构设计\n│   │   ├── 推荐模型：Claude Opus 4.5\n│   │   ├── 优势：推理强、架构方向把控准\n│   │   └── 局限：价格较贵\n│   │\n│   └── 第三层：具体编码实现\n│       ├── 主选：Claude 3.5（性价比高）\n│       └── 平替：Gemini 2.5 Pro（更便宜，需多验证几轮）\n│\n├── 模型横向评价\n│   ├── Claude Opus（agentic 模式）：效果最好，最贵\n│   ├── Gemini 2.5 Pro：平替首选，量大管饱\n│   ├── Gemini 2.0 Pro：有潜力，安全审查能力待提高\n│   └── GPT 系列：质量可以，性价比低，不推荐\n│\n└── 核心原则\n    ├── 术业有专攻，按需分配模型\n    ├── 根据预算灵活调整\n    └── 别迷信单一模型，AI 更新太快","concepts":"#### 概念一：分层写作模式\n\n**是什么**：将一个完整的开发任务拆分为多个阶段，每个阶段选用最擅长该任务的 AI 模型，而不是全程用同一个模型。\n\n**为什么重要**：\n不同模型在 UI 生成、逻辑推理、架构设计上的能力差距显著；用单一模型会在它的短板上浪费时间和金钱，分层使用可以让每一分钱都花在刀刃上。\n\n**详细解释**：\n\n| 层级 | 任务类型 | 推荐模型 | 核心理由 |\n|------|----------|----------|----------|\n| 第一层 | 前端原型 / UI 搭建 | Gemini 2.0 Pro | UI 美观，出效果快，适合快速验证 |\n| 第二层 | 系统架构 / 数据库设计 / API 规划 | Claude Opus 4.5 | 推理能力强，架构方向把控准 |\n| 第三层 | 具体代码实现 | Claude 3.5 / Gemini 2.5 Pro | 执行效率高，性价比好 |\n\n**实际应用场景**：\n视频中举例：做 AI 视频剪辑工具的后台管理系统——先用 Gemini 搭界面（30 分钟出视觉效果），再用 Claude Opus 做架构设计，最后用 Claude 3.5 跑具体代码实现，一天内完成整个系统。\n\n---\n\n#### 概念二：性价比优先的模型选择逻辑\n\n**是什么**：在效果相近的前提下，优先选择单位成本更低的模型；只在真正需要时才动用高价模型。\n\n**为什么重要**：\n高价模型（如 Claude Opus）并非在所有任务上都比平价模型强出足够多，盲目使用会快速烧光预算，尤其在大量代码生成场景下成本差异极为显著。\n\n**详细解释**：\n\n| 场景 | 推荐选择 | 理由 |\n|------|----------|------|\n| 常规编码 | Claude 3.5 | 效率高，性价比好 |\n| 复杂 bug / 复杂架构 | Claude Opus 4.5 | 贵但值，解决复杂问题能力明显更强 |\n| 预算有限的编码 | Gemini 2.5 Pro | 价格更低，水平接近 Claude 3.5 |\n| 不差钱追求最优 | Claude Opus + agentic 模式 | 效果最好，但成本最高 |\n| 不推荐用于写代码 | GPT 系列 | 同等价格可买到更好服务 |\n\n**实际应用场景**：\n对大多数独立开发者或小团队，Gemini 2.5 Pro 是\"量大管饱\"的平替首选，多跑几轮验证即可弥补偶尔的不稳定性。\n\n---\n\n#### 概念三：模型各自的能力边界\n\n**是什么**：每个主流 coding 模型都有明确的优势区间和短板，了解边界才能合理分配任务。\n\n**为什么重要**：\n把不擅长的任务交给错误的模型，不仅出错率高，还会浪费大量 token 成本在反复修正上。\n\n**详细解释**：\n\n| 模型 | 优势 | 短板 |\n|------|------|------|\n| Gemini 2.0 Pro | UI 界面美观，前端效果好，出图快 | 复杂后端逻辑推理能力弱 |\n| Claude Opus 4.5 | 复杂推理、架构设计、疑难 bug 定位 | 价格贵，日常编码性价比低 |\n| Claude 3.5 | 常规编码执行效率高，性价比好 | 极复杂问题不如 Opus |\n| Gemini 2.5 Pro | 价格便宜，推理能力接近 Claude 3.5 | 偶尔需要多轮验证才稳定 |\n| GPT 系列 | 质量尚可 | 性价比在当前竞争格局下偏低 |\n\n**实际应用场景**：\n遇到\"奇怪的 bug 怎么都解决不了\"时，直接升级到 Claude Opus，而不是在低价模型上反复挣扎浪费时间。","table":"| 使用场景 | 首选模型 | 备选 / 平替 | 关键理由 |\n|----------|----------|-------------|----------|\n| 快速搭前端原型 / UI | Gemini 2.0 Pro | — | 界面美观，速度快 |\n| 系统架构 / 数据库 / API 设计 | Claude Opus 4.5 | — | 推理最强，把控方向 |\n| 常规后端编码实现 | Claude 3.5 | Gemini 2.5 Pro | 性价比高，执行稳定 |\n| 预算有限的全流程编码 | Gemini 2.5 Pro | — | 便宜，水平接近 Claude 3.5 |\n| 追求最优效果（不差钱） | Claude Opus + agentic 模式 | — | 效果天花板，成本最高 |\n| 不推荐场景 | GPT 系列 | — | 同价位有更优选择 |","thinking":"1. **分层策略的切换成本如何控制？** 在不同模型之间传递上下文（代码、架构文档、需求）时，如何设计 prompt 和交接格式，才能减少信息损耗、避免\"换了模型就忘了前面做了什么\"的问题？\n\n2. **Gemini 2.5 Pro\"多跑几轮验证\"的隐性成本值得吗？** 如果把多轮验证的时间成本折算进去，它相对于 Claude 3.5 的价格优势还剩多少？什么类型的项目更适合用它，什么类型的项目反而不划算？\n\n3. **\"别迷信某一个模型\"在实操中如何落地？** 随着各家模型快速迭代，如何建立一套自己的周期性评测机制，而不是靠零散的感受来判断哪个模型当前最值得用？","remember":"别用一个模型从头写到尾——前端原型交给 Gemini，架构设计交给 Claude Opus，具体编码按预算在 Claude 3.5 和 Gemini 2.5 Pro 之间选，术业有专攻才是最省钱的 vibe coding 方式。","is_new":true},{"id":"7604485515164880163","title":"零代码一下午做出网页应用并上线","cat":"vibecoding","video_url":"https://www.douyin.com/video/7604485515164880163","audience":"想用 AI 工具独立做出产品但完全不会写代码的普通人","summary":"用 ChatGPT/Claude + Google Stitch + Google IDX + Vercel 四个工具串联成一条流水线，让完全不会写代码的人也能在一个下午内把想法变成真实上线的网页应用。","raw_preview":"我用了一下午做出了一个完整的网页应用，还部署上线了，任何人都能访问，关键是我一行代码都没写。今天我把整个过程拆解给你，跟着做你也行。\n\n整个过程就四步：第一步明确需求，第二步生成原型，第三步原型转代码，第四步部署上线。接下来我一步一步跟你说清楚。\n\n先说第一步，头脑风暴，明确需求。这一步是整个流程中最重要的一步，很多人会忽略它，但我必须告诉你，你最终做出来的东西好不好，80% 取决于你这一步做得扎","knowledge_map":"零代码做网页应用并上线\n│\n├── 第一步：明确需求（最重要，决定80%质量）\n│   ├── 工具：ChatGPT / Claude / Gemini 任选其一\n│   ├── 方法：像聊天一样描述想法，多轮对话（10~20轮）\n│   ├── AI 的作用：反问、补漏、分析利弊\n│   ├── 目标：明确模块、功能、页面数、操作流程\n│   └── 输出物：PRD（产品需求文档）\n│\n├── 第二步：生成原型界面\n│   ├── 工具：Google Stitch\n│   ├── 输入：PRD 文档\n│   ├── 输出：覆盖所有页面的 UI 原型（视觉接近成品）\n│   └── 方法：反复微调（风格、布局、按钮位置等）\n│\n├── 第三步：原型转代码\n│   ├── 工具：Google IDX（从 Stitch 直接导出）\n│   ├── 技术栈：React + TypeScript（不需要懂）\n│   ├── 简单项目：在 IDX 内直接预览/调试/修改\n│   ├── 复杂项目：拉到本地用 Cursor / Claude Code / Cline\n│   ├── 报错处理：把报错信息扔给 AI 修\n│   ├── 原则：小步迭代，改一点测一点\n│   └── 关键操作：一键推送代码到 GitHub（必做，可回退）\n│\n└── 第四步：部署上线\n    ├── 工具：Vercel\n    ├── 登录方式：GitHub 账号\n    ├── 操作：选仓库 → 填环境变量（如 API Key）→ 点部署\n    └── 输出：专属网址，任何人可访问","concepts":"#### 概念一：PRD（产品需求文档）\n\n**是什么**：把你对产品的所有想法和需求整理成一份结构化文档，是后续所有步骤的\"蓝图\"。\n\n**为什么重要**：视频明确说\"最终做出来的东西好不好，80% 取决于这一步做得扎不扎实\"。后续的原型生成、代码生成都依赖这份文档的质量。\n\n**详细解释**：\n\n| 要素 | 说明 |\n|------|------|\n| 模块划分 | 应用由哪几个大模块组成 |\n| 功能列表 | 每个模块下有哪些具体功能 |\n| 页面清单 | 一共几个页面，每页有什么内容 |\n| 操作流程 | 用户从进入到完成任务的完整路径 |\n\n**实际应用场景**：用 ChatGPT/Claude/Gemini 多轮对话，最终让 AI 把聊天结果汇总输出成这份文档，直接复制扔给下一步工具使用。\n\n---\n\n#### 概念二：原型（UI Prototype）\n\n**是什么**：用 Google Stitch 根据 PRD 自动生成的应用界面视觉稿，看起来接近真实产品，但还不能运行。\n\n**为什么重要**：它是需求文字和可运行代码之间的\"翻译层\"，让你在写代码之前就能看到并调整产品长什么样，避免做出来才发现不对。\n\n**详细解释**：\n- 输入 PRD → Stitch 自动生成所有页面的 UI 布局\n- 可以继续用自然语言指令调整：风格（如暗黑风格）、布局、按钮位置等\n- 反复微调直到满意，才进入下一步\n\n**实际应用场景**：把 PRD 粘贴进 Google Stitch，告诉它\"我想要暗黑风格\"\"这个按钮移到右上角\"，迭代到满意为止。\n\n---\n\n#### 概念三：GitHub 版本控制\n\n**是什么**：一个代码托管平台，可以保存代码的每一次历史版本。\n\n**为什么重要**：视频特别强调\"这一步一定要做，相当于给代码上了个保险，改崩了随时能回退\"。对于不懂代码的人来说，这是防止把项目搞坏又无法恢复的关键保障。\n\n**详细解释**：\n- Google IDX 支持一键将代码推送到 GitHub\n- 每次改动前推送一次，出问题可以回到上一个可用版本\n- 同时也是 Vercel 部署的代码来源\n\n**实际应用场景**：在 IDX 里点一下\"推送到 GitHub\"，之后 Vercel 直接连接这个仓库完成部署。\n\n---\n\n#### 概念四：Vercel 一键部署\n\n**是什么**：一个专门用于部署前端网页应用的平台，连接 GitHub 仓库后可以自动构建并生成可访问的网址。\n\n**为什么重要**：让\"本地能跑\"变成\"全世界都能访问\"，是整个流程的最后一公里，且操作极简。\n\n**详细解释**：\n\n| 步骤 | 操作 |\n|------|------|\n| 登录 | 用 GitHub 账号登录 Vercel |\n| 选仓库 | 选择刚推送的代码仓库 |\n| 填环境变量 | 如有 API Key 等敏感信息在此填写 |\n| 点击部署 | Vercel 自动构建，生成专属网址 |\n\n**实际应用场景**：整个操作不超过5分钟，部署完成后得到一个形如 `yourapp.vercel.app` 的网址，发给任何人都能打开使用。","table":"| 步骤 | 目标 | 工具 | 输入 | 输出 |\n|------|------|------|------|------|\n| 第一步：明确需求 | 把模糊想法变成清晰文档 | ChatGPT / Claude / Gemini | 你的想法（自然语言） | PRD 产品需求文档 |\n| 第二步：生成原型 | 把文档变成可视化界面 | Google Stitch | PRD 文档 | 所有页面的 UI 原型 |\n| 第三步：原型转代码 | 把界面变成可运行程序 | Google IDX → GitHub（复杂项目再用 Cursor/Claude Code/Cline） | UI 原型文件 | 可运行的前端代码 + GitHub 仓库 |\n| 第四步：部署上线 | 让任何人都能访问 | Vercel | GitHub 仓库 | 专属访问网址 |\n\n| 场景 | 推荐方案 |\n|------|------|\n| 项目简单（纯前端） | 全程在 Google IDX 内完成 |\n| 项目复杂（需要后端/精细调整） | 从 GitHub 拉到本地，用 Cursor / Claude Code / Cline |\n| 遇到报错 | 把报错信息直接发给 AI，让它修 |\n| 担心改崩 | 每次改动前先推送到 GitHub |","thinking":"1. **需求阶段的质量瓶颈**：视频说\"80% 的质量取决于第一步\"，但如果你本身对自己想做什么都不清楚，AI 的反问和引导能补足多少？有没有什么方法可以在开始聊之前先做一些准备，让第一步效率更高？\n\n2. **这条工具链的边界在哪里**：视频介绍的流程主要适合前端网页应用，如果产品需要用户登录、数据存储、支付等后端功能，这套流程还能走多远？哪个环节会最先遇到障碍？\n\n3. **Vibe Coding 的可维护性问题**：一行代码都没写就做出来的产品，如果上线后需要持续迭代、修复 bug、增加功能，长期维护的成本和风险会是什么样的？和自己写代码的项目相比有哪些本质差异？","remember":"做产品不再需要会写代码，你只需要会描述需求——用 AI 聊出 PRD、用 Stitch 画出原型、用 IDX 生成代码、用 Vercel 上线，一个下午，从想法到产品。","is_new":true},{"id":"7607472841860189492","title":"AI辅助完成App从开发到上架全流程","cat":"vibecoding","video_url":"https://www.douyin.com/video/7607472841860189492","audience":"有App创意但不会写代码、想用AI工具实现产品落地的普通人或产品经理","summary":"一个普通人用AI工具在一个月内独立完成了鸿蒙+iOS双端App的开发、备案、上架全流程，并揭示了\"流程掌握\"才是真正门槛这一核心洞察。","raw_preview":"我用一个月多的时间，使用AI工具完成了一款App的从开发到上架。今后我会分多个视频细节介绍实现的步骤。\n\n这款App目前可以在鸿蒙和iOS系统上运行，前端使用的是鸿蒙和iOS的原生开发框架，后端使用的是Python开发框架，并且完成了App上架的所有必要申请，包括ICP网站备案、软著的申请，以及公安部AI算法备案。从环境搭建到正式上架，实现了AI辅助开发的全流程。\n\n这款App名叫\"家庭药箱\"，通","knowledge_map":"AI辅助App开发全流程\n├── 1. 产品本身\n│   ├── 名称：家庭药箱\n│   ├── 平台：鸿蒙 + iOS 原生双端\n│   ├── 后端：Python\n│   └── 核心功能\n│       ├── 拍照AI录入药品\n│       ├── 服药提醒\n│       ├── 家庭联动（远程查看老人服药）\n│       └── AI机器人（通义千问）\n│           ├── 查看待办 / 快速打卡\n│           ├── 对话创建服药计划\n│           ├── 健康报告分析\n│           └── 健康问题咨询\n│\n├── 2. 开发工具链\n│   ├── 编程助手：Claude Code\n│   ├── 核心模型：Claude Opus 4.6\n│   └── 代码编辑器：VS Code\n│\n├── 3. 基础设施\n│   ├── 服务器：阿里云（99元/年）\n│   └── 域名：.CN 域名\n│\n├── 4. 上架必要备案（三项）\n│   ├── 工信部 ICP 备案（阿里云工作台提交）\n│   ├── 软著登记（60页代码文档 + 60页设计文档，审核约60天）\n│   └── 公安部 AI 算法备案（约10个工作日）\n│\n└── 5. 核心洞察\n    ├── 代码壁垒已被AI打破\n    └── 真正门槛 = 对软件开发流程的掌握","concepts":"#### 概念一：AI辅助编程（Vibe Coding）\n\n**是什么**：使用Claude Code等AI编程工具，通过对话或指令让AI生成、修改、调试代码，开发者主要负责方向和审查。\n\n**为什么重要**：\n代码曾经是App开发最高的门槛，大多数有想法的人因为不会写代码而止步。AI编程工具将这道壁垒彻底打破，让\"想法→产品\"的路径对普通人开放。\n\n**详细解释**：\n视频中使用的工具组合为：\n\n| 工具 | 作用 |\n|---|---|\n| Claude Code | AI编程助手，负责生成和修改代码 |\n| Claude Opus 4.6 | 底层核心模型，作者评价为\"编程能力最强，没有之一\" |\n| VS Code | 代码编辑器，用于查看和管理文件 |\n\n**实际应用场景**：\n用Opus 4.6完成鸿蒙+iOS双端原生前端代码和Python后端代码的编写，节省大量手写代码的时间。\n\n---\n\n#### 概念二：App上架三项备案\n\n**是什么**：在中国大陆，任何商用App在正式上架前，依法必须完成三项不同部门的备案或登记手续。\n\n**为什么重要**：\n这是商用App合法运营的前提，缺少任何一项都无法正常上架或可能面临下架风险，也是很多独立开发者容易忽视的\"隐性门槛\"。\n\n**详细解释**：\n\n| 备案类型 | 主管部门 | 提交方式 | 所需材料 | 审核周期 |\n|---|---|---|---|---|\n| ICP备案 | 工信部 | 阿里云工作台 | 常规网站材料 | 若干工作日 |\n| 软著登记 | 版权局 | 线上提交 | 60页代码文档 + 60页设计文档 | 约60天（可加钱加急） |\n| AI算法备案 | 公安部 | 官方网站 | 按流程填写 | 约10个工作日 |\n\n> ⚠️ 软著登记是耗时最长、材料最多的一项，但AI可以在20分钟内生成所需的两份文档（以前人工准备需要约一周）。\n\n**实际应用场景**：\n项目开发完成后，作者用AI生成软著所需的60页代码文档和60页设计文档，将原本一周的准备工作压缩至20分钟。\n\n---\n\n#### 概念三：软件开发的底层流程\n\n**是什么**：软件开发作为系统工程，有一套从需求→设计→开发→测试→上架→备案的标准流程，这套流程本身不因AI的出现而改变。\n\n**为什么重要**：\n作者的核心洞察是：大多数人做不出App，不是因为不会用AI写代码，而是不懂软件开发的流程。AI只是加速了执行，流程的掌握才是真正的能力壁垒。\n\n**详细解释**：\n\n```\n需求定义 → 技术选型 → 基础设施搭建 → 前后端开发\n    → 功能测试 → 备案申请（并行推进）→ 正式上架\n```\n\n- AI改变的：代码编写速度、文档生成速度\n- AI没有改变的：流程的先后顺序、每个环节的必要性\n\n**实际应用场景**：\n作者用一个月完成全流程，说明只要流程清晰，执行速度可以大幅压缩，但每个环节（尤其是备案审核等待期）仍然客观存在。\n\n---\n\n#### 概念四：低成本商用基础设施\n\n**是什么**：支撑一个商用App运行的最基础服务器和域名资源，可以用极低成本起步。\n\n**为什么重要**：\n很多人误以为做商用App需要很高的服务器成本，实际上早期验证阶段成本极低，降低了个人开发者的资金门槛。\n\n**详细解释**：\n\n| 资源 | 选择 | 成本 |\n|---|---|---|\n| 服务器 | 阿里云优惠服务器 | 99元/年 |\n| 域名 | .CN 域名 | 极低年费 |\n| 管理入口 | 阿里云工作台 | 免费 |\n\n**实际应用场景**：\n作者通过阿里云工作台统一管理服务器、域名和ICP备案，所有购买和可用资源在一个界面集中显示。","table":"| 维度 | 详情 |\n|---|---|\n| **项目名称** | 家庭药箱 |\n| **开发周期** | 约1个月 |\n| **支持平台** | 鸿蒙 + iOS（双端原生） |\n| **后端语言** | Python |\n| **AI编程工具** | Claude Code + Claude Opus 4.6 |\n| **接入大模型** | 通义千问（App内AI机器人） |\n| **服务器成本** | 阿里云 99元/年 |\n| **备案项目** | ICP备案 / 软著登记（60天）/ 公安部AI算法备案（10天） |\n| **AI节省最多的环节** | 软著文档生成（一周→20分钟） |\n| **作者核心结论** | 流程掌握 > 会不会写代码 |","thinking":"1. **流程是新门槛，那流程从哪里学？** 作者说\"掌握标准流程和方法论\"是关键，但这套流程本身对新手来说并不透明——如何系统获取软件开发的全流程知识，是否也可以用AI来辅助学习和规划？\n\n2. **AI生成的软著文档，质量和合规性如何保障？** 软著登记需要60页代码文档和60页设计文档，AI能在20分钟内生成，但审核机构如何看待AI生成的申请材料？这类文件的真实性和法律效力是否存在风险？\n\n3. **\"工业级代码\"的边界在哪里？** 作者说AI现在能实现\"工业级代码\"，但一款月活用户规模扩大后，AI生成的代码在性能优化、安全性、可维护性上是否还能支撑？个人开发者用AI做出的产品，技术天花板在哪里？","remember":"代码已经不是门槛，懂得软件开发的完整流程，才是普通人用AI把想法变成真实App的真正武器。","is_new":true},{"id":"7609728440245602025","title":"挑战30天从AI焦虑者变实践者","cat":"vibecoding","video_url":"https://www.douyin.com/video/7609728440245602025","audience":"没有AI基础、也非程序员，但想系统学习AI工具并落地应用的普通人","summary":"迪姐发起一个30天AI学习挑战，带零基础普通人分5个阶段系统掌握AI底层认知、主流工具和实际工作流，从焦虑旁观者变成真正的AI实践者。","raw_preview":"Hello，这里是迪姐。今天我们想正式从3月1号开始，发起一个为期30天直播系列的挑战活动，名字叫做\"挑战30天掌握AI\"，浩瀚完整的学习路线图。\n\n我们要做的是一件非常明确的事情：用30天的时间和大家一起从AI的焦虑者变成AI的实践者。\n\n参与这个30天的挑战活动，大家将会获得什么呢？首先是理解AI的底层逻辑，会用主流的AI工具，同时能够用AI去动手做图像，包括在电商场景当中去制作商品的素材、进","knowledge_map":"挑战30天掌握AI\n│\n├── 目标\n│   ├── 理解AI底层逻辑\n│   ├── 会用主流AI工具\n│   ├── 用AI做图像/电商素材\n│   ├── 做小工具和小应用\n│   └── 搭建个人AI工作流\n│\n├── 参与门槛\n│   ├── 无需AI基础\n│   ├── 无需编程经验\n│   └── 只需坚持30天\n│\n└── 五大阶段\n    ├── 阶段一（第1-5天）：AI底层认知\n    │   ├── token与上下文窗口\n    │   ├── prompt正确用法\n    │   ├── AI幻觉原理\n    │   ├── 模型差异与选型\n    │   └── 目标：构建AI心智模型\n    │\n    ├── 阶段二：Prompt & Context工程\n    │   ├── Chain of Thought 思维链\n    │   ├── System Prompt设计\n    │   └── Context Engineering\n    │\n    ├── 阶段三：创意与生产力工具\n    │   ├── Gemini → 做研究\n    │   ├── Claude → 写长文/代码\n    │   ├── Midjourney → 电商图片/测评\n    │   └── 自动化自媒体内容工作流\n    │\n    ├── 阶段四：无代码开发与AI Agent\n    │   ├── 无代码开发工具/网站/APP\n    │   ├── N8N → 搭建工作流\n    │   └── Dify → 搭建AI Agent\n    │\n    └── 阶段五：沉淀与系统化\n        ├── 个人知识库搭建\n        ├── 日常工作流自动化\n        ├── 开源模型趋势\n        ├── 专属个人AI助手\n        └── 第30天：复盘与系统打造","concepts":"#### 概念一：AI心智模型\n\n**是什么**：对AI如何工作的正确底层认知框架，包括token、上下文窗口、幻觉机制和模型差异。\n\n**为什么重要**：\n没有正确的心智模型，用AI只是\"碰运气\"；有了它，才能知道为什么AI会出错、该选哪个模型、怎么提问才有效。\n\n**详细解释**：\n\n| 概念 | 含义 |\n|------|------|\n| Token | AI理解语言的基本单位，不完全等于一个字或一个词 |\n| 上下文窗口 | AI每次能\"记住\"的信息量上限 |\n| AI幻觉 | AI在不确定时仍会生成看似合理但错误的内容 |\n| 模型选型 | 根据任务特点选择最合适的AI模型 |\n\n**实际应用场景**：知道上下文窗口有限，就会主动把长对话拆分；知道幻觉存在，就会对AI给出的事实进行核查。\n\n---\n\n#### 概念二：Prompt & Context 工程\n\n**是什么**：通过设计高质量的提示词（Prompt）和上下文结构，让AI产出更精准结果的方法论。\n\n**为什么重要**：\n同样的AI工具，会提问的人和不会提问的人，产出质量可以天差地别。这是普通人能快速拉开差距的核心技能。\n\n**详细解释**：\n\n| 技术 | 作用 |\n|------|------|\n| Chain of Thought（思维链） | 引导AI一步步推理，减少跳跃性错误 |\n| System Prompt | 给AI设定角色、规则和背景，让输出更稳定 |\n| Context Engineering | 精心管理输入给AI的上下文信息，提升回答质量 |\n\n**实际应用场景**：写一个System Prompt让AI始终以\"电商文案专家\"身份回复，每次对话不需要重复说明背景。\n\n---\n\n#### 概念三：主流AI工具的分工\n\n**是什么**：不同AI工具有各自擅长的场景，合理分工才能最大化效率。\n\n**为什么重要**：\n很多人只用一个工具做所有事，效果平平。了解各工具的定位，可以像\"用对刀切对菜\"一样显著提升产出质量。\n\n**详细解释**：\n\n| 工具 | 擅长场景 |\n|------|---------|\n| Gemini | 信息研究、资料整合 |\n| Claude | 长文写作、代码辅助 |\n| Midjourney | 电商图片生成、视觉测评素材 |\n| N8N | 自动化工作流搭建 |\n| Dify | AI Agent构建 |\n\n**实际应用场景**：做电商选品时，用Gemini研究市场趋势，用Midjourney生成产品图，用N8N自动推送内容到各平台。\n\n---\n\n#### 概念四：无代码开发与AI Agent\n\n**是什么**：不需要写传统编程代码，通过AI和可视化工具，普通人也能开发小工具、网站和自动化智能体（Agent）。\n\n**为什么重要**：\n这打破了\"开发=程序员专属\"的边界，让有想法的普通人可以直接把创意变成可用的产品。\n\n**详细解释**：\n- **无代码开发**：用AI辅助生成代码或使用可视化平台，做出网站、APP、插件\n- **AI Agent**：能自主完成多步骤任务的AI系统，比如自动收集信息→整理→发布\n- **N8N**：开源自动化工具，可以连接各类应用搭建工作流\n- **Dify**：用于构建和部署AI Agent的平台\n\n**实际应用场景**：用Dify搭建一个AI客服Agent，自动回答用户常见问题，不需要雇人值守。","table":"| 阶段 | 时间 | 核心内容 | 关键产出 |\n|------|------|---------|---------|\n| 阶段一 | 第1-5天 | AI底层认知（token、幻觉、模型选型） | 建立正确AI心智模型 |\n| 阶段二 | 第二阶段 | Prompt工程、Chain of Thought、System Prompt | 掌握高质量与AI沟通的方法 |\n| 阶段三 | 第三阶段 | Gemini/Claude/Midjourney实战 | 用AI提效、做电商素材、自媒体工作流 |\n| 阶段四 | 第四阶段 | 无代码开发、N8N、Dify | 开发小工具/网站/AI Agent |\n| 阶段五 | 第五阶段 | 知识库、开源模型、个人AI助手 | 打造专属个人生产力系统 |\n\n| 工具 | 类型 | 核心用途 |\n|------|------|---------|\n| Gemini | AI模型 | 研究与信息整合 |\n| Claude | AI模型 | 长文写作与代码 |\n| Midjourney | AI绘图 | 电商图片生成 |\n| N8N | 自动化平台 | 工作流搭建 |\n| Dify | Agent平台 | AI智能体构建 |","thinking":"1. **心智模型决定上限**：视频把\"建立正确AI心智模型\"放在第一阶段，为什么底层认知比学会用工具更重要？如果跳过这一步直接学工具，会遇到什么问题？\n\n2. **工具分工的边界在哪里**：Gemini做研究、Claude写长文、Midjourney做图——随着各家AI能力快速迭代，这种分工格局会长期稳定吗？普通人应该如何保持自己工具认知的更新？\n\n3. **从学会到系统化的鸿沟**：最后一个阶段强调\"沉淀与系统化\"，把所学打造成个人生产力系统——学了30天之后，什么样的人能真正做到系统化，什么样的人会学完就忘？决定这个差距的关键是什么？","remember":"30天、5个阶段、零基础可入——这不是又一个AI工具教程，而是一张从\"看不懂AI\"到\"用AI改变工作方式\"的完整路线图。","is_new":true},{"id":"7611079015830506786","title":"Red/Green TDD 提升 AI 编程质量","cat":"vibecoding","video_url":"https://www.douyin.com/video/7611079015830506786","audience":"已在使用 AI 辅助编程、但对代码质量和可控性感到焦虑的开发者","summary":"AI 编程时代，写代码已经不值钱，用 Red/Green TDD\"先写测试、定义标准\"才是让 AI 持续产出高质量代码的核心方法。","raw_preview":"你让 AI 写代码，写完发现一跑就崩。你让 AI 改个小功能，结果整个项目全废了。\n\n别急，全世界最懂 AI 编程的人之一、Django 创始人 Simon Willison 给出了一个杀手级方法，四个字——红绿灯法。今天我把他的整套 Agentic Engineering 方法论给你拆透。\n\nSimon Willison 是 Django 框架的联合创始人，开源圈的老炮，全球写 AI 编程实践最","knowledge_map":"AI 编程质量保障方法论（Simon Willison · Agentic Engineering Patterns）\n│\n├── 背景问题\n│   ├── AI 写代码快但不可控（改按钮可能删登录逻辑）\n│   ├── 代码产量爆炸（Cloudflare 案例：1人+AI，1周，$1100）\n│   └── 新稀缺资源：不是写代码，而是\"定义什么叫对\"\n│\n├── 核心概念对比\n│   ├── Vibe Coding（随意说话让 AI 写，能不能用另说）\n│   └── Agentic Engineering（工程师用 AI 做工具，你控制它）\n│\n├── 核心方法：Red/Green TDD\n│   ├── 什么是 TDD（测试驱动开发，存在 20+ 年）\n│   ├── 为什么 AI 时代变成必须项（无法逐行审查）\n│   └── 三步操作流程\n│       ├── Step 1：先写测试（描述\"我要什么\"，让 AI 出测试用例）\n│       ├── Step 2：跑测试，确认红灯（验证测试本身有效）\n│       └── Step 3：让 AI 写实现，绿灯通过，红灯重写\n│\n└── 配套技巧：First Run Test\n    ├── 每次新会话第一句话：先跑测试\n    ├── 好处1：AI 知道项目有测试套件，改代码自动跑测试\n    ├── 好处2：测试数量让 AI 感知项目规模，更谨慎\n    └── 好处3：AI 会主动为新代码补写测试","concepts":"#### 概念一：Agentic Engineering vs Vibe Coding\n\n**是什么**：两种截然不同的 AI 编程姿态——Vibe Coding 是随意描述让 AI 生成代码；Agentic Engineering 是专业工程师把 AI 当工具，自己掌握控制权。\n\n**为什么重要**：\n决定了你和 AI 的权力关系。Vibe Coding 是 AI 控制你（你只能接受它给的），Agentic Engineering 是你控制 AI（你定规则，它执行）。\n\n**详细解释**：\n\n| 维度 | Vibe Coding | Agentic Engineering |\n|------|------------|---------------------|\n| 使用者 | 任何人 | 专业工程师 |\n| 指令方式 | 随意描述需求 | 定义验收标准 |\n| 结果可控性 | 低，能不能用另说 | 高，测试说了算 |\n| 代表人物 | — | Simon Willison |\n\n**实际应用场景**：\n做个人小工具可以 Vibe Coding，但生产环境、团队协作项目必须用 Agentic Engineering，否则 AI 的一次\"顺手改动\"可能引发连锁崩溃。\n\n---\n\n#### 概念二：Red/Green TDD（测试驱动开发）\n\n**是什么**：一种先写测试、后写实现的开发方法。红灯 = 测试失败（实现还不存在或有问题），绿灯 = 测试通过（实现正确）。\n\n**为什么重要**：\nAI 写代码速度极快，人工逐行审查已经不现实。测试是唯一能自动、客观判断\"AI 写的对不对\"的机制，是你给 AI 划的及格线。\n\n**详细解释**：\n\n三步操作流程：\n\n| 步骤 | 操作 | 关键注意点 |\n|------|------|-----------|\n| Step 1 | 告诉 AI\"我要什么\"，让它先写测试用例 | 不要先写实现，先写测试 |\n| Step 2 | 跑测试，确认当前是红灯（失败） | 必须确认！AI 可能写出\"永远通过\"的假测试 |\n| Step 3 | 让 AI 写实现代码，再跑测试 | 绿灯通过，红灯让 AI 重写 |\n\n**实际应用场景**：\n例如让 AI 写一个\"输入文章、输出所有标题\"的函数——先让 AI 写测试用例（给定一篇含3个标题的文章，应返回3个标题），确认测试失败后，再让 AI 写函数实现，跑测试变绿即完成。\n\n---\n\n#### 概念三：First Run Test（首次运行测试）\n\n**是什么**：每次开启新的 AI 编程会话时，第一句话就让 AI 先跑一遍现有测试套件。\n\n**为什么重要**：\n它是一个\"建立上下文\"的习惯动作，能在会话一开始就把 AI 的行为模式校准到\"质量优先\"模式。\n\n**详细解释**：\n\n| 好处 | 具体效果 |\n|------|---------|\n| 建立测试意识 | AI 知道项目有测试套件，后续每次改代码都会自动想到跑测试 |\n| 感知项目规模 | 测试数量让 AI 判断项目大小，从而更谨慎地修改 |\n| 带动主动补测试 | AI 看到你重视测试，会主动为新增代码补写测试用例 |\n\n**实际应用场景**：\n打开 Claude Code 或 Codex，第一条消息不是\"帮我加个功能\"，而是\"先跑一下测试，告诉我现在哪些通过哪些失败\"。","table":"| 对比维度 | 旧习惯（不推荐） | Red/Green TDD（推荐） |\n|---------|----------------|----------------------|\n| 开发顺序 | 先写实现，再想测试 | 先写测试，再写实现 |\n| 质量验证方式 | 人工看代码、手动测试 | 自动化测试套件 |\n| 对 AI 的指令 | \"帮我做 X\" | \"做成什么样算对，先写测试\" |\n| AI 改动风险 | 高（可能悄悄破坏其他功能） | 低（测试会立刻暴露回归问题） |\n| 适用工具 | — | Claude Code、Codex 等均适用 |\n| 核心价值 | 快速出代码 | 持续产出高质量代码 |\n| 稀缺能力 | 写代码（AI 已接管） | 定义验收标准（人的核心价值） |","thinking":"1. **\"测试先失败\"这一步为什么不能省？** AI 有时会生成\"永远通过\"的假测试——这种测试不仅没用，还会给你虚假的安全感。如何在日常工作中建立\"验证测试有效性\"的习惯，而不是默认信任 AI 的输出？\n\n2. **当代码产量不再是瓶颈，\"定义验收标准\"的能力如何培养？** Simon 说写测试就是在定义\"什么叫对\"。对于非测试背景的开发者，或者面对模糊需求时，怎样把业务要求转化成清晰的、可测试的验收条件？\n\n3. **Simon 把 Agentic Engineering Patterns 类比为 1994 年的《设计模式》——这个类比成立吗？** 《设计模式》解决的是代码结构的复用问题，而 Agentic Engineering 解决的是人与 AI 协作的质量控制问题。如果它真的定义了下一个时代，还有哪些\"模式\"可能会被总结出来？","remember":"让 AI 写代码很容易，但只有你先写测试、定义\"什么叫对\"，AI 才能真正为你所用。","is_new":true},{"id":"7612909965455428891","title":"用 AI 天团做 Vibe Coding 开发","cat":"vibecoding","video_url":"https://www.douyin.com/video/7612909965455428891","audience":"想用 AI 辅助开发但没有系统方法论的非专业开发者或独立产品人","summary":"一位非开发背景的产品人，分享自己如何用\"三工具并行 + Agent Teams 角色分工\"的 Vibe Coding 工作流，独立完成中大型项目开发。","raw_preview":"你不是开发背景吧？对，我不是开发背景，对。净的，我是完全就是 Vibe Coding 在做这个项目，是吗？90% 是 Vibe Coding 吧，因为用 Vibe Coding 很久了，其实自己脑子里也学了很多不同的语言，用什么技术，大概是什么样的，有时候也能自己减错。因为其实实话说，如果一个人开发中大型项目的话，你真的不懂得演这种具体的技术，你是很容易出很多 Bug，也会 Debug 很久很久。","knowledge_map":"Vibe Coding 独立开发工作流\n│\n├── 工具层（三工具并行）\n│   ├── 左：Claude（项目冷启动 / 架构储型）\n│   ├── 中：Cursor（主力开发编辑器）\n│   └── 右：IDE 内置 Copilot（收尾补全）\n│\n├── 方法层（Cursor Agent Teams 角色分工）\n│   ├── 架构师（设计整体技术架构）\n│   ├── 前端工程师\n│   ├── 后端工程师\n│   ├── 商业分析师\n│   ├── 高层管理人\n│   └── 投资人（可选）\n│\n├── 流程层（开发阶段）\n│   ├── 阶段1：Claude 起步，生成项目骨架\n│   ├── 阶段2：Cursor Agent Teams 多角色讨论，输出方案\n│   ├── 阶段3：进入正常开发循环，验收 & 考察\n│   └── 阶段4：Copilot 收尾补全\n│\n└── 模型选择\n    ├── Claude Sonnet 系列（主力）\n    └── Claude 4.6 / Sonnet 4.6（日常首选）","concepts":"#### 概念一：Vibe Coding\n\n**是什么**：不依赖系统性编程知识，主要靠 AI 工具驱动完成代码编写的开发方式。\n\n**为什么重要**：\n让非开发背景的人也能独立完成中大型项目，大幅降低了软件开发的门槛。\n\n**详细解释**：\n视频中的博主明确表示自己\"不是开发背景\"，但通过长期使用 Vibe Coding，脑子里也积累了多种语言和技术的基本认知，甚至能自己排查部分错误。Vibe Coding 不等于完全不懂技术，而是以 AI 为主力，人负责方向和验收。\n\n**实际应用场景**：\n- 独立开发者做产品原型\n- 产品经理直接实现自己的想法，不依赖工程团队\n\n---\n\n#### 概念二：Cursor Agent Teams 角色分工\n\n**是什么**：Cursor 编辑器内置的 Agent Teams 功能，允许用户给 AI 设置多个不同职能角色，让它们互相讨论后输出最终方案。\n\n**为什么重要**：\n单一 AI 视角容易有盲区；多角色分工能从架构、商业、管理等多维度审视方案，减少遗漏。\n\n**详细解释**：\n\n| 角色 | 职责 |\n|------|------|\n| 架构师 | 设计整体技术架构 |\n| 前端工程师 | 负责前端实现 |\n| 后端工程师 | 负责后端实现 |\n| 商业分析师 | 分析商业可行性和案例 |\n| 高层管理人 | 统筹视角，把控方向 |\n| 投资人（可选）| 从投资回报角度审视方案 |\n\n团队规模灵活，可以是 3-4 人小团队，也可以是 6 人完整团队，根据项目复杂度调整。\n\n**实际应用场景**：\n- 项目立项阶段，用多角色讨论快速得出技术 + 商业综合方案\n- 复杂功能设计时，避免只从单一技术视角思考\n\n---\n\n#### 概念三：三工具并行工作流\n\n**是什么**：同时打开 Claude、Cursor、IDE Copilot 三个工具，在开发的不同阶段各司其职。\n\n**为什么重要**：\n不同工具有不同的优势区间，组合使用能弥补各自的短板，提升整体开发质量和效率。\n\n**详细解释**：\n\n| 位置 | 工具 | 使用时机 | 优势 |\n|------|------|----------|------|\n| 左侧 | Claude | 项目冷启动 | 架构储型完整，遗漏少，注意力机制更稳定 |\n| 中间 | Cursor | 主力开发全程 | Agent Teams 功能强，适合迭代开发 |\n| 右侧 | IDE Copilot | 开发中后期收尾 | 在编辑器内嵌入式补全 |\n\n博主特别指出：Cursor 因注意力机制的问题，有时会遗漏一些小需求；而 Claude 在项目起步阶段的完整性表现更好，所以用 Claude 打底再切换到 Cursor 是更稳的策略。\n\n**实际应用场景**：\n- 新项目启动：先用 Claude 生成完整骨架，再导入 Cursor 继续开发\n- 日常迭代：以 Cursor 为主，Copilot 辅助收尾","table":"| 维度 | 内容 |\n|------|------|\n| 开发者背景 | 非开发，纯 Vibe Coding |\n| 主力编辑器 | Cursor |\n| 冷启动工具 | Claude |\n| 收尾工具 | IDE 内置 Copilot |\n| 核心方法 | Cursor Agent Teams 多角色分工 |\n| 团队规模 | 小团队 3-4 人 / 完整团队 6 人 |\n| 主力模型 | Claude Sonnet 4.5 / Claude 4.6 |\n| 适合项目规模 | 中大型项目 |","thinking":"1. **角色设置的边界在哪里？** Agent Teams 的角色越多讨论越充分，但也可能引入噪音和矛盾意见——什么情况下该用 3 人小团队，什么情况下才需要 6 人完整团队？\n\n2. **Vibe Coding 的技术天花板是什么？** 博主提到非开发背景做中大型项目容易出 Bug 且难以 Debug，那么 Vibe Coding 是否有项目复杂度的边界？超过这个边界后，人需要补充哪些最低限度的技术能力？\n\n3. **工具切换的成本如何控制？** 三工具并行意味着上下文需要在不同工具间同步，这个同步成本如何最小化？是否有更高效的单工具替代方案？","remember":"没有开发背景不是障碍——用 Claude 打地基、Cursor Agent Teams 组团讨论、Copilot 收尾，一个人也能跑起一个 AI 开发天团。","is_new":true},{"id":"7614351761827042266","title":"用 Vibe Coding 构建全球植被可视化应用","cat":"vibecoding","video_url":"https://www.douyin.com/video/7614351761827042266","audience":"对 Vibe Coding 感兴趣、想通过实际案例学习 AI 辅助编程的入门开发者或自然爱好者","summary":"作者用 Vibe Coding 方式构建了一个全球植被可视化应用，展示如何通过 AI 辅助编程快速实现带有多维筛选和实时天气联动功能的地理数据产品。","raw_preview":"你会好奇世界各地区都有什么样的花朵吗？于是我用 Vibe Coding 做了这个应用，根据植被在世界各地的生长记录，比如中国的桂花还有百合，地中海的无花果、金盏菊，非洲的金合欢、猴面包树，还有墨西哥的龙舌兰、巨人仙人掌。我还增加了几个非常有趣的功能，就是可以根据植被的类型来查看，比如花卉的或者乔木的；当然也可以根据气候来查看，比如温带的、湿地的；并且还可以根据海拔来过滤植被，不同的海拔对应不同的植","knowledge_map":"全球植被可视化应用（Vibe Coding 实践）\n├── 数据层：植被生长记录\n│   ├── 亚洲：桂花、百合（中国）\n│   ├── 地中海：无花果、金盏菊\n│   ├── 非洲：金合欢、猴面包树\n│   └── 北美洲/墨西哥：龙舌兰、巨人仙人掌\n│\n├── 功能层：多维筛选系统\n│   ├── 按植被类型筛选（花卉 / 乔木 …）\n│   ├── 按气候类型筛选（温带 / 湿地 …）\n│   └── 按海拔高度筛选\n│\n├── 扩展层：实时天气系统\n│   ├── 北美降雪\n│   └── 南海降雨\n│\n└── 未来方向\n    └── 引入更大、更多元的植被数据库","concepts":"#### 概念一：Vibe Coding\n\n**是什么**：一种以\"感觉驱动\"的 AI 辅助编程方式，开发者用自然语言描述想法，由 AI 生成代码，快速将创意变成可运行的应用。\n\n**为什么重要**：\n让没有深厚编程背景的人也能构建功能完整的应用，大幅降低从\"想法\"到\"产品\"的门槛。\n\n**详细解释**：\n本视频是 Vibe Coding 的典型案例——作者并未展示复杂的代码细节，而是直接呈现最终成品：一个包含数据展示、多维筛选、实时天气联动的完整 Web 应用。整个过程的核心是\"描述需求 → AI 实现 → 迭代调整\"。\n\n**实际应用场景**：\n快速原型验证、个人兴趣项目、数据可视化 Demo 制作。\n\n---\n\n#### 概念二：多维筛选系统\n\n**是什么**：允许用户从多个不同维度（类型、气候、海拔）对同一数据集进行过滤和查看的交互功能。\n\n**为什么重要**：\n单一维度的数据展示往往信息密度低，多维筛选让用户能按自己的关注点切入，大幅提升信息的可用性。\n\n**详细解释**：\n\n| 筛选维度 | 示例选项 | 作用 |\n|----------|----------|------|\n| 植被类型 | 花卉、乔木 | 按形态分类查看 |\n| 气候类型 | 温带、湿地 | 按生长环境查看 |\n| 海拔高度 | 低海拔、高海拔 | 按地形条件查看 |\n\n**实际应用场景**：\n地理信息系统（GIS）、生态研究工具、旅行博物类 App。\n\n---\n\n#### 概念三：实时天气联动\n\n**是什么**：在植被地图上叠加实时天气数据（如降雪、降雨），使地理可视化更具动态感和真实感。\n\n**为什么重要**：\n天气与植被分布高度相关，实时天气层让应用从\"静态图鉴\"升级为\"动态生态系统\"，信息更直观。\n\n**详细解释**：\n视频中提到两个典型天气场景：\n- **北美的雪**：对应高纬度、高海拔植被带\n- **南海的雨**：对应热带雨林、湿地植被带\n\n天气系统的引入，让用户在看到某种植被的同时，也能感受到其所处的真实气候环境。\n\n**实际应用场景**：\n生态教育平台、气候变化科普工具、户外探险辅助应用。","table":"| 维度 | 内容 |\n|------|------|\n| **开发方式** | Vibe Coding（AI 辅助编程） |\n| **核心功能** | 全球植被地图可视化 |\n| **数据覆盖地区** | 中国、地中海、非洲、墨西哥/北美 |\n| **代表性植被** | 桂花、百合、无花果、金盏菊、金合欢、猴面包树、龙舌兰、巨人仙人掌 |\n| **筛选维度** | 植被类型 / 气候类型 / 海拔高度 |\n| **扩展功能** | 全球实时天气系统（雪、雨） |\n| **当前局限** | 数据库规模有限，多元性不足 |\n| **未来方向** | 引入更大、更多元的植被数据库 |","thinking":"1. **数据质量决定上限**：视频末尾提到\"如果有更大更多元的数据库会更直观\"——在 Vibe Coding 快速搭建应用的背景下，数据的获取和清洗是否反而成了最难突破的瓶颈？\n\n2. **筛选维度的设计逻辑**：作者选择了\"类型、气候、海拔\"三个维度，如果你来设计，还会增加哪些维度（如土壤类型、濒危等级、花期月份）？增加维度后如何避免交互复杂度爆炸？\n\n3. **实时天气 + 植被的深度结合**：目前天气层更多是视觉叠加，如果进一步让天气数据驱动植被数据的动态更新（如雨季显示雨林植被更茂盛的状态），技术和数据层面需要解决哪些问题？","remember":"用 Vibe Coding，你只需要描述\"地球的花语\"，AI 帮你把它变成一张活的全球植被地图。","is_new":true},{"id":"7619957723727170859","title":"Claude Code 三大提效技巧","cat":"vibecoding","video_url":"https://www.douyin.com/video/7619957723727170859","audience":"想用 Claude Code 辅助编程、但还没找到高效用法的开发者或 AI 编程新手","summary":"通过\"先商量再放手、用 claude.md 定规矩、语音代替打字\"三个技巧，让 Claude Code 越用越懂你、越用越省力。","raw_preview":"我现在每天用 Claude Code 超过10个小时，总结出了3个提效技巧，能够让它越用越懂你，干活不返工。\n\n第一个：先商量再放手。复杂的任务先跟他说\"别动手，给我方案\"，他会自动切换为 Plan 模式，然后询问咱们细节、列步骤、给方案，等我们确认之后再开启狂编模式，把全线都给它——不管是上网查资料、写文件还是改代码，他都能给你库库干了，你就只需要去泡杯咖啡，回来就干完了。那如果你是新手，应该是","knowledge_map":"Claude Code 三大提效技巧\n├── 技巧一：先商量再放手\n│   ├── 触发方式：说\"别动手，给我方案\"\n│   ├── 效果：自动切换 Plan 模式（询问细节→列步骤→给方案）\n│   └── 确认后：开启狂编模式（需在设置中手动勾选）\n│\n├── 技巧二：给他定规矩\n│   ├── 方式A：项目根目录建 claude.md → 写项目相关偏好规则\n│   ├── 方式B：Memory → 写个人偏好（跨项目通用）\n│   └── 动态更新：对话中说\"记住这一点\"可实时追加规则\n│\n└── 技巧三：用嘴说，不要用手打\n    ├── 触发方式：按住 H 键调出语音输入\n    ├── 效率优势：说话速度是打字的 3 倍\n    └── 质量优势：口述更自然详细，AI 输出更周全","concepts":"#### 概念一：Plan 模式（先商量再放手）\n\n**是什么**：在让 Claude Code 动手之前，先让它进入\"只出方案、不写代码\"的规划模式。\n\n**为什么重要**：\n复杂任务直接开干容易跑偏，返工成本极高；先对齐思路再执行，能大幅减少无效工作。\n\n**详细解释**：\n- 触发词：在任务描述前加\"**别动手，给我方案**\"\n- Claude Code 会自动识别并切换为 Plan 模式\n- Plan 模式下它会主动询问细节、拆解步骤、输出完整方案\n- 人工确认方案无误后，再授权它进入\"狂编模式\"全力执行\n\n**实际应用场景**：\n需要改动多个文件、涉及架构调整、或需求描述还不够清晰时，先用 Plan 模式对齐，再放手执行。\n\n---\n\n#### 概念二：claude.md + Memory 规则体系\n\n**是什么**：通过文档和记忆模块，把你的偏好、规范持久化写入 Claude Code，让它\"记住你\"。\n\n**为什么重要**：\n每次重新交代规则既低效又容易遗漏；把规则固化后，Claude Code 每次启动都会自动遵守，越用越顺手。\n\n**详细解释**：\n\n| 存储位置 | 适合放什么内容 | 作用范围 |\n|---|---|---|\n| `claude.md`（项目根目录） | 项目技术栈、代码风格、目录结构约定等 | 当前项目 |\n| Memory | 个人习惯、通用偏好、沟通风格等 | 跨项目通用 |\n\n- 对话过程中随时可以说\"**记住这一点**\"，Claude Code 会将该内容追加到记忆中，下次不再犯同样错误\n\n**实际应用场景**：\n统一团队代码风格、固定回复语言、记录项目特有的命名规范等。\n\n---\n\n#### 概念三：语音输入（按住 H 键）\n\n**是什么**：Claude Code 内置的语音输入功能，按住 `H` 键即可调出，用说话代替打字来输入 Prompt。\n\n**为什么重要**：\n- 速度优势：说话速度约是打字速度的 **3 倍**\n- 质量优势：口述时人会自然说得更详细、更完整，AI 获得的上下文更充分，输出质量更高\n\n**详细解释**：\n口头表达更接近人自然思考的方式，不容易因为\"懒得打字\"而省略关键细节，从而让 AI 的理解更准确、产出更周全。\n\n**实际应用场景**：\n描述复杂需求、解释业务背景、或手边不方便打字时，用语音输入效率更高。","table":"| 技巧 | 触发方式 | 核心效果 | 新手注意事项 |\n|---|---|---|---|\n| Plan 模式（先商量） | 说\"别动手，给我方案\" | 先对齐方案再执行，避免返工 | 狂编模式需在设置中手动勾选才能启用 |\n| claude.md 规则 | 项目根目录新建 `claude.md` | 固化项目偏好，自动遵守 | 大项目建议项目规则和个人偏好分开存放 |\n| Memory 规则 | 对话中说\"记住这一点\" | 跨项目通用的个人偏好持久化 | 可随时动态追加，无需手动编辑文件 |\n| 语音输入 | 按住 `H` 键 | 输入速度提升约3倍，描述更详细 | 说话比打字更自然，不要刻意简化描述 |","thinking":"1. **Plan 模式的边界在哪里？** 什么样的任务适合先走 Plan 模式，什么样的简单任务反而不需要这一步，直接让它动手更高效？\n\n2. **claude.md 应该写多细？** 规则写得太少没有约束效果，写得太多又可能干扰 AI 的判断——如何找到\"规则密度\"的平衡点？\n\n3. **语音输入会带来新的问题吗？** 口述容易产生口语化表达、逻辑跳跃或信息冗余，这些对 AI 的理解是帮助还是干扰？如何让语音输入的质量更稳定？","remember":"用 Claude Code 的正确姿势是：**先商量方向、再用规则驯化它、最后用嘴喂饱它**——让 AI 越来越懂你，而不是每次从零开始。","is_new":true},{"id":"7621963586362625330","title":"Claude Code 中文汉化快速上手","cat":"vibecoding","video_url":"https://www.douyin.com/video/7621963586362625330","audience":"想用 Claude Code 但被全英文界面劝退的中文用户或编程新手","summary":"通过两个\"邪修\"技巧——全局中文汉化 + 自动中文说明提示——帮助中文用户彻底消除 Claude Code 的英文使用门槛。","raw_preview":"别再被 Claude Code 的英文劝退了，今天带你当个快乐的邪修。\n\n兄弟们，这两个痛点是不是困扰问题很久了？第一，斜杠命令全是英文，查个功能搞得要开翻译；第二，程序跑起来一堆命令飞过去，根本看不懂，就像看天书，完全是个黑箱。\n\n既然是邪修，那必须上点黑科技。\n\n模仿第一招：全局汉化，深层设置，所有命令通通变成大白话中文，告别翻译，点水用。\n\n第二招：装个说明书，每次命令运行，下方自动弹出粉红","knowledge_map":"Claude Code 中文化改造\n├── 痛点识别\n│   ├── 痛点1：斜杠命令全是英文，需要频繁翻译\n│   └── 痛点2：命令执行过程不透明，像\"黑箱\"\n│\n├── 解决方案（邪修两招）\n│   ├── 第一招：全局汉化\n│   │   ├── 操作层：深层设置\n│   │   └── 效果：所有命令变成中文大白话\n│   │\n│   └── 第二招：自动中文说明书\n│       ├── 操作层：配置自动弹出提示\n│       ├── 样式：粉红色中文提示框\n│       └── 效果：实时解释\"在干嘛\"和\"为什么\"\n│\n└── 最终目标\n    └── 打破黑箱，一边开挂一边变强","concepts":"#### 概念一：斜杠命令（Slash Command）\n\n**是什么**：Claude Code 中以 `/` 开头的快捷指令，用于触发特定功能操作。\n\n**为什么重要**：斜杠命令是使用 Claude Code 的核心交互方式，不懂命令就等于不会用工具。\n\n**详细解释**：\n- 默认情况下，所有斜杠命令均为英文\n- 中文用户需要反复查阅文档或开翻译才能理解每条命令的含义\n- 使用频率高，英文障碍会严重拖慢工作效率\n\n**实际应用场景**：每次在 Claude Code 中输入 `/` 触发命令列表时，汉化后可直接看到中文描述，无需翻译。\n\n---\n\n#### 概念二：全局汉化（深层设置）\n\n**是什么**：通过修改 Claude Code 的底层配置，将界面命令描述统一替换为中文。\n\n**为什么重要**：一次配置，永久生效，彻底解决英文命令看不懂的问题，不再依赖翻译工具。\n\n**详细解释**：\n- 作用范围：全局，覆盖所有斜杠命令\n- 操作位置：深层设置（具体路径视频中演示）\n- 效果：命令名称和描述变成\"大白话中文\"\n\n**实际应用场景**：配置完成后，打开 Claude Code 的命令面板，所有功能一目了然，新手也能快速找到需要的命令。\n\n---\n\n#### 概念三：自动中文说明提示（\"说明书\"模式）\n\n**是什么**：在每条命令执行时，自动在下方弹出粉红色中文说明框，解释当前操作的内容和原因。\n\n**为什么重要**：让命令执行过程从\"黑箱\"变成\"透明箱\"，用户不仅知道结果，还能理解过程，边用边学。\n\n**详细解释**：\n\n| 属性 | 说明 |\n|------|------|\n| 触发时机 | 每次命令运行时自动弹出 |\n| 显示位置 | 命令执行区域下方 |\n| 显示样式 | 粉红色中文提示框 |\n| 内容维度1 | 告诉你\"它在干嘛\" |\n| 内容维度2 | 告诉你\"为什么要这么干\" |\n\n**实际应用场景**：运行一条构建或调试命令时，提示框自动出现，解释\"正在编译文件，因为检测到代码变更\"，帮助新手理解工具行为逻辑。","table":"| 对比维度 | 改造前（默认状态） | 改造后（邪修状态） |\n|----------|-------------------|-------------------|\n| 斜杠命令语言 | 全英文 | 中文大白话 |\n| 查命令方式 | 需要开翻译查文档 | 直接看懂，即点即用 |\n| 命令执行过程 | 黑箱，看不懂 | 实时中文说明，透明可读 |\n| 提示样式 | 无额外说明 | 粉红色中文提示框 |\n| 适合人群 | 英文熟练用户 | 中文用户 / 编程新手 |\n| 配置成本 | — | 一次设置，永久生效 |","thinking":"1. **汉化配置的边界在哪里？** 全局汉化改变的是界面描述，还是会影响 Claude Code 实际执行命令的逻辑？如果底层命令仍是英文，汉化的本质是\"翻译层\"还是\"替换层\"？\n\n2. **\"说明书\"提示对学习效率的影响是什么？** 自动弹出的中文解释能帮助新手更快理解工具原理，但长期依赖提示是否会阻碍用户真正掌握 Claude Code 的底层机制？\n\n3. **\"邪修\"方法的可持续性如何？** Claude Code 版本更新后，这套汉化配置是否需要重新设置？有没有更官方或更稳定的中文支持路径值得期待？","remember":"两步配置搞定 Claude Code 汉化：命令变中文、执行有说明，新手也能看懂每一步在干什么。","is_new":true},{"id":"7622125674547358438","title":"Vibe Coding 打开技术新世界的三扇门","cat":"vibecoding","video_url":"https://www.douyin.com/video/7622125674547358438","audience":"对编程感兴趣但没有开发背景、想用 AI 工具入门技术世界的普通人","summary":"没有开发背景的人通过 Vibe Coding 实践，可以自然习得 GitHub、Markdown、技术对话能力这三项真实有用的技术素养——过程本身比结果更有价值。","raw_preview":"今天想跟大家分享一下 Vibe Coding 是如何帮我这一个没有开发背景的人打开了三个技术界的新世界大门的。\n\n第一个是关于 GitHub 和开源。虽然这两个词我以前就听过，但是我从来都没有用过，因为我觉得它们离我的世界真的是太远了，只有很专业的那种开发人员才会去用它们。但是当我开始 Vibe Coding 之后，我必须去学如何用 GitHub 的时候，我才发现这个东西没有我想象的复杂。并且因为","knowledge_map":"Vibe Coding 带来的三扇技术新世界大门\n│\n├── 1. GitHub 与开源社区\n│   ├── 以前的认知：只有专业开发者才用\n│   ├── 实践后发现：没有想象中复杂\n│   ├── 掌握的基础操作：控制 repo、克隆项目\n│   └── 实际收益：能直接使用开源项目（G-Stack / Mirofish / OpenClaude）\n│\n├── 2. Markdown 文档（.md 文件）\n│   ├── 是什么：文字 + 少量格式的纯文本文档\n│   ├── 在 Vibe Coding 中的用途\n│   │   ├── project.md：写产品需求\n│   │   ├── CLAUDE.md：AI 项目配置\n│   │   ├── agents.md / memory.md：智能体记忆管理\n│   │   └── Daily Log：知识管理日志\n│   └── 意义：读懂主流 AI 工具的核心文档\n│\n└── 3. 能参与技术型对话\n    ├── 习得方式：边玩边积累，非刻意学习\n    ├── 具体案例\n    │   ├── 知识管理 → 联想到 memory.md + Daily Log\n    │   ├── 语音助理隐私 → 联想到 Granola 不保存录音\n    │   └── 敏感信息保存 → 听懂 .gitignore 和 Environment Variable\n    └── 核心价值：技术词汇内化为真实理解，而非死记硬背","concepts":"#### 概念一：GitHub 与开源社区\n\n**是什么**：GitHub 是一个代码托管平台，开源是指代码公开、人人可用的软件开发模式。\n\n**为什么重要**：\n大量优质 AI 工具和项目（如 G-Stack、Mirofish、OpenClaude）都托管在 GitHub 上，能用 GitHub 意味着能直接获取和使用这些资源，而不必等待别人打包好的版本。\n\n**详细解释**：\n\n| 操作 | 含义 | 难度感知（实践前→后） |\n|------|------|----------------------|\n| 克隆 repo | 把别人的项目下载到本地 | 很难 → 其实不复杂 |\n| 开源自己的项目 | 把自己的代码公开到 GitHub | 专业行为 → 普通人也能参与 |\n| 浏览开源项目 | 发现并尝试社区里的新工具 | 看不懂 → 能直接上手 |\n\n**实际应用场景**：\n看到网上推荐的开源 AI 工具时，可以直接去 GitHub 克隆下来本地运行，而不是只能干等官方发布安装包。\n\n---\n\n#### 概念二：Markdown 文档（.md 文件）\n\n**是什么**：一种轻量级文本格式，用极少的符号（如 `#`、`-`、`**`）给纯文字加上结构和格式，文件后缀为 `.md`。\n\n**为什么重要**：\n几乎所有主流 AI 开发工具的核心配置和文档都用 `.md` 格式书写，读懂 `.md` 文件等于读懂工具的\"说明书\"。\n\n**详细解释**：\n\n| 文件名 | 用途 |\n|--------|------|\n| `project.md` | 写清楚一个项目的所有产品需求 |\n| `CLAUDE.md` | 告诉 Claude 这个项目的背景和规则 |\n| `agents.md` | 定义 AI 智能体的行为方式 |\n| `memory.md` | 存储 AI 的长期记忆和上下文 |\n| `Daily Log.md` | 每日知识/进度记录 |\n\n**实际应用场景**：\n用 Claude Code 或 OpenClaude 时，直接打开 `CLAUDE.md` 就能理解这个工具在这个项目里的角色设定，不需要靠猜。\n\n---\n\n#### 概念三：在实践中自然习得技术词汇\n\n**是什么**：通过长期动手使用 AI 工具和 Vibe Coding，在不刻意记忆的情况下，把技术概念内化为真实理解。\n\n**为什么重要**：\n传统学编程的方式是\"先学后用\"，容易放弃。Vibe Coding 的路径是\"先用后懂\"，技术词汇在真实场景中反复出现，自然就记住了，而且记住的是\"用法\"而不是\"定义\"。\n\n**详细解释**：\n\n视频中提到的具体案例：\n\n- **讨论知识管理** → 自然联想到 `memory.md` 和 Daily Log 的设计逻辑\n- **讨论语音助理隐私** → 联想到 Granola 工具\"只提取信息、不保留录音\"的机制\n- **讨论敏感信息存储** → 听懂了 `.gitignore`（告诉 Git 忽略某些文件）和 Environment Variable（把密钥存在环境变量里而不是代码里）\n\n**实际应用场景**：\n在和技术团队开会时，不会因为听不懂术语而脱节，甚至能用自己的实践经验参与讨论。","table":"| 维度 | 实践前的状态 | Vibe Coding 之后的状态 |\n|------|-------------|----------------------|\n| GitHub | 听过但从不用，觉得是专业开发者的工具 | 能克隆 repo、能开源自己的项目 |\n| Markdown | 从未听说过 | 能读写 `.md` 文件，理解各类配置文档 |\n| 技术对话 | 摸不透自己学到了什么 | 能在团队讨论中听懂并参与技术话题 |\n| 学习方式 | 刻意学习、系统学习 | 边玩边积累，在实践中自然内化 |\n| 开源社区 | 感觉很远 | 能发现、使用、贡献开源项目 |\n\n**视频提到的工具/项目一览**：\n\n| 名称 | 类型 | 获取方式 |\n|------|------|---------|\n| G-Stack | 开源项目 | GitHub 克隆 |\n| Mirofish | 开源项目 | GitHub 克隆 |\n| OpenClaude | 开源 AI 工具 | GitHub 克隆 |\n| Granola | 语音会议工具 | 独立产品 |\n| Claude Code | AI 编程工具 | 独立产品 |","thinking":"1. **\"先用后懂\"和\"先学后用\"哪种路径更适合非技术背景的人入门 AI 工具？** 视频里的经历说明实践可以驱动学习，但这种方式会不会留下知识盲区，在某个阶段需要系统补课？\n\n2. **Markdown 作为\"人类可读的配置语言\"正在成为 AI 工具的标准界面，这意味着什么？** 如果越来越多的 AI 工具用 `.md` 文件来定义行为，普通用户和开发者之间的边界是否正在消失？\n\n3. **视频里说\"也许过程比结果更重要\"，在 Vibe Coding 的语境下，这个\"过程\"具体积累的是什么？** 是可迁移的技术素养，还是只对特定工具有效的操作经验？两者有什么区别？","remember":"Vibe Coding 最大的红利不是做出了什么产品，而是你在折腾的过程中，悄悄读懂了技术世界的语言。","is_new":true},{"id":"7622672221126806818","title":"Agent Reach——让 AI Agent 真正能搜能读","cat":"vibecoding","video_url":"https://www.douyin.com/video/7622672221126806818","audience":"正在使用或学习 AI Agent 工具、希望扩展其信息获取能力的开发者和内容创作者","summary":"Agent Reach 是一个能给 AI Agent 补上联网搜索与多平台内容读取能力的 Skill，安装简单、实用性强，适合想让 Agent 真正\"能干活\"的人。","raw_preview":"推荐一个真正好用的 Skill，那就是 Agent Reach。因为它不是噱头，而是真的能补上 Agent 缺的联网搜索和内容读取能力。像 YouTube、GitHub、Twitter 还有小红书、微博这些平台的信息，它都能更方便地搜和读。\n\n更狠的是，你不用自己慢慢配环境，把安装文档发给 Agent，它就会自己把工具链装起来。\n\n而且它还支持小宇宙播客转文字、做摘要、做知识卡片、做内容拆条，这一","knowledge_map":"Agent Reach\n├── 是什么\n│   └── 一个给 AI Agent 用的 Skill（工具插件）\n├── 解决什么问题\n│   └── 补上 Agent 缺失的联网搜索 + 内容读取能力\n├── 支持的平台\n│   ├── YouTube\n│   ├── GitHub\n│   ├── Twitter\n│   ├── 小红书\n│   └── 微博\n├── 安装方式\n│   └── 把安装文档发给 Agent → Agent 自动配置工具链\n└── 适用场景\n    ├── 播客转文字（小宇宙）\n    ├── 做摘要\n    ├── 做知识卡片\n    └── 内容拆条","concepts":"#### 概念一：Skill（AI Agent 插件）\n\n**是什么**：Skill 是给 AI Agent 安装的功能扩展模块，类似手机 App，装上之后 Agent 就能多一项能力。\n\n**为什么重要**：\n原生 AI Agent 能力有限，很多实际任务（如联网搜索、读取特定平台内容）需要通过 Skill 来补充。\n\n**详细解释**：\nAgent 本身像一个\"大脑\"，但没有手和眼睛。Skill 就是给它配上具体的工具，让它能真正触达外部信息和平台。\n\n**实际应用场景**：\n需要让 Agent 搜索 GitHub 上的项目、读取 YouTube 视频内容、抓取小红书帖子时，就需要对应的 Skill 支持。\n\n---\n\n#### 概念二：联网搜索与内容读取能力\n\n**是什么**：Agent 通过 Skill 获得主动访问互联网、抓取特定平台页面内容的能力。\n\n**为什么重要**：\n没有这项能力，Agent 只能依赖训练数据，无法获取实时信息或特定平台的最新内容，严重限制实用性。\n\n**详细解释**：\n\n| 能力类型 | 支持平台 | 典型用途 |\n|----------|----------|----------|\n| 内容搜索 | YouTube、GitHub、Twitter、小红书、微博 | 查找资料、追踪热点 |\n| 内容读取 | 小宇宙播客、各平台文章 | 转文字、提取信息 |\n\n**实际应用场景**：\n搜索 GitHub 上某个开源项目的最新动态，或者读取一期播客的完整内容并生成摘要。\n\n---\n\n#### 概念三：Agent 自动配置工具链\n\n**是什么**：将安装文档直接发给 Agent，由 Agent 自行完成环境配置和工具链安装，无需用户手动操作。\n\n**为什么重要**：\n手动配置开发环境对非技术用户门槛较高，容易出错。Agent 自动配置大幅降低了使用门槛。\n\n**详细解释**：\n传统方式需要用户自己看文档、执行命令、排查报错。Agent Reach 的安装方式是：把文档丢给 Agent → Agent 读懂文档 → 自动执行安装步骤。\n\n**实际应用场景**：\n不熟悉命令行的内容创作者，也可以通过这种方式顺利装好 Agent Reach 并开始使用。\n\n---\n\n#### 概念四：内容加工工作流\n\n**是什么**：Agent Reach 支持将播客、视频等内容转化为文字，并进一步生成摘要、知识卡片、拆条素材等二次内容。\n\n**为什么重要**：\n内容创作者和知识工作者经常需要消化大量音视频信息，手动处理效率极低，Agent Reach 可以将这个流程自动化。\n\n**详细解释**：\n\n| 工作类型 | 输入 | 输出 |\n|----------|------|------|\n| 转文字 | 小宇宙播客音频 | 文字稿 |\n| 做摘要 | 长文字稿 | 核心要点摘要 |\n| 知识卡片 | 文章/播客内容 | 结构化知识卡片 |\n| 内容拆条 | 长内容 | 多条短素材 |\n\n**实际应用场景**：\n播客运营者将每期节目自动转录并生成小红书拆条文案，效率大幅提升。","table":"| 维度 | 详情 |\n|------|------|\n| 工具名称 | Agent Reach |\n| GitHub 星标 | 12.2k |\n| 工具类型 | AI Agent Skill（插件） |\n| 核心能力 | 联网搜索 + 多平台内容读取 |\n| 支持平台 | YouTube、GitHub、Twitter、小红书、微博、小宇宙 |\n| 安装方式 | 发安装文档给 Agent，Agent 自动配置 |\n| 适合场景 | 内容创作、知识整理、信息检索 |\n| 推荐理由 | 真实补能、安装门槛低、平台覆盖广 |","thinking":"1. **Agent Reach 能读取的平台内容是否存在版权或反爬限制？** 在实际使用中，哪些平台的内容抓取可能会遇到障碍，应该如何规避风险？\n\n2. **\"把安装文档发给 Agent 让它自己装\"这种模式，代表了怎样的人机协作趋势？** 未来是否会有更多工具采用\"文档即安装\"的交互方式？\n\n3. **对于内容创作者来说，Agent Reach 的播客转文字 + 拆条能力，是否会改变内容生产的分工方式？** 哪些环节还是需要人工介入？","remember":"与其让 Agent 空有大脑却两眼一抹黑，不如装上 Agent Reach，让它真正看得见、搜得到、读得懂。","is_new":true},{"id":"7623325276408010633","title":"Claude 直接调用 Codex 官方插件","cat":"vibecoding","video_url":"https://www.douyin.com/video/7623325276408010633","audience":"正在使用 Claude Code 写代码、希望把 OpenAI Codex 能力整合进工作流的开发者","summary":"OpenAI 官方发布了 Codex Plugin CC，让你在 Claude Code 里直接调用 Codex 的代码生成、对抗性测试和救援修复能力，彻底打通两大 AI 编程工具。","raw_preview":"跟朋友们说，大家知道吗，刚才 OpenAI 官方上线了一个 plugin 叫做 Codex plugin CC，那它干什么的？顾名思义，就是允许你直接在 Claude Code 里面将 Codex 写代码进行 review。\n\n那么刚才我本来是在录制一个 Claude Code 的一个 showcase 视频，看到这个消息，觉得绝对是超过 99% 的人还不知道，里面就讲到我们如何在 Claude ","knowledge_map":"Codex Plugin CC（OpenAI 官方插件）\n│\n├── 背景\n│   ├── 运行环境：Claude Code\n│   └── 解决的问题：之前只能通过 subagent 间接调用 Codex\n│\n├── 三大核心功能\n│   ├── 1. 标准代码生成（Standard）\n│   │   └── 生成代码 / 修复 bug\n│   │\n│   ├── 2. 对抗性测试（Adversarial）\n│   │   ├── 修复 bug\n│   │   └── 审查架构设计合理性\n│   │\n│   └── 3. 救援模式（Rescue）\n│       ├── 触发条件：bug 无法解决时\n│       └── 行为：接管整个代码库，完成后续工作\n│\n└── 安装方式\n    └── 复制官方命令一键安装","concepts":"#### 概念一：Codex Plugin CC\n\n**是什么**：OpenAI 官方发布的 Claude Code 插件，允许在 Claude Code 环境中直接调用 Codex 的能力。\n\n**为什么重要**：\n此前开发者想在 Claude Code 里用 Codex，只能绕道通过 subagent 间接调用，流程繁琐。现在官方插件直接打通，降低了使用门槛。\n\n**详细解释**：\n这是 OpenAI 主动为竞品（Claude Code）生态做的插件，说明两家工具之间的互操作性正在增强，开发者可以在同一个工作流里混用不同厂商的 AI 能力。\n\n**实际应用场景**：\n在 Claude Code 会话中，无需切换工具或手动调 API，直接唤起 Codex 完成特定任务。\n\n---\n\n#### 概念二：三大功能模式\n\n**是什么**：Codex Plugin CC 提供三种不同的调用模式，对应不同的编程场景。\n\n**为什么重要**：\n不同场景下需要 AI 扮演不同角色——有时需要生成代码，有时需要审查设计，有时需要\"接盘\"一个烂摊子，三种模式各司其职。\n\n**详细解释**：\n\n| 模式 | 名称 | 核心能力 | 适用场景 |\n|------|------|----------|----------|\n| 模式一 | 标准代码生成（Standard） | 生成代码、修复 bug | 日常开发、快速出代码 |\n| 模式二 | 对抗性测试（Adversarial） | 修复 bug + 审查架构设计 | 代码 review、上线前质量把关 |\n| 模式三 | 救援模式（Rescue） | 接管代码库、完成后续工作 | bug 死活干不掉、项目陷入僵局时 |\n\n**实际应用场景**：\n- 新功能开发 → 用标准模式生成代码\n- 准备上线 → 用对抗性测试模式做最后审查\n- 卡了很久的 bug → 直接开救援模式，让 Codex 接管收尾\n\n---\n\n#### 概念三：救援模式（Rescue Mode）\n\n**是什么**：当开发者遇到无法解决的 bug 时，Codex 接管整个代码库并自主完成后续工作的特殊模式。\n\n**为什么重要**：\n这是三个模式里最激进的一个——它不只是给建议，而是直接\"接盘\"，对于卡壳的项目有极高的实用价值。\n\n**详细解释**：\n救援模式的逻辑是：当你的 Claude Code 会话已经陷入死循环、bug 反复出现无法收敛时，交给 Rescue 模式，它会读取整个代码上下文，重新规划并执行后续步骤。\n\n**实际应用场景**：\n用 Claude Code 开发到一半，某个 bug 来回修了十几次还是不对，这时候与其继续消耗 token 和时间，不如直接触发 Rescue，让 Codex 接手。","table":"| 对比维度 | 旧方案 | 新方案（Codex Plugin CC） |\n|----------|--------|--------------------------|\n| 调用方式 | 通过 subagent 间接调用 | 官方插件直接调用 |\n| 发布方 | 社区/第三方 | OpenAI 官方 |\n| 安装复杂度 | 相对繁琐 | 复制命令一键安装 |\n| 功能覆盖 | 基础调用 | 生成 / 对抗测试 / 救援三模式 |\n| 架构审查 | 不支持 | 对抗性测试模式支持 |\n| 接管代码库 | 不支持 | 救援模式支持 |","thinking":"1. **救援模式的边界在哪里？** Rescue 模式会\"接管整个代码库\"，那么对于大型项目，它的上下文窗口是否足够？接管后的代码风格和原有代码能保持一致吗？\n\n2. **OpenAI 为什么要给竞品 Claude Code 做插件？** 这背后是商业策略还是生态开放的信号？如果 Codex 能在所有主流 AI 编程工具里被调用，对 OpenAI 意味着什么？\n\n3. **对抗性测试模式能替代人工 Code Review 吗？** 它审查架构设计合理性的深度如何？对于复杂的业务逻辑和领域知识，AI 的对抗性测试和资深工程师的 review 差距在哪里？","remember":"以前要绕路，现在 OpenAI 官方插件让你在 Claude Code 里直接召唤 Codex——生成、审查、救援，三种模式一键搞定。","is_new":true},{"id":"7624130726815943946","title":"零基础30天独立游戏开发复盘","cat":"vibecoding","video_url":"https://www.douyin.com/video/7624130726815943946","audience":"对独立游戏开发感兴趣、想了解从零开始做游戏实际进展的初学者或业余开发者","summary":"一位零基础开发者用30天搭建出独立游戏基础框架，诚实复盘已完成的系统模块与严重低估工作量的真实教训，给想做独立游戏的人提供接地气的参考。","raw_preview":"零基础三十天做游戏，现在怎么样了？\n\n今天是我从零开始做游戏的第三十天，大家看看最新进度。这个是游戏里的NPC，咱们火锅店的服务员，目前所有角色都已经接入了AI对话，感兴趣的可以去我主页看那期我给游戏接入了AI的视频。\n\n当时也有很多小伙伴在评论区提了建议，比如玩家只能手动打字回复，玩久了会觉得麻烦，而且聊天内容没有记录，很容易忘记之前说了什么。针对这些问题，我现在已经加上了三条推荐回复，可以直接","knowledge_map":"零基础30天独立游戏开发复盘\n│\n├── 已完成的系统模块\n│   ├── AI对话系统\n│   │   ├── NPC接入AI对话\n│   │   ├── 推荐回复（3条快捷选项）\n│   │   └── 历史聊天记录\n│   │\n│   ├── UI系统\n│   │   ├── 角色状态栏（多版本迭代）\n│   │   ├── 集成面板（设置/背包/属性合并）\n│   │   └── 临时占位图标（待统一替换）\n│   │\n│   ├── 图鉴系统\n│   │   ├── 食材/道具/NPC信息收录\n│   │   └── 收集进度与背景介绍\n│   │\n│   └── 关系系统（基础框架）\n│       ├── NPC好感度机制\n│       ├── 不同等级对话差异\n│       └── 待解锁：专属剧情与福利\n│\n├── 规划中的功能\n│   ├── 时装系统\n│   ├── 商店\n│   ├── 冒险\n│   ├── 工会\n│   └── 用户面板\n│\n└── 核心教训\n    ├── 30天只够搭框架，内容填充工作量巨大\n    └── 严重低估了游戏开发的实际工作量","concepts":"#### 概念一：基础框架 vs 游戏内容\n\n**是什么**：框架是游戏的系统骨架（对话、UI、图鉴、关系等机制跑通），内容是填进去的剧情、道具、事件等具体数据。\n\n**为什么重要**：很多初学者容易把\"框架搭好\"误认为\"游戏做好了\"，实际上框架只是地基，内容填充才是工程量最大的部分。\n\n**详细解释**：\n\n| 维度 | 基础框架 | 游戏内容 |\n|------|----------|----------|\n| 举例 | 关系系统的好感度机制 | 每个NPC的具体对话台词、剧情事件 |\n| 举例 | 图鉴系统的界面与逻辑 | 每一件道具、食材的背景介绍 |\n| 开发状态 | 30天内基本跑通 | 大量尚未填充 |\n| 工作量感知 | 容易低估后续工作 | 实际占据游戏开发的大部分时间 |\n\n**实际应用场景**：作者30天后得出结论——核心系统已跑通，但游戏实质上\"只是个骨架\"，剧情、道具、事件都还没来得及填充。\n\n---\n\n#### 概念二：UI迭代优化\n\n**是什么**：UI（用户界面）不是一次做好的，而是在开发过程中根据体验反复修改、升级的过程。\n\n**为什么重要**：初学者往往希望一步到位，但实际开发中UI需要多轮迭代，接受\"先跑通、再打磨\"的节奏非常关键。\n\n**详细解释**：\n- **第一版**：角色状态栏仅三个属性图标，简单粗糙\n- **第二版**：优化后初具雏形\n- **当前版**：再次更新后的现有样式，但仍有问题待解决\n- **集成优化**：将原本零散的设置、背包、属性三个独立弹窗，合并为一个统一面板\n\n**实际应用场景**：作者用\"改了好几版\"来描述UI演进，说明迭代是常态，不必追求第一版完美。\n\n---\n\n#### 概念三：AI辅助开发\n\n**是什么**：在独立游戏开发中借助AI工具完成部分工作，例如NPC对话接入AI、用AI批量生成风格统一的图标。\n\n**为什么重要**：对于零基础或小团队开发者，AI可以大幅降低某些环节的门槛和时间成本。\n\n**详细解释**：\n\n| 应用场景 | 具体做法 |\n|----------|----------|\n| NPC对话 | 所有角色接入AI对话系统，实现动态交互 |\n| 图标生成 | 计划在物品系统完善后，用AI一次性生成风格统一的图标集 |\n\n**实际应用场景**：作者明确表示临时图标是占位用的，等内容稳定后再用AI批量生成，体现了\"先功能、后美化\"的务实策略。\n\n---\n\n#### 概念四：社区反馈驱动迭代\n\n**是什么**：根据观众/玩家在评论区提出的具体问题，有针对性地改进游戏功能。\n\n**为什么重要**：独立开发者资源有限，优先解决真实用户反馈的痛点，比闭门造车更高效。\n\n**详细解释**：\n- **用户反馈痛点**：手动打字回复麻烦；聊天记录不保存导致遗忘\n- **对应改进**：新增三条推荐快捷回复 + 历史聊天记录功能\n\n**实际应用场景**：作者在上一期视频评论区收集建议，本期直接展示改进结果，形成\"发布→反馈→迭代\"的闭环。","table":"| 系统模块 | 当前状态 | 待完善内容 |\n|----------|----------|------------|\n| AI对话系统 | ✅ 已完成（含快捷回复+历史记录） | — |\n| UI系统 | 🔄 多版迭代中，仍有问题 | 图标待统一替换 |\n| 图鉴系统 | 🔄 框架已出，内容未填充 | 道具、NPC背景信息 |\n| 关系/好感度系统 | 🔄 基础框架完成 | 角色喜好、互动事件、专属剧情 |\n| 时装/商店/冒险/工会 | 📋 已规划，未详细展示 | 待开发 |\n| 游戏内容（剧情/事件） | ❌ 大量未填充 | 核心待完成工作 |","thinking":"1. **工作量评估问题**：作者坦言30天远远不够，那么在启动一个独立游戏项目之前，应该如何更准确地拆解和估算各模块的工作量？\"框架工作量\"和\"内容工作量\"的比例大概是多少？\n\n2. **先框架还是先内容**：作者选择先把所有系统框架跑通再填充内容，这种策略有什么优缺点？有没有可能采用\"一个系统做深做透再做下一个\"的策略，哪种更适合独立开发者？\n\n3. **AI介入边界**：视频中AI被用于NPC对话和图标生成，随着AI能力增强，独立游戏开发中哪些环节最适合AI介入，哪些环节仍然需要人来主导？这对零基础开发者的门槛意味着什么？","remember":"30天能搭起游戏的骨架，但让骨架长出血肉才是真正的工作量所在——独立游戏开发，比你想象的长十倍。","is_new":true},{"id":"7624359483216547098","title":"七种 AI 编码方式全景评测","cat":"vibecoding","video_url":"https://www.douyin.com/video/7624359483216547098","audience":"对 AI 辅助编程感兴趣、想了解当前主流开发方式优劣的开发者或技术爱好者","summary":"从好到差系统评测7种 AI 时代的编程方式，帮你快速找到适合自己水平和场景的开发姿势。","raw_preview":"2026年了，写代码的方式层出不穷，今天从好到差锐评一下主流的开发方式。\n\n首先出场的是我们的老大哥——纯手写代码。这种编程方式使用传统写代码工具，开发者纯手写代码进行构建程序。因为模型能力逐渐变强，在2024、2025年还有大佬说自己坚持不使用AI，但如今已经成为过去，只有密码学和密码领域的大佬才会使用，出于情怀，给到NPC。\n\n其次是网页对话式编程，通过网页端对话让AI生成代码。因为AI无法感","knowledge_map":"七种编码方式评测\n├── 评级：NPC（最差）\n│   └── 纯手写代码\n│       ├── 不借助任何AI工具\n│       └── 仅密码学等极少数领域仍在使用\n│\n├── 评级：垃圾\n│   └── 网页对话式编程（ChatGPT/Claude 网页版等）\n│       ├── 无法感知本地环境\n│       ├── 需手动复制粘贴上下文\n│       └── 只适合写小玩具程序\n│\n├── 评级：顶级\n│   ├── IDE 集成编程（Cursor / VS Code 插件）\n│   │   ├── 能读取本地项目文件\n│   │   ├── AI 可自行跑命令验证代码\n│   │   └── 老程序员首选\n│   └── 命令行编程（Claude Code 等）\n│       ├── 注重想法而非代码细节\n│       ├── 适合中小项目和大模型开发\n│       └── 上手门槛较低，但效果因人而异\n│\n├── 评级：一般\n│   ├── 手机编程\n│   │   ├── 随时随地下达指令\n│   │   ├── 屏幕小、信息量有限\n│   │   └── 适合灵感验证小 demo\n│   └── 命令行自动编程（MCP + 自动截图等）\n│       ├── AI 自主打开浏览器、截图、排查问题\n│       ├── 需要详细计划，适合大佬\n│       └── 新人需求易冲突，但代表未来方向\n│\n└── 评级：行（最高）\n    └── 多 Agent 编程\n        ├── 多个 Agent 并行写代码/测试/合并\n        ├── 大幅缩短等待时间\n        └── 当前最新潮、效率最高的方式","concepts":"#### 概念一：IDE 集成编程\n\n**是什么**：在本地开发环境（如 Cursor、VS Code）中直接嵌入 AI 能力，让 AI 读取项目文件并辅助写代码。\n\n**为什么重要**：AI 能\"看到\"你的整个项目，理解上下文，自动运行命令验证代码是否正确，极大减少手动操作。\n\n**详细解释**：\n\n| 特性 | 说明 |\n|------|------|\n| 本地环境感知 | AI 可读取项目文件结构，无需手动粘贴代码 |\n| 命令自动执行 | AI 可自行跑测试、编译命令，验证结果 |\n| 代表工具 | Cursor、VS Code + AI 插件 |\n| 主要用户 | 有一定代码基础的老程序员 |\n\n**实际应用场景**：在已有项目中添加新功能、排查 bug、重构代码，适合日常生产开发。\n\n---\n\n#### 概念二：命令行编程\n\n**是什么**：在终端通过自然语言描述需求，由 AI（如 Claude Code）直接生成并执行代码，开发者不需要深度介入代码细节。\n\n**为什么重要**：降低了编程门槛，让没有深厚代码基础的人也能构建中小型项目，同时让有经验的人专注于想法而非实现。\n\n**详细解释**：\n\n- 核心理念：**注重想法，不注重代码**\n- 优点：上手快，描述需求即可\n- 缺点：无法直观看到项目文件，对代码掌控感弱\n- 效果差异大：擅长者事半功倍，不擅长者反复修改\n\n**实际应用场景**：开发大模型相关工具、中小型项目的快速原型搭建。\n\n---\n\n#### 概念三：命令行自动编程（MCP 自动化）\n\n**是什么**：为 AI 配置大量 MCP（Model Context Protocol）工具，使其能自主打开浏览器、截图、定位问题，按照预先写好的计划自动完成开发任务。\n\n**为什么重要**：代表了 AI 编程从\"辅助\"走向\"自主执行\"的趋势，是未来编码方式的雏形。\n\n**详细解释**：\n\n| 维度 | 内容 |\n|------|------|\n| 核心能力 | AI 自主操作浏览器、截图、调试 |\n| 前提条件 | 需要写好详细、无冲突的计划文档 |\n| 适合人群 | 有经验的编程大佬 |\n| 新人风险 | 需求描述不清或相互冲突，AI 难以推进 |\n| 未来潜力 | 视频认为这是未来主流方向 |\n\n**实际应用场景**：复杂项目的自动化开发流程，适合能写清晰技术规格文档的资深开发者。\n\n---\n\n#### 概念四：多 Agent 编程\n\n**是什么**：同时启动多个 AI Agent，分别承担写代码、测试、合并冲突等不同角色，并行推进开发任务。\n\n**为什么重要**：解决了单 Agent 串行等待慢的问题，是目前效率最高的 AI 编程方式。\n\n**详细解释**：\n\n| 单 Agent 模式 | 多 Agent 模式 |\n|--------------|--------------|\n| 串行执行，需等待输出 | 多个 Agent 并行工作 |\n| 写完代码才能测试 | 写代码、测试、合并同步进行 |\n| 等待时间以分钟计 | 快速验证想法 |\n| 当前主流 | 当前最新潮、效率最高 |\n\n**实际应用场景**：需要快速迭代的项目，一个 Agent 写功能，一个 Agent 跑测试，一个 Agent 处理代码合并冲突。","table":"| 编码方式 | 代表工具 | 能感知本地环境 | 适合人群 | 适用场景 | 评级 |\n|---------|---------|:----------:|---------|---------|:----:|\n| 纯手写代码 | 传统 IDE | ✅ | 极少数领域大佬 | 密码学等特殊领域 | NPC |\n| 网页对话式 | ChatGPT / Claude 网页 | ❌ | 初学者 | 小玩具程序 | 垃圾 |\n| IDE 集成编程 | Cursor / VS Code 插件 | ✅ | 有经验的程序员 | 日常生产开发 | 顶级 |\n| 命令行编程 | Claude Code | ⚠️ 部分 | 无代码基础者 / 有经验者均可 | 中小项目、大模型开发 | 顶级 |\n| 手机编程 | Claude Code（手机控制） | ⚠️ 部分 | 灵感型开发者 | 小 demo、灵感验证 | 一般 |\n| 命令行自动编程 | MCP + Cursor | ✅ | 编程大佬 | 自动化复杂开发流程 | 一般 |\n| 多 Agent 编程 | 多 Agent 框架 | ✅ | 追求效率的开发者 | 快速迭代、并行开发 | 行 ⭐ |","thinking":"1. **IDE 集成编程和命令行编程都被评为\"顶级\"，但适合人群不同——对于一个从零开始学编程的人，应该直接跳过 IDE 集成，从命令行编程入手吗？这样做有什么潜在风险？**\n\n2. **命令行自动编程（MCP 自动化）被认为是\"未来的编码方式\"，但目前只适合大佬，瓶颈在于\"写好详细计划\"的能力——这说明未来程序员的核心竞争力会从\"写代码\"转变成什么？**\n\n3. **多 Agent 编程效率最高，但多个 Agent 并行工作时如何保证代码风格一致、逻辑不冲突？这个问题目前是否有成熟的解决方案？**","remember":"工具不分好坏，但选错了方式，AI 再强也帮不了你——2026年，选对编码姿势比会写代码更重要。","is_new":true},{"id":"7625222811607943409","title":"NotebookLM 接入 Gemini 三大场景实战","cat":"vibecoding","video_url":"https://www.douyin.com/video/7625222811607943409","audience":"已在使用 AI 工具但感觉效率没拉满、想把 NotebookLM 和 Gemini 组合起来用的职场人或学习者","summary":"把 NotebookLM 当知识库、Gemini 当执行引擎连接起来，可以在学习、数据分析、工作汇报三个场景中把两个工具的能力叠加放大，真正做到\"输入知识库，输出高质量成果\"。","raw_preview":"你知道吗？你现在用 NotebookLM 的方式很可能只发挥了它 80% 的东西。大多数人用 NotebookLM 就是存资料，顶多生成一个播客。但当你把它跟 Gemini 接上，同一个知识库就能变成可复用的工作成果。\n\n今天我实操三个场景：学习、分析、沟通，看完你会发现你之前的用法可能连这两个工具 10% 的能力都没发挥出来。\n\n我们先说第一个——学习。我们可以把 AI 公司、项目里面的视频脚本","knowledge_map":"NotebookLM × Gemini 组合玩法\n│\n├── 核心逻辑\n│   ├── NotebookLM = 知识库（存资料）\n│   ├── Gemini = 执行引擎（生成成果）\n│   └── 连接方式：Gemini 左侧面板调用 NotebookLM 知识库\n│\n├── 场景一：学习\n│   ├── 知识库内容：视频脚本、实操记录、工具测评\n│   ├── 操作：让 Gemini 生成\"动态交互学习演练\"\n│   └── 效果：可点击展开的结构化学习系统（非问答）\n│\n├── 场景二：数据分析 & 项目管理\n│   ├── 知识库内容：项目文档、汇报记录（来自 Google Drive）\n│   ├── 操作：让 Gemini 生成可视化数据看板\n│   └── 效果：项目进度 / 关键指标 / 风险点 / 下一步行动，附数据来源页码\n│\n└── 场景三：工作汇报\n    ├── 知识库内容：同上项目知识库\n    ├── 操作：让 Gemini 生成大纲 → 导出 Slides\n    └── 效果：可编辑 PPT，支持随时用自然语言调整风格和内容","concepts":"#### 概念一：NotebookLM 知识库\n\n**是什么**：把各种文档、脚本、记录集中存放的私有知识仓库，是整个工作流的\"原材料层\"。\n\n**为什么重要**：没有结构化的知识库，AI 生成的内容就是无根之木；知识库质量直接决定输出成果的质量。\n\n**详细解释**：\n- 可以存入视频脚本、项目文档、测评记录等多种格式内容\n- 支持来自 Google Drive 的文件直接导入\n- 知识库是按项目/主题分开建立的，不同场景建不同库\n\n**实际应用场景**：学习时建\"AI 工具学习库\"，工作时建\"XX 项目库\"，互不干扰、随时调用。\n\n---\n\n#### 概念二：Gemini 调用 NotebookLM 知识库\n\n**是什么**：在 Gemini 界面左侧找到 NotebookLM 图标，选择对应知识库后，Gemini 的所有生成都基于该知识库内容。\n\n**为什么重要**：这是两个工具从\"分开用\"变成\"组合用\"的关键操作，打通后才能实现知识库到成果的直接输出。\n\n**详细解释**：\n| 操作步骤 | 说明 |\n|---|---|\n| 1. 打开 Gemini | 进入 Gemini 主界面 |\n| 2. 左侧找 NotebookLM 图标 | 这是连接入口 |\n| 3. 选择目标知识库 | 按场景选对应的库 |\n| 4. 输入指令 | 基于知识库内容下达生成任务 |\n\n**实际应用场景**：每次换项目只需切换知识库，指令可以复用。\n\n---\n\n#### 概念三：用自然语言迭代输出结果\n\n**是什么**：生成初稿后，不需要重新操作，直接用一句话告诉 Gemini 如何修改，它会在原有成果基础上调整。\n\n**为什么重要**：消除了传统工具\"改一处动全局、手动重排\"的痛点，让修改成本趋近于零。\n\n**详细解释**：\n- 风格调整：\"把这页改得口语一点\"\n- 内容替换：\"把这个图表换成柱状图\"\n- 角度切换：\"换个分析角度重新生成\"\n- 局部生成：\"只生成某个板块\"\n\n**实际应用场景**：PPT 汇报前临时被要求\"说得轻松一点\"，一句话搞定，不用重做。\n\n---\n\n#### 概念四：输出格式多样化\n\n**是什么**：同一个知识库，可以根据需要让 Gemini 输出不同形态的成果——交互页面、数据看板、结构化大纲、可编辑 PPT 等。\n\n**为什么重要**：知识库只需维护一份，面对不同受众和场合可以随时切换输出形式，极大降低重复劳动。\n\n**详细解释**：\n| 场景 | 输出形态 |\n|---|---|\n| 学习 | 可点击交互学习演练 |\n| 数据分析 | 可视化数据看板（含数据来源标注） |\n| 工作汇报 | 结构化大纲 → Google Slides 可编辑 PPT |\n\n**实际应用场景**：同一个项目，对内用数据看板开周会，对外用 PPT 做汇报，知识库不用动。","table":"| 对比维度 | 单独用 NotebookLM | 单独用 Gemini | 两者组合 |\n|---|---|---|---|\n| **核心功能** | 存资料、问问题、生成播客 | 问答、生成文本 | 知识库驱动的成果输出系统 |\n| **学习场景** | 问答式查询 | 无知识库支撑 | 可交互的结构化学习演练 |\n| **分析场景** | 基础摘要 | 无项目文档支撑 | 带来源标注的可视化数据看板 |\n| **汇报场景** | 无法直接生成 PPT | 无项目上下文 | 一键生成可编辑 Slides |\n| **修改成本** | 重新提问 | 重新提问 | 一句话自然语言迭代 |\n| **数据可信度** | 有来源 | 无来源标注 | 标注到具体文档页码 |","thinking":"1. **知识库的质量边界在哪里？** 视频里说\"输入决定输出\"，但如果项目文档本身写得很乱、信息不完整，Gemini 生成的数据看板和汇报大纲会失真到什么程度？有没有办法让 AI 先帮你\"整理\"知识库再输出？\n\n2. **这套组合对私密数据安全吗？** 把公司项目文档存入 NotebookLM 再接入 Gemini，数据是否会被 Google 用于训练？对于有数据合规要求的企业，这套工作流是否可行？\n\n3. **\"一句话修改\"的边界在哪？** 视频展示的修改都是风格和图表类型，如果要修改的是逻辑结构或核心论点，自然语言指令还能精准控制输出吗？什么情况下还是需要回到知识库层面重新整理？","remember":"NotebookLM 是粮仓，Gemini 是厨师，连起来才能做出一桌菜——单独用哪个，你都只是在囤食材。","is_new":true},{"id":"7625597847643670521","title":"非技术人员的 Vibe Coding 工具选择","cat":"vibecoding","video_url":"https://www.douyin.com/video/7625597847643670521","audience":"想用 AI 工具做产品但没有编程背景的零基础小白或非技术从业者","summary":"用\"两个维度 + 五个工具\"的框架，帮助零基础小白快速找到适合自己的 Vibe Coding 入门工具。","raw_preview":"上次做的小调查发现很多新手小白不知道 Vibe Coding 到底应该从哪一步开始，那今天我们就用一分钟时间来想清楚，市面上这些主流的开发工具，哪些是适合非技术人员去进行 Vibe Coding 的工具。我已经准备好了，想要用的小白可以去评论区，评论给大家，直接看张参考图。\n\n那我们可以从两个维度去说。第一个维度是全能型和垂直型的。那全能型的工具呢，他就是可以什么都做，写代码、改 bug、大运行都","knowledge_map":"非技术人员的 Vibe Coding 工具选择\n│\n├── 维度一：功能覆盖范围\n│   ├── 全能型（写代码 + 改 bug + 运行，什么都做）\n│   └── 垂直型（专注某一块，如界面/测试）\n│\n├── 维度二：自动化程度\n│   ├── 半自动（助手型，控制权在用户手里，点一下动一下）\n│   └── 全自动（Agent 型，数字员工，从头到尾自己跑通）\n│\n└── 推荐五大工具（纯小白适用）\n    ├── Cursor   —— 最适合新手，免费、配置简单、无网络要求\n    ├── Lovable  —— UI 搭建神器，最懂外行人\n    ├── Bolt     —— 做 MVP（最小可行性产品）一步到位\n    ├── Vercel   —— Next.js 出品，快速生成高级网页前端\n    └── Claude   —— 对话式开发伙伴，需要用户表达清晰有逻辑","concepts":"#### 概念一：全能型 vs 垂直型工具\n\n**是什么**：按工具的功能覆盖范围划分的两类工具。\n\n**为什么重要**：选错工具类型会导致学习成本高、效率低，明确自己的需求才能选对工具。\n\n**详细解释**：\n\n| 类型 | 能做什么 | 适合谁 |\n|------|----------|--------|\n| 全能型 | 写代码、改 bug、运行部署都能做 | 想全面尝试 Vibe Coding 的新手 |\n| 垂直型 | 只专注某一个环节，如界面设计或测试 | 卡在某一步、想针对性突破的用户 |\n\n**实际应用场景**：如果你完全不知道从哪里下手，先用全能型工具（如 Cursor）整体跑通流程；如果你已经能大致开发但界面很丑，就用垂直型工具（如 Lovable）专门打磨 UI。\n\n---\n\n#### 概念二：半自动（助手型）vs 全自动（Agent 型）\n\n**是什么**：按工具的自动化程度划分的两类工作模式。\n\n**为什么重要**：决定了你在开发过程中需要投入多少精力和判断，也影响出错时你能否及时介入。\n\n**详细解释**：\n\n| 类型 | 工作方式 | 控制权 | 适合场景 |\n|------|----------|--------|----------|\n| 半自动（助手型） | 用户指令 → 工具执行一步 → 用户再指令 | 在用户手里 | 想边学边做、保持掌控感 |\n| 全自动（Agent 型） | 用户说目标 → 工具自动规划并跑通全流程 → 交付产品 | 在工具手里 | 想快速出产品、信任工具能力 |\n\n**实际应用场景**：做第一个产品时建议用半自动模式，能看清楚每一步在干什么；有经验之后可以用 Agent 型工具提升效率。\n\n---\n\n#### 概念三：MVP（最小可行性产品）\n\n**是什么**：用最少的功能验证一个产品想法是否可行的原型版本。\n\n**为什么重要**：非技术人员资源有限，先做 MVP 可以快速验证方向，避免在错误的产品上浪费时间。\n\n**详细解释**：MVP 不追求完美，只追求\"能跑、能用、能验证核心假设\"。视频中提到 Bolt 就是专门为快速做出 MVP 设计的工具，一步到位。\n\n**实际应用场景**：你有一个 App 想法，先用 Bolt 做出能点击的基础版本，拿给真实用户试用，收到反馈后再决定要不要继续深做。\n\n---\n\n#### 概念四：用 Claude 做对话式开发\n\n**是什么**：把 Claude 当成开发伙伴，通过持续对话描述需求，让它直接生成代码或产品。\n\n**为什么重要**：对于不会写代码的人，\"聊天\"是最低门槛的交互方式，但质量高度依赖用户的表达能力。\n\n**详细解释**：视频特别强调了一个前提条件——用户需要**逻辑清晰、条理分明**地描述需求，Claude 才能给出准确的结果。这意味着 Claude 对用户的\"需求整理能力\"有一定要求，不适合完全没想清楚就开始聊的情况。\n\n**实际应用场景**：在动手之前，先把你想做的产品的功能、用户、流程写成一份清单，然后带着这份清单去和 Claude 对话，效果会好很多。","table":"| 工具 | 核心定位 | 最适合的场景 | 门槛 | 费用 |\n|------|----------|--------------|------|------|\n| **Cursor** | 全能型开发环境 | 零基础入门，全流程体验 | 最低 | 免费 |\n| **Lovable** | UI 搭建神器 | 产品界面设计，外行也能做好看的 UI | 低 | — |\n| **Bolt** | MVP 快速生成 | 想快速验证产品想法 | 低 | — |\n| **Vercel** | 网页前端部署 | 把想法变成高级网页 | 中 | — |\n| **Claude** | 对话式开发伙伴 | 边聊边做，需求清晰时效果极好 | 中（需要表达能力） | — |","thinking":"1. **视频推荐 Cursor 完全免费且对小白最友好，但真实使用中免费版有哪些限制？当项目复杂度提升后，Cursor 还够用吗？**\n\n2. **Claude 做 Vibe Coding 的前提是\"逻辑清晰、条理分明地描述需求\"——对于非技术人员来说，如何训练自己把模糊的产品想法整理成 Claude 能读懂的需求？**\n\n3. **全自动 Agent 型工具听起来很省力，但控制权完全交给工具，如果中途出错或方向跑偏，非技术人员有能力发现并纠正吗？这种风险该怎么管理？**","remember":"选 Vibe Coding 工具前先想清楚两件事：你要做什么（全能 vs 垂直），你想管多少（半自动 vs 全自动）——想清楚了，工具自然就选对了。","is_new":true},{"id":"7625629969054132835","title":"用设计规范文件解决 Vibe Coding 页面丑问题","cat":"vibecoding","video_url":"https://www.douyin.com/video/7625629969054132835","audience":"正在用 AI 辅助编程（Vibe Coding）但苦恼于页面视觉效果差的开发者或设计新手","summary":"用现成的 Design.md 设计规范文件\"喂给\"AI，可以让 Vibe Coding 生成的页面直接跳过\"丑\"这一关，省去大量反复调整的时间。","raw_preview":"最近看到一个在 GitHub 上一周涨了 1.7 万星的仓库，它补的刚好就是很多人做 Vibe Coding 最头疼的一步——页面能做出来，但就是容易丑，看起来很散，而且后面要花很多时间反复去 Google。\n\n最近推了一个 Design.md 的思路，本质上就是先写一份设计规则，让 AI 先读，再开始做页面。这个仓库做的事情更直接，它把很多现成的设计风格都整理好了，像 Apple、Linear、","knowledge_map":"Vibe Coding 页面丑问题的解决方案\n│\n├── 问题根源\n│   ├── 页面能跑，但视觉很散\n│   └── 反复 Google 调样式，效率低\n│\n├── 解决思路：Design.md 方法论\n│   ├── 核心逻辑：先给 AI 读设计规则，再让它写页面\n│   └── 规则内容：颜色、字体、组件风格、间距、布局层级\n│\n├── 该仓库做了什么\n│   ├── 把主流网站风格拆解好（Apple、Linear、Vercel 等）\n│   └── 整理成可直接复用的 Design.md 文件\n│\n├── 使用方式\n│   ├── 挑选接近的风格文件\n│   └── 直接丢进 AI 对话/项目上下文\n│\n└── 注意事项\n    └── 中文页面需额外调整字体和留白","concepts":"#### 概念一：Vibe Coding 的\"页面丑\"问题\n\n**是什么**：用 AI 生成代码时，功能逻辑可以跑通，但页面视觉效果混乱、缺乏设计感的普遍现象。\n\n**为什么重要**：\n页面观感直接影响产品的可用性和专业度，而 AI 在没有设计约束的情况下，默认生成的样式往往缺乏一致性和品味。\n\n**详细解释**：\nAI 写代码时不会自动套用某种设计语言，颜色、字体、间距都是随机决策，结果就是\"能用但难看\"。很多人的解法是事后反复调，耗时且低效。\n\n**实际应用场景**：\n用 Cursor、Claude 等工具快速搭建落地页、工具页、个人项目时，第一版出来视觉效果差，需要花大量时间补救。\n\n---\n\n#### 概念二：Design.md 方法论\n\n**是什么**：在让 AI 开始写页面之前，先提供一份写好的设计规范文档（Design.md），作为 AI 的\"设计上下文\"。\n\n**为什么重要**：\nAI 是基于上下文工作的，给它明确的设计约束，它生成的结果就会在这个约束范围内收敛，第一版质量大幅提升。\n\n**详细解释**：\nDesign.md 里包含的内容通常有：\n\n| 设计维度 | 示例内容 |\n|----------|----------|\n| 整体气质 | 极简、科技感、温暖亲切 |\n| 颜色系统 | 主色、辅色、背景色、文字色 |\n| 字体规范 | 字体家族、标题/正文字号比例 |\n| 组件风格 | 按钮圆角大小、卡片阴影层级 |\n| 间距与布局 | 内边距规则、栅格系统、留白比例 |\n\n**实际应用场景**：\n在开始一个新项目时，把对应的 Design.md 文件放进 AI 的 system prompt 或项目上下文，然后直接开始让 AI 写页面。\n\n---\n\n#### 概念三：现成风格仓库的复用逻辑\n\n**是什么**：该 GitHub 仓库已经把 Apple、Linear、Vercel 等知名产品的设计风格，拆解整理成了一套套现成可用的 Design.md 文件。\n\n**为什么重要**：\n不需要自己从零写设计规范，直接\"借用\"成熟产品的设计语言，降低了使用门槛。\n\n**详细解释**：\n- 仓库里每个风格对应一个 Design.md 文件\n- 文件内容是对该网站设计语言的具体描述和约束\n- 用户只需挑一个风格，复制粘贴进 AI 工具即可\n\n**实际应用场景**：\n想做一个有 Apple 官网质感的产品介绍页，直接取仓库里的 Apple 风格 Design.md 丢给 AI，而不是自己去描述\"我要苹果那种感觉\"。\n\n---\n\n#### 概念四：中文页面的适配问题\n\n**是什么**：仓库里的设计规范是基于英文语境制作的，直接用于中文页面时，字体选择和留白比例会出现不适配的情况。\n\n**为什么重要**：\n中英文字体的字重、字符密度、行高需求差异明显，直接套用英文规范会让中文页面显得拥挤或比例失调。\n\n**详细解释**：\n- 英文字体规范（如 Inter、SF Pro）不能直接映射到中文字体\n- 中文字符密度更高，需要适当增大行高和字间距\n- 留白的感知在中英文页面中有视觉差异\n\n**实际应用场景**：\n使用仓库风格生成中文页面后，需要额外一轮调整：替换为合适的中文字体（如思源黑体、PingFang），并手动调整行高和段落间距。","table":"| 对比维度 | 不用 Design.md | 用 Design.md 仓库 |\n|----------|----------------|-------------------|\n| 第一版页面质量 | 随机，通常较差 | 有设计语言，质量稳定 |\n| 调整成本 | 高，反复 Google 补样式 | 低，主要做微调 |\n| 上手难度 | 无门槛（但结果差） | 极低（挑风格+复制粘贴） |\n| 设计感来源 | AI 默认随机决策 | 借用成熟产品设计语言 |\n| 中文页面适配 | 无特别问题 | 需额外调字体和留白 |\n| 适合场景 | 纯功能验证原型 | 有一定视觉要求的页面 |","thinking":"1. **Design.md 的边界在哪里？** 设计规范文件能约束 AI 的视觉输出，但它能解决交互逻辑和用户体验层面的问题吗？什么情况下 Design.md 反而会限制 AI 的发挥？\n\n2. **\"借用\"成熟产品设计语言的风险是什么？** 大量 Vibe Coding 项目都套用 Apple 或 Linear 风格，会不会导致产品同质化严重？如何在使用现成规范的同时保留自己的差异化？\n\n3. **中文互联网有没有值得拆解的设计语言？** 目前仓库以英文产品为主，微信、飞书、即刻等中文产品是否也有值得整理成 Design.md 的设计系统？谁来做这件事？","remember":"让 AI 写页面之前，先给它一份\"设计说明书\"——用别人拆好的 Design.md，你的页面第一版就能直接有品味。","is_new":true},{"id":"7627168048558285425","title":"lesson_7627168048558285425.md","cat":"vibecoding","video_url":"https://www.douyin.com/video/7627168048558285425","audience":"","summary":"","raw_preview":"","knowledge_map":"","concepts":"","table":"","thinking":"","remember":"","is_new":false},{"id":"7627482803596384442","title":"AI产品经理Vibe Coding面试高分答案","cat":"vibecoding","video_url":"https://www.douyin.com/video/7627482803596384442","audience":"正在准备AI产品经理面试、或想用Vibe Coding真正落地产品的产品经理","summary":"AI产品经理做Vibe Coding的核心竞争力，不是会让AI写代码，而是一套\"需求成型→规范驱动→技术判断\"的完整能力结构。","raw_preview":"AI产品经理里面，90%的人都会在这道题上翻车。面试官问你什么是Vibe Coding，要是你一开口就说\"用AI写代码做页面、省时间\"，那么面试官基本上就能判定你不懂，也没有真正落地过这一块。\n\n所以我今天就用几分钟时间来给大家讲解，作为AI产品经理，什么样的Vibe Coding能力是有竞争力的。\n\nAI产品经理最强的Vibe Coding，它不是更像程序员，而是更像产品Owner。很多人会误以","knowledge_map":"Vibe Coding 高竞争力能力结构\n│\n├── 核心定位：产品 Owner，而非程序员\n│   ├── 定义问题\n│   ├── 组织资源\n│   ├── 推进落地\n│   └── 验证结果\n│\n├── 第一层：需求成型能力（拼的不是 coding）\n│   ├── 明确产品目标\n│   │   ├── 内部工具 / Demo / MVP？\n│   │   └── 对外展示 or 内部使用？\n│   ├── 定义用户是谁\n│   │   └── C端 / 运营 / 销售 / 客服 / 老板 → 页面结构不同\n│   └── 拆解核心流程\n│       ├── 用户从哪里进入\n│       ├── 点击后发生什么\n│       └── 异常情况如何处理\n│\n├── 第二层：规范驱动开发（不是聊天驱动）\n│   ├── 精简版 PRD（即使是 Demo 也需要）\n│   ├── 信息框架 & 页面结构（页面、模块、跳转逻辑）\n│   ├── 数据结构 & 存储状态\n│   └── 验收标准\n│\n└── 第三层：基础技术判断能力\n    ├── 前后端分层意识\n    │   ├── 哪些属于前端\n    │   └── 哪些属于后端逻辑\n    ├── 组件化意识\n    │   ├── 通用组件\n    │   └── 一次性页面\n    └── 调试能力","concepts":"#### 概念一：Vibe Coding 的正确定位——产品 Owner，不是程序员\n\n**是什么**：AI时代有竞争力的产品经理，是能定义问题、组织资源、推进落地、验证结果的产品Owner，而不是越来越像工程师的人。\n\n**为什么重要**：\n很多人误以为AI时代产品经理要向工程师靠拢，这个方向会让你越跑越偏。真正的竞争力在于你能不能用AI把\"想法\"变成\"可讨论、可测试、可验证的东西\"。\n\n**详细解释**：\nAI扩大的是你的**执行半径**，而不是替换你的产品判断。以前产品经理只能写文档、画原型、提需求；现在你可以亲自把方案做成一个可运行的Demo。但驱动这一切的，依然是产品Owner的思维，而不是写代码的能力。\n\n**实际应用场景**：\n面试时被问到Vibe Coding，不要说\"用AI写代码省时间\"，而要说清楚你是如何用AI把一个功能从想法推进到可验证的闭环——这才是面试官想听到的。\n\n---\n\n#### 概念二：需求成型能力——AI最擅长补全，不擅长业务判断\n\n**是什么**：在Vibe Coding里，产品经理拼的核心能力是把需求说清楚的能力，而不是coding能力本身。\n\n**为什么重要**：\nAI就像一个执行速度极快但没有业务判断力的工程师。你的需求模糊，它就在模糊空间里自由发挥，结果大概率跑偏。\n\n**详细解释**：\n\n| 需要想清楚的维度 | 具体内容 |\n|---|---|\n| 产品目标 | 内部工具？干净的Demo？对外MVP？ |\n| 用户是谁 | C端用户、运营、销售、客服、老板——页面结构和交互方式各不同 |\n| 核心流程 | 用户从哪里进入、点击后发生什么、异常情况怎么处理 |\n\n**实际应用场景**：\n在开始让AI写代码之前，先把以上三个维度想清楚并写下来。你给AI的输入越清晰，它产出的东西离你的预期就越近。\n\n---\n\n#### 概念三：规范驱动开发——不能靠\"聊天驱动\"\n\n**是什么**：用结构化的规范文档（PRD、页面结构、数据结构、验收标准）来驱动AI开发，而不是边聊边改、到哪算哪。\n\n**为什么重要**：\n聊天驱动的开发结果是\"玩具式项目\"——整体不可维护，无法交接，更无法迭代。\n\n**详细解释**：\n\n| 规范文档 | 作用 |\n|---|---|\n| 精简版 PRD | 明确要做什么，即使是Demo也需要 |\n| 信息框架 & 页面结构 | 定义哪些页面、哪些模块、跳转逻辑是什么 |\n| 数据结构 & 存储状态 | 确保数据层有基本设计，不是乱来 |\n| 验收标准 | 明确\"做到什么程度算完成\"，避免无限返工 |\n\n**实际应用场景**：\n哪怕只是做一个内部演示Demo，也要先写一份最精简的PRD，画出页面跳转关系，再开始让AI生成代码。\n\n---\n\n#### 概念四：基础技术判断能力——能识别AI写的是不是垃圾\n\n**是什么**：产品经理需要具备基础的技术认知，能判断AI生成代码的质量和合理性，而不是完全信任AI的输出。\n\n**为什么重要**：\nAI降低了写代码的门槛，但同时暴露了一个更大的问题：如果你没有基础技术判断力，你根本不知道AI写出来的东西好不好，甚至是不是垃圾。\n\n**详细解释**：\n\n| 技术判断能力 | 具体内容 |\n|---|---|\n| 前后端分层意识 | 知道哪些逻辑在前端，哪些在后端，不会提出不合理的需求 |\n| 组件化意识 | 能识别哪些是可复用的通用组件，哪些是一次性页面 |\n| 调试能力 | 出了问题能定位方向，而不是只会重新问AI |\n\n**实际应用场景**：\n当AI生成一段代码后，你需要能大致判断：这个逻辑放在前端合不合理？这个模块是不是写重了？而不是直接复制粘贴就跑。","table":"| 维度 | 错误认知（翻车答案） | 正确认知（高分答案） |\n|---|---|---|\n| Vibe Coding 是什么 | 用AI写代码做页面、省时间 | 借助AI把想法快速落地并推进闭环的完整能力结构 |\n| 产品经理的定位 | 越来越像工程师/程序员 | 越来越像能定义问题、验证结果的产品Owner |\n| 核心竞争力 | coding能力 | 需求成型能力 |\n| 开发驱动方式 | 聊天驱动（到哪算哪） | 规范驱动（PRD + 页面结构 + 验收标准） |\n| 对AI的态度 | 完全信任AI的输出 | 具备基础技术判断力，能识别AI输出的质量 |\n| AI的本质 | 替你做业务判断的工具 | 执行速度快但没有业务判断力的\"工程师\" |","thinking":"1. **\"需求成型能力\"和传统产品经理写PRD的能力，本质上有什么区别？** AI时代的需求成型，是否对产品经理提出了更高的要求——不只是写清楚，还要写得让AI能直接执行？\n\n2. **如果一个产品经理完全没有技术背景，应该从哪个技术概念开始建立\"基础技术判断力\"？** 前后端分层、组件化、调试能力，哪个对非技术背景的产品经理来说是最优先要补的？\n\n3. **\"聊天驱动开发\"在什么场景下是合理的，什么场景下会出问题？** 是不是所有Vibe Coding项目都需要完整的规范文档，还是有一个复杂度的临界点？","remember":"Vibe Coding面试，拼的不是你让AI写了多少代码，而是你能不能用一套规范把一个想法推进成可验证的东西——这才是产品Owner的竞争力。","is_new":true},{"id":"7628496030555770121","title":"AI 一键生成思维导图和流程图","cat":"vibecoding","video_url":"https://www.douyin.com/video/7628496030555770121","audience":"需要频繁制作周报、PPT 或学习笔记、但不想手动排版的职场人和学生","summary":"有一个 AI 网站可以把你粘贴进去的一段文字，自动生成流程图、时间线、思维导图等专业图表，支持样式调整后导出，彻底省掉手动排版的时间。","raw_preview":"这是一个能让写周报的人集体沉默的网站。每天认识一个宝藏网站，第七十七期。\n\n今天分享的是：你只需要把一段文字粘贴进去，点一下，就能生成流程图、时间线、思维导图这些图表。不用拖拽，不用调格式。\n\n比如你想汇报本周工作进展，直接把内容粘贴进去，它就能给你生成一张专业的图表。\n\n更离谱的是，生成完不满意还能换样式、换颜色、改文字。改完直接导出 PNG 或 PDF。\n\n以后写周报想加张流程图，直接往里一塞","knowledge_map":"AI 自动生成图表工具\n├── 输入方式\n│   └── 粘贴一段文字\n├── 支持的图表类型\n│   ├── 流程图\n│   ├── 时间线\n│   └── 思维导图\n├── 核心优势\n│   ├── 无需拖拽\n│   └── 无需手动调格式\n├── 后期编辑能力\n│   ├── 换样式\n│   ├── 换颜色\n│   └── 改文字\n└── 导出格式\n    ├── PNG\n    └── PDF","concepts":"#### 文字转图表（Text to Diagram）\n\n**是什么**：把一段普通文字作为输入，由 AI 自动解析结构并生成对应的可视化图表。\n\n**为什么重要**：\n制作流程图、思维导图传统上需要在专业软件里手动拖拽节点、连线、调整布局，耗时且门槛高。文字转图表把这个过程压缩到\"粘贴+点击\"两步。\n\n**详细解释**：\n\n| 传统做法 | AI 工具做法 |\n|---|---|\n| 打开 Visio / XMind 等软件 | 打开网站，粘贴文字 |\n| 手动添加节点和连线 | 点击一下自动生成 |\n| 手动调整布局和样式 | 选择预设样式一键切换 |\n| 导出需要额外操作 | 直接导出 PNG / PDF |\n\n**实际应用场景**：\n- 写周报时，把本周工作进展的文字描述粘贴进去，生成一张汇报用的流程图\n- 整理学习笔记，把文字内容转成思维导图方便复习\n\n---\n\n#### 生成后编辑与导出\n\n**是什么**：AI 生成图表后，用户还可以对样式、颜色、文字内容进行二次修改，满意后导出为图片或文档格式。\n\n**为什么重要**：\n纯自动生成的结果不一定 100% 符合需求，支持编辑意味着 AI 负责\"搭架子\"，人只需要做最后的微调，效率和灵活性都有保障。\n\n**详细解释**：\n- **换样式**：切换不同的图表视觉风格\n- **换颜色**：调整配色方案\n- **改文字**：直接在图表上修改节点文字内容\n- **导出格式**：PNG（适合插入 PPT / 文档）、PDF（适合正式存档或打印）\n\n**实际应用场景**：\n- 生成周报流程图后，发现某个步骤描述不准确，直接在图上改文字，无需重新生成\n- 根据公司汇报风格换一套颜色，导出 PNG 插入 PPT","table":"| 维度 | 详情 |\n|---|---|\n| 输入方式 | 粘贴一段文字 |\n| 支持图表类型 | 流程图、时间线、思维导图 |\n| 是否需要拖拽排版 | 不需要 |\n| 生成后能否修改 | 能（样式、颜色、文字均可改） |\n| 导出格式 | PNG、PDF |\n| 典型使用场景 | 周报配图、PPT 插图、学习笔记整理 |","thinking":"1. **AI 生成的图表结构是否总是准确？** 当输入的文字逻辑层次比较复杂或模糊时，AI 解析出的图表结构可能和你的预期不符——你会如何在输入阶段优化文字，让生成结果更准确？\n\n2. **这类工具会不会让人的结构化思维能力退化？** 长期依赖 AI 自动生成图表，是否会减少自己主动梳理信息层级的练习机会？\n\n3. **PNG 和 PDF 两种导出格式分别适合哪些具体场景？** 除了视频提到的周报和 PPT，还有哪些工作或学习场景可以用到这个工具？","remember":"把文字粘进去，流程图自己长出来——写周报再也不用对着空白画布发呆。","is_new":true},{"id":"7628910682364235008","title":"65行提示词驯服AI写代码","cat":"vibecoding","video_url":"https://www.douyin.com/video/7628910682364235008","audience":"有一定AI编程使用经验、希望提升AI写代码质量和可控性的开发者或技术爱好者","summary":"Karpathy将AI写代码的实战经验提炼成一份65行的提示词规则文件，帮助开发者解决AI乱加需求、改崩代码的核心痛点，从而真正掌控AI编程流程。","raw_preview":"这到底是一个没有代码、只有65行字的文件，凭什么狂揽3.7万星？因为它击中了AI写代码的三大决症。\n\nOpenAI创始成员Karpathy已出言：现在的AI写代码总爱加脑补需求，把简单问题复杂化，修个Bug还顺手把原本正常的代码改崩。\n\n于是大神把自己的实战经验浓缩成四条给AI看的纪律手册，整合成一份SKIP提示词。你只要丢给AI，它瞬间就变得靠谱不少了。\n\n一句话总结：这不只是一个文件，更是一套","knowledge_map":"65行提示词文件（3.7万星）\n├── 背景：AI写代码的三大决症\n│   ├── 1. 爱脑补需求，超出范围行事\n│   ├── 2. 把简单问题复杂化\n│   └── 3. 修Bug时顺手改崩正常代码\n│\n├── 来源：Karpathy 的实战经验总结\n│   └── OpenAI 创始成员，权威背书\n│\n├── 解法：四条给AI看的纪律手册\n│   └── 整合成一份 SKIP 提示词文件\n│\n└── 核心价值\n    ├── 丢给AI → 立即变靠谱\n    └── 驾驭AI，而不是被AI带着走","concepts":"#### 概念一：AI写代码的三大决症\n\n**是什么**：当前AI辅助编程中反复出现的三类典型问题。\n\n**为什么重要**：这三类问题是开发者使用AI写代码时最常踩的坑，直接导致效率下降、代码质量失控。\n\n**详细解释**：\n\n| 决症 | 具体表现 |\n|------|----------|\n| 脑补需求 | AI自作主张添加未被要求的功能或逻辑 |\n| 过度复杂化 | 本来一个简单的改动，AI给出冗长复杂的方案 |\n| 改崩代码 | 修一个Bug时，顺带动了原本正常运行的代码，引入新问题 |\n\n**实际应用场景**：在用Cursor、Copilot等AI工具写代码时，经常会遇到\"我只让它改一行，它改了一整个文件\"的情况，正是这三大决症的典型体现。\n\n---\n\n#### 概念二：SKIP 提示词文件\n\n**是什么**：一份只有65行的纯文本规则文件，内容是四条约束AI行为的纪律手册，使用时直接丢给AI作为上下文。\n\n**为什么重要**：它把顶级工程师的编程经验固化成AI能读懂的规则，让任何人都能复用这套经验，而不需要反复手动纠正AI的行为。\n\n**详细解释**：\n\n- 文件本身不含代码，只有自然语言写成的行为规范\n- 核心思路：与其事后纠错，不如事前立规矩\n- 使用方式：将文件内容作为系统提示词或上下文喂给AI\n\n**实际应用场景**：在开启一个新的AI编程对话前，将这份文件的内容粘贴进去，AI后续的回复会更克制、更聚焦、更少\"自由发挥\"。\n\n---\n\n#### 概念三：经验固化为规则\n\n**是什么**：将人类专家的隐性经验显式地写成规则，让AI可以直接遵循。\n\n**为什么重要**：AI本身没有\"踩坑记忆\"，每次对话都是白板。把经验写成规则，等于给AI装上了一个经验过滤器。\n\n**详细解释**：\n\n- Karpathy 作为 OpenAI 创始成员，对AI模型的行为边界有深度理解\n- 这份文件的价值不在于技术复杂度（只有65行），而在于经验密度\n- 本质是一种**提示词工程**的最佳实践：用规则代替反复纠正\n\n**实际应用场景**：团队协作时，可以把这类规则文件纳入项目仓库，统一所有成员与AI交互的行为预期。","table":"| 维度 | 内容 |\n|------|------|\n| 文件大小 | 65行，无代码，纯文本 |\n| GitHub 星标 | 3.7万（视频发布时） |\n| 作者 | Karpathy（OpenAI 创始成员） |\n| 解决的核心问题 | AI脑补需求 / 复杂化方案 / 改崩代码 |\n| 使用方式 | 直接作为提示词丢给AI |\n| 核心结构 | 四条纪律手册 |\n| 本质价值 | 驾驭AI，而不是被AI带着走 |","thinking":"1. **规则的边界在哪里？** 这份65行的规则文件能约束AI行为，但AI本身的理解和执行也存在偏差——当规则本身被AI\"创意解读\"时，我们该如何校验和迭代这套规则？\n\n2. **经验固化的代价是什么？** Karpathy的经验来自特定的编程场景和习惯，把它套用到不同技术栈、不同项目规模的开发场景中，是否会产生新的约束和摩擦？\n\n3. **这套思路能推广到编程以外吗？** \"把专家经验写成规则文件喂给AI\"这个方法论，是否可以迁移到写作、数据分析、产品设计等其他AI协作场景，形成各领域自己的\"纪律手册\"？","remember":"与其反复纠正AI，不如一开始就立好规矩——65行规则文件，是让AI听话的最短路径。","is_new":true},{"id":"7628912832150654234","title":"6个Skill让AI写出好看的前端","cat":"vibecoding","video_url":"https://www.douyin.com/video/7628912832150654234","audience":"有一定 vibe coding 经验、想提升 AI 生成前端页面视觉质量的开发者或独立建站者","summary":"介绍 6 个可直接装入 AI 编程工作流的前端 Skill 工具包，帮你系统解决 vibe coding 网站\"廉价感\"和\"AI 味\"问题。","raw_preview":"这几个前端常用 Skill 你用过吗？\n\n**I'm Packable**，增强版 Front Design Scale，专注设计规范落地。\n\n**Taste Scale**，提升 AI 前端审美判断。\n\n**UI Skills**，模块化 UI 工程技能集合。\n\n**Motion AI Kit**，专注动画和动效。\n\n**Better Icons**，解决 AI 开发图标难题。\n\n最后再加上 *","knowledge_map":"6个前端AI Skill\n├── 设计规范落地\n│   └── I'm Packable（增强版 Front Design Scale）\n├── 审美判断提升\n│   └── Taste Scale\n├── UI 工程能力\n│   └── UI Skills（模块化 UI 技能集合）\n├── 动画与动效\n│   └── Motion AI Kit\n├── 图标解决方案\n│   └── Better Icons\n└── 大厂设计参考\n    └── Design in.mb（大厂设计与 AI 文档包）","concepts":"#### 概念一：设计规范落地类 Skill（I'm Packable）\n\n**是什么**：一个增强版的前端设计规范 Skill，帮助 AI 在生成代码时遵循真实可用的设计规范。\n\n**为什么重要**：\nAI 写前端时最容易忽略设计一致性，间距、字号、颜色体系往往随机生成，导致页面\"拼凑感\"强。\n\n**详细解释**：\n专注于将设计规范\"喂给\"AI，让 AI 输出的组件和布局符合统一标准，而不是每次都靠提示词临时约束。\n\n**实际应用场景**：\n需要多页面保持视觉一致性的项目，或从零搭建一套有品牌感网站时使用。\n\n---\n\n#### 概念二：审美判断类 Skill（Taste Scale）\n\n**是什么**：专门提升 AI 在前端界面上的\"审美判断力\"的 Skill。\n\n**为什么重要**：\nAI 默认生成的 UI 往往\"功能正确但不好看\"，缺乏对视觉层次、留白、配色协调的感知。\n\n**详细解释**：\nTaste Scale 相当于给 AI 装了一套美学评判标准，让它在生成 UI 时能主动做出更接近设计师水准的选择。\n\n**实际应用场景**：\n希望 AI 生成的页面不需要大量人工调整、直接达到\"可展示\"水准时使用。\n\n---\n\n#### 概念三：动画动效类 Skill（Motion AI Kit）\n\n**是什么**：专注于前端动画和动效实现的 Skill 工具包。\n\n**为什么重要**：\n动效是区分\"普通网站\"和\"有质感网站\"的关键细节，但 AI 在没有引导的情况下几乎不会主动添加合理动效。\n\n**详细解释**：\nMotion AI Kit 为 AI 提供动效相关的规范和实现模式，使其能生成过渡动画、加载效果、交互反馈等，提升整体体验感。\n\n**实际应用场景**：\n落地页、产品展示页、个人作品集等对视觉体验要求较高的场景。\n\n---\n\n#### 概念四：图标与大厂参考类 Skill（Better Icons + Design in.mb）\n\n**是什么**：\n- **Better Icons**：解决 AI 开发中图标选用混乱、质量参差问题的 Skill。\n- **Design in.mb**：汇集大厂设计规范与 AI 可读文档的参考包。\n\n**为什么重要**：\n图标是前端细节中最容易暴露\"AI 味\"的地方；大厂设计文档则为 AI 提供了经过验证的高质量参照系。\n\n**详细解释**：\n\n| Skill | 解决的问题 | 核心价值 |\n|---|---|---|\n| Better Icons | AI 乱用图标、风格不统一 | 提供规范图标使用方案 |\n| Design in.mb | 缺乏高质量设计参照 | 引入大厂设计标准与 AI 文档 |\n\n**实际应用场景**：\n任何需要图标的界面；想让 AI 参考 Airbnb、Linear 等大厂设计风格时使用。","table":"| Skill 名称 | 核心定位 | 主要解决的问题 |\n|---|---|---|\n| I'm Packable | 设计规范落地 | 页面缺乏一致性、组件风格散乱 |\n| Taste Scale | AI 审美判断 | 生成 UI 不好看、视觉层次混乱 |\n| UI Skills | 模块化 UI 工程 | UI 组件工程能力弱、复用性差 |\n| Motion AI Kit | 动画与动效 | 页面静态感强、缺乏质感交互 |\n| Better Icons | 图标规范使用 | 图标风格混乱、AI 味明显 |\n| Design in.mb | 大厂设计参考 | 缺乏高水准设计标准参照 |","thinking":"1. **这 6 个 Skill 是否需要全部同时加载？** 不同项目类型（落地页 vs 后台系统 vs 个人作品集）应该如何按需组合使用？\n\n2. **\"去除 AI 味\"的本质是什么？** 是规范问题、审美问题，还是细节打磨问题——这 6 个 Skill 分别在哪个层面发力？\n\n3. **随着 AI 模型本身审美能力的提升，这类外挂 Skill 的必要性会降低吗？** 还是说设计规范的注入始终需要人工干预？","remember":"与其反复用提示词\"求\"AI 做好看的界面，不如直接给它装上这 6 个 Skill，让审美和规范成为 AI 的默认能力。","is_new":true},{"id":"7628955177269103923","title":"AI产品经理的Vibe Coding掌握路径","cat":"vibecoding","video_url":"https://www.douyin.com/video/7628955177269103923","audience":"想转型或正在从事AI产品经理岗位、希望了解Vibe Coding能力要求的职场人","summary":"Vibe Coding正成为AI产品经理的必考技能，本视频拆解了它的定义、价值和从入门到独立交付产品的四级掌握路径。","raw_preview":"对于Vibe Coding，AI产品经理到底要掌握到什么程度？我们今年能看到AI圈子里面一个明显的趋势，就是对AI产品经理要求Vibe Coding能力。最激进的，当初基本上效招在招AI产品的数席时，Vibe Coding变成了必考项。\n\n那到底什么是Vibe Coding？AI产品经理需要掌握到什么程度？我们一篇内容给大家讲清楚。\n\n首先先讲什么是Vibe Coding。Vibe Coding这","knowledge_map":"Vibe Coding × AI产品经理\n│\n├── 1. 什么是Vibe Coding\n│   ├── 概念来源：卡帕西（OpenAI联合创始人）提出\n│   ├── 核心定义：用自然语言驱动AI完成编程全流程\n│   └── 与传统AI辅助编程的区别：人不消化代码，只写提示词\n│\n├── 2. 为什么产品经理要学\n│   ├── 短期：工作提效（如自建数据报表工具）\n│   └── 长期：组织变革，全栈角色成主流，一人团队成为可能\n│\n└── 3. 要掌握到什么程度（四个级别）\n    ├── 第一级：精准提需求（把模糊想法拆解为系统需求）\n    ├── 第二级：复杂任务拆解 + 上下文治理\n    ├── 第三级：调试（理解前后端/数据库/日志等基础技术结构）★多数PM目标级别\n    └── 第四级：复杂依赖外部库的集成（进阶，非当前必须）","concepts":"#### 概念一：Vibe Coding\n\n**是什么**：用自然语言描述意图，让AI完成代码编写、修改、调试和迭代的全流程开发方式。\n\n**为什么重要**：\n编程语言从\"Python/JavaScript等代码语言\"切换为\"自然语言\"，门槛大幅降低，非技术背景的人也能构建完整产品。\n\n**详细解释**：\n\n| 对比维度 | 传统AI辅助编程 | Vibe Coding |\n|---|---|---|\n| 人的角色 | 需要读懂并修改代码 | 只写提示词，不消化代码 |\n| 编程语言 | Python / JS 等 | 自然语言 |\n| 门槛 | 需要一定编程基础 | 学习后人人可用 |\n| 产出 | 代码片段辅助 | 完整可交付产品 |\n\n**实际应用场景**：\n产品经理自己用Vibe Coding搭建一个数据报表工具，不需要找数据分析同学，完全基于自己的需求独立完成。\n\n---\n\n#### 概念二：Vibe Coding 四级掌握路径\n\n**是什么**：将Vibe Coding能力分为四个递进层次，帮助AI产品经理明确学习目标。\n\n**为什么重要**：\n不同阶段的人容易卡在不同的瓶颈，清晰的层级帮助有针对性地突破，避免盲目学习。\n\n**详细解释**：\n\n| 级别 | 核心能力 | 难点 | 对PM的挑战 |\n|---|---|---|---|\n| 第一级 | 精准提需求 | 提示词模糊、跳跃 | 难度较低，会写PRD就会写提示词 |\n| 第二级 | 复杂任务拆解 + 上下文治理 | 上下文窗口过长导致AI\"崩溃\" | 需要学会分步骤拆解任务 |\n| 第三级 | 调试 | 无技术背景难以定位问题 | 需理解前后端、数据库、日志等基础概念 |\n| 第四级 | 外部库集成 | 依赖管理复杂 | 进阶能力，当前阶段非必须 |\n\n**实际应用场景**：\n做一个完整应用时，先让AI搭整体框架（拆解），再写前端组件，最后连数据库——这是第二级任务拆解的典型操作。\n\n---\n\n#### 概念三：上下文治理\n\n**是什么**：在Vibe Coding过程中，管理与AI对话的上下文长度和信息质量，避免因上下文过长导致AI输出混乱或\"失忆\"。\n\n**为什么重要**：\n这是很多人在做复杂项目时遇到的第一个真实瓶颈——AI开始表现良好，越往后越乱，根源就是上下文窗口问题。\n\n**详细解释**：\n- 上下文窗口有限，超出后AI会\"忘记\"前面的内容\n- 任务越复杂，越需要主动拆解，而不是一口气把所有需求塞给AI\n- 常见策略：分模块对话、定期重置上下文、用文档锚定关键信息\n\n**实际应用场景**：\n开发一个带数据库的Web应用时，分三段对话：①搭框架 → ②写前端组件 → ③连数据库，而不是一次性描述所有需求。\n\n---\n\n#### 概念四：全栈角色与组织变革\n\n**是什么**：视频提出的长期趋势——Vibe Coding普及后，公司每个人都可能成为\"懂商业+懂产品+懂代码+懂设计\"的全栈角色。\n\n**为什么重要**：\n这不只是一个技能问题，而是职业发展方向的判断——AI产品经理学Vibe Coding，本质上是在提前适应未来的组织形态。\n\n**详细解释**：\n- 未来组织：人员规模缩小，但每人负责一个完整业务单元\n- 个人能力：能决策、能判断、能落地，一人团队直接推进产品\n- 收益变化：人变少，但胜任者的回报大幅提升\n\n**实际应用场景**：\n一个AI产品经理独立完成需求分析、原型、Vibe Coding开发、上线部署全流程，不依赖研发和设计同学。","table":"| 维度 | 关键信息 |\n|---|---|\n| 概念提出者 | 卡帕西（Andrej Karpathy），OpenAI联合创始人 |\n| 核心定义 | 用自然语言驱动AI完成完整编程流程 |\n| 与传统辅助编程的区别 | 人不消化代码，只写提示词 |\n| 短期价值 | 产品经理工作提效（如自建数据工具） |\n| 长期价值 | 适应全栈角色，应对组织变革 |\n| 第一级 | 精准提需求（会写PRD就能过） |\n| 第二级 | 复杂任务拆解 + 上下文治理 |\n| 第三级 | 调试（需理解基础技术结构）← 多数PM目标 |\n| 第四级 | 外部库集成（进阶，当前非必须） |\n| 技术基础要求（第三级） | 前端、后端、数据库、AI接口、包管理、日志、本地部署 |","thinking":"1. **第三级的技术知识边界在哪里？** 视频说要理解\"前端、后端、数据库、日志\"等基础概念，但\"理解\"和\"会用\"之间的差距可能很大——对于零技术背景的产品经理，这个学习曲线具体有多陡？有没有办法在不系统学习技术的情况下跨过调试这道坎？\n\n2. **上下文治理是否会成为新的核心竞争力？** 随着AI模型的上下文窗口越来越大（如已有百万token的模型），第二级的\"上下文治理\"能力会不会逐渐变得不那么重要？还是说任务拆解本身就是一种思维能力，和窗口大小无关？\n\n3. **全栈角色的预测是否过于乐观？** 视频描绘了\"一人团队\"的未来图景，但复杂产品的质量保障、安全合规、大规模协作等问题，Vibe Coding真的能覆盖吗？哪些岗位和场景是Vibe Coding短期内无法替代的？","remember":"Vibe Coding让编程语言变成了自然语言，AI产品经理的目标是打通\"提需求→拆任务→能调试\"这三关，做到独立交付产品。","is_new":true},{"id":"7629235002428968232","title":"AI生图提示词底层逻辑解析","cat":"vibecoding","video_url":"https://www.douyin.com/video/7629235002428968232","audience":"有一定AI生图使用经验、频繁遇到生成结果不符合预期的创作者","summary":"AI生图效果差的根源不是模型能力不足，而是提示词触发了\"关键词联想陷阱\"和\"视觉代偿\"两大机制——理解这两个机制，就能从抽卡变成精准控图。","raw_preview":"当你用AI生成\"男生在拿手机打游戏\"的时候，偶尔会得到这样的结果——为什么连科幻大片都能生成，AI画好一个打游戏的少年就这么难？如果你也被这个问题困惑了好久，那么恭喜你，这条视频将会彻底解开这一切。\n\n真正的原因其实就藏在提示词里。先看一个简单的例子：如果你对AI说\"生成一个人戴着护士帽\"，不用想，这个人不仅会戴着护士帽，还一定会穿着护士服，还一定会出现在医院里。如果你说\"生成一个人，不戴着护士帽","knowledge_map":"AI生图底层逻辑\n├── 隐性坑：关键词联想陷阱\n│   ├── 是什么：提到某个词，AI自动脑补一整套刻板印象\n│   ├── 否定词也无效（\"不戴护士帽\"仍出现医院场景）\n│   ├── 典型案例\n│   │   ├── 护士帽 → 护士服 + 医院\n│   │   ├── 游戏 → 屏幕朝外（违反物理规律）\n│   │   └── 修图 → 屏幕朝向观众\n│   └── 解决方案：用具体描述替换触发词\n│       ├── \"打游戏\" → \"双手握着手机\"\n│       └── \"修图\" → 反向描述（看向显示器背面）\n│\n└── 显性坑：视觉代偿\n    ├── 是什么：AI无法理解抽象概念，用具象元素替代\n    ├── 触发场景\n    │   ├── 抽象动作（背对、望向）→ 用正脸/眼睛代偿\n    │   └── 拍摄角度（俯拍）→ 无法正确呈现\n    ├── 解决方案：描述画面中能看到的视觉元素\n    │   └── \"望向地球\" → \"远方太空中悬浮着一颗地球\"\n    └── 反向利用：用视觉代偿控制镜头\n        ├── 拉近镜头 → 大量描述宇航员面罩/头盔细节\n        ├── 推远镜头 → 减少人物细节描述\n        └── 比\"特写/全景\"等词更稳定","concepts":"#### 概念一：关键词联想陷阱\n\n**是什么**：AI在处理提示词时，会因为某个关键词自动激活一整套与之绑定的刻板印象场景，即使这个词被否定，它依然会占用AI的注意力并影响生成结果。\n\n**为什么重要**：这是AI生图中最常见的\"玄学失控\"根源。用户以为是模型不行，实际上是提示词本身在拖后腿。\n\n**详细解释**：\n\n| 触发词 | AI自动脑补的内容 | 即使否定仍会出现 |\n|--------|-----------------|-----------------|\n| 护士帽 | 护士服、医院场景 | ✅ |\n| 安全帽 | 工地场景 | ✅ |\n| 圣诞帽 | 圣诞节装饰 | ✅ |\n| 厨师帽 | 厨房、做饭 | ✅ |\n| 游戏 | 屏幕朝外展示游戏画面 | ✅ |\n\n**实际应用场景**：\n\n- ❌ 错误写法：`一个男生在卧室打游戏`（\"游戏\"触发陷阱，手机屏幕会朝外）\n- ✅ 正确写法：`一个男生在卧室，双手握着手机`（绕开触发词）\n- 🔄 反向利用：`男生看向显示器背面`（用反常识描述，让AI生成你真正想要的角度）\n\n---\n\n#### 概念二：视觉代偿\n\n**是什么**：AI没有完整的空间和动作模型，无法理解\"背对\"\"望向\"等抽象概念，会用更具象的视觉元素来\"代替\"表达这个概念，导致生成结果偏离预期。\n\n**为什么重要**：这解释了为什么写了\"背对镜头\"AI还是给正脸，写了\"俯视角\"角度却不对——这不是bug，是AI的底层工作方式。理解它，就能反过来利用它。\n\n**详细解释**：\n\n| 抽象描述 | AI的代偿逻辑 | 实际生成结果 |\n|---------|-------------|-------------|\n| 背对镜头 | 用\"背包+头盔\"代表背身 | 可能出现正脸+背包 |\n| 望向地球 | 用\"眼睛+面罩+正脸\"代表望向 | 宇航员正脸对着镜头 |\n| 俯视角拍摄 | 无法理解摄像机位置 | 角度偏差或正面构图 |\n\n**实际应用场景**：\n\n- ❌ 错误写法：`宇航员背对镜头望向地球`\n- ✅ 正确写法：`一个宇航员站在月球上，背对着镜头，远方的太空中悬浮着一颗地球`（描述画面里能看到的元素，而不是抽象动作）\n- 🔄 反向利用控制镜头：\n  - 想拉近镜头 → 大量描述宇航员面罩、头盔纹理等细节\n  - 想推远镜头 → 减少人物细节，增加环境描述\n  - 效果比直接写\"特写/全景\"更稳定\n\n---\n\n#### 概念三：描述视觉元素而非抽象动作\n\n**是什么**：写提示词时，应该描述\"站在画面里的观众能看到什么\"，而不是描述\"场景里发生了什么动作或空间关系\"。\n\n**为什么重要**：这是视频给出的核心方法论，能同时解决联想陷阱和视觉代偿两个问题。\n\n**详细解释**：\n\n| 思维方式 | 示例 | 效果 |\n|---------|------|------|\n| ❌ 描述动作/空间关系 | \"宇航员望向地球\" | AI无法理解，产生代偿 |\n| ✅ 描述画面可见元素 | \"宇航员的背影，远方悬浮着地球\" |
