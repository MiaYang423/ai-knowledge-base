n**是什么**：工具接入的统一标准协议，像 USB-C 统一数据线，让模型能直接使用任何符合协议的外部工具。\n\n**为什么重要**：解决了以前每接一个工具都要单独对接的问题，大幅降低工具集成成本。\n\n**详细解释**：\n- 以前：每个工具各自对接，重复开发，接口不统一\n- MCP 之后：只要工具符合 MCP 协议，模型就能直接调用，生态快速扩展\n\n**实际应用场景**：Agent 调用外部工具（搜索、数据库、日历、邮件等）时，通过 MCP 统一接入。\n\n---\n\n#### Agent（智能体）\n\n**是什么**：LLM + 工具 + 自主循环的组合，能自主规划、执行、纠错，完成复杂任务，无需人工逐步指挥。\n\n**为什么重要**：Agent 是 AI 从\"工具\"升级为\"员工\"的关键，代表了 AI 应用的最高形态。\n\n**详细解释**：\n- 普通 LLM：你问一句，它答一句\n- Agent：你说目标，它自主拆解任务、调用工具、执行、纠错、交付结果\n\n**实际应用场景**：编程 Agent（Claude Code、Codex）、生活助手 Agent（OpenClaw）、有学习能力的 Agent（Hermes）。","table":"| 层级 | 代表概念 | 类比 |\n|------|----------|------|\n| 第一层：大脑 | LLM（GPT、Claude、Gemini） | 公司员工本人 |\n| 第二层：沟通方式 | GUI、CLI、Prompt | 说话方式 |\n| 第三层：工具手册 | RAG、MCP、Skills、Hermes | 工具箱 + 操作手册 |\n| 第四层：自主干活 | Agent（OpenClaw、Claude Code） | 能自主完成任务的员工 |\n| 第五层：办公室 | IDE（Cursor、VS Code）、Vibe Coding | 办公室 |","thinking":"1. 视频说\"每次看到新概念先想想它属于哪一层\"——Sora（视频生成）、Midjourney（图片生成）这类生成式 AI 工具，应该归入五层框架的哪一层？它们和 LLM 的关系是什么？\n\n2. 视频提到 Hermes 有\"学习循环，从每次使用中积累经验\"——这和传统 LLM 的微调有什么本质区别？学习循环在工程上是如何实现的？\n\n3. Vibe Coding 被视频定义为\"新的工作方式\"而不是工具——这个定性意味着什么？它对传统软件开发流程（需求→设计→编码→测试）的冲击体现在哪些环节？","remember":"AI 概念不乱，是因为你有坐标系：大脑（LLM）→ 沟通方式 → 工具手册 → 自主干活（Agent）→ 办公室，新名词出来先找它在哪一层。","is_new":true},{"id":"7639302834722196751","title":"字节 Agent 二面全题解析","cat":"agent-multi-agent","video_url":"https://www.douyin.com/video/7639302834722196751","audience":"正在准备字节跳动 AI Agent 实习或校招二面的算法/工程方向求职者","summary":"字节 Agent 二面的真正考点是落地能力，不是背概念——11 道题覆盖项目拷打、多模态、Skills、Memory、多 Agent 调度、SSE、LoRA、RAG 评估全链路。","raw_preview":"一起来看看字节的 AI Agent 实习二面面经，看看你能答上来几道。这套题整体难度偏难，但是前面是基础，后面才是真正区分水平的地方。我是小哲，点赞收藏加关注，我们马上开始。\n\n**第一道题：项目被整体考打时应该怎么讲？**\n\n不要只备业务背景，核心是讲清楚你解决了什么问题，系统链路怎么走，指标怎么衡量，线上遇到过什么坑。面试官更想听干货，比如延迟、成本、稳定性、可观测性，你有没有真的做过。\n\n*","knowledge_map":"字节 Agent 二面题解\n├── 项目能力\n│   └── 题1：讲清楚问题、链路、指标、线上坑\n├── 模型能力\n│   ├── 题2：多模态大模型（输入能力+落地边界）\n│   └── 题7：LoRA 排查与改进\n├── Agent 核心能力\n│   ├── 题3：Skills 设计（封装+参数+兜底+权限）\n│   ├── 题4：Memory 与多轮对话\n│   └── 题5：多 Agent 切换机制（路由+退出条件）\n├── RAG 能力\n│   ├── 题8：动态知识更新（流水线+版本+失效）\n│   └── 题9：评估方案（检索+生成分层评估）\n├── 工程能力\n│   ├── 题6：SSE 局限性（单向流+WebSocket对比）\n│   ├── 题10：复杂任务准确率评估（子步骤+人工标注）\n│   └── 题11：MCP vs Function Calling","concepts":"#### Agent Skills 设计\n\n**是什么**：将可复用的 Agent 能力封装成标准化工具，包含参数说明、约束条件和执行逻辑。\n\n**为什么重要**：Skills 是 Agent 能力复用和模块化的基础，设计好坏直接影响 Agent 的稳定性和可维护性。\n\n**详细解释**：\n- 封装内容：参数定义、调用约束、执行逻辑、失败兜底\n- 工程要求：权限隔离、调用日志、结果校验\n- 让模型知道：什么时候调用、怎么传参、失败了怎么处理\n\n**实际应用场景**：搜索 Skill、发邮件 Skill、查数据库 Skill——每个 Skill 独立封装，Agent 按需调用。\n\n---\n\n#### 多 Agent 切换机制\n\n**是什么**：通过路由器根据任务类型、置信度和失败次数，在不同 Agent 之间动态切换执行策略的机制。\n\n**为什么重要**：多 Agent 协作最常见的问题是循环讨论、成本失控，必须有明确的退出条件和裁决机制。\n\n**详细解释**：\n\n| 设计要素 | 说明 |\n|----------|------|\n| 角色分工 | 规划 Agent、执行 Agent、校验 Agent |\n| 路由依据 | 任务类型、置信度、失败次数 |\n| 切换时机 | 置信度不足或失败次数超阈值 |\n| 退出条件 | 必须明确定义，防止死循环 |\n| 裁决机制 | 冲突时由裁决层决定最终执行方向 |\n\n**实际应用场景**：复杂任务中多个 Agent 分工协作，规划 Agent 拆任务，执行 Agent 完成子任务，校验 Agent 检查结果。\n\n---\n\n#### MCP vs Function Calling\n\n**是什么**：两种不同层次的工具接入机制——Function Calling 是模型调用单个函数的协议，MCP 是连接外部工具和资源的上下文协议。\n\n**为什么重要**：这是高频面试题，混淆两者说明对 Agent 工具层理解不到位。\n\n**详细解释**：\n\n| 维度 | Function Calling | MCP |\n|------|-----------------|-----|\n| 定位 | 模型调用单个函数 | 连接外部工具和资源的上下文协议 |\n| 重点 | 参数结构化 | 生态连接，统一接入标准 |\n| 适用场景 | 单次工具调用 | 文件、数据库、服务能力统一暴露给 Agent |\n| 类比 | 打一个电话 | 接入整个通信网络 |\n\n**实际应用场景**：Function Calling 适合简单的单次工具调用；MCP 适合 Agent 需要访问多种外部资源的复杂场景。","table":"| 题目 | 核心答案关键词 |\n|------|---------------|\n| 项目考打 | 问题+链路+指标+线上坑，不只是业务背景 |\n| 多模态 | 输入能力+落地边界+工程成本 |\n| Skills | 封装+参数+兜底+权限隔离+调用日志 |\n| Memory | 短期=窗口，长期=摘要/向量库，按任务检索 |\n| 多 Agent 切换 | 路由+退出条件+裁决机制 |\n| SSE 局限 | 单向流，复杂场景用 WebSocket |\n| LoRA 排查 | 数据→基座→参数，小数据易过拟合 |\n| RAG 更新 | 流水线+版本时间戳+旧知识失效 |\n| RAG 评估 | 检索召回率+上下文相关性+答案忠实度 |\n| 复杂任务评估 | 子步骤+人工标注+前后对比 |\n| MCP vs FC | FC 偏调用格式，MCP 偏生态连接 |","thinking":"1. 视频说\"多 Agent 很容易循环讨论\"——如何设计一个有效的退出条件？最大循环次数、时间限制、置信度阈值，哪种方式更适合生产环境？\n\n2. RAG 评估拆成检索和生成两层后，如果检索召回率很高但最终答案质量差，问题出在哪里？如何设计实验来定位是生成模型的问题还是上下文拼接的问题？\n\n3. LoRA 表达能力有限、容易过拟合小数据——在什么情况下应该放弃 LoRA 转而做全量微调？两者的选择依据是什么？","remember":"字节 Agent 二面考的不是你背了多少概念，而是你能不能把每个技术点讲到工程细节——延迟、成本、稳定性、可观测性，一个都不能虚。","is_new":true},{"id":"7639306284101160207","title":"字节大模型 Agent 算法面全题解析","cat":"agent-multi-agent","video_url":"https://www.douyin.com/video/7639306284101160207","audience":"正在准备字节跳动大模型/Agent 算法面的求职者，需要掌握 Transformer、LoRA、RAG 和系统设计的工程师","summary":"字节大模型 Agent 算法面的 11 道题，从 Transformer 原理到高并发系统设计，真正考的是你能不能把算法理解落地成工程方案。","raw_preview":"一起来看看字节的大模型 Agent 算法面经，看看你能答上来几道。这套题整体难度偏难，但是前面是基础，后面才是真正区分水平的地方。我是小哲，点赞收藏加关注，我们马上开始。\n\n**第一道题：Transformer 的结构组成和各部分作用是什么？**\n\n这题先讲清楚主干。核心是 Embedding、位置编码、多头注意力、前馈网络、残差连接和 Layer Norm。注意力负责建模上下文关系，前馈网络做非","knowledge_map":"字节大模型 Agent 算法面题解\n├── 模型基础\n│   ├── 题1：Transformer 结构（Embedding+注意力+FFN+残差+LayerNorm）\n│   ├── 题2：降低计算复杂度（稀疏注意力/Flash Attention）\n│   ├── 题3：LoRA 微调（低秩增量矩阵，Rank 选择）\n│   └── 题4：KV Cache（缓存历史KV，优化推理延迟）\n├── RAG 能力\n│   ├── 题5：RAG 完整流程（切分→向量化→召回→重排→生成）\n│   ├── 题6：时间衰减对召回的影响（相似度+时间分+重排）\n│   └── 题8：知识图谱更新机制（离线构建+在线增量+版本控制）\n├── 训练与微调\n│   ├── 题7：训练数据构建（质量+多样性+边界case）\n│   └── 题9：LoRA 冻结层选择（Q/V/MLP，实验驱动）\n└── 系统设计\n    ├── 题10：高并发延迟优化（缓存+并行+流式+监控）\n    └── 题11：多线程多进程调度（任务拆分+队列+熔断+资源隔离）","concepts":"#### Transformer 核心结构\n\n**是什么**：由 Embedding、位置编码、多头注意力、前馈网络、残差连接和 Layer Norm 组成的深度学习架构，是现代大语言模型的基础。\n\n**为什么重要**：所有大模型面试的起点，必须能清晰讲出每个组件的作用，不能只背名字。\n\n**详细解释**：\n\n| 组件 | 作用 |\n|------|------|\n| Embedding + 位置编码 | 将 Token 转为向量，加入位置信息 |\n| 多头注意力 | 建模 Token 之间的上下文关系 |\n| 前馈网络（FFN） | 做非线性变换，增强表达能力 |\n| 残差连接 | 缓解梯度消失，保证深层训练稳定 |\n| Layer Norm | 归一化，稳定训练过程 |\n\n**实际应用场景**：理解 Transformer 结构是分析模型推理瓶颈、选择优化方案的基础。\n\n---\n\n#### LoRA 微调\n\n**是什么**：冻结原模型参数，只在部分线性层旁边添加低秩增量矩阵（A×B）进行微调的参数高效训练方法。\n\n**为什么重要**：LoRA 是目前最常用的大模型微调方案，面试必考，且需要讲到 Rank 选择和层选择的工程依据。\n\n**详细解释**：\n- Rank 越大：表达能力越强，但显存/成本/过拟合风险越高\n- Rank 选择策略：先小 Rank 做基线，根据验证集效果和任务复杂度调整\n- 冻结层选择：优先在注意力的 Q、V 层或部分 MLP 层加 LoRA，依据是任务类型和实验效果\n\n**实际应用场景**：在资源有限的情况下，对大模型做领域适配或指令微调。\n\n---\n\n#### 高并发 Agent 系统延迟优化\n\n**是什么**：在高并发场景下，通过多层次优化（缓存、并行、流式输出、监控）降低 Agent 召回和生成延迟的系统设计方案。\n\n**为什么重要**：这是算法面后半段的区分题，考察的是系统设计能力，不只是算法理解。\n\n**详细解释**：\n\n| 阶段 | 优化手段 |\n|------|----------|\n| 召回阶段 | 缓存、并行检索、索引分片、粗排+精排 |\n| 生成阶段 | 流式输出、KV Cache、批处理、超时降级 |\n| 监控 | P95 延迟监控，区分模型慢/检索慢/工具调用慢 |\n\n**实际应用场景**：线上 Agent 服务的性能调优，保证高并发下的响应时间 SLA。","table":"| 题目 | 核心答案关键词 |\n|------|---------------|\n| Transformer 结构 | Embedding+位置编码+多头注意力+FFN+残差+LayerNorm |\n| 降低计算复杂度 | 稀疏注意力/Flash Attention，长文本降延迟和显存 |\n| LoRA 原理 | 冻结参数+低秩增量矩阵，Rank 小→大，实验驱动 |\n| KV Cache | 缓存历史KV，只算新增，显存换延迟 |\n| RAG 流程 | 切分→向量化→召回→重排→生成，关注切片粒度和溯源 |\n| 时间衰减 | 相似度+时间分+重排模型统一打分 |\n| 训练数据 | 质量（去重去噪）+ 多样性（意图/难度/边界case） |\n| 图谱更新 | 离线构建+在线增量+版本控制+冲突检测 |\n| LoRA 冻结层 | Q/V/MLP，看任务类型，实验说话 |\n| 高并发优化 | 缓存+并行+流式+监控P95，区分瓶颈在哪 |\n| 多线程调度 | 任务拆分+进程/线程池+队列+熔断+资源隔离 |","thinking":"1. 视频说\"Flash Attention\"可以降低 Transformer 的计算复杂度——Flash Attention 的核心思路是什么？它解决的是计算复杂度问题还是显存访问问题？两者有什么区别？\n\n2. RAG 流程中\"重排（Rerank）\"这一步的作用是什么？如果去掉重排，只用向量召回，在什么场景下会明显影响答案质量？\n\n3. LoRA 微调时\"先从小 Rank 做基线\"——但如果任务本身很复杂，小 Rank 的基线效果很差，如何判断是 Rank 不够还是数据质量的问题？有没有系统性的排查方法？","remember":"算法面不是背公式，是把 Transformer 到 LoRA 到 RAG 到系统调度，每一块都能讲出工程权衡——这才是字节想要的落地能力。","is_new":true},{"id":"7639731341004737819","title":"阿里 Agent 面经落地能力拆解","cat":"agent-multi-agent","video_url":"https://www.douyin.com/video/7639731341004737819","audience":"准备 AI Agent 方向面试、希望深入理解 Agent 落地工程的开发者和求职者","summary":"这期视频拆解阿里 AI Agent 面试的 7 道高频题，核心结论是：面试官考的不是你会背多少概念，而是你能不能把 Agent 落地方案讲清楚。","raw_preview":"一起来看看阿里的 AI Agent 解决方案面题，看看你能答上来几道。这套题整体难度偏难，但是核心不是背概念，而是能不能讲清楚落地方案。我是小哲，点赞收藏加关注，我们马上开始。\n\n第一道题：AI Agent 和 Function Calling 的区别是什么？Function Calling 是模型调用工具的一种能力，AI Agent 是围绕目标完成任务的系统，可能包含规划、记忆、工具调用、知识库","knowledge_map":"阿里 AI Agent 面试拆解\n├── 基础概念区分\n│   └── Function Calling（零件）vs AI Agent（整套执行流程）\n├── 工程辅助\n│   └── AI Coding 工具的边界：提效可以，核心逻辑仍需人工\n├── 框架选型\n│   ├── LangChain（快速搭 RAG / 工具调用）\n│   └── LangGraph（有状态 / 可分支 / 可回放工作流）\n├── 云服务能力\n│   └── 模型服务 / 向量数据库 / 消息队列 / 日志监控 / 成本控制等\n├── 推理引擎\n│   ├── 常见引擎：vLLM / TensorRT-LLM / TGI / SGLang\n│   └── 关键指标：吞吐 / 首 token 延迟 / 显存占用 / 并发能力\n├── PD 分离\n│   ├── Prefill（耗算力）vs Decode（耗缓存）\n│   └── 分层调度 + KV Cache 管理\n└── 落地挑战与趋势\n    ├── 挑战：稳定性 / 成本 / 可解释性 / 长任务可靠性\n    └── 趋势：标准协议 / 模型路由 / 业务流程自动化","concepts":"#### Function Calling vs AI Agent\n\n**是什么**：Function Calling 是模型调用单个外部函数的能力；AI Agent 是围绕目标、包含规划/记忆/工具调用/反馈循环的完整任务执行系统。\n\n**为什么重要**：面试中两者经常被混淆，能清晰区分说明候选人理解了 Agent 的架构层次。\n\n**详细解释**：\n\n| 维度 | Function Calling | AI Agent |\n|---|---|---|\n| 定位 | 单次工具调用能力（零件） | 完整任务执行系统（整套流程） |\n| 包含要素 | 参数结构化调用 | 规划 + 记忆 + 工具调用 + 知识库 + 反馈循环 |\n| 典型场景 | 查天气、查数据库 | 自动完成多步骤复杂任务 |\n\n**实际应用场景**：客服 Agent 需要先理解用户意图（规划），调用订单查询接口（Function Calling），再根据结果决定下一步（反馈循环），这整套才是 Agent。\n\n---\n\n#### PD 分离（Prefill-Decode 分离）\n\n**是什么**：将大模型推理的 Prefill（输入处理）阶段和 Decode（逐 token 生成）阶段拆分到不同资源上分别优化。\n\n**为什么重要**：两个阶段的资源瓶颈完全不同，混在一起会导致资源浪费；分离后可独立扩缩容，大幅提升资源利用率。\n\n**详细解释**：\n\n| 阶段 | 资源特点 | 优化方向 |\n|---|---|---|\n| Prefill | 耗算力 + 带宽（并行处理输入） | 高算力 GPU / 批处理 |\n| Decode | 耗缓存（逐 token 生成） | KV Cache 管理 / 低延迟 |\n\n**实际应用场景**：高并发在线推理服务中，Prefill 集群和 Decode 集群分开部署，根据流量分别扩缩容，降低整体推理成本。\n\n---\n\n#### Agent 落地云服务矩阵\n\n**是什么**：AI Agent 线上运行所需的完整云服务组合，远不止一个模型 API 接口。\n\n**为什么重要**：很多候选人只知道调模型接口，不了解生产级 Agent 需要的工程基础设施，这是面试中的高频失分点。\n\n**详细解释**：\n\n| 服务类型 | 作用 |\n|---|---|\n| 模型服务 | 核心推理能力 |\n| 向量数据库 | 长期记忆 / RAG 检索 |\n| 对象存储 | 文件 / 知识库存储 |\n| 消息队列 | 异步任务解耦 |\n| 函数计算 | 工具执行弹性伸缩 |\n| 日志监控 | 可观测性 / 告警 |\n| 鉴权管理 | 安全边界控制 |\n| 内容安全 | 输入输出过滤 |\n\n**实际应用场景**：企业内部知识问答 Agent 需要向量数据库存知识库、对象存储放文档、日志监控追踪每次调用链路、内容安全过滤敏感信息。","table":"| 面试题 | 核心答案要点 |\n|---|---|\n| Function Calling vs Agent | 零件 vs 整套执行流程；Agent 包含规划/记忆/反馈循环 |\n| AI Coding 辅助 Agent 开发 | 可生成 Schema/测试/解释代码；核心逻辑/安全/鉴权需人工 |\n| LangChain vs LangGraph | LangChain 快速搭 RAG；LangGraph 适合有状态/可分支工作流 |\n| 落地云服务 | 8 类服务：模型/向量库/存储/队列/函数计算/日志/鉴权/内容安全 |\n| 推理引擎 | vLLM / TensorRT-LLM / TGI / SGLang；关注吞吐/延迟/显存/并发 |\n| PD 分离 | Prefill 耗算力、Decode 耗缓存；分离后独立扩缩容 |\n| 落地挑战 | 稳定性/成本/可解释性/长任务可靠性 |","thinking":"1. 视频中说\"AI Coding 工具提效可以，甩锅不行\"——在实际团队中，如何设计 code review 流程来确保 AI 生成代码的质量和安全性？\n2. LangChain 和 LangGraph 的选型标准是\"团队是否需要框架生态还是可控可观测\"，在什么情况下应该考虑完全不用框架、自研 Agent 编排层？\n3. PD 分离在提升资源利用率的同时，会引入额外的网络延迟和调度复杂度，如何评估这个 trade-off 是否值得？","remember":"阿里 Agent 面试考的不是你会背多少框架，而是你能不能把从模型接口到生产落地的整条链路讲清楚。","is_new":true},{"id":"7641236470006631730","title":"氛围编程已死迎接 Agent 工程时代","cat":"agent-multi-agent","video_url":"https://www.douyin.com/video/7641236470006631730","audience":"关注 AI 编程趋势、正在使用或考虑使用 AI Coding 工具的开发者和产品人","summary":"Karpathy 宣告 vibe coding 时代结束，正式进入 agentic engineering 时代——这意味着程序员的核心价值从\"会写代码\"转向\"会管 Agent、做工程判断\"。","raw_preview":"大家好，我是阿里长长，今天聊一个被 Karpathy 亲口宣判结束的时代——氛围编程。\n\n前几天 Karpathy 跟红杉的 Stephanie Zhan 录了一期对话，标题就一句话：From Vibe Coding to Agentic Engineering。距离他第一次抛出 vibe coding 这个词，刚好一年。\n\n一年前他说，未来你只要描述想要啥，模型就给你写出来。当时整个圈子都嗨了，","knowledge_map":"从 Vibe Coding 到 Agentic Engineering\n├── 时代背景\n│   ├── Karpathy 提出 vibe coding（1年前）\n│   └── Karpathy 宣告 vibe coding 结束（现在）\n├── Software 3.0 框架\n│   ├── 1.0：人手写代码\n│   ├── 2.0：神经网络从数据学习\n│   └── 3.0：LLM 为计算基底，自然语言为接口，Agent 为 runtime\n├── Vibe Coding vs Agentic Engineering\n│   ├── Vibe Coding：靠氛围/感觉/运气，适合做原型\n│   └── Agentic Engineering：memory/tools/测试/多Agent/监控/工程纪律\n├── 核心矛盾\n│   └── 模型越强 → 传统\"会写代码\"越不能保证真正懂系统\n├── Karpathy 的警告\n│   └── 无约束 Agent = 拥有 root 权限的初级工程师（人质危机）\n├── 市场信号\n│   ├── GitHub Certified Agentic AI Developer 认证（GH600）\n│   └── 多家大厂裁员适配 agentic AI 时代\n└── 核心判断\n    └── 判断力 > 知识；工程化使用 Agent > 会用 Claude Code","concepts":"#### Vibe Coding vs Agentic Engineering\n\n**是什么**：两种使用 AI Coding 工具的范式——前者靠感觉和运气快速出原型，后者用工程纪律和系统设计管理 Agent 完成生产级任务。\n\n**为什么重要**：这是判断一个人 AI 编程能力段位的核心分水岭，也是当前市场对 AI 开发者的真实要求。\n\n**详细解释**：\n\n| 维度 | Vibe Coding | Agentic Engineering |\n|---|---|---|\n| 核心方式 | 描述需求，模型输出，靠感觉接受 | 写 spec，配 context，审 diff，管权限 |\n| 适用场景 | 原型验证、demo 演示 | 生产级系统、复杂业务逻辑 |\n| 结果质量 | 可能能跑，前端可能是车祸现场 | 有测试、有监控、有工程纪律 |\n| 工程要素 | 基本没有 | memory/tools/多Agent/沙箱/CI/安全审计 |\n| 程序员角色 | 魔术师（从帽子里变戏法） | 工程师（管理 Agent 团队） |\n\n**实际应用场景**：个人 side project 用 vibe coding 快速验证想法；企业生产系统必须用 agentic engineering，否则 Agent 一次犯错可能导致数据丢失或安全事故。\n\n---\n\n#### Software 3.0\n\n**是什么**：Karpathy 提出的软件发展三阶段框架，3.0 阶段 LLM 本身成为计算基底，自然语言是编程接口，Agent 是 runtime。\n\n**为什么重要**：这个框架解释了为什么程序员的工作内容在变——你写的不再是代码，而是给模型看的 spec 和提示词。\n\n**详细解释**：\n\n| 阶段 | 特征 | 程序员做什么 |\n|---|---|---|\n| Software 1.0 | 人手写代码 | 直接编写逻辑 |\n| Software 2.0 | 神经网络从数据学习 | 准备数据、设计网络结构 |\n| Software 3.0 | LLM 为计算基底 | 写 spec、管 Agent、做判断 |\n\n**实际应用场景**：在 Software 3.0 时代，程序员的日常工作变成：写清楚 spec → 给 Agent 配好 context → 跑测试 → 审 diff → 管权限边界。\n\n---\n\n#### 无约束 Agent 的风险\n\n**是什么**：Karpathy 的警告——一个拥有 root 权限、精力无限但偶尔会犯错的 Agent，不是同事，是\"人质危机\"。\n\n**为什么重要**：这是 agentic engineering 的核心工程原则：Agent 必须有权限边界、工具限制和成功标准，否则一次失误就可能造成不可逆损失。\n\n**详细解释**：\n- 危险能力组合：能改文件 + 能装包 + 能拿 secret + 能推送分支 + 能部署\n- 正确做法：专精 Agent（每个有自己的工具范围、权限边界、成功标准）\n- 人的角色：调度多个专精 Agent，而不是给一个万能 Agent 放开所有权限\n\n**实际应用场景**：代码审查 Agent 只有读权限；部署 Agent 只能操作特定环境；数据库 Agent 只能查询不能写入——权限最小化原则。","table":"| 对比维度 | Vibe Coding | Agentic Engineering |\n|---|---|---|\n| 定位 | 原型 / demo | 生产级系统 |\n| 核心能力 | 会用 AI 工具 | 会管 Agent、做工程判断 |\n| 工程要素 | 基本缺失 | memory/tools/测试/监控/安全审计 |\n| Agent 权限 | 通常放开 | 严格最小化 |\n| 程序员价值 | 知识（越来越不稀缺） | 判断力（越来越稀缺） |\n| 市场认证 | 无 | GitHub GH600 认证 |","thinking":"1. 视频中说\"判断力越来越稀缺\"——那些没有足够工程经验积累判断力的初级开发者，在 agentic engineering 时代应该如何建立自己的核心竞争力？\n2. Karpathy 说无约束 Agent 是\"人质危机\"，但过度约束又会限制 Agent 的能力上限，实际工程中如何找到权限边界的最优解？\n3. GitHub GH600 认证的出现说明 agentic engineering 已经开始职业化，这类认证体系能否真正衡量一个人管理 Agent 的实际能力？","remember":"氛围编程只配做原型，真正的 AI 时代工程师是管 Agent 的人——判断力，才是 Software 3.0 时代最稀缺的技能。","is_new":true},{"id":"7641973888016723441","title":"Agent评测核心指标与方法","cat":"agent-multi-agent","video_url":"https://www.douyin.com/video/7641973888016723441","audience":"有志于AI产品经理岗位、正在准备大模型面试的求职者","summary":"Agent评测不能只看答案准不准，必须同时评估任务完成率、意图理解、工具调用准确率和路径正确性，并结合离线与在线两种测评方式。","raw_preview":"最近在面试当中很多AI产品经理都会被问到什么是Agent的评测。很多人一提到评测，第一个反应就是看他回答准不准。但事实上在实际项目当中，如果你只是这么理解，那么你还是停留在传统聊天机器人的视角。所以我今天想梳理一下，Agent评测到底在看什么，他到底有哪些核心的指标以及具体怎么做。对于AI产品经理从零到进阶的所有材料我也都准备好了，可以老地方来拿。\n\n首先我们需要明确他到底在评什么内容，不是说一上","knowledge_map":"Agent评测体系\n├── 评什么\n│   ├── 明确任务目标（完成/失败判断标准）\n│   └── 两层评测\n│       ├── 结果评测（最终是否完成任务）\n│       └── 过程评测（路径是否正确）\n├── 核心指标\n│   ├── 任务完成率\n│   ├── 意图理解准确率\n│   ├── 工具调用准确率\n│   └── 任务路径正确性\n└── 怎么做\n    ├── 拆解任务场景\n    ├── 建立测试集\n    ├── 定义评分标准\n    └── 离线测评 + 在线测评结合","concepts":"#### 两层评测框架\n\n**是什么**：将Agent评测分为\"结果评测\"和\"过程评测\"两个维度。\n\n**为什么重要**：传统聊天机器人只看最终答案，但Agent需要完成多步骤任务，中间过程（意图理解、任务拆解、接口调用）同样关键，只看结果会漏掉大量问题。\n\n**详细解释**：\n- **结果评测**：Agent最终有没有完成对的任务，结果是否符合预期\n- **过程评测**：完成任务的路径是否正确，包括意图理解、任务拆解、工具调用等中间步骤\n\n**实际应用场景**：评测一个订票Agent时，不仅要看票订成了没，还要看它有没有走弯路、调用了哪些接口、有没有理解对用户意图。\n\n---\n\n#### 四大核心指标\n\n**是什么**：衡量Agent性能的四个关键量化指标。\n\n**为什么重要**：有了具体指标才能客观比较不同Agent的优劣，也能在迭代时有明确的优化方向。\n\n**详细解释**：\n\n| 指标 | 含义 |\n|------|------|\n| 任务完成率 | Agent最终完成任务的比例 |\n| 意图理解准确率 | 正确理解用户意图的比例 |\n| 工具调用准确率 | 选对工具、传对参数的比例 |\n| 任务路径正确性 | 完成任务所走路径是否合理、无冗余 |\n\n**实际应用场景**：在面试中被问到\"如何量化Agent性能\"时，用这四个维度系统作答，远比只说\"准确率\"更有说服力。\n\n---\n\n#### 离线测评 vs 在线测评\n\n**是什么**：两种不同阶段的评测方式。\n\n**为什么重要**：两者关注点不同，需要结合使用才能全面评估Agent的实际效果。\n\n**详细解释**：\n- **离线测评**：上线前，基于测试集进行评估，关注功能正确性\n- **在线测评**：上线后，基于真实用户使用数据，关注实际有效性\n\n**实际应用场景**：产品上线前用离线测评验证基本能力，上线后用在线测评持续监控真实场景下的表现。","table":"| 维度 | 关键点 |\n|------|--------|\n| 评什么 | 先明确任务目标和完成/失败标准 |\n| 结果评测 | 最终任务是否完成 |\n| 过程评测 | 路径是否正确（意图→拆解→调用） |\n| 指标1 | 任务完成率 |\n| 指标2 | 意图理解准确率 |\n| 指标3 | 工具调用准确率 |\n| 指标4 | 任务路径正确性 |\n| 测评方式 | 离线测评（上线前）+ 在线测评（上线后）|\n| 操作步骤 | 拆场景→建测试集→定评分标准→综合测评 |","thinking":"1. 对于同一个任务，Agent A用3步完成、Agent B用50步完成，任务完成率相同，但路径效率差异巨大——在实际产品中，你会如何设计\"路径效率\"这个指标的具体评分规则？\n\n2. 离线测试集的构建往往依赖人工标注，而Agent处理的任务场景可能非常多样——如何设计一套高覆盖率、低成本的测试集构建方案？\n\n3. 在线测评中，如果用户没有明确反馈（没有点\"踩\"或\"赞\"），如何间接判断Agent是否真正完成了任务？","remember":"评测Agent不是给聊天机器人打分——结果和过程都要看，四个指标缺一不可，离线+在线双管齐下才算真正的评测体系。","is_new":true},{"id":"7645625280037014803","title":"MCP核心概念面试八题解析","cat":"agent-multi-agent","video_url":"https://www.douyin.com/video/7645625280037014803","audience":"正在备战AI/Agent方向面试、需要系统掌握MCP协议知识的求职者","summary":"通过美团Agent面经的8道MCP真题，系统梳理MCP的核心概念、三层架构（Host/Client/Server）、与Function Calling/Plugins的区别，以及生产落地的关键注意事项。","raw_preview":"一起来看看这套美团的Agent面经，看看你能答上来几道。这套题整体难度中等，但是最后一题很多人会答得很虚。我是小哲，点赞收藏加关注，我们马上开始。\n\n第一道题：什么是MCP？它的核心目标是什么？MCP可以理解成Agent连接外部工具和数据源的一套标准协议，核心目标是把工具发现、上下文传递和调用方式标准化，让不同客户端和服务端可以复用，而不是每个项目都重新接一遍。\n\n第二道题：MCP主要解决了什么问","knowledge_map":"MCP核心知识体系\n├── 基础概念\n│   ├── 是什么：Agent连接外部工具和数据源的标准协议\n│   └── 核心目标：工具发现、上下文传递、调用方式标准化\n├── 解决的问题\n│   └── 工具接入碎片化（各框架协议不统一）\n├── 三层架构\n│   ├── Host：用户交互入口和控制面（IDE/桌面助手/Agent平台）\n│   ├── Client：协议适配层，连接Host和Server\n│   └── Server：能力提供方（文件系统/数据库/搜索/业务系统）\n├── 与其他概念的区别\n│   ├── vs Function Calling：模型侧格式 vs 系统侧协议\n│   └── vs Plugins：平台扩展形态 vs 底层连接协议\n└── 生产落地注意事项\n    ├── 通信安全、权限隔离、工具白名单\n    ├── 参数校验、审计日志、超时容断\n    ├── 敏感操作二次确认\n    └── 多租户、版本兼容、Server降级","concepts":"#### MCP三层架构：Host / Client / Server\n\n**是什么**：MCP将Agent的工具调用拆分为三个角色，各司其职。\n\n**为什么重要**：清晰的分层让工具能力可以跨应用复用，不同的Host可以接入同一个Server，降低重复开发成本。\n\n**详细解释**：\n\n| 角色 | 位置 | 职责 | 示例 |\n|------|------|------|------|\n| Host | 最外层 | 用户交互入口，发起连接，管理会话 | IDE、桌面助手、Agent平台 |\n| Client | Host内部 | 协议适配，连接Server，转换消息 | 协议适配层 |\n| Server | 后端 | 提供具体能力，声明工具和参数 | 文件系统、数据库、搜索服务 |\n\n**实际应用场景**：一个IDE（Host）内置Client，连接多个MCP Server，分别提供代码搜索、文件读写、数据库查询等能力，模型可以统一调用。\n\n---\n\n#### MCP vs Function Calling vs Plugins\n\n**是什么**：三种增强Agent能力的不同机制，层次和侧重点各不相同。\n\n**为什么重要**：面试中经常被混淆，能清晰区分说明对Agent系统架构有深入理解。\n\n**详细解释**：\n\n| 概念 | 层次 | 侧重点 | 关系 |\n|------|------|--------|------|\n| Function Calling | 模型侧 | 让模型按Schema产出参数 | 可与MCP配合使用 |\n| MCP | 系统侧 | 工具发现、连接、治理的标准协议 | 底层基础设施 |\n| Plugins | 产品侧 | 特定平台的扩展机制 | 依赖某个生态 |\n\n**实际应用场景**：模型通过Function Calling决定调用哪个工具，MCP负责标准化地把调用请求路由到对应的Server，Plugins是某个平台（如ChatGPT）对外暴露的扩展能力形态。\n\n---\n\n#### 生产落地的安全与工程要点\n\n**是什么**：MCP在真实生产环境中需要额外处理的工程和安全问题。\n\n**为什么重要**：这是第八题\"很多人会答得很虚\"的原因——概念好答，落地细节才是真正的工程能力体现。\n\n**详细解释**：\n- **安全层**：通信安全、权限隔离、工具白名单、参数校验\n- **可靠性层**：审计日志、超时容断、Server异常降级\n- **工程层**：多租户支持、版本兼容、敏感操作二次确认\n- **关键原则**：工具发现 ≠ 工具可用，不能因为发现了工具就直接允许调用\n\n**实际应用场景**：Agent要帮用户发送重要邮件时，必须有二次确认机制，不能让模型自动触发敏感操作。","table":"| 题目 | 核心答案 |\n|------|----------|\n| MCP是什么 | Agent连接外部工具和数据源的标准协议 |\n| MCP核心目标 | 工具发现、上下文传递、调用方式标准化 |\n| MCP解决什么问题 | 工具接入碎片化 |\n| Host | 用户交互入口和控制面 |\n| Client | Host内部的协议适配层 |\n| Server | 具体能力提供方 |\n| MCP vs Function Calling | 系统侧协议 vs 模型侧格式，可配合使用 |\n| MCP vs Plugins | 底层协议 vs 平台扩展形态 |\n| 生产落地重点 | 安全、权限、白名单、审计、降级、二次确认 |","thinking":"1. 视频说\"工具发现不能等于工具可用\"——在实际产品设计中，应该如何设计工具的权限分级和动态白名单机制？\n\n2. MCP的三层架构（Host/Client/Server）和传统的B/S架构有何相似之处？这种分层对AI产品的可扩展性有什么具体帮助？\n\n3. 当多个MCP Server提供相似功能时（如两个不同的搜索Server），模型应该如何决策选择哪个？这个决策逻辑应该放在哪一层处理？","remember":"MCP就是给Agent世界制定了一套\"USB标准\"——Host是电脑，Client是USB接口，Server是各种外设，标准化之后谁都能插谁。","is_new":true}];

function renderMd(text) {
  if (!text) return "";
  let lines = text.split("\n");
  let html = [];
  let inCode = false, codeLang = "", codeLines = [];
  let inTable = false, tableLines = [];
  let inUl = false, inOl = false;

  function flushList() {
    if (inUl) { html.push("</ul>"); inUl = false; }
    if (inOl) { html.push("</ol>"); inOl = false; }
  }
  function flushTable() {
    if (!inTable) return;
    inTable = false;
    // parse table
    let rows = tableLines.filter(l => l.trim() && !l.match(/^[\s|:-]+$/));
    if (rows.length === 0) { tableLines = []; return; }
    let t = "<table>";
    rows.forEach((row, i) => {
      let cells = row.split("|").map(c => c.trim()).filter((c,idx,arr) => idx > 0 && idx < arr.length - 1 || (idx === 0 && c) || (idx === arr.length-1 && c));
      // remove empty first/last from pipe split
      let parts = row.split("|");
      parts = parts.slice(1, parts.length - 1).map(c => c.trim());
      if (parts.length === 0) return;
      let tag = i === 0 ? "th" : "td";
      t += "<tr>" + parts.map(c => `<${tag}>${inlineRender(c)}</${tag}>`).join("") + "</tr>";
    });
    t += "</table>";
    html.push(t);
    tableLines = [];
  }

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Code block
    if (line.trim().startsWith("```")) {
      if (!inCode) {
        flushList(); flushTable();
        inCode = true;
        codeLang = line.trim().slice(3).trim();
        codeLines = [];
      } else {
        inCode = false;
        let escaped = codeLines.join("\n").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
        html.push(`<pre><code>${escaped}</code></pre>`);
        codeLines = [];
      }
      continue;
    }
    if (inCode) { codeLines.push(line); continue; }

    // Table
    if (line.trim().startsWith("|")) {
      if (!inTable) { flushList(); inTable = true; tableLines = []; }
      tableLines.push(line);
      continue;
    } else if (inTable) {
      flushTable();
    }

    // Headings
    let hm = line.match(/^(#{1,6})\s+(.+)$/);
    if (hm) {
      flushList();
      let lvl = Math.min(hm[1].length + 1, 6); // offset by 1 to avoid h1
      html.push(`<h${lvl}>${inlineRender(hm[2])}</h${lvl}>`);
      continue;
    }

    // Blockquote
    if (line.startsWith("> ")) {
      flushList();
      html.push(`<blockquote>${inlineRender(line.slice(2))}</blockquote>`);
      continue;
    }

    // Unordered list
    let ulm = line.match(/^(\s*)[\-\*\+]\s+(.+)$/);
    if (ulm) {
      if (!inUl) { if (inOl) { html.push("</ol>"); inOl = false; } html.push("<ul>"); inUl = true; }
      html.push(`<li>${inlineRender(ulm[2])}</li>`);
      continue;
    }

    // Ordered list
    let olm = line.match(/^(\s*)\d+\.\s+(.+)$/);
    if (olm) {
      if (!inOl) { if (inUl) { html.push("</ul>"); inUl = false; } html.push("<ol>"); inOl = true; }
      html.push(`<li>${inlineRender(olm[2])}</li>`);
      continue;
    }

    flushList();

    // Empty line
    if (!line.trim()) { html.push("<p></p>"); continue; }

    // Paragraph
    html.push(`<p>${inlineRender(line)}</p>`);
  }
  flushList(); flushTable();
  return html.join("\n");
}

function inlineRender(text) {
  if (!text) return "";
  // escape html first (except what we add)
  text = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // inline code
  text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
  // bold+italic
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, "<strong><em>$1</em></strong>");
  // bold
  text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  text = text.replace(/__(.+?)__/g, "<strong>$1</strong>");
  // italic
  text = text.replace(/\*(.+?)\*/g, "<em>$1</em>");
  text = text.replace(/_(.+?)_/g, "<em>$1</em>");
  // link
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, "<a href=\"$2\" target=\"_blank\">$1</a>");
  return text;
}

function highlightText(text, q) {
  if (!q) return esc(text);
  let re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"), "gi");
  return esc(text).replace(re, m => `<span class="search-highlight">${m}</span>`);
}

function esc(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ============ ROUTER ============
function goHome() {
  state = { view:"home", cat:null, lessonId:null, search: state.search };
  if (state.search) renderSearch(state.search);
  else renderHome();
}
function goCat(cat) {
  state = { view:"cat", cat, lessonId:null, search:"" };
  document.getElementById("searchInput").value = "";
  document.getElementById("searchClear").style.display = "none";
  renderCat(cat);
}
function goLesson(id) {
  state = { ...state, view:"lesson", lessonId:id, search:"" };
  document.getElementById("searchInput").value = "";
  document.getElementById("searchClear").style.display = "none";
  renderLesson(id);
}

// ============ SEARCH ============
function onSearch(q) {
  state.search = q.trim();
  document.getElementById("searchClear").style.display = q ? "block" : "none";
  if (state.search) renderSearch(state.search);
  else {
    if (state.view === "home") renderHome();
    else if (state.view === "cat") renderCat(state.cat);
  }
}
function clearSearch() {
  document.getElementById("searchInput").value = "";
  state.search = "";
  document.getElementById("searchClear").style.display = "none";
  if (state.view === "lesson") renderHome();
  else if (state.view === "cat") renderCat(state.cat);
  else renderHome();
}
function renderSearch(q) {
  setBreadcrumb([{label:"首页",fn:"goHome()"},{label:`搜索: "${q}"`,active:true}]);
  let matches = LESSONS.filter(l =>
    l.title.toLowerCase().includes(q.toLowerCase()) ||
    (l.summary||"").toLowerCase().includes(q.toLowerCase()) ||
    (l.concepts||"").toLowerCase().includes(q.toLowerCase()) ||
    (l.knowledge_map||"").toLowerCase().includes(q.toLowerCase())
  );
  let main = document.getElementById("main");
  if (!matches.length) {
    main.innerHTML = `<div class="empty-state"><div class="e-icon">🔍</div><div>没有找到与 "<strong>${esc(q)}</strong>" 相关的教案</div></div>`;
    return;
  }
  let cards = matches.map(l => lessonCard(l, q)).join("");
  main.innerHTML = `
    <div class="section-title">搜索结果 <span class="badge">${matches.length}</span></div>
    <div class="lesson-grid">${cards}</div>`;
}

// ============ HOME ============
function renderHome() {
  state.view = "home";
  setBreadcrumb([{label:"首页",active:true}]);
  let counts = {};
  LESSONS.forEach(l => { counts[l.cat] = (counts[l.cat]||0)+1; });
  let cards = Object.entries(CATS).map(([key,cat]) => {
    let cnt = counts[key]||0;
    return `<div class="cat-card" onclick="goCat('${key}')">
      <div class="cat-icon">${cat.icon}</div>
      <div class="cat-name">${esc(cat.name)}</div>
      <div class="cat-desc">${esc(cat.desc)}</div>
      <div class="cat-count">📖 ${cnt} 篇教案</div>
    </div>`;
  }).join("");
  let total = LESSONS.length;
  let newCount = LESSONS.filter(l=>l.is_new).length;
  document.getElementById("main").innerHTML = `
    <div class="section-title">📚 知识分类 <span class="badge">${total} 篇</span></div>
    <div class="cat-grid">${cards}</div>
    ${newCount ? renderNewLessons() : ""}
  `;
}

function renderNewLessons() {
  let news = LESSONS.filter(l=>l.is_new).slice(0,6);
  if (!news.length) return "";
  return `<div class="section-title" style="margin-top:32px">🆕 最新教案 <span class="badge">${news.length}</span></div>
    <div class="lesson-grid">${news.map(l=>lessonCard(l)).join("")}</div>`;
}

// ============ CATEGORY ============
function renderCat(cat) {
  state.view = "cat"; state.cat = cat;
  let catInfo = CATS[cat]||{name:cat,icon:"📁",desc:""};
  setBreadcrumb([
    {label:"首页",fn:"goHome()"},
    {label:`${catInfo.icon} ${catInfo.name}`,active:true}
  ]);
  let lessons = LESSONS.filter(l=>l.cat===cat);
  let cards = lessons.map(l=>lessonCard(l)).join("");
  document.getElementById("main").innerHTML = `
    <div class="section-title">${catInfo.icon} ${esc(catInfo.name)} <span class="badge">${lessons.length} 篇</span></div>
    <p style="color:var(--text2);font-size:0.9rem;margin-bottom:20px;">${esc(catInfo.desc)}</p>
    <div class="lesson-grid">${cards}</div>`;
}

function lessonCard(l, highlight) {
  let q = highlight||"";
  let titleHtml = q ? highlightText(l.title,q) : esc(l.title);
  let summaryHtml = q ? highlightText(l.summary||"",q) : esc(l.summary||"");
  let catInfo = CATS[l.cat]||{name:l.cat,icon:"📁"};
  return `<div class="lesson-card" onclick="goLesson('${esc(l.id)}')">
    <div class="lesson-title">${titleHtml}</div>
    <div class="lesson-summary">${summaryHtml}</div>
    <div class="lesson-meta">
      ${l.is_new ? '<span class="tag-new">NEW</span>' : ""}
      <span class="tag-cat">${catInfo.icon} ${esc(catInfo.name)}</span>
    </div>
  </div>`;
}

// ============ LESSON DETAIL ============
function renderLesson(id) {
  let l = LESSONS.find(x=>x.id===id);
  if (!l) { renderHome(); return; }
  let catInfo = CATS[l.cat]||{name:l.cat,icon:"📁"};
  setBreadcrumb([
    {label:"首页",fn:"goHome()"},
    {label:`${catInfo.icon} ${catInfo.name}`,fn:`goCat('${l.cat}')`},
    {label:l.title,active:true}
  ]);

  let sections = [];

  // 视频原文
  if (l.raw_preview) {
    sections.push(sectionBlock("📝","视频原文（精华节选）",
      `<div class="md-content"><p>${esc(l.raw_preview).replace(/\n/g,"<br>")}</p></div>`, true));
  }

  // 知识地图
  if (l.knowledge_map) {
    sections.push(sectionBlock("🗺️","知识地图",
      `<div class="knowledge-map">${esc(l.knowledge_map)}</div>`, true));
  }

  // 核心概念精讲
  if (l.concepts) {
    sections.push(sectionBlock("💡","核心概念精讲",
      `<div class="md-content">${renderMd(l.concepts)}</div>`, true));
  }

  // 速查表
  if (l.table) {
    sections.push(sectionBlock("📋","速查表",
      `<div class="md-content">${renderMd(l.table)}</div>`, true));
  }

  // 延伸思考
  if (l.thinking) {
    sections.push(sectionBlock("🤔","延伸思考",
      `<div class="md-content">${renderMd(l.thinking)}</div>`, false));
  }

  document.getElementById("main").innerHTML = `
    <div class="detail-wrap">
      <div class="detail-header">
        <div class="detail-title">${esc(l.title)}</div>
        ${l.audience ? `<div class="detail-audience">👥 适合人群：<strong>${esc(l.audience)}</strong></div>` : ""}
        <div class="detail-summary-box">💬 ${esc(l.summary)}</div>
        ${l.video_url ? `<button class="video-btn" onclick="showVideoModal('${esc(l.video_url)}')">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> 查看抖音视频
        </button>` : ""}
      </div>
      ${l.remember ? `<div class="remember-box">💡 ${esc(l.remember)}</div>` : ""}
      ${sections.join("")}
    </div>`;
}

function sectionBlock(icon, title, bodyHtml, expanded) {
  let id = "sb_" + Math.random().toString(36).slice(2);
  return `<div class="section-block">
    <div class="section-block-header ${expanded?"":"collapsed"}" onclick="toggleSection('${id}',this)">
      <span class="s-icon">${icon}</span>
      <span class="s-title">${title}</span>
      <span class="s-toggle">▼</span>
    </div>
    <div class="section-block-body ${expanded?"":"hidden"}" id="${id}">${bodyHtml}</div>
  </div>`;
}

function toggleSection(id, header) {
  let body = document.getElementById(id);
  if (!body) return;
  let hidden = body.classList.toggle("hidden");
  header.classList.toggle("collapsed", hidden);
}

// ============ BREADCRUMB ============
function setBreadcrumb(crumbs) {
  let bc = document.getElementById("breadcrumb");
  bc.innerHTML = crumbs.map((c,i) => {
    let isLast = i === crumbs.length - 1;
    let sep = i > 0 ? `<span class="sep">›</span>` : "";
    if (c.active || isLast) return `${sep}<span class="crumb active">${esc(c.label)}</span>`;
    return `${sep}<span class="crumb" onclick="${c.fn||'goHome()'}">${esc(c.label)}</span>`;
  }).join("");
}

// ============ VIDEO MODAL ============
function showVideoModal(url) {
  currentVideoUrl = url;
  document.getElementById("modalUrl").textContent = url;
  document.getElementById("videoModal").classList.remove("hidden");
}
function hideModal() {
  document.getElementById("videoModal").classList.add("hidden");
}
function closeModal(e) {
  if (e.target === document.getElementById("videoModal")) hideModal();
}
function copyUrl() {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(currentVideoUrl).then(()=>showToast("✅ 链接已复制到剪贴板")).catch(()=>fallbackCopy());
  } else fallbackCopy();
}
function fallbackCopy() {
  let ta = document.createElement("textarea");
  ta.value = currentVideoUrl;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand("copy");
  document.body.removeChild(ta);
  showToast("✅ 链接已复制");
}
function openUrl() {
  window.open(currentVideoUrl, "_blank", "noopener,noreferrer");
  hideModal();
}

// ============ TOAST ============
let toastTimer;
function showToast(msg) {
  let t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 2800);
}

// ============ INIT ============
renderHome();
</script>
</body>
</html>
