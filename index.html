务评估 | 细粒度评估设计 | 子步骤拆解 + 人工标注检查点 + 前后对比 |\n| MCP vs Function Calling | 协议架构理解 | 调用格式 vs 生态连接 |","thinking":"1. **多 Agent 系统的退出条件应该怎么设计才合理？** 纯靠失败次数阈值够用吗，还是需要引入任务完成度评估或时间成本约束，如何在稳定性和灵活性之间取得平衡？\n\n2. **RAG 的评估体系建立之后，如何形成持续优化的闭环？** 线上用户的隐式反馈（如追问、不满意重问）能否自动转化为评估信号，驱动检索和生成的迭代？\n\n3. **MCP 作为\"生态连接协议\"，在实际 Agent 工程中会带来哪些新的安全和权限挑战？** 当 Agent 通过 MCP 统一接入文件、数据库和外部服务时，如何防止越权访问或数据泄露？","remember":"面试官考的不是你背了多少概念，而是你有没有真的把 Agent 落地过——链路、指标、踩坑，一个都藏不住。","is_new":true},{"id":"7639731341004737819","title":"阿里 AI Agent 面试解决方案拆解","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7639731341004737819","audience":"正在准备大厂 AI 方向技术面试、希望系统梳理 AI Agent 落地能力的开发者或算法工程师","summary":"通过拆解阿里 AI Agent 真实面经的 7 道题，帮你从\"背框架\"升级到\"能讲清楚落地方案\"的面试水平。","raw_preview":"一起来看看阿里的 AI Agent 解决方案面经，看看你能答上来几道。这套题整体难度偏难，但是核心不是背概念，而是能不能讲清楚落地方案。我是小哲，点赞收藏加关注，我们马上开始。\n\n第一道题，AI Agent 和 Function Calling 的区别是什么？Function Calling 是模型调用工具的一种能力，AI Agent 是围绕目标完成任务的系统，可能包含规划、记忆、工具调用、知识库","knowledge_map":"阿里 AI Agent 面试题拆解\n│\n├── 1. 基础概念层\n│   ├── Function Calling（工具调用能力 / 零件）\n│   └── AI Agent（围绕目标的完整执行系统）\n│\n├── 2. 开发工具层\n│   ├── AI coding 工具的能力边界\n│   │   ├── 能做：生成 Schema、写测试、排查错误\n│   │   └── 不能做：理解业务逻辑、保障安全权限\n│   └── Agent 框架选型\n│       ├── LangChain（快速搭建 RAG / 工具调用）\n│       └── LangGraph（有状态 / 可分支 / 可回放工作流）\n│\n├── 3. 工程落地层\n│   ├── 云服务能力\n│   │   ├── 模型服务、向量数据库、对象存储\n│   │   └── 消息队列、函数计算、日志监控、权限管理、内容安全\n│   └── 推理引擎\n│       ├── 常见引擎：vLLM / TensorRT-LLM / TGI / SGLang\n│       └── 核心指标：吞吐、首 token 延迟、总延迟、显存、并发、兼容性\n│\n├── 4. 性能优化层\n│   └── PD 分离（Prefill / Decode 拆分）\n│       ├── Prefill：吃算力和带宽\n│       ├── Decode：关注持续生成和缓存\n│       └── 实现：分层调度 + KV Cache 管理\n│\n└── 5. 挑战与趋势层\n    ├── 挑战：稳定性 / 成本 / 可解释性 / 安全 / 评测 / 长任务可靠性\n    └── 趋势：工具生态 / 标准协议 / 模型路由 / 业务流程自动化","concepts":"#### 概念一：Function Calling vs AI Agent\n\n**是什么**：Function Calling 是大模型调用外部工具的单一能力；AI Agent 是以目标为导向、整合多种能力的完整任务执行系统。\n\n**为什么重要**：面试中混淆两者是最常见的失分点，也是判断候选人是否真正理解 Agent 架构的关键。\n\n**详细解释**：\n\n| 维度 | Function Calling | AI Agent |\n|------|-----------------|----------|\n| 定位 | 零件 / 单一能力 | 整套执行流程 |\n| 组成 | 模型 + 工具调用接口 | 规划 + 记忆 + 工具调用 + 知识库 + 反馈循环 |\n| 目标导向 | 否（执行单次调用） | 是（围绕目标持续推进） |\n| 典型场景 | 查天气、调 API | 自动完成多步骤复杂任务 |\n\n**实际应用场景**：回答\"你们系统是 Agent 还是只用了 Function Calling\"时，能清晰说明两者边界，体现架构认知深度。\n\n---\n\n#### 概念二：Agent 框架选型（LangChain vs LangGraph）\n\n**是什么**：LangChain 和 LangGraph 是两种主流 Agent 开发框架，适用场景不同。\n\n**为什么重要**：框架选型直接影响开发效率、系统可控性和后期维护成本，是落地方案设计的核心决策之一。\n\n**详细解释**：\n\n| 维度 | LangChain | LangGraph |\n|------|-----------|-----------|\n| 核心优势 | 组件丰富、生态完善 | 有状态、可分支、可回放 |\n| 适合场景 | 快速搭建 RAG、工具调用 | 复杂工作流、需要状态管理 |\n| 选型关键 | 看重开发速度和生态 | 看重可控性和可观测性 |\n\n**实际应用场景**：面试被问\"为什么选这个框架\"时，不能只说\"文档多、社区活跃\"，要结合业务是否需要状态管理、分支逻辑来回答。\n\n---\n\n#### 概念三：推理引擎与 PD 分离\n\n**是什么**：推理引擎是部署大模型进行在线推理的服务化框架；PD 分离是将推理过程中的 Prefill（预填充）和 Decode（逐 token 生成）两个阶段拆开独立优化的架构方案。\n\n**为什么重要**：这是大模型工程化部署的核心性能优化手段，也是阿里等大厂面试中考察候选人工程深度的高频题。\n\n**详细解释**：\n\n常见推理引擎对比：\n\n| 引擎 | 特点 |\n|------|------|\n| vLLM | 高吞吐、PagedAttention、社区活跃 |\n| TensorRT-LLM | NVIDIA 官方、推理性能极致优化 |\n| TGI | HuggingFace 出品、易集成 |\n| SGLang | 结构化生成、高并发场景表现好 |\n\n推理核心指标：\n\n| 指标 | 说明 |\n|------|------|\n| 吞吐（Throughput） | 单位时间处理的请求数 |\n| 首 token 延迟（TTFT） | 用户发请求到收到第一个 token 的时间 |\n| 总延迟 | 完整响应耗时 |\n| 显存占用 | 影响可部署的模型规模 |\n| 并发能力 | 同时处理多少请求 |\n| 模型兼容性 | 支持哪些模型架构 |\n\nPD 分离核心逻辑：\n- **Prefill 阶段**：处理输入 prompt，计算量大、吃算力和带宽\n- **Decode 阶段**：逐 token 生成，关注持续生成速度和 KV Cache 管理\n- **分离收益**：两阶段可独立扩缩容，资源利用率更高\n\n**实际应用场景**：高并发在线服务场景下，通过 PD 分离 + KV Cache 管理，可以在不增加硬件的情况下显著提升系统吞吐。\n\n---\n\n#### 概念四：AI Agent 落地的云服务体系\n\n**是什么**：Agent 上线不只是调一个模型接口，而是需要一套完整的云服务能力支撑。\n\n**为什么重要**：很多候选人只会讲模型调用，忽略工程化支撑，这是落地能力薄弱的典型表现。\n\n**详细解释**：\n\n| 云服务类型 | 作用 |\n|-----------|------|\n| 模型服务 | 提供推理接口 |\n| 向量数据库 | 支持 RAG 知识检索 |\n| 对象存储 | 存储文件、历史记录 |\n| 消息队列 | 异步任务解耦 |\n| 函数计算 | 弹性执行工具调用 |\n| 日志监控 | 可观测性、排查问题 |\n| 权限管理 | 控制 Agent 操作边界 |\n| 内容安全 | 过滤有害输入输出 |\n\n线上还需要具备：弹性伸缩、审计追踪、告警机制、灰度发布、成本控制。\n\n**实际应用场景**：设计 Agent 系统架构时，能主动提到这些支撑层，是区分\"能聊概念\"和\"能做落地\"的关键信号。","table":"| 题目 | 核心答案要点 | 避坑提示 |\n|------|------------|---------|\n| Function Calling vs Agent | FC 是零件，Agent 是完整执行流程 | 不要把两者混为一谈 |\n| AI coding 工具辅助开发 | 提效工具，不能替代业务判断和安全把关 | 不要说\"AI 可以自动完成开发\" |\n| LangChain vs LangGraph | 前者快速搭建，后者适合有状态复杂工作流 | 选型要结合业务需求，不能只说生态好 |\n| Agent 落地云服务 | 8 类服务 + 弹性/审计/告警/灰度/成本 | 不能只答\"调模型接口\" |\n| 推理引擎与指标 | vLLM/TensorRT-LLM/TGI/SGLang + 6 项指标 | 不同业务对吞吐和延迟权重不同 |\n| PD 分离 | Prefill/Decode 拆开独立优化，提升资源利用率 | 要说清楚两阶段各自的资源瓶颈 |\n| Agent 落地挑战与趋势 | 6 大挑战 + 从聊天框走向业务流程自动化 | 趋势要落到具体方向，不要泛泛而谈 |","thinking":"1. **边界在哪里**：AI coding 工具\"提效可以，甩锅不行\"——在你的实际项目中，哪些环节是 AI 工具真正帮不上忙、必须人工介入的？如何在团队中建立清晰的人机协作边界？\n\n2. **框架 vs 自研**：视频提到落地时要看团队\"是否需要框架生态还是更需要可控和可观测\"——什么规模的团队、什么类型的业务，值得放弃 LangChain 的生态去自研 Agent 调度层？\n\n3. **从聊天框到业务流程**：视频把\"从聊天框走向业务流程自动化\"列为 Agent 的核心趋势——这个转变在工程上意味着什么？权限管理、异常处理、人工审核节点应该如何设计才能让 Agent 真正可信任地接管业务流程？","remember":"AI Agent 面试考的从来不是你背了多少框架名字，而是你能不能把一个 Agent 系统从模型接口一路讲到云服务、推理优化和上线保障。","is_new":true},{"id":"7640472423791726437","title":"两个月自学AI应用开发拿高薪","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7640472423791726437","audience":"想转行AI应用开发、有一定编程基础或零基础但愿意系统自学的求职者。","summary":"通过一套四阶段极简学习路线，两个月系统自学AI应用开发，从零到能做项目、能拿高薪offer。","raw_preview":"纯靠兴趣自学，直接拿下36K AI应用开发的offer，甚至只学了两个月。别不信，90%的人学AI不是学不会，是瞎学、乱学，把时间都浪费在了没用的知识点上。那今天我直接给你一套两个月转行AI应用开发的极简路线，纯干货，不看就是你的损失。\n\n先问你一句话，25-26年最爆的赛道是什么？绝对是AI大模型。从最近的招聘市场来看，一个最直观的感受是：大厂在不断地推出AI应用开发的岗位，AI业务相关的新司远","knowledge_map":"两个月AI应用开发极简路线\n├── 第一阶段：技术基础（对应初级岗位）\n│   ├── Python（主流语言，优先选）\n│   ├── RAG检索增强生成\n│   ├── 向量数据库\n│   ├── LangChain框架\n│   ├── Agent流程\n│   ├── 提示词工程\n│   ├── 大模型API调用\n│   └── 模型微调训练基础\n├── 第二阶段：项目实战（对应20K薪资）\n│   ├── 业务匹配度 + 技术匹配度\n│   ├── AI服务编排（LangGraph / Skills / MCP）\n│   └── 项目完整全流程\n├── 第三阶段：深度优化（对应30K薪资）\n│   ├── 大模型原理（KV缓存、前缀缓存）\n│   ├── 召回率提升\n│   ├── 模型微调（SFT / DPO）\n│   ├── 数据清洗\n│   └── 评测集设计\n└── 第四阶段：Agent集群（对应高级管理者）\n    ├── Agent路由\n    ├── 跨Agent记忆\n    ├── 可观测性\n    ├── 测试\n    └── 鉴权","concepts":"#### RAG（检索增强生成）\n\n**是什么**：让大模型在回答时，先从外部知识库检索相关内容，再生成答案的技术。\n\n**为什么重要**：解决大模型知识截止和幻觉问题，是AI应用开发最核心的技术之一。\n\n**详细解释**：\n- 需要掌握：向量数据库（存储检索内容）+ 召回率优化（找到最相关内容）\n- 第一阶段打基础，第三阶段深入优化召回率\n\n**实际应用场景**：企业知识库问答、客服机器人、文档检索系统。\n\n---\n\n#### Agent流程与MCP\n\n**是什么**：Agent是能自主规划并调用工具完成任务的AI系统；MCP是Agent连接外部工具的标准协议。\n\n**为什么重要**：Agent是当前AI应用开发最热门的方向，招聘市场需求量大。\n\n**详细解释**：\n- 第二阶段：学会AI服务编排（LangGraph / Skills / MCP部署与设计）\n- 第四阶段：进阶到Agent集群（路由、跨Agent记忆、可观测性）\n\n**实际应用场景**：自动化工作流、多步骤任务执行、企业AI助手。\n\n---\n\n#### 模型微调（SFT / DPO）\n\n**是什么**：在预训练大模型基础上，用特定数据进一步训练，使其更符合业务需求的技术。\n\n**为什么重要**：是从\"能用\"到\"好用\"的关键跨越，对应30K薪资水平。\n\n**详细解释**：\n| 方法 | 说明 |\n|------|------|\n| SFT（监督微调）| 用标注数据直接训练模型 |\n| DPO（直接偏好优化）| 通过人类偏好对比数据训练 |\n\n**实际应用场景**：让模型输出符合公司业务规范、特定风格或领域知识。\n\n---\n\n#### 分阶段学习路线\n\n**是什么**：将AI应用开发技能按难度和市场价值分为四个阶段，按顺序学习。\n\n**为什么重要**：大多数人\"瞎学、乱学\"导致学了很多但做不了项目，系统路线解决这个问题。\n\n**详细解释**：\n| 阶段 | 内容 | 对应薪资 |\n|------|------|---------|\n| 第一阶段 | Python + RAG + LangChain + API | 初级岗位 |\n| 第二阶段 | 项目实战 + MCP服务部署 | ~20K |\n| 第三阶段 | 大模型原理 + 微调 + 评测 | ~30K |\n| 第四阶段 | Agent集群 + 路由 + 可观测性 | 高级管理者 |\n\n**实际应用场景**：适合零基础或有编程基础的人系统规划转行路径。","table":"| 维度 | 内容 |\n|------|------|\n| 总周期 | 2个月 |\n| 核心语言 | Python（主流，优先选） |\n| 第一阶段关键词 | RAG、向量数据库、LangChain、Agent、提示词、大模型API、微调 |\n| 第二阶段关键词 | 项目业务匹配、LangGraph、Skills、MCP部署 |\n| 第三阶段关键词 | KV缓存、SFT、DPO、数据清洗、评测集 |\n| 第四阶段关键词 | Agent路由、跨Agent记忆、可观测性、鉴权 |\n| 薪资参考 | 初级→20K→30K→高级管理者 |\n| 避坑点 | 不要只做LangChain项目、不要乱学没有体系 |","thinking":"1. 视频强调\"业务匹配度+技术匹配度\"来选择项目，那面试前如何调研目标公司的技术栈，让自己的项目经验更有针对性？\n\n2. 第四阶段的\"Agent集群\"（路由、跨Agent记忆、可观测性）在实际生产环境中面临哪些工程挑战，和单Agent相比复杂度提升在哪里？\n\n3. 视频提到评测集是保障大模型输出符合用户需求的关键，但如何设计一套有效的评测集？评测指标应该怎么选？","remember":"学AI应用开发不是知识点越多越好，而是按顺序打通一条从基础到项目到微调到Agent的完整链路——两个月从看不懂到能面试。","is_new":true},{"id":"7640827329316691619","title":"AI概念产品设计审美参考","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7640827329316691619","audience":"对AI产品UI设计感兴趣、希望提升设计审美和风格参考的产品设计师或产品经理。","summary":"通过解析设计师Slava Kony Love的作品风格，提炼出\"iOS原生质感+极简科技未来感\"的AI概念产品设计方法论，为产品设计师提供高质量审美参考。","raw_preview":"大家好，今天继续分享一些设计灵感。今天分享的是Dribbble设计师Slava Kony Love的作品，他的作品大量围绕AI语音助手、数据看板、天气、闹钟、音乐、视频生成、Wipe Co.、Jalei概念产品展开，整体上苹果iOS原生质感拉满，大量使用苹果真机、灵动岛、系统小组件与圆润圆角卡片，整体观感就像是在打造下一代iOS原生质感功能。\n\n配色走高级轻冷路线，以浅灰、灵灰、黑白低调色为主，只","knowledge_map":"AI概念产品设计风格解析\n├── 作品类型\n│   ├── AI语音助手\n│   ├── 数据看板\n│   ├── 天气 / 闹钟 / 音乐\n│   └── 视频生成概念产品\n├── 视觉语言\n│   ├── iOS原生质感\n│   │   ├── 苹果真机展示\n│   │   ├── 灵动岛\n│   │   └── 系统小组件 + 圆润卡片\n│   ├── 配色策略\n│   │   ├── 主色：浅灰 / 灵灰 / 黑白低调色\n│   │   └── 点缀：少量高饱和色 + 渐变\n│   └── 细节元素\n│       ├── 点阵元素\n│       ├── 声波波形\n│       ├── 环形数据图表\n│       └── 规整网格布局\n├── 动态设计\n│   └── 动效优先，静态图也有灵动质感\n└── 设计定位\n    ├── 前沿概念设计（≠ 传统SaaS业务界面）\n    ├── 未来交互趋势探索\n    └── 极简科技美学","concepts":"#### iOS原生质感设计语言\n\n**是什么**：以苹果iOS系统的视觉规范为基础，结合灵动岛、系统小组件、圆润卡片等元素，打造贴近原生系统感的界面风格。\n\n**为什么重要**：让AI概念产品看起来\"真实可信\"，而不是纯粹的概念幻想，增强未来感的同时保持可落地的质感。\n\n**详细解释**：\n- 大量使用苹果真机展示（增加真实感）\n- 灵动岛作为交互元素融入设计\n- 系统小组件与圆润圆角卡片保持一致性\n\n**实际应用场景**：AI助手App概念稿、iOS平台AI功能设计提案。\n\n---\n\n#### 高级轻冷配色策略\n\n**是什么**：以浅灰、灵灰、黑白等低调色为主色调，仅用少量高饱和色彩和渐变作为视觉点缀的配色方法。\n\n**为什么重要**：避免冰冷单调的同时保持极简高级感，未来科技感藏在克制的色彩搭配里。\n\n**详细解释**：\n| 色彩角色 | 用法 |\n|---------|------|\n| 主色 | 浅灰、灵灰、黑白低调色 |\n| 点缀色 | 少量高饱和色彩 + 渐变 |\n| 效果 | 简约但不冰冷，科技感藏在细节 |\n\n**实际应用场景**：AI产品UI配色方案制定、设计系统色板规划。\n\n---\n\n#### 概念设计 vs 业务设计的定位差异\n\n**是什么**：概念设计侧重未来交互趋势和美学探索，不追求完整业务流程；业务设计侧重信息架构和功能完整性。\n\n**为什么重要**：明确设计定位才能避免\"用概念设计思路做业务产品\"或\"用业务设计思路做概念稿\"的错位。\n\n**详细解释**：\n| 维度 | 概念设计（本视频风格） | 传统SaaS业务设计 |\n|------|----------------------|-----------------|\n| 目标 | 未来交互想象、美学探索 | 完整业务流程、信息架构 |\n| 信息密度 | 低，大面积留白 | 高，密集功能布局 |\n| 动效 | 优先，动效即体验 | 辅助，不影响功能 |\n| 落地性 | 概念为主 | 直接可用 |\n\n**实际应用场景**：产品发布会视觉、设计竞赛、品牌概念展示。","table":"| 风格关键词 | 说明 |\n|-----------|------|\n| 原生AI设计 | 贴近iOS系统视觉规范 |\n| iOS未来质感 | 灵动岛 + 系统小组件 + 圆润卡片 |\n| 极简科技风 | 低调主色 + 少量点缀色 |\n| 版式氛围感UI | 规整网格 + 大面积精致文字 |\n| 数据可视化主导 | 声波波形 + 环形图表 + 点阵元素 |\n| 动效优先 | 静态图也要有流畅灵动质感 |\n| 前沿概念探索 | 不追求业务完整性，追求趋势感 |","thinking":"1. 视频中的\"概念设计\"风格（趋势感、动效优先）和实际产品落地之间存在哪些鸿沟？如何在保持美学的同时兼顾业务可用性？\n\n2. \"数据可视化主导\"的设计语言（声波波形、环形图表）在AI产品中有哪些真实的交互意义，还是仅仅是视觉装饰？\n\n3. iOS原生质感设计风格在Android平台或跨平台产品上是否适用？如果要做跨平台AI产品，设计语言应该如何调整？","remember":"AI概念产品设计的核心不是\"功能有多全\"，而是\"未来感有多真\"——克制的配色、灵动的细节、动效优先，让人一眼就相信这是下一代的样子。","is_new":true},{"id":"7641553317671324971","title":"六周吃透AI产品经理的方法","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7641553317671324971","audience":"想转型AI产品经理或提升AI产品能力的传统产品经理、应届生。","summary":"用一套六周分阶段学习计划，让传统产品经理系统掌握AI产品核心技能，从提示词工程到RAG再到Agent，最终能独立输出AI产品方案。","raw_preview":"一个很抽象，但是能让你六周吃透AI产品经理的方法。说句实在的，只要你不是年纪偏大且有足够的经历，也不是三天打鱼两天晒网，六周时间，真够你把AI产品经理搞明白，变成能真正干活的AI工程师。\n\n我当时是这么做的：\n\n前两周打牢基础，先把prompt提示词工程、大模型工具吃透，Transformer原理能熟练调用LLM API，能独力跑通一次简单AI交互流程就够。稳扎稳打。\n\n第三周，深入核心，吃透RA","knowledge_map":"六周AI产品经理学习路线\n├── 第1-2周：基础阶段\n│   ├── Prompt提示词工程\n│   ├── 大模型工具熟练使用\n│   ├── Transformer原理理解\n│   ├── LLM API调用\n│   └── 跑通简单AI交互流程\n├── 第3周：核心深入\n│   ├── RAG核心逻辑\n│   │   ├── 全链路设计\n│   │   └── 落地实践\n│   ├── 向量数据库应用场景\n│   └── RAG知识服务部署主流方案\n└── 第4-5周：实战落地\n    ├── 简单Agent产品设计与落地\n    ├── ReAct模式产品设计逻辑\n    ├── 多Agent协作方案设计\n    └── 多Agent在复杂业务场景的价值","concepts":"#### Prompt提示词工程\n\n**是什么**：设计和优化输入给大模型的指令，使其输出更符合预期的技术与方法论。\n\n**为什么重要**：是AI产品经理最基础、最高频使用的能力，直接影响AI功能效果。\n\n**详细解释**：\n- 第1-2周打基础时首要掌握\n- 结合LLM API调用，能独力跑通AI交互流程\n\n**实际应用场景**：AI功能需求设计、与研发沟通AI效果调优、用户场景提示词设计。\n\n---\n\n#### RAG（检索增强生成）\n\n**是什么**：让大模型在回答时先检索外部知识库再生成答案，解决知识局限和幻觉问题的技术。\n\n**为什么重要**：是AI产品中最核心的落地技术之一，第3周单独用一周深入学习。\n\n**详细解释**：\n- 需理解：全链路设计（数据处理→检索→生成）\n- 需掌握：向量数据库的应用场景\n- 需了解：RAG知识服务部署的主流方案\n\n**实际应用场景**：企业知识库产品、智能客服、文档问答系统。\n\n---\n\n#### Agent与ReAct模式\n\n**是什么**：Agent是能自主规划并执行多步骤任务的AI系统；ReAct是一种\"推理+行动\"交替进行的Agent设计模式。\n\n**为什么重要**：是AI产品的高阶形态，也是当前招聘市场对AI产品经理的核心考察点。\n\n**详细解释**：\n| 概念 | 说明 |\n|------|------|\n| 单Agent | 独立完成任务，适合简单场景 |\n| 多Agent协作 | 多个Agent分工合作，适合复杂业务场景 |\n| ReAct模式 | 推理（Reasoning）+ 行动（Acting）交替，提升任务完成质量 |\n\n**实际应用场景**：自动化工作流产品、复杂业务场景的AI助手设计。","table":"| 周次 | 学习内容 | 产出目标 |\n|------|---------|---------|\n| 第1-2周 | Prompt工程、Transformer原理、LLM API | 能跑通简单AI交互流程 |\n| 第3周 | RAG全链路、向量数据库、部署方案 | 理解RAG在AI产品中的落地价值 |\n| 第4-5周 | Agent设计、ReAct模式、多Agent协作 | 能独立输出基础AI产品方案 |","thinking":"1. 视频中的六周路线以技术理解为主，但AI产品经理还需要哪些非技术能力（如用户研究、数据分析、商业判断），这些如何在六周内同步建立？\n\n2. RAG和Agent在实际产品中常常结合使用，作为产品经理如何判断一个场景适合用RAG、Agent还是两者结合？\n\n3. 视频提到\"多Agent在复杂业务场景中的产品价值\"，目前多Agent产品落地面临的最大挑战是什么？产品经理应该如何在需求文档中描述多Agent的协作逻辑？","remember":"六周不是让你成为AI专家，而是让你从\"不懂AI\"变成\"能给公司出AI产品方案\"——提示词→RAG→Agent，三步走，稳扎稳打。","is_new":true},{"id":"7645625280037014803","title":"美团Agent面经MCP八题解析","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7645625280037014803","audience":"准备AI/Agent相关岗位面试、需要系统掌握MCP核心概念的开发者或产品经理。","summary":"通过解析美团Agent面经的8道MCP考题，系统梳理MCP的核心概念、架构角色与生产落地注意事项，帮助求职者掌握Agent面试高频考点。","raw_preview":"一起来看看这套美团的Agent面经，看看你能答上来几道。这套题整体难度中等，但是最后一题很多人会答得很虚。我是小哲，点赞收藏加关注，我们马上开始。\n\n第一道题：什么是MCP，它的核心目标是什么？MCP可以理解成Agent连接外部工具和数据源的一套标准协议，核心目标是把工具发现、上下文传递和调用方式标准化，让不同客户端和服务端可以复用，而不是每个项目都重新接一遍。\n\n第二道题：MCP主要解决了什么问","knowledge_map":"MCP核心知识体系（8道面试题）\n├── 基础概念\n│   ├── MCP定义：Agent连接外部工具的标准协议\n│   └── 核心目标：工具发现、上下文传递、调用标准化\n├── 解决的问题\n│   └── 工具接入碎片化（各框架协议不统一）\n├── 架构角色\n│   ├── Host：用户交互入口和控制面（IDE/桌面助手/Agent平台）\n│   ├── Client：运行在Host内，连接Server，做协议适配\n│   └── Server：提供具体能力（文件/数据库/搜索/业务系统）\n├── 与相关概念的区别\n│   ├── MCP vs Function Calling（系统侧协议 vs 模型侧格式）\n│   └── MCP vs Plugins（底层协议 vs 平台扩展机制）\n└── 生产落地注意事项\n    ├── 通信安全 + 权限隔离\n    ├── 工具白名单 + 参数校验\n    ├── 审计日志 + 超时熔断\n    ├── 敏感操作二次确认\n    └── 多租户版本兼容 + 降级策略","concepts":"#### MCP（模型上下文协议）\n\n**是什么**：Agent连接外部工具和数据源的一套标准协议，目标是把工具发现、上下文传递和调用方式标准化。\n\n**为什么重要**：解决了过去各Agent框架工具协议碎片化的问题，让工具能力可以跨项目复用。\n\n**详细解释**：\n- 标准化三件事：工具发现、上下文传递、调用方式\n- 让不同客户端和服务端可以复用，无需每个项目重新接入\n\n**实际应用场景**：多个Agent平台共享同一套工具服务（如搜索、数据库、代码仓库）。\n\n---\n\n#### MCP三层架构：Host / Client / Server\n\n**是什么**：MCP将系统分为三个角色，各司其职。\n\n**为什么重要**：理解三层架构是回答MCP架构类面试题的核心，也是工程落地的基础。\n\n**详细解释**：\n| 角色 | 位置 | 职责 |\n|------|------|------|\n| Host | 最外层，用户侧 | 用户交互入口，发起连接，管理会话，协调模型和工具结果 |\n| Client | Host内部 | 连接Server，发送请求，做协议适配 |\n| Server | 工具侧 | 提供具体能力，声明工具列表，处理鉴权/限流/日志 |\n\n**实际应用场景**：IDE（Host）→ MCP Client → 代码仓库MCP Server。\n\n---\n\n#### MCP vs Function Calling vs Plugins\n\n**是什么**：三种不同层次的工具集成方式。\n\n**为什么重要**：面试高频混淆点，需要能清晰区分。\n\n**详细解释**：\n| 概念 | 层次 | 重点 | 关系 |\n|------|------|------|------|\n| Function Calling | 模型侧 | 让模型按schema产出参数 | 与MCP可配合 |\n| MCP | 系统侧协议 | 工具发现、连接、治理 | 底层协议 |\n| Plugins | 平台扩展机制 | 依赖特定生态 | 产品形态 |\n\n**实际应用场景**：Function Calling负责模型输出参数，MCP负责把参数传给正确的工具并返回结果。\n\n---\n\n#### 生产环境MCP落地要点\n\n**是什么**：将MCP从原型部署到生产环境时需要关注的工程安全与稳定性要点。\n\n**为什么重要**：这是面试最后一题，也是最难答、最能体现工程落地能力的考点。\n\n**详细解释**：\n- **安全**：通信安全、权限隔离、工具白名单、参数校验\n- **可观测**：审计日志、超时熔断\n- **可靠性**：敏感操作二次确认、多租户版本兼容、server异常降级\n- 核心原则：**工具发现 ≠ 工具可用**\n\n**实际应用场景**：企业级Agent平台的MCP服务治理、安全审计。","table":"| 面试题 | 核心答案关键词 |\n|--------|--------------|\n| MCP是什么 | 标准协议、工具发现、上下文传递、调用标准化 |\n| MCP解决什么问题 | 工具接入碎片化 |\n| Host是什么 | 用户交互入口、控制面、发起连接管理会话 |\n| Client是什么 | Host内部、连接Server、协议适配层 |\n| Server是什么 | 提供具体能力、声明工具、处理鉴权限流日志 |\n| MCP vs Function Calling | 系统侧协议 vs 模型侧格式，可配合非替代 |\n| MCP vs Plugins | 底层协议 vs 平台扩展机制/产品形态 |\n| 生产落地注意 | 安全+权限+白名单+审计+熔断+降级 |","thinking":"1. 视频说\"工具发现不能等于工具可用\"，在实际系统中如何设计工具的权限校验机制，确保Agent只能调用被授权的工具？\n\n2. MCP和Function Calling\"可以配合，不是替代关系\"——在一个完整的Agent调用链中，两者分别在哪个环节发挥作用，数据流是怎样的？\n\n3. 多租户场景下MCP的版本兼容是个难题，如果不同客户使用不同版本的MCP Server，系统应该如何设计来保证兼容性和稳定性？","remember":"MCP是Agent世界的\"USB接口\"——不管什么工具、什么平台，插进去就能用，而生产落地的难点不在于\"能不能连\"，而在于\"安不安全、稳不稳定\"。","is_new":true},{"id":"7596229808447573282","title":"Claude Skill 搭建自动化写作 Agent 实战","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7596229808447573282","audience":"有内容创作需求、希望用 AI 工具提升写稿效率的创作者或自媒体人。","summary":"把大博主的写作 SOP 封装成 Claude Skill，让 AI 全流程自动化完成从选题到出稿的写作任务，将单篇创作时间从 2 小时压缩到 20 分钟。","raw_preview":"建议所有人都去学 Claude Skills，真的太香了。之前我们写篇文章，从折腾选题到收集资料，再到写出稿、改稿、校对，就算是专业的创作者，至少也要两小时起步。现在我将大博主都在用的写作流程提炼成 SOP，再让 Claude 帮我写成 Skill，就可以让 AI 帮你自动化写作，归档一篇高质量的文稿，从之前的两小时起步到 20 分钟就能搞定。\n\n今天手把手带你过一遍整个流程，看看 Skill 到","knowledge_map":"Claude Skill 自动化写作 Agent\n│\n├── 前提准备\n│   ├── 安装 Claude Code\n│   ├── 接入模型\n│   └── 安装 Skill Creator（官方引导工具）\n│\n├── 核心：写作 SOP 拆解（7步流程）\n│   ├── Step 1：理解需求 → 自动保存 Brief 文件夹\n│   ├── Step 2：信息搜集 → 多渠道搜索 + 自动归档（含时间/来源）\n│   ├── Step 3：选题讨论 → AI 提供 3-4 个方向（含大纲+工作量评估）\n│   ├── Step 4：创建任务清单 → 协作文件夹（测试/配图需求）\n│   ├── Step 5：学习风格 → 提取历史爆文的结构/语言/行文特征\n│   ├── Step 6：出稿创作 → 结合风格+时效案例，先搭框架\n│   └── Step 7：三重审校 → 数据校对 → 去 AI 味 → 细节打磨\n│\n├── Skill 文件结构\n│   ├── skill.md（必须有）\n│   │   ├── Name（触发关键词）\n│   │   └── Description（AI 自动触发条件）\n│   ├── Reference（参考文档）\n│   ├── Script（运行脚本）\n│   └── Template（模板）\n│\n└── 写作 Agent 知识库目录\n    ├── 风格参考（历史爆文）\n    ├── 写作技巧（个人整理的 Markdown）\n    ├── 规范指南（防流水账指南等）\n    └── 用户人设（个人信息 + 写作偏好）","concepts":"#### 概念一：Claude Skill\n\n**是什么**：一种可以封装特定工作流程的 AI 能力模块，在 Claude Code 中按需加载和触发，相当于给 AI 装上一个\"专属工种\"。\n\n**为什么重要**：\n普通的对话式 AI 每次都要重新交代背景和要求，而 Skill 把 SOP、风格偏好、文件管理规则一次性写入，之后只需自然语言触发，AI 就能自动执行完整流程，且按需加载节省 token。\n\n**详细解释**：\n\n| 组成文件 | 作用 |\n|---|---|\n| `skill.md`（必须） | 定义 Skill 的 Name 和 Description，AI 依此判断何时自动触发 |\n| Reference | 参考文档，如写作规范、风格指南 |\n| Script | 运行脚本，定义执行逻辑 |\n| Template | 输出模板，规范成稿格式 |\n\n**实际应用场景**：\n输入\"帮我写一篇关于 XX 产品的测评\"，Skill 自动识别意图，依次完成信息搜集、选题讨论、风格匹配、出稿、审校，全程无需人工干预每个步骤。\n\n---\n\n#### 概念二：写作 SOP 的 7 步流程\n\n**是什么**：将专业创作者的完整写作流程标准化，分解为 7 个可被 AI 执行的明确步骤。\n\n**为什么重要**：\nAI 写作质量差的根本原因是\"流程缺失\"——直接让 AI 写文章，它没有上下文、没有风格参照、没有校对机制。7 步 SOP 把人类创作者的隐性经验显性化，让 AI 有章可循。\n\n**详细解释**：\n\n| 步骤 | 动作 | 关键输出 |\n|---|---|---|\n| Step 1 理解需求 | 解析用户输入 | 自动保存 Brief 到对应文件夹 |\n| Step 2 信息搜集 | 多渠道检索 | 含时间戳和来源的资料文档 |\n| Step 3 选题讨论 | 与用户协商，不直接动笔 | 3-4 个选题方向 + 大纲 + 工作量评估 |\n| Step 4 任务清单 | 识别测试/配图需求 | 协作文件夹中的任务清单文档 |\n| Step 5 学习风格 | 读取历史爆文 | 提取开头方式、结构、语言、行文特征 |\n| Step 6 出稿创作 | 结合风格+时效案例 | 框架完整的初稿（不求完美） |\n| Step 7 三重审校 | 模拟主编审稿机制 | 数据校对 → 去 AI 味 → 细节打磨 |\n\n**实际应用场景**：\nStep 3\"先讨论选题，不直接写\"是关键设计——避免 AI 自作主张跑偏方向，把人的判断留在最关键的决策节点上。\n\n---\n\n#### 概念三：知识库与风格记忆\n\n**是什么**：在 Skill 的目录结构中，持续沉淀个人创作资产（爆文、技巧、规范、人设），让 Agent 随时间越用越懂你。\n\n**为什么重要**：\n这是让 AI 写出\"你的味道\"而非\"通用 AI 腔调\"的核心机制。风格参考、用户人设等文件夹让模型在每次运行时都能调取创作者的个人特征。\n\n**详细解释**：\n\n| 文件夹 | 存放内容 | 作用 |\n|---|---|---|\n| 风格参考 | 历史数据好的爆文 | 让 AI 学习你的写作风格 |\n| 写作技巧 | 个人整理的 Markdown 笔记 | 提供写作方法论参考 |\n| 规范指南 | 防流水账指南、排版规则等 | 约束输出质量底线 |\n| 用户人设 | 个人信息、写作需求与偏好 | 让 AI 理解\"我是谁，我想写给谁看\" |\n\n**实际应用场景**：\n资料越积越多，Agent 越来越专业——这是一个正向飞轮：每篇好文章沉淀进知识库，下一篇的起点就更高。","table":"| 对比维度 | 传统写作流程 | Claude Skill 自动化写作 |\n|---|---|---|\n| 耗时 | 2 小时起步 | 约 20 分钟 |\n| 选题方式 | 人工头脑风暴 | AI 提供 3-4 个方向供选择 |\n| 风格一致性 | 依赖个人状态 | 读取历史爆文，稳定输出 |\n| 审校机制 | 人工逐一检查 | 三重自动审校（数据/去AI味/细节） |\n| 文件管理 | 手动整理 | 按用途自动分类写入对应文件夹 |\n| token 消耗 | 不适用 | 按需加载，节省 token |\n| 可复用性 | 低（每次重新配置） | 高（Skill 一次配置，持续调用） |\n| 知识积累 | 存在个人脑中 | 沉淀进知识库，Agent 越用越强 |","thinking":"1. **SOP 的质量决定 Skill 的上限**：视频中强调要先把工作流程\"拆解清楚\"再让 Claude 生成 Skill。那么，如果你自己的写作流程本身就不清晰，AI 能帮你梳理出一套好的 SOP 吗？还是说创作者需要先有足够的自我认知？\n\n2. **\"先讨论选题，不直接写\"这个设计背后的逻辑**：视频特别强调 Step 3 不能让 AI 直接动笔，而是先和人讨论。这个\"人在回路\"的节点设计，哪些环节适合保留人的判断，哪些环节可以完全交给 AI？\n\n3. **知识库的边界在哪里**：风格参考放的是\"数据好的爆文\"，但爆文的风格不一定适合所有选题。当知识库积累的历史风格与新选题的调性冲突时，Agent 应该如何取舍？你会怎么在 Skill 中设计这个规则？","remember":"把你的写作经验变成 SOP，把 SOP 封装成 Claude Skill，从此 AI 替你走完全程，你只需要在关键决策点点头。","is_new":true},{"id":"7598449992155647282","title":"普通人用好这三个 Claude Skills 就够了","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7598449992155647282","audience":"想用 AI 工具提升内容创作效率、但面对海量插件不知如何筛选的普通创作者","summary":"面对 8 万个 Claude Skills 无从下手？只需围绕\"信息输入→内容输出→流程标准化\"三个环节各选一个核心 Skill，就能建立属于自己的差异化创作系统。","raw_preview":"其实你并不需要那么多 Claude Skills。最近 Claude Skills 有多火，相信大家都有所感受。目前 Skills 市场这个网站上 Skills 的数量已经达到了恐怖的 8 万个了，并且还在快速增长中。面对那么多新奇的 Skills，很多人像进了琳琅满目的超市一样，什么都想带回家，结果就是囤积了一堆 Skills，真正用上的没几个，彻底掉入效率陷阱。\n\n那么作为创作者，我们筛选 S","knowledge_map":"普通人用好 Claude Skills\n│\n├── 问题：Skills 太多 → 囤积却不用 → 掉入效率陷阱\n│\n├── 筛选原则：求精不求多，围绕创作三大环节选 Skill\n│\n├── 环节一：信息输入\n│   └── 推荐：Notebook Skill\n│       ├── 核心功能：打通知识库与 Claude 直接对话\n│       ├── 支持格式：PDF、YouTube 链接\n│       ├── 底层能力：Google Notebook LLM（Gemini 驱动）\n│       └── 核心价值：来源引用 → 减少幻觉 → 保持信息差异化\n│\n├── 环节二：内容输出\n│   └── 推荐：Obsidian Skill\n│       ├── 核心特点：本地存储、双链、Markdown\n│       ├── 官方 Skills（CEO 亲写）：\n│       │   ├── 自动写笔记\n│       │   ├── 画 Canvas 架构图\n│       │   └── 创建 Base 数据库\n│       └── 配套工具：Excalidraw 画图 / Napkin 文字可视化\n│\n└── 环节三：创作流程标准化\n    └── 推荐：Skills Creator（官方 Skill）\n        ├── 核心功能：通过自然语言对话创建专属 Skill\n        ├── 输入方式：工作流描述 / 与 Agent 的对话记录\n        └── 核心价值：一次封装 → 高频复用 → 产生规模效应","concepts":"#### 概念一：Notebook Skill（信息输入管理）\n\n**是什么**：一个能将外部文档（PDF、YouTube 等）导入知识库，并让 Claude 基于这些文档回答问题的 Skill，底层调用 Google Notebook LLM（Gemini 驱动）。\n\n**为什么重要**：\nAI 时代内容同质化严重，差异化的核心在于\"信息摄入的差异\"。好内容是优质信息输入的产物，而不是凭空生成的。\n\n**详细解释**：\n\n| 功能点 | 说明 |\n|---|---|\n| 支持导入格式 | PDF 文件、YouTube 视频链接 |\n| 回答来源 | 仅基于你上传的文档，附带来源引用 |\n| 核心优势 | 大幅减少幻觉，答案可溯源 |\n| 操作方式 | 在 Claude 界面直接上传或查询，无需额外配置 |\n\n**实际应用场景**：\n把你精心筛选的行业报告 PDF、优质 YouTube 视频导入知识库，让 Claude 基于这些内容创作，而不是依赖通用训练数据，从而产出别人写不出来的内容。\n\n---\n\n#### 概念二：Obsidian Skill（内容输出体系）\n\n**是什么**：基于 Obsidian 笔记软件的 Claude Skill，支持 Claude 直接将生成内容写入本地 Obsidian 库，并通过官方 Skills 实现笔记、架构图、数据库的自动化创建。\n\n**为什么重要**：\n创作者的输出不只是\"写完发出去\"，还需要沉淀和可视化。Obsidian 的本地存储特性避免了云端工具的授权和接口问题，让 Claude 写入更顺畅。\n\n**详细解释**：\n\n| Obsidian 特点 | 对创作的价值 |\n|---|---|\n| 本地存储 | 无需云端授权，Claude 可直接写入 |\n| 双链功能 | 知识点之间相互关联，便于复用 |\n| Markdown 格式 | 与 AI 生成内容天然兼容 |\n| Excalidraw 插件 | 直接在库内手绘架构图 |\n| Canvas 架构图（官方 Skill）| 自动生成可视化信息结构 |\n\n**实际应用场景**：\n用 Claude 生成内容后，直接指令写入 Obsidian 对应目录；需要配图时在 Excalidraw 里画图，或用 Napkin 做文字可视化，全程不离开本地环境。\n\n---\n\n#### 概念三：Skills Creator（流程标准化封装）\n\n**是什么**：Claude 官方提供的 Skill，通过自然语言对话引导用户把自己的工作流或提示词迭代过程封装成一个可复用的专属 Skill。\n\n**为什么重要**：\n有了好的输入和输出工具，如果每次都要重新描述流程，效率依然低下。将创作过程标准化封装，才能产生规模效应，让重复工作一键完成。\n\n**详细解释**：\n\n| 输入方式 | 示例 |\n|---|---|\n| 工作流描述 | 直接把当前 AI 工作流文字发给它 |\n| 对话记录 | 把你与 Agent 的历史对话粘贴进去 |\n| 提示词迭代记录 | 把多轮调试过的提示词和解法一起发给它 |\n\n封装指令示例（视频原话）：\n> \"把我们的对话整理好，包括我的提示词迭代和你的解法，存成一个 Skill，放到这个目录里，起个清晰的名字和描述，以后我会高频率复用。\"\n\n**实际应用场景**：\n当你摸索出一套稳定的选题→写作→配图创作流程后，用 Skills Creator 一次性封装，之后只需调用这个 Skill，无需重复输入背景和要求。","table":"| 维度 | Notebook Skill | Obsidian Skill | Skills Creator |\n|---|---|---|---|\n| **对应环节** | 信息输入 | 内容输出 | 流程标准化 |\n| **解决的问题** | 内容同质化、信息来源不可靠 | 输出散乱、可视化麻烦 | 流程无法复用、效率无法规模化 |\n| **核心能力** | 基于私有文档问答，附来源引用 | 本地自动写入笔记、画图、建库 | 自然语言创建专属 Skill |\n| **底层技术** | Google Notebook LLM（Gemini） | Obsidian 本地存储 + Markdown | Claude 官方 Skill 生成器 |\n| **上手难度** | 低（上传文件即用） | 低（无需云端授权） | 低（不需要懂开发） |\n| **核心价值** | 减少幻觉，保持信息差异化 | 提升分发效率，内容可沉淀 | 一次封装，高频复用 |","thinking":"1. **信息筛选本身也是核心竞争力**：Notebook Skill 的价值取决于你导入的文档质量，那么在\"用什么工具\"之前，\"如何建立自己的高质量信息源筛选标准\"是不是更值得优先思考？\n\n2. **标准化的边界在哪里**：Skills Creator 能把创作流程封装复用，但创作中有多少环节适合标准化、又有多少环节恰恰需要保留\"非标准化\"的个人判断？过度封装会不会反而削弱创作的差异化？\n\n3. **工具组合的迁移成本**：视频推荐的三个 Skill 深度绑定了 Notebook LLM、Obsidian、Claude 这一套生态，如果其中某个工具发生重大变化（如 API 政策调整），整套系统的稳定性如何保障？是否需要预留替代方案？","remember":"不是 Skills 越多越强——围绕\"输入→输出→标准化\"三个环节各选一个精准 Skill，才是普通创作者在 AI 时代建立差异化的正确姿势。","is_new":true},{"id":"7602423338950020395","title":"OpenCode 免费接入顶级模型与插件配置指南","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7602423338950020395","audience":"有一定编程基础、希望零成本使用 Claude / Gemini 顶级模型进行 AI 编程的开发者或技术爱好者","summary":"手把手教你用 OpenCode 免费接入 Claude 和 Gemini 顶级模型，并通过安装 Omai 插件包、Skills 和 MCP，把 OpenCode 打造成功能完备的 AI 编程超级助手。","raw_preview":"OpenCode 最近真是太火了，给它点赞的已经有9万多次了，我估计全球的大模型圈上都在针对 OpenCode 做测试调优。OpenCode 是目前真正能媲美 Claude Code 的工具，也是2026年到目前为止最火的颜色工具。\n\nOpenCode 目前只提供了英文文档，我按照其英文文档，同时结合了 Claude Code 的学习资料，输出了一份详细的 OpenCode 中文操作手册，包括安装","knowledge_map":"OpenCode 进阶配置\n├── 1. 免费接入顶级模型\n│   ├── 工具：Anthr Gravity（Google 出品）\n│   ├── 内置模型：Gemini 2.5 Pro + Claude 4.5 Opus\n│   └── 验证方式：/model 命令查看可用模型\n│\n├── 2. 安装增强插件 Omai OpenCode\n│   ├── 核心能力：7个编程 Agent 多智能体协作\n│   ├── 覆盖任务：写代码 / 查 Bug / 梳理项目结构\n│   └── 使用方式：/item 选择 Agent 或输入 ultrawork\n│\n├── 3. 配置 Skills\n│   ├── 方式一：兼容 Claude Code 已有 Skills（复制到 .claude/skills 目录）\n│   ├── 方式二：安装 Skills Creator，用自然语言创建新 Skills\n│   └── 生效方式：重启 OpenCode 后即可使用\n│\n└── 4. 配置 MCP\n    ├── 安装方式：自然语言指令（如\"安装 Chrome MCP Server\"）\n    ├── Key 配置：直接告诉 OpenCode，让它自动写入\n    └── 查看方式：/mcps 命令","concepts":"#### 概念一：Anthr Gravity —— 免费接入 Claude 和 Gemini 的桥梁\n\n**是什么**：Google 推出的一款 AI 编程工具，内置了 Gemini 和 Claude 两个顶级模型，可作为 OpenCode 的模型提供方插件使用。\n\n**为什么重要**：Claude 和 Gemini 的官方 API 均需付费，通过 Anthr Gravity 可以用 Google 账号免费登录，实现零成本接入两大顶级编程模型。\n\n**详细解释**：\n\n| 步骤 | 操作 |\n|------|------|\n| 1 | 在 GitHub 找到 Anthr Gravity 插件，复制安装指令 |\n| 2 | 粘贴到 OpenCode，自动下载安装 |\n| 3 | 重开终端，运行配置指令，选择 Google 登录方式 |\n| 4 | 浏览器弹出 Google 登录页，登录后复制授权码粘贴回终端 |\n| 5 | 重启 OpenCode，输入 `/model` 验证是否出现 Gemini 2.5 Pro 和 Claude 4.5 Opus |\n\n**实际应用场景**：不想花钱买 API Key，但希望在 OpenCode 中使用 Claude 4.5 Opus 或 Gemini 2.5 Pro 进行日常编程辅助。\n\n---\n\n#### 概念二：Omai OpenCode —— 多智能体编程插件包\n\n**是什么**：OpenCode 最热门的第三方插件包，内置7个专职编程 Agent，通过多智能体分工协作自动完成复杂开发任务。\n\n**为什么重要**：单个 AI 模型处理复杂项目时容易遗漏细节，多 Agent 协作可以把写代码、查 Bug、梳理结构等任务分配给最合适的智能体，据称作者投入了2.4万美金开发。\n\n**详细解释**：\n\n| 使用方式 | 说明 |\n|----------|------|\n| `/item` 命令 | 手动从7个 Agent 中选一个执行特定任务 |\n| 提示词输入 `ultrawork` | 自动调用 Omai OpenCode 的完整多 Agent 工作流 |\n\n**实际应用场景**：面对一个需要同时写代码、调试、整理目录结构的中大型项目时，用 ultrawork 让多个 Agent 并行处理，节省大量手动操作时间。\n\n---\n\n#### 概念三：Skills —— 可复用的自定义指令模块\n\n**是什么**：预先定义好的功能模块（类似宏或模板），可以让 OpenCode 一键执行特定任务，比如\"翻译\"、\"代码审查\"等。\n\n**为什么重要**：把常用操作固化成 Skills，避免每次重复输入长提示词，同时 OpenCode 完全兼容 Claude Code 已有的 Skills，迁移成本为零。\n\n**详细解释**：\n\n| 创建方式 | 操作 |\n|----------|------|\n| 迁移已有 Skills | 在项目根目录新建 `.claude/skills/` 文件夹，把 Claude Code 的 Skills 文件复制进去 |\n| 自然语言创建新 Skills | 安装 Skills Creator 插件后，直接告诉 OpenCode 你要什么功能（如\"创建一个翻译 Skills\"），它自动生成 |\n\n**实际应用场景**：团队有一套已在 Claude Code 中调试好的代码审查 Skills，可以直接复制到 OpenCode 继续使用，无需重新编写。\n\n---\n\n#### 概念四：MCP —— 让 OpenCode 连接外部工具的协议\n\n**是什么**：Model Context Protocol，一种让 AI 工具连接外部服务（如浏览器、数据库、API）的标准协议，安装后 OpenCode 可以直接操控这些外部工具。\n\n**为什么重要**：有了 MCP，OpenCode 不再局限于纯文本对话，可以真正操作浏览器、读取文件、调用外部 API，变成能干实事的自动化助手。\n\n**详细解释**：\n\n| 步骤 | 操作 |\n|------|------|\n| 安装 MCP | 直接在 OpenCode 输入自然语言，如\"安装 Chrome MCP Server\" |\n| 配置 Key | 把 API Key 告诉 OpenCode，让它自动写入配置文件 |\n| 查看已装 MCP | 输入 `/mcps` 查看所有已配置的 MCP 列表 |\n\n**实际应用场景**：安装浏览器 MCP 后，可以让 OpenCode 自动打开网页、抓取内容、填写表单，实现真正的浏览器自动化。","table":"| 功能 | 工具/方式 | 关键命令/路径 | 是否免费 |\n|------|-----------|---------------|----------|\n| 接入 Claude 4.5 Opus | Anthr Gravity 插件 + Google 账号登录 | `/model` 查看模型 | ✅ 免费 |\n| 接入 Gemini 2.5 Pro | Anthr Gravity 插件 + Google 账号登录 | `/model` 查看模型 | ✅ 免费 |\n| 多 Agent 编程协作 | Omai OpenCode 插件包 | `/item` 或输入 `ultrawork` | 需查插件说明 |\n| 迁移已有 Skills | 复制文件到指定目录 | `.claude/skills/` 文件夹 | ✅ 免费 |\n| 自然语言创建 Skills | Skills Creator 插件 | 直接描述需求给 OpenCode | 需查插件说明 |\n| 安装 MCP | 自然语言指令 | \"安装 XXX MCP Server\" | 取决于 MCP 本身 |\n| 查看所有 MCP | 内置命令 | `/mcps` | — |","thinking":"1. **Anthr Gravity 的免费额度是否有上限？** Google 提供的免费接入通常有速率限制或每日配额，在实际高强度编程场景中，免费额度是否够用？超出后有哪些替代方案？\n\n2. **Omai OpenCode 的7个 Agent 是如何分工的？** 视频只提到了多智能体协作的结果，但没有展示各 Agent 的具体职责划分。不同类型的任务（前端/后端/数据处理）应该如何选择对应的 Agent 才能发挥最大效果？\n\n3. **Skills 和 MCP 的边界在哪里？** Skills 是固化提示词逻辑，MCP 是连接外部工具——当一个任务既需要自定义提示逻辑又需要调用外部服务时，两者应该如何配合设计，才能避免重复或冲突？","remember":"用 Google 账号白嫖 Claude + Gemini，再装上 Omai 插件包、Skills 和 MCP，OpenCode 就从一个编辑器变成了你的全能 AI 开发团队。","is_new":true},{"id":"7615454479031362427","title":"Claude Code 1小时做微信小程序全程实录","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7615454479031362427","audience":"有微信小程序开发需求、想用 AI 编程工具提效的研究人员或独立开发者","summary":"用 Claude Code 配合微信开发者工具，通过自然语言 prompt + 多轮人机对话，在约1小时内从零生成一个可真机运行的问卷调研小程序。","raw_preview":"今天来录一个用 Claude Code 制作微信小程序的视频。这个小程序其实我好几年前就想做了，因为我们会有实地调研，但是有一个问题，就是想把它做成一个面板数据，每一年追踪一直有困难。所以这次我是借助 Claude Code 帮团队制作一个可以用于调研时候录入信息、之后能够方便反复进行问卷追踪的一个小程序。\n\n所以这边已经把 prompt 输入到 Claude Code 当中，然后后面这个页面是微","knowledge_map":"Claude Code 做微信小程序\n├── 背景需求\n│   ├── 实地调研场景\n│   ├── 面板数据追踪（多年重复问卷）\n│   └── 目标：录入信息 + 问卷追踪\n│\n├── 环境准备\n│   ├── 新建空文件夹（专门放小程序文件）\n│   ├── 微信开发者工具（模拟器 + 真机预览）\n│   └── 给 Claude Code 文件读写权限\n│\n├── 工作流程\n│   ├── Step 1：输入 prompt，描述需求\n│   ├── Step 2：Claude Code 生成方案，人工确认\n│   ├── Step 3：Terminal 中自动写代码，模拟器实时预览\n│   ├── Step 4：发现问题 → 补充需求 → 再次修改（迭代2-3轮）\n│   └── Step 5：真机测试，验证可用\n│\n└── 关键结果\n    ├── 小程序模块：注册 / 继续填写问卷\n    └── 从模板雏形 → 真机可运行，约1小时完成","concepts":"#### 概念一：Claude Code\n\n**是什么**：Anthropic 出品的 AI 编程助手，可以在 Terminal（命令行）中直接读写本地文件、生成和修改代码。\n\n**为什么重要**：不只是\"给你看代码片段\"，而是直接操作文件系统，相当于一个会写代码的协作者在你的项目文件夹里干活。\n\n**详细解释**：\n- 需要提前指定工作目录（本视频中是一个新建的空文件夹）\n- 需要授予文件修改权限才能自动写入\n- 工作过程在 Terminal 界面可见，透明可追踪\n\n**实际应用场景**：从零新建项目、批量修改已有代码文件、配合其他开发工具（如微信开发者工具）联动使用。\n\n---\n\n#### 概念二：先出方案再执行的工作模式\n\n**是什么**：Claude Code 在动手写代码之前，会先输出一份执行方案，等用户确认后再开始。\n\n**为什么重要**：给用户一个\"检查点\"，避免 AI 跑偏方向后大量返工，降低试错成本。\n\n**详细解释**：\n- 用户输入 prompt → Claude Code 理解需求并列出方案\n- 用户审阅方案，觉得没问题后\"同意\"\n- Claude Code 开始在 Terminal 中逐步写代码\n\n**实际应用场景**：需求复杂或文件较多时，这个确认步骤尤其重要，可以在方案阶段就纠正理解偏差。\n\n---\n\n#### 概念三：人机多轮迭代\n\n**是什么**：AI 生成第一版后，用户发现问题，追加新需求，AI 再修改，如此循环直到满意。\n\n**为什么重要**：一次 prompt 很难把所有细节说清楚，多轮对话是实际落地的常态，不是失败。\n\n**详细解释**：\n\n| 轮次 | 发生了什么 |\n|------|------------|\n| 第1轮 | Claude Code 生成基础页面，出现图标显示为代码字符的问题 |\n| 第2-3轮 | 用户补充需求，Claude Code 修复问题，错误逐渐减少 |\n| 最终 | 模拟器稳定运行，进入真机测试 |\n\n**实际应用场景**：任何 AI 辅助开发项目，都建议预留\"迭代时间\"，不要期望一次生成完美结果。\n\n---\n\n#### 概念四：双屏联动开发体验\n\n**是什么**：左侧 Terminal 看 Claude Code 写代码的过程，右侧微信开发者工具模拟器实时反映代码变化效果。\n\n**为什么重要**：所见即所得，不需要手动刷新或切换，大幅降低调试的心理负担，也方便及时发现视觉问题。\n\n**详细解释**：\n- Terminal（左）：展示 Claude Code 的操作日志和代码输出\n- 微信开发者工具模拟器（右）：代码文件一变动，界面立刻更新\n- 最后一步：真机预览，在手机上验证实际运行效果\n\n**实际应用场景**：适合边看边调的开发习惯，尤其对非专业开发者友好，可以直观判断效果对不对。","table":"| 维度 | 详情 |\n|------|------|\n| 使用工具 | Claude Code + 微信开发者工具 |\n| 项目类型 | 微信小程序（问卷调研） |\n| 核心功能模块 | 用户注册 / 继续填写问卷 |\n| 操作起点 | 空文件夹 + 一段 prompt |\n| 迭代轮数 | 约 2-3 轮 |\n| 完成时长 | 约 1 小时 |\n| 验证方式 | 模拟器预览 → 真机测试 |\n| 适用场景 | 学术调研、面板数据追踪、重复问卷填写 |\n| 关键前提 | 给 Claude Code 指定目录 + 文件读写权限 |","thinking":"1. **prompt 质量决定上限**：视频中一开始的 prompt 内容没有展示细节，如果需求描述不清晰，AI 方案会偏差多少？怎么写一个对 Claude Code 友好的小程序需求 prompt？\n\n2. **多轮迭代的边界在哪里**：本次 2-3 轮就基本完成，但如果功能更复杂（比如加入数据库同步、多用户权限管理），迭代成本会怎么变化？Claude Code 在哪类问题上容易卡住？\n\n3. **AI 生成的代码可维护性如何**：小程序跑起来了，但后续如果需要改需求、加功能，AI 生成的代码结构是否便于人工介入？团队协作时应该怎么管理这类\"AI 写的项目\"？","remember":"不会写代码也没关系——用 Claude Code，把需求说清楚，1小时能让一个真实可用的微信小程序跑在你手机上。","is_new":true},{"id":"7619905124168840818","title":"用 Claude Code 零基础开发微信小程序","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7619905124168840818","audience":"想用 AI 工具实现自己产品想法、但没有编程基础的普通人","summary":"一个从未写过代码的父亲，用 Claude Code 在不到 4 小时内独立开发并上线了微信小程序，证明 AI 时代\"会提问\"比\"会编程\"更关键。","raw_preview":"四小时从零开发微信小程序，我用 AI 突破能力边界。把我自己作为用户加产品经理加开发加测试的角色，先做好环境准备，按照上面一步步来做就行。就这样，一个不会编程的父亲，用 Claude Code 在四小时内完成了一款习惯养成打卡小程序的全部开发。而我过去 20 年从未写过代码，但今天我的小程序已经上线，孩子每天的英语阅读、数学练习、运动打卡都记录在这款习惯养成打卡小程序里。\n\n三小时五十八分钟完成了","knowledge_map":"用 Claude Code 零基础开发微信小程序\n│\n├── 1. 角色设定（一人承担全部职能）\n│   ├── 用户（提需求）\n│   ├── 产品经理（拆解需求）\n│   ├── 开发（执行实现）\n│   └── 测试（验证结果）\n│\n├── 2. 技术选型（零成本方案）\n│   ├── 前端：微信小程序原生（WXML + WXSS + JS）\n│   ├── 后端：微信云开发（数据库 + 云函数）\n│   └── 无需：服务器 / 运维 / 腾讯云采购\n│\n├── 3. Claude Code 承担的工作\n│   ├── 需求拆解\n│   ├── 页面结构设计\n│   ├── 数据库 Schema 设计\n│   ├── 业务逻辑代码生成\n│   └── Bug 修复\n│\n├── 4. 人类唯一需要做的事\n│   └── 说出具体的需求（会提问）\n│\n└── 5. 核心认知升级\n    ├── 旧路径：学前端 → 学后端 → 学数据库 → 找设计师（1个月+）\n    └── 新路径：想清楚需求 → 用 AI 实现（4小时）","concepts":"#### 概念一：Claude Code\n\n**是什么**：Anthropic 推出的 AI 编程助手，能够理解自然语言需求并生成可运行的代码。\n\n**为什么重要**：它把\"写代码\"这件事从专业门槛变成了沟通门槛，非程序员只要能描述清楚需求，就能得到可用的代码。\n\n**详细解释**：在本视频的实践中，Claude Code 承担了原本需要专业工程师才能完成的多项工作——\n\n| Claude Code 负责的事 | 传统方式需要的人 |\n|---|---|\n| 需求拆解 | 产品经理 |\n| 页面结构设计 | 前端工程师 |\n| 数据库 Schema 设计 | 后端工程师 |\n| 业务逻辑代码生成 | 全栈工程师 |\n| Bug 修复 | 测试 + 开发 |\n\n**实际应用场景**：本视频中用于开发一款儿童习惯养成打卡小程序，记录英语阅读、数学练习、运动打卡等每日任务。\n\n---\n\n#### 概念二：微信云开发（零服务器方案）\n\n**是什么**：微信官方提供的后端一体化服务，包含数据库、云函数、文件存储，无需自己购买和维护服务器。\n\n**为什么重要**：对于个人开发者来说，省去了服务器采购、运维、域名备案等一系列门槛和费用，可以专注在产品本身。\n\n**详细解释**：\n\n| 组件 | 作用 | 传统替代方案 |\n|---|---|---|\n| 云数据库 | 存储用户打卡数据 | MySQL / MongoDB + 服务器 |\n| 云函数 | 处理业务逻辑 | Node.js / Python 后端服务 |\n| 微信小程序原生前端 | 页面展示与交互 | React / Vue + 打包部署 |\n\n**实际应用场景**：视频作者用这套方案实现了完整的数据存储和业务逻辑，全程没有购买任何云服务器。\n\n---\n\n#### 概念三：一人多角色的产品开发模式\n\n**是什么**：个人开发者同时扮演用户、产品经理、开发者、测试四个角色，用 AI 补齐技术执行能力。\n\n**为什么重要**：这是 AI 时代个人开发者能够独立交付完整产品的核心工作方式，打破了\"做产品必须组团队\"的惯性认知。\n\n**详细解释**：\n\n| 角色 | 负责的事 | 谁来做 |\n|---|---|---|\n| 用户 | 定义真实需求和使用场景 | 自己 |\n| 产品经理 | 把需求拆解成可执行的任务 | 自己 |\n| 开发 | 写代码、实现功能 | Claude Code |\n| 测试 | 验证功能是否符合预期 | 自己 |\n\n**实际应用场景**：视频作者以\"父亲想记录孩子每日学习习惯\"为出发点，自己想清楚功能，再交给 Claude Code 实现，全程没有引入其他人。\n\n---\n\n#### 概念四：能力边界的拓展方式变了\n\n**是什么**：过去拓展能力靠\"学会新技能\"，现在拓展能力靠\"学会提出好问题\"。\n\n**为什么重要**：这是视频最核心的认知转变，直接决定了普通人要不要、该怎么用 AI 工具。\n\n**详细解释**：\n\n| 维度 | AI 之前 | AI 之后 |\n|---|---|---|\n| 拓展能力的方式 | 系统学习技术栈 | 学会精准描述需求 |\n| 时间成本 | 一个月起步 | 数小时内出成品 |\n| 门槛 | 编程能力 | 表达和拆解需求的能力 |\n| 限制因素 | \"我不会\" | \"我没想清楚\" |\n\n**实际应用场景**：视频作者过去 20 年从未写过代码，但通过清晰描述需求，在 4 小时内完成了一款真实上线的产品。","table":"| 维度 | 具体内容 |\n|---|---|\n| 完成时间 | 3 小时 58 分钟 |\n| 产品类型 | 微信小程序（儿童习惯养成打卡） |\n| 核心功能 | 英语阅读 / 数学练习 / 运动打卡记录 |\n| 前端技术 | 微信小程序原生（WXML + WXSS + JS） |\n| 后端方案 | 微信云开发（数据库 + 云函数） |\n| AI 工具 | Claude Code |\n| 服务器费用 | 无（零采购） |\n| 开发者背景 | 20 年从未写过代码的非技术人员 |\n| 人类唯一的工作 | 说出具体的需求 |\n| AI 承担的工作 | 需求拆解、页面设计、数据库设计、代码生成、Bug 修复 |","thinking":"1. **需求描述的质量决定结果的质量**：视频中强调\"说出具体的需求\"是人类唯一的工作，那么什么样的需求描述是\"具体的\"？如何训练自己把模糊的想法转化成 Claude Code 能高效执行的指令？\n\n2. **这套方案的边界在哪里**：4 小时完成的是一款相对简单的打卡工具，如果产品复杂度提升——比如涉及支付、社交、多用户权限——Claude Code 的辅助效果会如何变化？个人开发者的能力天花板在哪里？\n\n3. **\"会提问\"本身是一种可习得的技能吗**：视频说\"不会和能做成之间只隔着一个会提问的人\"，但会提问是否也需要一定的领域知识做底子？完全零基础的人，第一步应该怎么建立这种提问能力？","remember":"AI 时代，能力边界不再由\"你会什么\"决定，而是由\"你能不能把需求说清楚\"决定。","is_new":true},{"id":"7621826794995453230","title":"用AI Agent打造内容创作工作流","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7621826794995453230","audience":"有内容创作需求、被信息过载和注意力分散困扰、想用AI提升工作效率的创作者","summary":"通过给微信 AI agent 配置\"深度研究\"\"每日新闻推送\"\"脚本写作\"三个 skills，可以系统性地解决内容创作者信息过载、注意力涣散、选题拖延三大痛点。","raw_preview":"早上我花了大概五分钟扫了 Starchild 的二维码，马上在微信上多了一个新朋友——我的 Starchild AI agent。我用它搭了三个 skills，现在整个工作流都升级了。\n\n我理解 skills 的方式是这样的：想象你雇了一个保姆，第一天她肯定会犯错，不知道该做什么。但想象第一百天，经过一百天和你一起工作，她已经掌握了一项技能——她知道你的东西放在哪里，知道你的日程安排。这些积累下来","knowledge_map":"用 AI Agent Skills 升级内容创作工作流\n│\n├── 核心概念：什么是 Skills\n│   └── 类比：保姆第100天 vs 第1天\n│       └── Skills = AI agent 积累的、可复用的专项能力\n│\n├── Skill 1：深度研究（Deep Research）\n│   ├── 触发方式：发现感兴趣的话题 → 发给 Starchild\n│   ├── 效果：2小时阅读 → 5分钟对话\n│   └── 解决痛点：信息获取耗时长\n│\n├── Skill 2：每日新闻推送（Daily News Briefing）\n│   ├── 触发方式：每天早上7点自动推送\n│   ├── 渠道：微信消息\n│   ├── 效果：3分钟读完 AI 领域重要新闻\n│   └── 解决痛点：刷社交媒体导致注意力分散 / 信息焦虑\n│\n└── Skill 3：脚本写作（Script Writing）\n    ├── 触发方式：由 Starchild 从新闻中辅助决定选题\n    ├── 效果：5分钟定选题 + 生成初稿 → 进入写作模式\n    └── 解决痛点：ADHD / 选题拖延 / 启动困难","concepts":"#### 概念一：Skills（AI Agent 的专项技能）\n\n**是什么**：Skills 是给 AI agent 配置的、针对特定任务的专项能力，让它能以固定方式、持续稳定地完成某类工作。\n\n**为什么重要**：\n普通的 AI 对话是一次性的，每次都要重新描述需求。而 Skills 让 AI agent 像一个熟悉你习惯的助手，不需要反复解释，直接上手执行。\n\n**详细解释**：\n视频用\"保姆\"做了一个很直观的类比：\n\n| 阶段 | 状态 | 对应 AI |\n|------|------|---------|\n| 第 1 天 | 不熟悉环境，容易出错，需要手把手指导 | 刚开始用的通用 AI，每次都要重新提示 |\n| 第 100 天 | 知道东西放哪、了解你的日程、主动完成任务 | 配置好 Skills 的 AI agent，稳定输出 |\n\n**实际应用场景**：\n- 看到一个新话题 → 直接丢给 Starchild → 5分钟拿到深度研究结果\n- 每天早上不用打开任何 App → 微信直接收到新闻摘要\n\n---\n\n#### 概念二：深度研究 Skill（Deep Research）\n\n**是什么**：针对某个具体话题，让 AI agent 自动收集、整理、总结相关信息，输出结构化的研究结果。\n\n**为什么重要**：\n内容创作者需要大量输入，但深度阅读非常耗时。深度研究 Skill 把\"信息收集\"这个环节从2小时压缩到5分钟。\n\n**详细解释**：\n- 触发方式：发现感兴趣的话题（如马斯克的 AI 芯片项目 TerraFat）\n- 操作：告诉 Starchild 这个话题，让它做 deep research\n- 输出：系统整理好的核心信息，不需要自己去四处搜索\n\n**实际应用场景**：\n看到热点新闻 → 发给 AI agent → 对话5分钟 → 拿到可以直接用于创作的研究素材\n\n---\n\n#### 概念三：每日新闻推送 Skill（Daily News Briefing）\n\n**是什么**：设定 AI agent 每天固定时间，主动推送某个领域的重要新闻摘要到指定渠道（视频中是微信）。\n\n**为什么重要**：\n刷社交媒体找信息有两个问题：一是容易被算法带偏、注意力分散；二是会产生信息焦虑。主动推送把\"被动刷\"变成\"主动接收\"，保护注意力和精力。\n\n**详细解释**：\n\n| 对比项 | 刷社交媒体 | 每日新闻推送 Skill |\n|--------|-----------|-------------------|\n| 时间消耗 | 不可控，容易超时 | 固定3分钟 |\n| 注意力 | 容易被无关内容分散 | 只看筛选后的重要内容 |\n| 信息质量 | 算法推荐，良莠不齐 | AI 按需求筛选 |\n| 触发方式 | 主动打开 App | 每天7点自动推送到微信 |\n\n**实际应用场景**：\n早上7点收到微信消息 → 3分钟读完 AI 领域重要新闻 → 发现有价值选题 → 触发深度研究 Skill 进一步挖掘\n\n---\n\n#### 概念四：脚本写作 Skill（Script Writing）\n\n**是什么**：让 AI agent 辅助完成从选题决策到生成脚本初稿的全流程，帮助创作者快速进入写作状态。\n\n**为什么重要**：\n对于有拖延或注意力问题（如 ADHD）的创作者来说，\"启动\"是最难的一步。在多个选题之间犹豫会消耗大量时间和精力。脚本写作 Skill 把决策和启动这两个卡点都交给 AI 处理。\n\n**详细解释**：\n- 痛点：面对10个选题，可能犹豫好几个小时\n- 解法：让 Starchild 在5分钟内帮助决定选题，并生成脚本初稿\n- 关键机制：初稿不需要完美，它的作用是让大脑\"进入写作模式\"，降低启动阻力\n\n**实际应用场景**：\n每日新闻推送中发现3个感兴趣的选题 → 让 Starchild 决定今天做哪个 → Starchild 生成初稿 → 创作者在初稿基础上修改完善","table":"| Skill 名称 | 解决的痛点 | 触发方式 | 时间效益 |\n|-----------|-----------|---------|---------|\n| 深度研究 | 信息收集耗时、需要大量阅读 | 手动发送话题给 Starchild | 2小时 → 5分钟 |\n| 每日新闻推送 | 刷社交媒体分散注意力、信息焦虑 | 每天早上7点自动推送到微信 | 无限刷 → 3分钟 |\n| 脚本写作 | 选题拖延、启动困难（ADHD） | 由 Starchild 辅助决策并生成初稿 | 数小时犹豫 → 5分钟启动 |","thinking":"1. **Skills 的边界在哪里？** 视频中把 Skills 类比为保姆积累的经验，但 AI agent 的\"记忆\"和\"学习\"机制和人类并不相同。你认为一个 AI agent 的 Skill 真正积累的是什么？它和每次重新写 Prompt 有什么本质区别？\n\n2. **主动推送 vs 被动搜索，哪种信息获取方式更适合创作者？** 每日新闻推送帮你过滤了信息，但过滤的标准是你事先设定的。这会不会反而造成另一种\"信息茧房\"，让你错过意料之外的灵感？\n\n3. **让 AI 决定选题，会不会影响内容的独特性？** 视频中提到让 Starchild 在五分钟内帮助决定今天做哪个选题。如果大量创作者都用类似的 AI agent 来做选题决策，内容同质化的问题会更严重还是更轻？","remember":"与其每天被信息流淹没、对着空白文档发呆，不如给你的 AI agent 配好三个 Skills，让它替你完成\"找信息、选选题、破冷启动\"这三件最耗心力的事。","is_new":true},{"id":"7623718787753200930","title":"lesson_7623718787753200930.md","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7623718787753200930","audience":"","summary":"","raw_preview":"","knowledge_map":"","concepts":"","table":"","thinking":"","remember":"","is_new":false},{"id":"7624038825047723315","title":"AI 联网搜索与内容读取工具","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7624038825047723315","audience":"想让 AI 工具具备联网搜索和多平台内容读取能力的开发者或 AI 爱好者","summary":"介绍一个开源宝藏项目，能帮 AI 补齐联网搜索和多平台内容读取能力，且无需手动配置环境、开箱即用。","raw_preview":"这才是真正好用的 Stealth，已经讲过了 14.3K 下。这个项目补齐了 AI 技能的联网搜索和内容读取，短短向 YouTube、推特还有小红书、微博等主流平台信息，他都能更方便地搜索读取。更贴心的是，无需手动配置运行环境，持续上传安装文档就能自动完成全套工具链部署。恭喜你发现了宝藏项目。","knowledge_map":"AI 联网搜索与内容读取工具（Stealth）\n├── 核心能力\n│   ├── 联网搜索\n│   └── 内容读取\n│       ├── YouTube\n│       ├── 推特（Twitter）\n│       ├── 小红书\n│       └── 微博\n├── 核心优势\n│   ├── 无需手动配置运行环境\n│   └── 自动完成全套工具链部署\n└── 使用方式\n    └── 上传安装文档即可自动部署","concepts":"#### 概念一：AI 联网搜索能力补全\n\n**是什么**：通过该项目为 AI 工具补充原本不具备或不完善的实时联网搜索功能。\n\n**为什么重要**：\n许多 AI 工具本身的知识存在时效截止点，无法获取最新信息，联网搜索能力可以弥补这一短板。\n\n**详细解释**：\n该项目专门针对\"AI 技能缺口\"设计，让 AI 能够主动检索互联网上的实时内容，而不仅依赖训练数据。\n\n**实际应用场景**：\n需要查询最新资讯、热点事件或实时数据时，AI 可通过该工具直接联网获取。\n\n---\n\n#### 概念二：多平台内容读取\n\n**是什么**：支持从 YouTube、推特、小红书、微博等主流平台直接读取内容。\n\n**为什么重要**：\n不同平台的内容格式和访问方式各异，统一支持多平台读取大幅降低了使用门槛。\n\n**详细解释**：\n\n| 平台 | 内容类型 |\n|------|----------|\n| YouTube | 视频信息、字幕等 |\n| 推特（Twitter） | 推文、话题内容 |\n| 小红书 | 笔记、评论内容 |\n| 微博 | 博文、热搜内容 |\n\n**实际应用场景**：\n需要分析某平台舆情、整理多平台内容素材时，可直接调用该工具读取。\n\n---\n\n#### 概念三：零配置自动部署\n\n**是什么**：无需手动配置运行环境，只需上传安装文档即可自动完成全套工具链部署。\n\n**为什么重要**：\n传统开发工具往往需要复杂的环境配置，劝退大量非技术用户；零配置部署极大降低了上手难度。\n\n**详细解释**：\n项目内置了自动化部署逻辑，用户只需提供安装文档，系统会自动完成依赖安装、环境初始化等全流程操作。\n\n**实际应用场景**：\n非专业开发者或希望快速上手的用户，可以跳过繁琐配置步骤，直接进入使用状态。","table":"| 维度 | 详情 |\n|------|------|\n| 项目名称 | Stealth |\n| 核心功能 | 联网搜索 + 多平台内容读取 |\n| 支持平台 | YouTube、推特、小红书、微博 |\n| 部署方式 | 上传安装文档，自动完成全套工具链部署 |\n| 是否需要手动配置环境 | ❌ 不需要 |\n| 项目性质 | 开源项目 |\n| 适合人群 | AI 工具用户、开发者、内容研究者 |","thinking":"1. **能力边界在哪里？** 该工具支持读取的平台内容是否存在权限或反爬限制，实际使用中稳定性如何？\n\n2. **与现有 AI 工具如何集成？** Stealth 是作为独立工具使用，还是可以作为插件嵌入 Claude、Cursor 等 AI 开发环境中协同工作？\n\n3. **零配置部署的代价是什么？** 自动部署虽然方便，但在安全性、可定制性上是否有所取舍，适合生产环境使用吗？","remember":"用一个开源项目，让你的 AI 长出\"眼睛\"——能搜网页、能读懂主流平台，还不用自己配环境。","is_new":true},{"id":"7628551183854062900","title":"一句话生成高清架构图的开源工具","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7628551183854062900","audience":"需要频繁绘制系统架构图的开发者、架构师或技术产品经理。","summary":"介绍开源工具 Skills：只需用自然语言描述需求，就能自动生成高清、多风格的专业架构图，彻底告别付费画图软件。","raw_preview":"你是不是还在为专业化架构图感到崩溃？最近神器 Skills 让你一键开挂。每天使用这个强大工具，第8期。\n\n今天分享的是这个开源工具 Skills，一句话就能出高清架构图。比如你说\"画 AWS 的架构图，玻璃态风格\"，它自动识别、自动配色，直接输出高清 SVG 和 PNG 图片。\n\n同时支持14种图类型，多种世界风格，AWS、Azure 的场景全覆盖。通过对话的方式，让脑子里的架构直接变成图。项目","knowledge_map":"Skills 架构图工具\n├── 核心能力\n│   ├── 自然语言输入 → 自动识别意图\n│   ├── 自动配色\n│   └── 输出格式：高清 SVG / PNG\n├── 支持范围\n│   ├── 图类型：14种\n│   ├── 风格：多种（含玻璃态风格等）\n│   └── 云平台场景：AWS、Azure 全覆盖\n├── 交互方式\n│   └── 对话式（自然语言驱动）\n└── 项目属性\n    └── 完全开源，免费使用","concepts":"#### 概念一：自然语言驱动的架构图生成\n\n**是什么**：用一句话描述你想要的架构图，工具自动理解并生成对应图形，无需手动拖拽或编写代码。\n\n**为什么重要**：\n传统画架构图需要熟悉专业工具（如 Visio、Lucidchart），耗时且有学习成本；自然语言输入大幅降低使用门槛。\n\n**详细解释**：\n- 输入示例：`\"画 AWS 的架构图，玻璃态风格\"`\n- 工具自动完成：意图识别 → 组件选取 → 配色 → 图形渲染\n- 输出：可直接使用的高清图片\n\n**实际应用场景**：\n开发者在写技术方案时，用一句话快速生成系统架构图，插入文档或 PPT。\n\n---\n\n#### 概念二：多图类型与多风格支持\n\n**是什么**：Skills 支持14种图类型和多种视觉风格，满足不同场景的表达需求。\n\n**为什么重要**：\n不同的汇报对象和场景对图的要求不同，多类型支持让一个工具覆盖大多数需求。\n\n**详细解释**：\n\n| 维度 | 内容 |\n|------|------|\n| 图类型数量 | 14种 |\n| 风格举例 | 玻璃态风格等多种 |\n| 云平台覆盖 | AWS、Azure 等主流平台场景 |\n\n**实际应用场景**：\n架构师向业务方汇报时选择美观的玻璃态风格；向技术团队输出时选择标准工程图风格。\n\n---\n\n#### 概念三：开源免费\n\n**是什么**：Skills 项目代码完全开源，用户无需付费即可使用全部功能。\n\n**为什么重要**：\n市面上主流架构图工具（如 Lucidchart、draw.io 高级版）均有付费门槛，开源意味着零成本且可自行部署。\n\n**详细解释**：\n- 项目全部开源，可在平台自行查阅源码\n- 无订阅费、无导出限制\n- 支持社区贡献和二次开发\n\n**实际应用场景**：\n个人开发者或小团队在预算有限的情况下，获得专业级架构图能力。","table":"| 对比维度 | Skills（本视频工具） | 传统画图工具 |\n|----------|----------------------|--------------|\n| 输入方式 | 自然语言一句话 | 手动拖拽/编码 |\n| 学习成本 | 低 | 中～高 |\n| 图类型数量 | 14种 | 视工具而定 |\n| 输出格式 | SVG、PNG（高清） | 视工具而定 |\n| 云平台支持 | AWS、Azure 等全覆盖 | 部分支持 |\n| 费用 | 完全免费（开源） | 多数需付费 |\n| 风格选择 | 多种（含玻璃态） | 有限 |","thinking":"1. **自然语言描述的精确度问题**：当架构比较复杂时，一句话描述是否足够准确？如何通过多轮对话逐步细化架构图？\n\n2. **14种图类型能覆盖哪些场景**：除了云架构图，Skills 还支持哪些类型（如流程图、时序图、ER图）？这些类型能否满足非云原生项目的需求？\n\n3. **开源工具的可持续性**：开源免费工具依赖社区维护，如果项目停止更新，使用者应如何评估和应对这类风险？","remember":"用说话代替画图——Skills 让你把脑子里的架构，一句话变成专业高清图，还完全免费。","is_new":true},{"id":"7630113019703989937","title":"用 AI 自动追踪顶尖 AI 大佬动态","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7630113019703989937","audience":"想高效获取 AI 前沿资讯、又不想被信息焦虑淹没的 AI 学习者和从业者","summary":"用 Claude 配合\"Follow Builders\"这个 SKU，每天自动追踪 25 位顶尖 AI 一线人士的推特动态并生成摘要报告，用几分钟替代漫无目的地刷信息，从根源上解决 AI 信息焦虑。","raw_preview":"别再浪费大量的时间刷 AI 新闻了！一个 SKU 让 AI 每天自动帮你盯全球最顶尖的 25 个 AI 大佬，核心观点全部整理好了，你只看这一份就够了。\n\n这个 SKU 叫做 Follow Builders，是张杂拉写的。装上之后，你的 Claude 每天或者说每周会自动去推特上追踪这 25 位顶尖的 AI 大佬，去跟踪他们的动态、观点的动向，还有包括全部的观点都会给你提炼出来。\n\n这 25 个人","knowledge_map":"对抗 AI 信息焦虑\n├── 问题：信息太多，焦虑刷不完\n│   └── 常见误区：看得更多 ≠ 掌握得更好\n│\n├── 解决方案：让 AI 帮你过滤信息\n│   ├── 工具：Claude\n│   └── SKU：Follow Builders（作者：张杂拉）\n│\n├── SKU 的核心机制\n│   ├── 数据源：推特（Twitter/X）\n│   ├── 追踪对象：25 位顶尖 AI 大佬\n│   │   └── 特征：一线做产品/写代码，非二手翻译\n│   └── 输出：动态 + 观点 + 趋势 提炼报告\n│\n└── 推荐使用方式\n    ├── 频率：每天早上 8 点自动运行\n    ├── 产出：一份当日 AI 动态报告\n    └── 效果：几分钟看完，剩余时间自由支配","concepts":"#### 概念一：SKU（AI 工具的任务配置包）\n\n**是什么**：这里的 SKU 指的是可以安装到 Claude 中的预设任务模板，类似一个\"插件配方\"，装上后 Claude 就知道要做什么、怎么做。\n\n**为什么重要**：\n不需要自己从零写提示词或配置自动化流程，直接复用别人打磨好的方案，降低使用门槛。\n\n**详细解释**：\n视频中提到的 SKU 名为 **Follow Builders**，由创作者\"张杂拉\"编写。它的作用是让 Claude 定期去推特抓取指定 AI 大佬的动态，并整理成可读报告。\n\n**实际应用场景**：\n安装 Follow Builders 后，Claude 会按设定频率（每天/每周）自动执行信息采集和整理任务，无需用户手动触发。\n\n---\n\n#### 概念二：Follow Builders 的信息源选择逻辑\n\n**是什么**：Follow Builders 预设追踪的是 25 位在一线做产品、写代码的 AI 从业者，而非媒体账号或评论者。\n\n**为什么重要**：\n信息质量取决于来源。一线从业者发布的是第一手判断和实践经验，比二手翻译、媒体转述的信息更准确、更有参考价值。\n\n**详细解释**：\n\n| 信息类型 | 来源 | 特点 |\n|---|---|---|\n| 一手信息 | 一线 AI 大佬（产品/代码） | 直接、准确、有实践依据 |\n| 二手信息 | 媒体、翻译账号、博主转述 | 可能失真、滞后、加入主观解读 |\n\nFollow Builders 选择的是前者，确保你看到的是\"原矿\"而非\"加工品\"。\n\n**实际应用场景**：\n当某个 AI 模型发布或某项技术出现争议时，直接看一线工程师和产品人的第一反应，比等媒体报道更快、更准。\n\n---\n\n#### 概念三：定时自动化执行（Agent 式使用）\n\n**是什么**：让 Claude 在固定时间（如每天早上 8 点）自动运行任务，无需人工每次触发，体现了 AI Agent 的自主执行能力。\n\n**为什么重要**：\n把重复性的信息收集工作完全交给 AI，人只需在固定时间消费输出结果，大幅降低认知负担和时间成本。\n\n**详细解释**：\n- **触发方式**：定时（每天 8 点）\n- **执行内容**：抓取 25 位大佬推特动态 → 提炼核心观点 → 生成报告\n- **消费方式**：用户花几分钟阅读报告即可\n\n**实际应用场景**：\n博主自己的用法——早上 8 点报告已经准备好，看完继续做自己的事，不再需要零散地刷各种平台。","table":"| 维度 | 详情 |\n|---|---|\n| 工具名称 | Follow Builders（SKU） |\n| 作者 | 张杂拉 |\n| 运行平台 | Claude |\n| 数据来源 | 推特（Twitter/X） |\n| 追踪人数 | 25 位顶尖 AI 大佬 |\n| 人选标准 | 一线做产品/写代码，非二手翻译 |\n| 推荐运行频率 | 每天早上 8 点自动执行 |\n| 时间成本 | 每次只需几分钟阅读报告 |\n| 核心价值 | 用 AI 过滤信息，替代漫无目的刷内容 |","thinking":"1. **信息筛选的标准是什么？** Follow Builders 选出了 25 位\"一线\"大佬，但\"一线\"本身就是一种主观判断——谁来决定这 25 个人？这个名单本身会不会带来另一种信息茧房？\n\n2. **自动化 Agent 的边界在哪里？** 让 AI 每天自动跑任务、生成报告，用户只看结论——这种模式在提升效率的同时，是否也在削弱用户自己对信息的独立判断能力？\n\n3. **这套方法能迁移到其他领域吗？** 同样的逻辑——找到某个领域最顶尖的一线人士 → 让 AI 自动追踪并提炼——是否可以复制到投资、科研、设计等其他行业？需要解决哪些不同的问题？","remember":"对抗信息焦虑，不是看得更多，而是让 AI 替你只看最重要的——Follow Builders 就是把这件事自动化的那把钥匙。","is_new":true},{"id":"7630139794256858411","title":"用 Skill 自动生成文章封面与插图","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7630139794256858411","audience":"适合小红书、公众号等平台的内容创作者，希望用 AI 工具提升图文生产效率的人。","summary":"介绍一个在 GitHub 上获得 14K Star 的 Skills 工具，能自动为文章生成封面图和插图，帮助内容创作者搭建一套完整的图文生产流水线，大幅提升创作效率。","raw_preview":"这个 Skills 它可以帮你的文章生成封面图、信息图、文章插图，在 GitHub 上已经收获 14K 星。这个 Skills 对小红书的创作者还是蛮好用的，无论是风格、布局、还是密度都可以指定。支持的风格类型还是挺丰富的。整合文章插图技巧，给你单独搭好了一整套的生产线，真的大大提高你的工作效率。","knowledge_map":"文章配图 AI Skills 工具\n├── 功能覆盖\n│   ├── 封面图生成\n│   ├── 信息图生成\n│   └── 文章插图生成\n├── 可定制维度\n│   ├── 风格\n│   ├── 布局\n│   └── 密度\n├── 适用场景\n│   └── 小红书等图文内容平台\n└── 核心价值\n    ├── 整合插图技巧\n    ├── 搭建完整生产线\n    └── 大幅提升工作效率","concepts":"#### 概念一：文章配图 Skills\n\n**是什么**：一个专门用于为文章自动生成配图的 AI 技能工具，已在 GitHub 上获得 14K Star。\n\n**为什么重要**：\n内容创作中，配图质量直接影响阅读体验和传播效果，但手动制图耗时耗力。这个 Skills 把配图环节自动化，降低了创作门槛。\n\n**详细解释**：\n\n| 支持的图片类型 | 说明 |\n|---|---|\n| 封面图 | 文章/帖子的主视觉图 |\n| 信息图 | 用于呈现数据或知识点的图表类配图 |\n| 文章插图 | 穿插在正文中的辅助说明图 |\n\n**实际应用场景**：\n小红书创作者写完一篇笔记后，直接调用该 Skills，自动生成风格统一的封面和插图，无需额外设计软件。\n\n---\n\n#### 概念二：可定制的风格、布局与密度\n\n**是什么**：该 Skills 支持用户在生成图片时，自定义三个关键参数——风格、布局和密度。\n\n**为什么重要**：\n不同平台、不同内容类型对配图的要求差异很大。可定制参数意味着工具的适用范围更广，生成结果更贴合实际需求。\n\n**详细解释**：\n\n| 可定制维度 | 含义 |\n|---|---|\n| 风格（Style） | 图片的视觉风格，如卡通、扁平、插画等，类型丰富 |\n| 布局（Layout） | 图片内元素的排列方式和构图结构 |\n| 密度（Density） | 图片中信息量或视觉元素的疏密程度 |\n\n**实际应用场景**：\n做知识类内容时选择信息密度高的布局；做生活类内容时选择卡通风格、低密度的轻松插图。\n\n---\n\n#### 概念三：一体化图文生产线\n\n**是什么**：该 Skills 将文章插图的各类技巧整合在一起，为创作者搭建了一套从文章到配图的完整生产流程。\n\n**为什么重要**：\n过去创作者需要分别处理写作、找图、设计等环节，流程割裂、效率低。一体化生产线让这些步骤连贯起来，真正实现提效。\n\n**详细解释**：\n- 输入：文章内容\n- 处理：Skills 自动理解内容，匹配合适的图片类型与风格\n- 输出：封面图 + 插图，可直接用于发布\n\n**实际应用场景**：\n内容创作者完成文字后，一键触发 Skills，批量获得配套图片，整个发布流程时间大幅缩短。","table":"| 维度 | 内容 |\n|---|---|\n| 工具类型 | AI 配图 Skills |\n| GitHub Star 数 | 14K |\n| 支持图片类型 | 封面图、信息图、文章插图 |\n| 可定制参数 | 风格、布局、密度 |\n| 风格类型丰富度 | 丰富（视频中明确提及） |\n| 主要适用平台 | 小红书等图文内容平台 |\n| 核心价值 | 搭建完整生产线，大幅提升工作效率 |","thinking":"1. **定制参数的边界在哪里？** 风格、布局、密度这三个维度能覆盖所有创作场景吗？哪些细分需求可能还无法被满足？\n\n2. **14K Star 意味着什么？** GitHub Star 数能代表工具的实际可用性吗？在选择 AI 工具时，除了 Star 数，还应该参考哪些指标？\n\n3. **一体化生产线的代价是什么？** 当配图生成高度自动化后，创作者的视觉审美和设计能力是否会因此退化？效率与能力培养之间如何平衡？","remember":"这个 14K Star 的 Skills 工具，让你写完文章就能自动生成封面和插图，风格、布局、密度全都能定制，小红书创作者的配图效率直接拉满。","is_new":true},{"id":"7630297497495194880","title":"lesson_7630297497495194880.md","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7630297497495194880","audience":"","summary":"","raw_preview":"","knowledge_map":"","concepts":"","table":"","thinking":"","remember":"","is_new":false},{"id":"7630710539378806042","title":"用 Claude Code 搭建 AI 游戏公司","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7630710539378806042","audience":"对独立游戏开发感兴趣、希望用 AI 工具提效的开发者或创业者","summary":"Claude Code Game Studios 是一个开源项目，用 49 个 AI 角色模拟完整游戏公司架构，让一个人通过 72 条斜杠指令就能指挥\"全公司\"从立项做到上线。","raw_preview":"今天给大家介绍一个炸裂的 GitHub 热门项目——Claude Code Game Studios，昨天登上 GitHub Trending 趋势榜第一名。\n\n一句话说清楚：把 Claude Code 变成一整个游戏公司。\n\n它给你配了 49 个 AI 员工，按照游戏公司的组织架构搭起来。最顶上三个总监，定方向、创意、技术、制作；中间 10 个部门主管，管各自领域，射击、程序、美术、音频，全有；","knowledge_map":"Claude Code Game Studios\n├── 核心定位\n│   └── 用 Claude Code 模拟一整个游戏公司\n├── 组织架构（49 个 AI 员工）\n│   ├── 顶层：3 个总监\n│   │   ├── 创意总监\n│   │   ├── 技术总监\n│   │   └── 制作总监\n│   ├── 中层：10 个部门主管\n│   │   ├── 射击/玩法设计\n│   │   ├── 程序\n│   │   ├── 美术\n│   │   └── 音频（等共 10 个）\n│   └── 基层：30+ 一线员工\n│       ├── 关卡设计师\n│       ├── 音效师\n│       └── 其他执行岗位\n├── 操作方式\n│   └── 72 个斜杠指令\n│       ├── 覆盖立项 → 上线全流程\n│       └── 输入指令 → 对应团队自动响应\n└── 引擎支持\n    ├── Unity\n    └── 虚幻引擎（Unreal Engine）","concepts":"#### 概念一：AI 员工组织架构\n\n**是什么**：项目预设了 49 个具有不同职能的 AI 角色，按照真实游戏公司的层级结构排列，分为总监、部门主管、一线员工三层。\n\n**为什么重要**：\n不同的游戏开发任务需要不同的\"专家\"来处理，层级结构让任务分工更清晰，避免一个通用 AI 什么都做、什么都做不精的问题。\n\n**详细解释**：\n\n| 层级 | 人数 | 职责 |\n|------|------|------|\n| 总监层 | 3 人 | 把控方向：创意、技术、制作 |\n| 主管层 | 10 人 | 管理各专业领域（玩法、程序、美术、音频等） |\n| 执行层 | 30+ 人 | 具体落地执行（关卡设计、音效调音等） |\n\n**实际应用场景**：\n需要设计一个关卡时，不是随便问 AI，而是\"找\"关卡设计师这个角色，它会以专业视角给出符合游戏设计规范的方案。\n\n---\n\n#### 概念二：斜杠指令系统（72 个指令）\n\n**是什么**：用户通过输入特定的斜杠命令（如 `/design-level`）来触发对应 AI 团队的工作流，覆盖游戏开发从立项到上线的每一个环节。\n\n**为什么重要**：\n指令系统把\"和 AI 对话\"变成了\"向团队下达任务\"，降低了使用门槛——用户不需要知道怎么写提示词，只需要知道自己现在处于哪个开发阶段、需要推进哪件事。\n\n**详细解释**：\n- 72 个指令对应开发全流程的不同节点\n- 输入指令后，对应的 AI 角色（团队）自动响应并开始工作\n- 支持 Unity 和虚幻引擎两大主流游戏引擎的相关指令\n\n**实际应用场景**：\n独立开发者在完成原型后，打一条指令启动\"音频团队\"，AI 自动给出音效设计方案和调音建议，无需自己从零写提示词。\n\n---\n\n#### 概念三：独立开发者的角色转变\n\n**是什么**：这个项目把独立游戏开发者从\"单枪匹马的执行者\"变成\"开会、派活、把关的老板\"。\n\n**为什么重要**：\n传统独立开发最大的瓶颈不是想法，而是一个人要身兼数职——写代码、做美术、设计关卡、调音效。这个项目用 AI 员工填补了人力空缺，让开发者可以专注于决策和把关。\n\n**详细解释**：\n\n| 对比维度 | 传统独立开发 | 使用本项目后 |\n|----------|-------------|-------------|\n| 角色定位 | 执行者（什么都自己做） | 决策者（开会、派活、把关） |\n| 瓶颈来源 | 灵感枯竭 + 技能不全 | 主要是决策质量 |\n| 团队规模 | 1 人 | 1 人 + 49 个 AI 员工 |\n| 开发效率 | 受单人精力限制 | 多个环节可并行推进 |\n\n**实际应用场景**：\n一个程序员背景的独立开发者，以前做不了音效和美术；现在可以用对应的 AI 员工推进这些模块，自己只需审核和拍板。","table":"| 项目维度 | 详情 |\n|----------|------|\n| 项目名称 | Claude Code Game Studios |\n| 项目状态 | 开源，昨日登上 GitHub Trending 第一 |\n| AI 员工总数 | 49 个 |\n| 组织层级 | 3 层（总监 / 主管 / 执行） |\n| 总监数量 | 3 个（创意、技术、制作） |\n| 部门主管数量 | 10 个 |\n| 一线员工数量 | 30+ 个 |\n| 指令总数 | 72 个斜杠指令 |\n| 覆盖范围 | 立项 → 上线全流程 |\n| 支持引擎 | Unity、虚幻引擎（Unreal Engine） |\n| 底层模型 | Claude Code（Anthropic） |","thinking":"1. **架构设计的边界在哪里**：49 个 AI 员工的角色是预设固定的，还是可以自定义扩展？如果要做一个非主流类型的游戏（比如互动叙事或音乐游戏），现有的岗位设置是否够用？\n\n2. **\"老板视角\"的质量瓶颈**：当开发者从执行者变成决策者，最终游戏质量的上限取决于什么——是 AI 员工的能力天花板，还是开发者的审美判断和把关能力？\n\n3. **与传统游戏引擎工作流的整合深度**：项目声称支持 Unity 和虚幻引擎，但 AI 生成的代码、资产和配置能直接无缝导入引擎工程吗？中间还需要多少人工处理？","remember":"49 个 AI 员工、72 条指令，Claude Code Game Studios 让一个人就能当游戏公司老板。","is_new":true},{"id":"7631049617357999386","title":"lesson_7631049617357999386.md","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7631049617357999386","audience":"","summary":"","raw_preview":"","knowledge_map":"","concepts":"","table":"","thinking":"","remember":"","is_new":false},{"id":"7631149970733097158","title":"Claude 官方 PowerPoint 教程完结篇","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7631149970733097158","audience":"需要频繁制作或处理 PPT 的职场人，希望用 AI 工具提升效率","summary":"Claude 的 PowerPoint 插件能帮你完成\"翻资料、对数据、会前读 Deck\"这三件最耗时的苦差事，让你只专注于讲好故事本身。","raw_preview":"Claude 的官方这个月连发了三级 PowerPoint 教程，中文版我整理了一下，三集陆续上线，这是第三集。\n\n做 PPT 最花时间的，其实从来都不是做 PPT 本身，而是翻资料、对数据、会前看一份别人发来的厚厚的 Deck。这集刚好讲怎么把这三件苦差事一起扔给 Claude。点赞收藏再见，不难。\n\n在之前的视频里我们看过怎么用 Claude 从零做一份完整的 PPT，也看过怎么精准编辑，这一","knowledge_map":"Claude × PowerPoint 三大核心用法\n│\n├── 1. 上传参考资料 → 自动生成幻灯片\n│       ├── 支持类型：研究报告 / 数据导出 / 内部分析\n│       └── 场景：多份资料合并成一份汇报\n│\n├── 2. 接入实时数据（Connectors）\n│       ├── 支持平台：Google Drive / Notion / Confluence\n│       ├── 配置一次，Claude.ai 与 PPT 插件共享连接器\n│       └── 能力：从数据源拉数据 → 生成幻灯片 → 写回原工具\n│\n└── 3. 读懂现成 PPT（会前快速审阅）\n        ├── 主动摘要：告诉你整份 PPT 在讲什么\n        ├── 定向检索：回答具体页面的具体问题\n        └── 场景：会前快速消化别人发来的厚 Deck\n\n使用边界\n├── 模板尊重：读取版式/字体/配色，复杂模板需人工核对品牌规范\n└── 数据合规：敏感/受监管内容需遵守组织数据处理规范","concepts":"#### 概念一：上传文件生成幻灯片\n\n**是什么**：在 Claude PowerPoint 插件中点击加号按钮上传文件，Claude 自动提取信息并生成排版好的幻灯片。\n\n**为什么重要**：\n做 PPT 最耗时的环节不是\"做\"本身，而是从大量原始资料里找信息、提炼要点。这一步把这个过程自动化了。\n\n**详细解释**：\n\n| 支持的文件类型 | 典型使用场景 |\n|---|---|\n| 研究报告 | 把行业报告关键结论提炼进汇报 |\n| 数据导出文件 | 把表格数据转化为图表幻灯片 |\n| 内部分析文档 | 把文字分析转成可视化表达 |\n| 已有 PPT（Deck） | 多份资料合并成一份完整汇报 |\n\n**实际应用场景**：\n收到三份不同部门的分析报告，需要合并成一份给董事会的汇报——把三份文件全部上传，让 Claude 整合生成，省去手动翻阅和复制粘贴。\n\n---\n\n#### 概念二：Connectors（连接器）\n\n**是什么**：Claude 与外部平台（Google Drive、Notion、Confluence 等）的集成接口，允许 Claude 直接读取和写入这些平台的内容。\n\n**为什么重要**：\n资料往往分散在不同工具里，Connectors 让 Claude 直接去\"数据在的地方\"取数据，不需要手动导出再上传。\n\n**详细解释**：\n\n- 在 Claude.ai 里配置一次连接器，PowerPoint 插件会自动继承，无需重复设置\n- 工作流是双向的：从数据源拉数据 → 生成幻灯片 → 还能把结果写回原来的工具\n- 支持平台：Google Drive / Notion / Confluence\n\n**实际应用场景**：\nNotion 里有一份项目进展记录，直接让 Claude 读取并生成项目汇报幻灯片，做完后还能把摘要同步回 Notion。\n\n---\n\n#### 概念三：读懂现成 PPT（会前审阅）\n\n**是什么**：把一份已有的 PPT 交给 Claude，Claude 能主动摘要全文内容，也能回答你对具体页面、具体问题的提问。\n\n**为什么重要**：\n会前收到一份几十页的 Deck，从头翻完耗时且容易遗漏关键信息。Claude 可以帮你快速定位你真正关心的内容。\n\n**详细解释**：\n\n| 使用方式 | 示例提问 | Claude 的响应 |\n|---|---|---|\n| 主动摘要 | \"这份 PPT 在讲什么？\" | 提炼全文核心观点 |\n| 定向检索 | \"第七页引用了哪些数据？\" | 精准定位并给出答案 |\n| 风险筛查 | \"这份材料有没有谈到合规风险？\" | 检索相关内容并汇总 |\n\n**实际应用场景**：\n开会前 10 分钟收到对方发来的 40 页提案，直接问 Claude \"这份材料的核心诉求是什么，有没有涉及预算要求\"，快速完成会前准备。\n\n---\n\n#### 概念四：模板尊重与使用边界\n\n**是什么**：Claude 会读取现有 PPT 的版式、字体、配色，并在生成内容时保持风格一致；同时有两条需要人工把关的边界。\n\n**为什么重要**：\nAI 生成内容如果破坏公司品牌规范或触碰数据合规红线，会带来额外的返工成本甚至风险。\n\n**详细解释**：\n\n| 边界类型 | 说明 | 建议操作 |\n|---|---|---|\n| 品牌规范 | 复杂或高度定制的模板，输出效果可能有偏差 | 生成后与品牌规范手动核对 |\n| 数据合规 | 涉及敏感或受监管的内容 | 按所在组织的数据处理规范操作 |\n\n**实际应用场景**：\n用公司严格规范的品牌模板生成客户交付物时，Claude 生成后需要过一遍品牌 checklist，而不是直接发出。","table":"| 功能 | 操作入口 | 核心能力 | 最适合的场景 |\n|---|---|---|---|\n| 上传文件生成 PPT | 点击加号按钮上传 | 提取信息 → 生成排版幻灯片 | 多份资料合并成一份汇报 |\n| Connectors 接入数据 | Claude.ai 设置连接器 | 读取/写入 Drive、Notion、Confluence | 数据分散在多个平台时 |\n| 读懂现成 PPT | 上传已有 PPT 后提问 | 摘要全文 / 定向检索 / 风险筛查 | 会前快速消化厚 Deck |\n| 模板风格保持 | 自动读取现有模板 | 保留版式/字体/配色 | 需要保持品牌一致性时 |","thinking":"1. **Connectors 的双向写入能力意味着什么？** Claude 不只是\"生成内容的工具\"，而是可以嵌入到你原有工作流里的协作节点——这对你现有的工具链会产生什么影响？\n\n2. **\"机械活他来，故事你来讲\"这个分工边界在哪里？** 当 Claude 能自动从资料里提炼信息并排版，人真正需要负责的\"讲好故事\"具体指什么能力？\n\n3. **会前用 Claude 审阅别人的 PPT，会不会改变会议中的权力结构？** 当信息差被 AI 快速抹平，准备充分的一方和没有准备的一方之间的差距会拉大还是缩小？","remember":"做 PPT 最苦的三件事——翻资料、对数据、会前读 Deck——Claude 全包了，你只管讲好那个故事。","is_new":true},{"id":"7632354633612070198","title":"Claude Code 两周深度使用真实感受","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7632354633612070198","audience":"已经开始使用或计划深度使用 Claude Code 的 AI 工具探索者","summary":"深度使用 Claude Code 两周后，作者总结出三个关键认知：保存上下文、让 AI 主导执行、用工具组合激活真正的系统级能力——帮助你从\"问答式使用\"升级到\"协作式驱动\"。","raw_preview":"我最近高强度用了两周 Claude Code，两个 Max 账号都不够用的那种。我现在最大的感受就是它真的特别强，但你没用好就随时会功亏一篑。\n\n我今天不会去讲教程，我想讲三个我现在最真实的感受吧。\n\n**第一个感受就是一定要保存上下文。** 我最崩溃的一次是跟 Claude Code 聊了差不多一两个小时，我跟它聊清楚了任何我关于这个项目的一些想法，我把项目目标、背景资料、好的标准、想要做成什么","knowledge_map":"Claude Code 深度使用的三个真实感受\n│\n├── 感受一：上下文是核心资产\n│   ├── 问题：账号被封 → 一两小时积累的共识全部归零\n│   ├── 本质：AI 失去上下文 = 队友突然失忆\n│   └── 对策：持续保存（进展 / 方案 / 下一步 / 判断标准）\n│\n├── 感受二：人管方向，AI 管执行\n│   ├── 旧模式：人拆步骤 → 逐条指挥 AI\n│   ├── 新模式：人定目标 → AI 反向提问 → AI 自主推进\n│   ├── 核心咒语：\"你可以问我任何问题，\n│   │            直到你觉得你可以把这件事做好为止\"\n│   └── 分工：做什么 = 人的责任 / 怎么做 = Claude 的责任\n│\n└── 感受三：组合能力 > 单点能力\n    ├── 单独使用：聪明的聊天工具\n    ├── 串联工具链（skill + MCP）：执行系统\n    │   ├── 浏览网页 / 查资料\n    │   ├── 读公众号 / 抓信息 / 整理结构\n    │   └── 围绕目标持续推进\n    ├── 类比：英雄联盟出装 → 搭配比数量更重要\n    └── 结论：Claude Code = 依赖上下文 + 任务定义 + 工具组合的执行系统","concepts":"#### 概念一：上下文即资产\n\n**是什么**：在与 Claude Code 协作过程中，双方共同建立的项目背景、目标共识、判断标准和推进状态，统称为\"上下文\"。\n\n**为什么重要**：\n作者亲历账号被封，一两小时积累的所有共识瞬间清零。他的崩溃不是因为丢了账号，而是因为\"所有铺垫好的状态都没了\"——这说明上下文本身就是协作的核心价值所在。\n\n**详细解释**：\n\n| 上下文包含的内容 | 具体示例 |\n|---|---|\n| 项目目标 | 这个功能要解决什么问题 |\n| 背景资料 | 已有代码结构、产品逻辑 |\n| 判断标准 | 什么叫\"做好了\" |\n| 当前方案 | 现在走的是哪条路 |\n| 下一步计划 | 接下来要做什么 |\n\n**实际应用场景**：\n每次会话结束前，让 Claude 输出一份\"当前状态摘要\"，包含以上五项内容，保存到本地文档，下次开新会话时直接粘贴导入。\n\n---\n\n#### 概念二：反向提问法\n\n**是什么**：不是由人来拆解步骤指挥 AI，而是把目标交给 AI，让 AI 主动向人提问，直到它掌握足够信息能独立完成任务。\n\n**为什么重要**：\n当 AI 足够聪明时，人逐条拆步骤反而是在用人脑做 AI 擅长的事。真正稀缺的是人对\"做什么、为什么做、做到什么程度算好\"的判断，而不是执行路径的设计。\n\n**详细解释**：\n\n核心咒语（可直接复制使用）：\n> **\"你可以问我任何问题，直到你觉得你可以把这件事情做好为止。\"**\n\n| 旧模式 | 新模式 |\n|---|---|\n| 人拆步骤 → 逐条给 AI | 人说目标 → AI 反向提问 |\n| AI 是执行工具 | AI 是协作推进者 |\n| 人需要懂\"怎么做\" | 人只需要想清楚\"做什么\" |\n| 容易遗漏关键信息 | AI 主动补全所需信息 |\n\n**实际应用场景**：\n启动一个新任务时，先用一段话描述目标和背景，然后说出这句咒语，让 Claude 开始提问，你只需要回答它的问题，直到它说\"我已经可以开始了\"。\n\n---\n\n#### 概念三：工具组合 = 装备搭配\n\n**是什么**：将 Claude Code 与外部工具（skill、MCP 等）串联，形成能围绕特定目标持续执行的工具链，而不是把 Claude 当作单一聊天窗口使用。\n\n**为什么重要**：\n单独使用时，Claude 是\"很聪明的聊天工具\"；串联工具链之后，它变成\"依赖上下文、任务定义和工具组合的执行系统\"——两者的能力边界完全不同。\n\n**详细解释**：\n\n作者用英雄联盟出装来类比：\n\n| 游戏类比 | 工具使用类比 |\n|---|---|\n| 英雄本体 | Claude Code 基础能力 |\n| 装备 | skill / MCP 工具 |\n| 装备搭配 | 工具链的组合方式 |\n| 不是越多越好 | 不是装越多 skill 越厉害 |\n| 搭配适合当前英雄 | 组合适合当前任务 |\n\n视频提到的工具能力举例：\n- 浏览网页 → 查资料\n- 读公众号 → 抓取并整理信息结构\n- 写文案\n- 围绕目标持续推进多步骤任务\n\n**实际应用场景**：\n针对一个具体任务（如\"整理竞品信息报告\"），思考它需要哪些子能力，再选择对应工具串联，而不是打开 Claude 直接开始问。","table":"| 维度 | 错误用法 | 正确用法 |\n|---|---|---|\n| **上下文管理** | 会话结束就关掉，下次重新开始 | 每次保存进展、方案、标准、下一步 |\n| **任务分工** | 人拆步骤，逐条指挥 AI | 人定方向，AI 反向提问后自主推进 |\n| **工具使用** | 只用聊天窗口问答 | 串联 skill / MCP 构建工具链 |\n| **能力认知** | Claude = 聪明的问答工具 | Claude = 上下文 + 任务定义 + 工具组合的执行系统 |\n| **核心咒语** | \"第一步做 X，第二步做 Y……\" | \"你可以问我任何问题，直到你能把这件事做好为止\" |","thinking":"1. **上下文的边界在哪里？** 保存上下文固然重要，但什么信息值得保存、什么信息是噪音？如何设计一套轻量的上下文管理模板，让每次会话的\"状态交接\"成本最低？\n\n2. **反向提问法的适用边界是什么？** 这个方法在目标模糊时非常有效，但如果连\"做什么\"本身都不清晰，让 AI 提问是否会陷入\"盲人摸象\"？人在什么情况下还是需要先自己想清楚再交给 AI？\n\n3. **工具组合的\"最优解\"是任务相关的还是通用的？** 作者说搭配比数量更重要，那么对于不同类型的任务（写作、调研、编程、产品设计），各自的最优工具组合是否存在规律？还是每次都需要重新设计？","remember":"用 Claude Code 的上限，不取决于它有多聪明，而取决于你的上下文保存得多完整、目标定义得多清晰、工具链搭配得多合理。","is_new":true},{"id":"7632568000214494272","title":"Claude Code 报错修复与无限续杯技巧","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7632568000214494272","audience":"正在使用或想上手 Claude Code 的 AI 工具初学者，尤其是遇到 API 报错卡壳的人","summary":"Claude Code 遇到 API 报错时，不要用网页版 AI 对话框瞎问，要用本地 AI Agent（尤其是当初安装时用的那个）来定向解决，几分钟就能搞定。","raw_preview":"嗨，想跟大家分享一个能够让我们一直用上 Claude Code 的方法。之前我分享的文科生写 Claude Code 安装篇收获了大概 4 万的点赞和收藏，这篇就讲一讲它突然报错不能使用应该怎么办。\n\n当时我是在做一个非常紧急的任务，但是 Claude Code 一直在反馈 API 错误、API 错误。那我后来是怎么解决的呢？\n\n首先核心原则就是：一定一定要使用 AI 帮你解决问题。但是里面还有几","knowledge_map":"Claude Code 报错修复方法\n│\n├── ❌ 错误做法：网页版对话框\n│   ├── Kimi / Gemini / GPT 网页版\n│   └── 给出的建议泛泛，没有实际作用\n│       └── 结果：卡了三四天没解决\n│\n└── ✅ 正确做法：本地 AI Agent\n    ├── 核心原则一：一定用 AI 解决问题\n    ├── 核心原则二：用本地 Agent，不用对话框\n    ├── 核心原则三：同一件事交给同一个 Agent\n    │   └── 用安装时用的那个 Agent（本例：Cursor）\n    └── 核心原则四：挑聪明的 Agent\n        ├── Windsurf → 用了一天，没解决到根上\n        └── Cursor → 几分钟，问题解决","concepts":"#### 概念一：本地 AI Agent\n\n**是什么**：安装在本地电脑上、能直接读取项目文件和环境的 AI 编程助手（如 Cursor、Windsurf），区别于网页版对话框。\n\n**为什么重要**：\n网页版 AI 只能看到你粘贴过去的文字，无法感知你的本地环境、文件结构和报错上下文，所以给出的建议只能是\"可能是 A、可能是 B\"这种泛泛猜测，实际帮助极有限。\n\n**详细解释**：\n\n| 对比维度 | 网页版对话框（Kimi / Gemini / GPT） | 本地 AI Agent（Cursor / Windsurf） |\n|---|---|---|\n| 能否读取本地文件 | ❌ 不能 | ✅ 能 |\n| 了解项目上下文 | ❌ 只看你粘贴的内容 | ✅ 直接扫描项目 |\n| 给出的建议质量 | 泛泛，方向性建议 | 针对性，可直接执行 |\n| 解决报错的效率 | 低（本例：卡了三四天） | 高（本例：几分钟） |\n\n**实际应用场景**：\nClaude Code 出现 API 错误时，直接打开 Cursor，把报错信息丢给它，让它在项目环境里直接排查和修复。\n\n---\n\n#### 概念二：用\"安装时的 Agent\"解决问题\n\n**是什么**：遇到某个工具的问题，优先找当初安装、配置这个工具时所用的那个 AI Agent 来解决。\n\n**为什么重要**：\n同一个 Agent 参与了安装和配置过程，它对这个项目的环境、路径、依赖关系最熟悉，解决问题时有天然的上下文优势。\n\n**详细解释**：\n视频中的案例：\n- 安装 Claude Code 时用的是 **Cursor**\n- 出现 API 报错后，先去问了 Kimi / Gemini / GPT → 无效\n- 换用 **Windsurf** → 折腾了一天，没解决到根上\n- 最终回到 **Cursor**（安装时的那个窗口）→ 几分钟解决\n\n**实际应用场景**：\n以后安装任何 AI 工具，记住用的是哪个 Agent，出问题优先回到那个 Agent 的同一个对话窗口里寻求帮助。\n\n---\n\n#### 概念三：挑聪明的 Agent\n\n**是什么**：不同本地 AI Agent 背后调用的模型能力有差异，应优先选用底层模型更强的 Agent。\n\n**为什么重要**：\nAgent 再好用，底层模型弱，解决复杂问题的能力就有上限，可能绕了一大圈还是解决不了根本问题。\n\n**详细解释**：\n\n| Agent | 底层模型能力（视频中的判断） | 本例表现 |\n|---|---|---|\n| Windsurf | 相对较弱 | 用了一天，没解决到根上 |\n| Cursor | 相对较强（用的 GPT） | 几分钟解决 |\n\n**实际应用场景**：\n在选择本地 AI Agent 时，不只看界面好不好用，也要关注它背后调用的是哪个模型，优先选模型能力更强的。","table":"| 步骤 | 做什么 | 注意事项 |\n|---|---|---|\n| 1. 遇到报错 | 不要自己瞎查文档 | 交给 AI 解决 |\n| 2. 选工具 | 用本地 AI Agent | 不用网页版对话框 |\n| 3. 选哪个 Agent | 优先用安装时用的那个 | 它最了解你的项目环境 |\n| 4. Agent 选型 | 选底层模型更聪明的 | 模型弱会绕弯路 |\n| 5. 保持专一 | 同一个问题交给同一个 Agent | 不要频繁换 Agent |","thinking":"1. **\"安装时用的 Agent 最了解项目\"这个逻辑，是否意味着我们应该从一开始就养成\"用同一个 Agent 全程跟进一个项目\"的习惯？这对工作流有什么影响？**\n\n2. **网页版 AI 给出泛泛建议的根本原因是缺乏上下文，那有没有办法通过更好地\"喂信息\"（比如粘贴完整日志、配置文件）来弥补这个缺陷？还是本地 Agent 天然有不可替代的优势？**\n\n3. **视频中用\"聪明程度\"来选 Agent，但不同 Agent 在不同任务上的表现可能不一样，应该如何建立自己的 Agent 选型判断标准？**","remember":"Claude Code 报错别去问网页 AI，打开装它时用的那个本地 Agent，几分钟解决三四天的问题。","is_new":true},{"id":"7638612730857519482","title":"Claude 最常用的 11 个 Skill 推荐","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7638612730857519482","audience":"正在使用或想上手 Claude 的开发者、内容创作者和效率工具爱好者","summary":"博主从亲身使用上百个 Claude Skill 的经验中筛选出最常用的 11 个，按效率工具、产品开发、自媒体三条线分类讲解，帮你跳过试错直接用最有价值的组合。","raw_preview":"Skill 装多了，真的非常容易乱。我自己呢，现在常用的 Skill 是 11 个，按场景分成了三类。\n\n我先说第一类，它是属于效率工具。\n\n首先是 Agent 的位置。以前我们搜资料需要一个平台一个平台去切换，现在你只需要一句话说清楚你要什么，这个 Skill 它能帮你跨平台去找——YouTube、小红书、推特、公众号都能支持，还能直接提取字幕，不花 API 的费用。\n\n第二个呢，是 Noteb","knowledge_map":"Claude 最常用的 11 个 Skill\n│\n├── 第一类：效率工具（5个）\n│   ├── Agent Skill —— 跨平台搜资料 + 提取字幕\n│   ├── NotebookLM Skill —— 终端内批量导入资料并归纳分析\n│   ├── Browser Skill —— AI 接管浏览器，自动化重复操作\n│   ├── Skill Play Store —— 官方出品，把工作流封装成 Skill\n│   └── Find Skill —— Skill 搜索引擎，按需求匹配最合适的 Skill\n│\n├── 第二类：产品开发（5个）\n│   ├── JustStack —— 开发前先追问 6 个问题，逼清目标和边界\n│   ├── Discipline Powers —— 给 Claude Code 植入工程师工作习惯\n│   ├── Frontend Zen —— 从零生成前端页面\n│   ├── EYE-EYE Pro Max —— 在现有界面上做设计优化\n│   └── Playwright MCP —— 自动化模拟用户操作，跑测试报错\n│\n└── 第三类：自媒体（1个）\n    └── Humanizer —— 让 AI 生成的文字读起来更像人话","concepts":"#### 概念一：Skill（Claude 技能插件）\n\n**是什么**：安装在 Claude 上的功能扩展模块，类似手机 App，每个 Skill 赋予 Claude 某种特定能力或工作习惯。\n\n**为什么重要**：Claude 本身是通用模型，Skill 让它在特定场景下变得更专业、更自动化，减少每次手动提示的重复成本。\n\n**详细解释**：\n- Skill 可以是官方出品（如 Skill Play Store），也可以是社区开源（如 JustStack）\n- Skill 装多了容易混乱，博主建议聚焦在真正高频的场景，按需精选\n- 有专门的 Find Skill 帮你在大量 Skill 中做匹配，解决\"选择困难\"问题\n\n**实际应用场景**：日常工作中需要重复执行的任务（搜资料、写代码、做测试、发内容），都可以找对应 Skill 来接管。\n\n---\n\n#### 概念二：工作流自动化（Browser Skill + Skill Play Store）\n\n**是什么**：让 AI 代替人完成浏览器操作或把重复流程封装成可复用模块的两类 Skill。\n\n**为什么重要**：重复性操作是效率最大的杀手，这两个 Skill 的组合可以让 Claude 真正\"干活\"而不只是\"回答问题\"。\n\n**详细解释**：\n- **Browser Skill**：AI 直接控制浏览器——打开网页、点按钮、填表单、截图、爬数据，和人工操作无差异\n- **Skill Play Store**：用一句话描述你的工作流程，它帮你封装成可反复调用的 Skill，让 Claude 按你的习惯工作\n\n**实际应用场景**：每天重复的数据采集、表单填写、内容发布流程，描述一次，之后全部交给 AI 执行。\n\n---\n\n#### 概念三：AI 编程质量提升（JustStack + Discipline Powers）\n\n**是什么**：两个专门针对 Claude Code 使用场景的 Skill，分别解决\"需求不清\"和\"代码不规范\"两个核心问题。\n\n**为什么重要**：AI 写代码容易\"能跑但不能交付\"，这两个 Skill 把工程师的工作方法论植入进来，让输出质量上一个台阶。\n\n**详细解释**：\n\n| Skill | 解决的问题 | 具体做法 |\n|---|---|---|\n| JustStack | 需求模糊导致返工率高 | 开始前强制追问 6 个问题，逼清目标和边界条件 |\n| Discipline Powers | 代码只能跑不能交付 | 默认走拆任务→写测试→代码审查的工程师流程 |\n\n**实际应用场景**：用 Claude Code 开发产品功能时，先用 JustStack 对齐需求，再用 Discipline Powers 保证代码质量。\n\n---\n\n#### 概念四：Humanizer（AI 内容去机器味）\n\n**是什么**：专门处理 AI 生成文字\"通顺但不像人话\"问题的 Skill，让内容自然度明显提升。\n\n**为什么重要**：AI 写作的最大痛点不是语法错误，而是读起来有明显的\"AI 腔\"，Humanizer 针对性解决这个问题。\n\n**详细解释**：\n- AI 生成的内容通顺归通顺，但缺乏人的语感和表达习惯\n- 过一遍 Humanizer 之后，自然度明显不同\n- 博主几乎每天都在用，是自媒体场景下唯一入选的 Skill\n\n**实际应用场景**：所有用 AI 辅助生成的文章、脚本、社媒文案，发布前过一遍 Humanizer。","table":"| Skill 名称 | 分类 | 核心功能 | 最适合谁用 |\n|---|---|---|---|\n| Agent Skill | 效率工具 | 跨平台搜资料 + 提取字幕，不耗 API 费用 | 需要大量调研的人 |\n| NotebookLM Skill | 效率工具 | 终端内批量导入资料并归纳分析 | 知识整理、研究类工作者 |\n| Browser Skill | 效率工具 | AI 接管浏览器，自动化重复操作 | 有大量重复性网页操作的人 |\n| Skill Play Store | 效率工具 | 把工作流封装成可复用 Skill（官方出品） | 想定制自己专属工作流的人 |\n| Find Skill | 效率工具 | 按需求智能匹配最合适的 Skill | Skill 库大、不知道用哪个的人 |\n| JustStack | 产品开发 | 开发前追问 6 个问题，逼清需求和边界 | 用 AI 做产品开发的人 |\n| Discipline Powers | 产品开发 | 植入工程师工作习惯，默认走拆任务→测试→审查 | 用 Claude Code 写代码的人 |\n| Frontend Zen | 产品开发 | 从零生成前端页面，自动处理排版配色 | 不懂设计的开发者 |\n| EYE-EYE Pro Max | 产品开发 | 在现有界面上做设计优化 | 需要迭代已有产品 UI 的人 |\n| Playwright MCP | 产品开发 | 自动模拟用户操作跑测试，报出所有报错 | 需要做产品测试的开发者 |\n| Humanizer | 自媒体 | 让 AI 生成内容读起来更像人话 | 所有用 AI 辅助写作的内容创作者 |","thinking":"1. **Skill Play Store 的长期价值在哪里？** 博主特别强调这个 Skill\"长期价值非常非常高\"——如果每个人都能把自己的工作流封装成 Skill，是否意味着\"个人工作方法论\"本身会成为一种可复用、可分享甚至可交易的资产？\n\n2. **\"先被追问 6 个问题\"这个设计说明了什么？** JustStack 在开发开始前强制逼清需求，本质上是在纠正一个习惯——人们倾向于把模糊的想法直接扔给 AI。这个设计对你自己平时使用 AI 的方式有什么启发？\n\n3. **11 个 Skill 覆盖了 90% 的场景，那剩下 10% 是什么？** 博主装过上百个 Skill，最终只留下 11 个高频使用——那些被淘汰的 Skill 失败在哪里？是功能重叠、使用门槛高，还是场景太窄？这对你选择和管理自己的 AI 工具箱有什么参考意义？","remember":"与其装满上百个 Skill 却不知道用哪个，不如像博主一样，按效率、开发、内容三条线各精选几个，把 AI 真正嵌进你的日常工作流。","is_new":true},{"id":"7641437781760042971","title":"用 Claude Code 上下文管理逻辑对抗 AI 学习焦虑","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7641437781760042971","audience":"对 AI 工具感兴趣、但常感到信息过载或学习焦虑的普通用户和内容创作者","summary":"借鉴 Claude Code 的\"渐进式披露\"机制，用\"按需学习 + 轻量存档\"代替全量跟进，既节省时间和脑容量，又从根本上缓解 AI 信息焦虑。","raw_preview":"嗨大家好呀，好久不见。不知道大家是不是跟我一样，平常在上网的时候经常会发现很多新的好玩的 AI 项目或者 AI 工具，然后都想上手尝试一下或者学习一下，但是很快就会发现，其实我们学习的速度根本赶不上他们发展的速度。很多工具我可能还没上手，就已经出现更好更快更强的产品了。\n\n那么今天我想跟大家分享一个我在这方面的心得，如何能让我们更有效地去学习一些 AI 内容、产品或者工具。\n\n那么这个故事还要从这","knowledge_map":"Claude Code 上下文管理的学习启发\n│\n├── 问题根源\n│   ├── AI 工具迭代速度 >> 个人学习速度\n│   └── 全量跟进 → 时间耗尽 + 脑容量占满 + AI 焦虑\n│\n├── Claude Code 的解法：Progressive Disclosure（渐进式披露）\n│   ├── 是什么：不在每次 Session 开始时加载所有 Skill\n│   ├── 怎么做：先只记 Skill 的名称 + 简介\n│   └── 何时深入：真正需要用时，再读具体内容和操作\n│\n└── 映射到个人学习策略：按需学习\n    ├── 遇到新工具时的两个判断问题\n    │   ├── 我现在的项目能用到它吗？\n    │   └── 我是否立刻想尝试？\n    ├── 80~90% 答案为否 → 花 2~3 分钟了解概貌 + 存档\n    └── 真正需要时 → 打开存档 → 深度学习\n        └── 三个收益\n            ├── 时间不被低优先级内容占满\n            ├── 节省脑容量\n            └── 减少 AI 焦虑","concepts":"#### 概念一：Progressive Disclosure（渐进式披露）\n\n**是什么**：Claude Code 的上下文管理机制——不在 Session 开始时把所有 Skill 全部加载，而是先只读取每个 Skill 的名称和简介，需要时才加载具体内容。\n\n**为什么重要**：Context Window 的容量是有限的，如果一次性全量加载，窗口会立刻被占满，反而无法高效工作。\n\n**详细解释**：\n\n| 阶段 | Claude Code 的做法 | 对应的学习行为 |\n|------|-------------------|--------------|\n| 初次接触 | 读取 Skill 名称 + 简介 | 花 2~3 分钟了解工具是什么、能做什么 |\n| 存档备查 | 记录 Skill 索引，不占用主窗口 | 把工具信息存入文件夹/笔记 |\n| 按需深入 | 真正用到时才加载完整内容 | 有实际需求时再做深度学习 |\n\n**实际应用场景**：在 Claude Code 中管理大量 Skill 时，避免 Context Window 过载，保持每次 Session 的高效运行。\n\n---\n\n#### 概念二：按需学习（Need-based Learning）\n\n**是什么**：只在有明确使用需求或强烈兴趣时，才对某个 AI 工具或产品进行深度学习；其余情况只做轻量了解并存档。\n\n**为什么重要**：AI 工具的发布速度远超个人消化速度，全量跟进既不现实，也会制造持续的焦虑感和时间浪费。\n\n**详细解释**：\n\n遇到新工具时，先问自己两个问题：\n\n1. **我现在手上的项目能用到它吗？**\n2. **我是否觉得它非常有意思、立马想尝试？**\n\n| 判断结果 | 行动 |\n|---------|------|\n| 两个问题有一个答案为\"是\" | 立刻深入学习、上手尝试 |\n| 两个问题答案都是\"否\"（约占 80~90%） | 花 2~3 分钟了解概貌，存档备查，暂不深入 |\n\n**实际应用场景**：刷 X、小红书、科技新闻时看到新工具，用这套判断框架快速决策，避免被每一个\"爆款工具\"牵着走。\n\n---\n\n#### 概念三：轻量存档（Light Archiving）\n\n**是什么**：对暂时不需要深入了解的工具或产品，用 2~3 分钟做最小化记录（是什么、能做什么），存入固定的文件夹或笔记，以备日后检索。\n\n**为什么重要**：它是按需学习得以实现的基础设施——没有存档，\"需要时再学\"就变成了\"需要时找不到\"。\n\n**详细解释**：\n\n- 存档内容：工具名称、核心功能、来源链接（对应 Claude Code 的 Skill 名称 + 简介）\n- 存档位置：固定的文件夹、笔记软件、书签等，能快速检索即可\n- 触发深读：当某天真正遇到对应需求时，打开存档，再做完整学习\n\n**实际应用场景**：某周刷到一个有趣的 AI 图像工具，当下不需要，花 2 分钟记下存档；三周后做一个需要图像处理的项目，翻出存档，再深入研究。","table":"| 维度 | Claude Code 的做法 | 个人学习的对应做法 |\n|------|------------------|-----------------|\n| 面临的问题 | Context Window 容量有限 | 时间和脑容量有限 |\n| 核心机制 | Progressive Disclosure（渐进式披露） | 按需学习 |\n| 初次接触 | 只读 Skill 名称 + 简介 | 花 2~3 分钟了解概貌 |\n| 中间状态 | 记录索引，不占主窗口 | 存入文件夹，不占用当下精力 |\n| 深入时机 | 实际调用时才加载完整内容 | 有真实需求时才做深度学习 |\n| 核心收益 | Context Window 不过载 | 时间不被占满 + 减少 AI 焦虑 |\n| 适用比例 | — | 约 80~90% 的新工具走轻量存档路径 |","thinking":"1. **存档本身也会过载吗？** 如果每次都存档，文件夹里积累的条目越来越多，检索成本也会上升——你会怎么给自己的\"工具索引\"做二次管理？\n\n2. **\"按需\"的判断标准是否会随时间漂移？** 今天判断\"用不到\"的工具，可能三个月后成为行业标配。如何设计一个机制，定期重新审视存档中的内容，而不是让它永远沉睡？\n\n3. **这套方法是否适用于所有类型的学习？** 渐进式披露在 AI 工具学习上似乎很有效，但对于需要系统性建构知识体系的领域（如编程基础、数学），\"按需、碎片化\"的方式是否依然成立？","remember":"不是每个 AI 工具都值得你现在学——像 Claude Code 管理上下文一样管理你的注意力：先存档，真需要时再深入，焦虑自然就少了。","is_new":true},{"id":"7643112962974027008","title":"AI辅助自媒体创作的七个核心技能","cat":"claude-cursor","video_url":"https://www.douyin.com/video/7643112962974027008","audience":"想用AI工具提升内容创作效率的自媒体人、视频博主或内容运营","summary":"介绍7个可直接接入Claude等AI工具的自媒体创作Skill，覆盖素材收集、浏览器自动化、内容生成、去AI味、多平台发布全链路，帮创作者把AI真正用起来。","raw_preview":"这段时间一直在用AI做工具，今天就分享几个比较逆天的Skill。如果你有想用AI来帮你做视频，包括找热点、找素材、然后优化剪辑，那么这七个Skill一定要去用起来，效果直接拉满。\n\n第一个：Agent率去，主要用来找对标素材。覆盖小红书、推特、公众号这些平台，直接口头跟他说需求就行了，比如说收YouTube上关于口播技巧的热门视频，或者是让他帮你提取某个视频的字幕，一句话就能搞定，而且所有平台都支","knowledge_map":"AI自媒体创作七大技能\n├── 素材获取层\n│   ├── Skill 1：Agent率去（多平台素材搜集 + 字幕提取）\n│   └── Skill 3：Notebook LM Skill（素材一键导入分析）\n├── 自动化操作层\n│   └── Skill 2：OpenCLI（浏览器自动化：登录/截图/填表/爬数据）\n├── 内容生成层\n│   ├── Skill 4：Lisson号（主题→公众号长文+摘要+图文卡片+口播稿+播客）\n│   └── Skill 5：Lisson视频生成（代码驱动炫酷动效视频）\n├── 内容优化层\n│   └── Skill 6：Humanizer（去AI味，消除豆包腔）\n└── 分发发布层\n    └── Skill 7：宝玉推特（一键推送公众号/微博，真实浏览器路线）","concepts":"#### 概念一：Agent率去（多平台内容采集代理）\n\n**是什么**：一个覆盖小红书、推特、公众号、YouTube等平台的AI内容采集Skill，支持口语化指令直接操作。\n\n**为什么重要**：自媒体创作最耗时的环节之一是找对标内容和提取素材，Agent率去将这个过程从手动浏览变成一句话指令。\n\n**详细解释**：\n- 支持平台：小红书、推特、公众号、YouTube等\n- 典型用法：搜索热门视频、提取视频字幕\n- 费用：基于API，免费使用，无算力费用压力\n- 操作方式：直接口头描述需求，无需复杂配置\n\n**实际应用场景**：创作者想研究某类内容的爆款规律，直接让Agent率去抓取该话题下热门视频的字幕，快速分析选题结构。\n\n---\n\n#### 概念二：Lisson号创作者工作流\n\n**是什么**：由7个Skill打包组合的内容创作工作流，输入一个主题或视频链接，自动输出多种内容形态。\n\n**为什么重要**：内容创作者需要将同一个核心内容适配多个平台和格式，Lisson号将这个\"一稿多发\"的过程自动化。\n\n**详细解释**：\n| 输入 | 自动输出 |\n|------|----------|\n| 一个主题 | 公众号长文 + 重点摘要 + 段落插图 + 图文卡片 + 口播稿 |\n| 口播稿 | 一键转播客 |\n| 一个视频链接 | 内容提取 + 播客制作 + 剪辑视频（一条龙） |\n\n**实际应用场景**：博主录制完一期视频后，把视频链接丢给Lisson号，自动生成公众号推文、播客音频和剪辑版视频，一套内容多平台分发。\n\n---\n\n#### 概念三：Humanizer（去AI味技能）\n\n**是什么**：专门用于消除AI生成文本中\"AI腔\"的Skill，让输出内容更接近人类写作风格。\n\n**为什么重要**：AI生成的内容往往有明显的模式化表达（如\"豆包味\"），读者感知明显，影响内容质量和信任度；Humanizer解决这个痛点。\n\n**详细解释**：\n- 针对问题：AI生成文章语气千篇一律，缺乏个人风格\n- 典型症状：过于正式、结构过于整齐、用词重复、缺乏情感波动\n- 解决方式：通过Humanizer技能对AI输出进行风格化改写\n\n**实际应用场景**：用豆包或其他AI生成初稿后，经Humanizer处理，使文章语气更自然，适合直接发布到公众号或社交媒体。\n\n---\n\n#### 概念四：宝玉推特（真实浏览器路线发布）\n\n**是什么**：宝玉老师开发的内容发布Skill，约20个子技能，支持深度文章自动配图，通过真实浏览器操作（非API调用）完成多平台发布。\n\n**为什么重要**：API调用发布内容存在账号安全风险，真实浏览器路线模拟人工操作，安全性更高，适合长期稳定使用。\n\n**详细解释**：\n| 特性 | 说明 |\n|------|------|\n| 技能数量 | 约20个子技能 |\n| 核心功能 | 深度文章自动配图、一键多平台发布 |\n| 支持平台 | 公众号、微博等 |\n| 技术路线 | 真实浏览器操作（非API），安全性高 |\n\n**实际应用场景**：创作者写完深度文章后，让宝玉推特自动配图并一键发布到公众号和微博，节省排版和手动发布时间。","table":"| Skill名称 | 主要功能 | 适用场景 | 费用/特点 |\n|-----------|----------|----------|-----------|\n| Agent率去 | 多平台素材搜集、字幕提取 | 找对标内容、研究热门视频 | API免费 |\n| OpenCLI | 浏览器自动化操作 | 登录、截图、爬数据 | 省去手动操作 |\n| Notebook LM Skill | 素材一键导入分析 | 批量素材整理分析 | 无需打开软件 |\n| Lisson号 | 主题→多格式内容生成 | 一稿多发、播客制作 | 7个Skill打包 |\n| Lisson视频 | 代码生成炫酷动效视频 | 视觉效果视频制作 | 入门简单 |\n| Humanizer | 去AI味，优化文章风格 | AI初稿润色 | 去豆包腔 |\n| 宝玉推特 | 多平台内容发布+自动配图 | 内容分发 | 真实浏览器，安全 |","thinking":"1. 视频中介绍的7个Skill覆盖了内容创作的不同环节，但它们之间如何串联成一个完整的工作流？一个创作者应该按什么顺序组合使用这些工具？\n\n2. Humanizer的\"去AI味\"本质上是在修改AI的输出风格，这是否意味着AI生成内容的\"标准化问题\"是当前工具链的一个系统性缺陷？未来的AI写作工具应该如何在生成阶段就解决这个问题？\n\n3. 宝玉推特选择\"真实浏览器路线\"而非API调用来保证安全性，这种设计取舍背后反映了哪些平台的反自动化策略？这对AI工具的长期可用性有什么影响？","remember":"这7个Skill把自媒体创作的全链路——从找素材、生内容、去AI味到多平台发布——都接入了AI，创作者只需要把它们串起来用。","is_new":true},{"id":"7633813879620980011","title":"AI Agent 核心数据流原理","cat":"llm-fundamentals","video_url":"https://www.douyin.com/video/7633813879620980011","audience":"想搞懂 AI Agent（智能体）内部是怎么运转的开发者或技术爱好者","summary":"用一张数据流程图，完整拆解 AI Agent 从\"收到用户消息\"到\"返回最终结果\"的每一个内部环节，帮你真正看懂 Agent 是怎么工作的。","raw_preview":"一张图让你看懂小龙虾（AI Agent）的核心流程，明明白白的养虾。\n\n大家好，我是汉山。我们在微信、飞书里发的一句话，小龙虾（Agent）为什么能够理解并且还能够去执行？今天我们就用这张图给大家讲清楚。\n\n所以我们从最开始发消息这里，比如微信、飞书，从这边发消息，发的消息会流走到我们的网关的位置里，就是这个路由或者网关。这是我们的一个数据的路口，它负责一些鉴权、限流或者一些安全检测。比如我们这个","knowledge_map":"AI Agent 完整数据流\n│\n├── 1. 入口层\n│   └── 消息来源（微信 / 飞书 / 网页）\n│       └── 网关 / 路由\n│           ├── 鉴权\n│           ├── 限流\n│           └── 安全检测\n│\n├── 2. 上下文组装层\n│   ├── System Prompt（角色说明 / 能力边界）\n│   ├── MCP 外部接口列表（可调用的工具清单）\n│   └── Memory 历史记忆\n│       ├── 短期记忆（内存）\n│       └── 长期记忆（文件 / 数据库）\n│\n├── 3. 交互决策层（核心模块）\n│   ├── 接收组装好的上下文\n│   ├── 生成 Prompt → 送给大模型\n│   ├── 接收大模型回复\n│   └── 判断回复类型\n│       ├── 最终回复 → 返回结果\n│       └── 中间步骤 → 调用 Tool\n│\n├── 4. 工具执行层（Tool）\n│   ├── 发消息\n│   ├── 建任务\n│   ├── 搜索网页\n│   ├── 读取文件\n│   └── 执行命令\n│       └── 执行结果回传 → 重新组装上下文\n│\n└── 5. 循环执行机制\n    └── 模型 → 工具 → 模型 → 工具 → … → 最终结果\n        └── 结果通过网关返回给消息发送者","concepts":"#### 概念一：网关 / 路由\n\n**是什么**：Agent 系统的数据入口，所有外部消息必须经过这里才能进入系统。\n\n**为什么重要**：没有网关，任何来源的消息都可以直接打到 Agent 内部，系统既不安全也无法管控。\n\n**详细解释**：\n- **鉴权**：验证消息来源是否合法，比如飞书 / 微信的 Token 校验\n- **限流**：控制请求频率，防止被刷爆\n- **安全检测**：过滤恶意输入或违规内容\n\n**实际应用场景**：你在飞书里 @ 一个 Agent 机器人，飞书会带着签名把消息推送过来，网关先验签，验证通过才往后走。\n\n---\n\n#### 概念二：上下文组装（Context Assembly）\n\n**是什么**：在把消息送给大模型之前，把所有相关信息拼装成一个完整 Prompt 的过程。\n\n**为什么重要**：大模型本身是无状态的，它只能看到你这次送进去的内容。所有的\"记忆\"和\"能力\"，都必须在这一步显式地拼进去，模型才能知道。\n\n**详细解释**：\n\n| 组装内容 | 说明 | 存储位置 |\n|---|---|---|\n| System Prompt | 告诉模型它是谁、有什么能力、有什么限制 | 代码 / 配置文件 |\n| MCP 工具列表 | 列出所有可调用的外部接口，让模型知道能用什么工具 | 配置 / 注册中心 |\n| 短期记忆 | 本次会话的历史对话记录 | 内存 |\n| 长期记忆 | 跨会话的用户信息或知识积累 | 文件 / 数据库 |\n\n**实际应用场景**：你第二天再问 Agent 昨天聊的事，它能记得，就是因为长期记忆被拼进了这次的上下文里。\n\n---\n\n#### 概念三：交互决策模块\n\n**是什么**：Agent 的\"大脑中枢\"，负责把组装好的上下文送给模型、接收模型回复，并判断下一步该做什么。\n\n**为什么重要**：这个模块决定了 Agent 是\"回答完就结束\"还是\"继续调工具干活\"，是 Agent 能自主执行复杂任务的关键。\n\n**详细解释**：\n- 收到模型回复后，判断回复类型：\n  - **最终回复**：直接返回给用户\n  - **工具调用指令**：解析出要调哪个工具、传什么参数，去执行\n- 工具执行完毕后，把结果重新拼入上下文，再次送给模型\n- 如此循环，直到模型给出最终回复\n\n**实际应用场景**：你让 Agent 帮你\"搜一下最新的 AI 新闻然后整理成表格发给我\"，它会先调搜索工具，把结果拿回来，再调模型整理，最后再发消息给你，整个过程全靠这个模块调度。\n\n---\n\n#### 概念四：循环执行机制（Agent Loop）\n\n**是什么**：Agent 在\"调用大模型 → 调用工具 → 调用大模型\"之间不断循环，直到任务完成的执行模式。\n\n**为什么重要**：这是 Agent 区别于普通聊天机器人的本质——它不是一问一答，而是能持续自主地把一件复杂的事情做完。\n\n**详细解释**：\n\n```\n用户下达指令\n      ↓\n  大模型分析\n      ↓\n  需要用工具？\n  ┌───┴───┐\n 是       否\n  ↓       ↓\n调工具   返回最终结果给用户\n  ↓\n结果拼回上下文\n  ↓\n再次送给大模型\n  ↓\n（回到\"需要用工具？\"继续循环）\n```\n\n**实际应用场景**：让 Agent 自动完成一个多步骤任务，比如\"查数据 → 写报告 → 发邮件\"，每一步都是一次循环，Agent 自己判断下一步该干什么，不需要人工介入。","table":"| 模块 | 核心职责 | 关键技术点 |\n|---|---|---|\n| 网关 / 路由 | 数据入口，管控安全 | 鉴权、限流、安全检测 |\n| 上下文组装 | 拼装完整 Prompt | System Prompt、Memory、MCP 工具列表 |\n| 短期记忆 | 本次会话历史 | 存内存，会话结束即清除 |\n| 长期记忆 | 跨会话知识积累 | 存文件或数据库，持久化 |\n| 交互决策模块 | 调度模型与工具 | 判断是最终回复还是工具调用 |\n| 工具层（Tool） | 执行具体动作 | 搜网页、读文件、发消息、执行命令等 |\n| Agent Loop | 持续执行复杂任务 | 模型↔工具反复循环直到任务完成 |\n| 网关（返回） | 把结果送回用户 | 原路返回给微信 / 飞书等消息来源 |","thinking":"1. **循环几次才停？** Agent Loop 理论上可以无限循环，实际系统中是怎么防止它\"死循环\"或者跑偏的？有哪些常见的终止条件设计？\n\n2. **记忆该存多少？** 短期记忆放内存、长期记忆放数据库，但上下文窗口是有长度限制的。当历史记忆太长塞不进去时，Agent 应该怎么做取舍？\n\n3. **工具越多越好吗？** MCP 工具列表在上下文组装时全部塞给模型，如果注册了几百个工具，模型还能准确选择正确的工具吗？工具的数量和质量之间应该如何权衡？","remember":"Agent 不神秘：一条消息进来，经过网关、拼上记忆和工具清单、送给大模型、调工具、再送给模型……就这样反复循环，直到把事情做完再把结果还给你。","is_new":true},{"id":"7634071750099160346","title":"程序员转型大模型必看UP主推荐","cat":"llm-fundamentals","video_url":"https://www.douyin.com/video/7634071750099160346","audience":"想系统学习大模型、寻找优质学习资源的程序员或AI转型从业者","summary":"视频精选8位大模型领域优质UP主，按技术深度与应用方向分类推荐，帮助不同背景的学习者快速找到最匹配自己的学习路径。","raw_preview":"大模型学习者必看博主。\n\n适合追踪科技前沿、挖掘传统行业AI融合机遇的决策者——\n\n**Number 8：王木头**，学科学，深登AI数学原理科普详解，讲解传统架构与注意力机制，以动画加公式拆解底层逻辑，适合追本溯源、理性专研的深度学习者。\n\n**Number 7：Simon同弟子豪兄**，专注工程AI代码教学，详解模型部署、微调实战，全程演示避坑，实现AI本地落地，适合企业垂直大模型训练的技术爱","knowledge_map":"大模型学习UP主推荐\n├── 底层原理方向（学术向）\n│   ├── 王木头（数学原理 · 动画公式 · 注意力机制）\n│   └── 李宏毅（机器学习 · 强化学习 · 生成式大模型）\n│\n├── 工程开发方向（技术向）\n│   └── Simon同弟子豪兄（模型部署 · 微调实战 · 本地落地）\n│\n├── 自动化与效率方向（工具向）\n│   └── 归层（AI工作流 · 多工具串联 · 智能体搭建）\n│\n├── AI应用与提示词方向（应用向）\n│   └── 宝玉（AI应用开发 · 提示词高阶用法 · 商业文案）\n│\n└── 视觉创作方向（内容向）\n    ├── 也不想（AI视频 · Sora · 爆款内容创作）\n    ├── 秋叶AI（AI绘画 · SD本地部署 · 零代码方案）\n    └── 卡兹克（商业设计 · 提示词生成逻辑 · 海报封面）","concepts":"#### 概念一：底层原理类博主\n\n**是什么**：专注讲解大模型数学基础、算法架构与底层逻辑的内容创作者。\n\n**为什么重要**：理解底层原理才能在工程实践中做出正确判断，而不是只会调用API。\n\n**详细解释**：\n- **王木头**：以动画+公式的形式拆解注意力机制等传统架构，降低数学门槛\n- **李宏毅**：台大教授级讲师，系统覆盖强化学习、生成式大模型，构建完整知识体系\n\n**实际应用场景**：适合想从\"会用\"升级到\"懂原理\"的程序员，或准备面试大模型岗位的学习者。\n\n---\n\n#### 概念二：工程实战类博主\n\n**是什么**：专注模型部署、微调、本地化落地等工程操作的内容创作者。\n\n**为什么重要**：企业真实场景中，能跑通、能部署、能避坑比理论更直接产生价值。\n\n**详细解释**：\n- **Simon同弟子豪兄**：全程演示模型部署与微调，覆盖踩坑与解决方案，适合企业垂直大模型训练场景\n\n**实际应用场景**：适合负责企业内部AI系统落地的技术开发者或AI工程师。\n\n---\n\n#### 概念三：AI工具与自动化类博主\n\n**是什么**：专注AI工作流搭建、多工具串联、智能体应用的内容创作者。\n\n**为什么重要**：不写代码也能通过工具组合实现业务自动化，是非技术背景人群的高效入口。\n\n**详细解释**：\n- **归层**：讲解多工具串联与智能体搭建，结合真实办公场景演示提效方案\n\n**实际应用场景**：适合想用AI优化团队工作流程、减少重复劳动的企业管理者或运营人员。\n\n---\n\n#### 概念四：视觉创作与商业应用类博主\n\n**是什么**：专注AI绘画、视频生成、商业设计与提示词应用的内容创作者。\n\n**为什么重要**：视觉内容是商业场景中最高频的AI落地需求，门槛低、见效快。\n\n**详细解释**：\n- **也不想**：聚焦Sora等AI视频模型，分享爆款内容创作方法\n- **秋叶AI**：提供SD模型一键部署方案，零代码快速上手AI绘画\n- **卡兹克**：解密商业海报、封面的提示词生成逻辑，精准把控视觉风格\n\n**实际应用场景**：适合电商、品牌、自媒体、短视频等有大量视觉内容需求的从业者。","table":"| 排名 | UP主 | 核心方向 | 内容特色 | 适合人群 |\n|------|------|----------|----------|----------|\n| No.1 | 宝玉 | AI应用开发·提示词 | 海外前沿动态·业务提效·商业文案 | 自媒体运营·商业从业者 |\n| No.2 | 李宏毅 | 机器学习·生成式大模型 | 强化学习·高阶算法·完整知识体系 | 系统学AI的终身学习者 |\n| No.3 | 卡兹克 | AI商业设计 | 提示词生成逻辑·海报封面制作 | 品牌营销·产品设计负责人 |\n| No.4 | 秋叶AI | AI绘画·本地部署 | SD一键部署·零代码避坑 | 视觉创作·实体产业创业者 |\n| No.5 | 也不想 | AI视觉·视频生成 | Sora等视频大模型·爆款内容技巧 | 短视频运营·商业操盘手 |\n| No.6 | 归层 | AI自动化工作流 | 多工具串联·智能体搭建·办公提效 | 追求效率的企业经营者 |\n| No.7 | Simon同弟子豪兄 | 工程AI代码 | 模型部署·微调实战·全程避坑 | 企业垂直大模型技术爱好者 |\n| No.8 | 王木头 | AI数学原理 | 动画+公式·注意力机制·底层逻辑 | 深度学习的理性研究者 |","thinking":"1. **学习路径设计**：对于一个零基础想转型大模型的程序员，应该按照什么顺序追这些博主？是先打底层原理基础（王木头→李宏毅），还是先从工程实战入手（Simon）快速建立信心？\n\n2. **技术与商业的鸿沟**：视频中技术向博主（李宏毅、王木头）和商业应用向博主（宝玉、卡兹克）的受众几乎是两个圈子——这种分裂是否说明当前AI教育领域缺少\"技术落地商业\"的桥梁型内容？\n\n3. **工具依赖的风险**：秋叶AI、归层等博主主打\"零代码工具\"路线，对于想长期从事AI行业的人来说，过度依赖工具而不理解底层，会带来哪些职业发展上的隐患？","remember":"找对博主比埋头苦学更重要——8个方向，对号入座，少走半年弯路。","is_new":true},{"id":"7636749070652367016","title":"用AI工具制作游戏概念Demo","cat":"llm-fundamentals","video_url":"https://www.douyin.com/video/7636749070652367016","audience":"对AI创作感兴趣、想用现有AI工具快速制作游戏概念展示视频的设计师或独立开发者","summary":"用\"2D角色生成 → 3D质感迁移 → UI概念图 → AI视频\"四步流程，零成本制作以假乱真的游戏概念Demo视频。","raw_preview":"这条AI游戏Demo发出来之后，很多人都在问我是怎么做的，今天就简单拆一下流程，教大家怎么用Image 2和Kling 2.0制作类似这种游戏画面。\n\n整个流程主要分四步。\n\n第一步，用Image Ernie创建2D角色。这里要把人物外形、服装、纹身、机械手臂这些关键细节写清楚，因为后面的游戏界面和视频画面都会围绕这个角色继续延展。\n\n第二步，用Nano Banana增加3D风格和纹理。把3D参考","knowledge_map":"AI游戏概念Demo制作流程\n│\n├── 第一步：创建2D角色（Image Ernie）\n│   ├── 描述人物外形\n│   ├── 描述服装细节\n│   └── 描述特殊元素（纹身、机械手臂等）\n│\n├── 第二步：增加3D质感（Nano Banana）\n│   ├── 导入3D参考图\n│   └── 将质感迁移到2D角色上\n│\n├── 第三步：生成游戏UI概念图（GPT Image 2）\n│   ├── 生成完整UI界面（非单独角色图）\n│   └── 制作5张关键画面（构建完整世界观）\n│\n├── 第四步：生成完整视频（Kling 2.0）\n│   ├── 提示词写清楚角色设定\n│   ├── 按秒分镜描述画面内容\n│   │   ├── 0-2秒：开始页面\n│   │   └── 2-4秒：人物介绍页\n│   └── 描述每页镜头动作细节\n│\n└── 可选步骤：视频增强 & 高清放大\n    └── 提升画面清晰度和细节质感","concepts":"#### 概念一：角色一致性设计（Character Consistency）\n\n**是什么**：在流程最开始就把角色的所有关键视觉细节定义清楚，让后续每一步生成都围绕同一个角色延展。\n\n**为什么重要**：游戏Demo的可信度来自视觉统一性。如果角色在UI图和视频里长得不一样，整个Demo就会显得粗糙、不像真实项目。\n\n**详细解释**：\n- 在第一步写提示词时，需要明确描述：人物外形、服装款式、纹身位置与样式、机械手臂等特殊元素\n- 这些细节会作为\"视觉锚点\"，贯穿后续的3D质感迁移、UI生成和视频生成全程\n\n**实际应用场景**：制作角色展示页、游戏预告片时，角色设定文本可以反复复用到每一步的提示词里。\n\n---\n\n#### 概念二：2D转3D质感迁移\n\n**是什么**：借助工具（Nano Banana）把3D参考图的材质、光影、体积感\"贴\"到2D角色上，让角色看起来像游戏引擎里渲染出来的3D模型。\n\n**为什么重要**：纯2D角色图放进游戏UI里会显得格格不入；加上3D质感后，角色的真实感和游戏感会大幅提升。\n\n**详细解释**：\n- 输入：已生成的2D角色图 + 一张3D风格参考图\n- 输出：具有3D材质和纹理质感的角色图\n- 核心逻辑是\"风格迁移\"，不改变角色造型，只改变表面质感\n\n**实际应用场景**：概念角色设计稿快速升级为游戏级视觉效果，适合没有3D建模能力的创作者。\n\n---\n\n#### 概念三：整套游戏UI生成（而非单张角色图）\n\n**是什么**：用GPT Image 2生成包含完整界面元素的游戏UI画面，而不是只生成角色本身。\n\n**为什么重要**：单张角色图只能展示角色，无法传达\"这是一个游戏\"的感觉；完整的UI界面（含按钮、状态栏、场景背景、字体排版等）才能让观看者相信这是一个真实项目。\n\n**详细解释**：\n\n| 做法 | 效果 |\n|------|------|\n| 只生成角色图 | 像角色设计稿，缺乏游戏感 |\n| 生成完整UI界面 | 像真实游戏截图，世界观完整 |\n| 制作5张关键画面 | 形成完整Demo叙事，更像正式项目 |\n\n**实际应用场景**：游戏UI概念验证、向投资人或团队展示项目视觉方向、虚拟项目预告片。\n\n---\n\n#### 概念四：按秒分镜的视频提示词写法\n\n**是什么**：在Kling 2.0的提示词里，用时间轴的方式精确描述每一秒画面内容和镜头动作。\n\n**为什么重要**：AI视频模型如果只收到模糊描述，生成结果会随机且混乱；按秒给出分镜指令，能大幅提升视频的叙事节奏和画面可控性。\n\n**详细解释**：\n- 先在提示词开头写清楚角色设定（保持与前几步一致）\n- 再按时间段描述画面，例如：\n  - `0-2秒`：出现游戏开始页面\n  - `2-4秒`：人物介绍页入场\n- 每个时间段还需补充镜头动作（推进、横移、淡入等）\n\n**实际应用场景**：制作游戏预告片、产品概念视频、AI短片时，用分镜提示词替代传统脚本。","table":"| 步骤 | 使用工具 | 输入 | 输出 | 关键注意点 |\n|------|----------|------|------|------------|\n| 第一步：创建2D角色 | Image Ernie | 文字提示词 | 2D角色图 | 细节要写全：外形、服装、纹身、机械手臂等 |\n| 第二步：增加3D质感 | Nano Banana | 2D角色图 + 3D参考图 | 3D质感角色图 | 选好参考图，质感决定最终风格 |\n| 第三步：生成游戏UI | GPT Image 2 | 角色图 + UI需求描述 | 5张游戏界面图 | 生成完整UI，不要只生成角色 |\n| 第四步：生成视频 | Kling 2.0 | 游戏UI图 + 分镜提示词 | 游戏预告片视频 | 提示词按秒分镜，写清楚镜头动作 |\n| 可选：画质增强 | 视频增强工具 | 生成的视频 | 高清视频 | 提升清晰度和细节质感 |\n\n**适用场景速查**：\n\n| 使用场景 | 是否适合这套流程 |\n|----------|-----------------|\n| 游戏概念Demo | ✅ 最核心用途 |\n| 角色展示视频 | ✅ 适合 |\n| 游戏UI视觉测试 | ✅ 适合 |\n| 虚拟项目预告片 | ✅ 适合 |\n| 真实游戏开发资产 | ❌ 不适合，仅用于展示 |","thinking":"1. **角色一致性的边界在哪里？** 当前流程依赖提示词复用来保持角色一致，但AI生成存在随机性。如果5张UI图里角色细节出现偏差，有没有更稳定的方法来\"锁定\"角色形象？\n\n2. **按秒分镜提示词的上限是什么？** Kling 2.0能精确响应多细粒度的时间指令？如果要做一段30秒以上的预告片，这套写法还有效吗？有没有更好的结构化方式？\n\n3. **这套流程能否反向用于真实游戏开发？** 用AI快速生成的概念Demo，能在多大程度上指导真实的UI设计和角色建模？从\"AI展示稿\"到\"可落地资产\"之间，还差哪些关键步骤？","remember":"角色设定写清楚、UI生成要完整、视频提示词按秒分镜——四步流程让任何人都能做出以假乱真的游戏概念Demo。","is_new":true},{"id":"7637141582751337778","title":"lesson_7637141582751337778.md","cat":"llm-fundamentals","video_url":"https://www.douyin.com/video/7637141582751337778","audience":"","summary":"","raw_preview":"","knowledge_map":"","concepts":"","table":"","thinking":"","remember":"","is_new":false},{"id":"7638448471984409866","title":"B站大模型学习博主Top10盘点","cat":"llm-fundamentals","video_url":"https://www.douyin.com/video/7638448471984409866","audience":"想系统学习大模型但不知道从哪里入手的零基础新手或有一定基础的开发者","summary":"盘点B站大模型学习Top 10博主，按内容风格和适合人群分类，帮你快速找到最适合自己的学习路径。","raw_preview":"B站大模型博主盘点Top 10。\n\n**Number 10 Leaf Files**：专注大模型高阶源码解析，深度拆解底层架构与核心逻辑，专业性强，适配高阶研发学习。适合资深开发、研究生，以及深耕大模型底层研发的技术发烧友。\n\n**Number 9 同技此豪雄**：主打多模态大模型实战教程，清晰易懂，负迁性高，案例丰富，适合拓展多领域AI应用能力。适合视觉算法工程师、全栈开发者，以及想要学习多模态","knowledge_map":"B站大模型博主Top 10\n├── 零基础/入门向\n│   ├── No.4 林粒粒呀 → RAG、提示词、Agent实操，门槛最低\n│   ├── No.6 网络头学科学 → 动画讲底层数学，降低理论门槛\n│   └── No.2 五道口那时 → 全栈实战，通俗易懂，快速落地\n│\n├── 工程开发向\n│   ├── No.5 两目入程序员 → 微调、LoRA、开源框架，代码实战\n│   ├── No.3 Pingly Balah WAZ → 量化、本地部署、推理加速，硬核部署\n│   └── No.9 同技此豪雄 → 多模态大模型实战\n│\n├── 前沿资讯向\n│   ├── No.7 更直哥 → 行业动态、新模型快速解读\n│   └── No.8 靠够数据科学 → 前沿技术解读+科普\n│\n└── 高阶/系统学习向\n    ├── No.1 丹礼物学AI → 体系完整，理论+论文+代码，最系统\n    └─
