工具\n│   ├── Blank TypeScript 是什么：空白起步模板\n│   └── 初始化后自动生成：入口文件 / 配置文件 / 依赖声明 / 脚本\n│\n├── 3. Codex 对话机制\n│   ├── 排队模式：主任务完成后再回答插入问题\n│   └── 插队模式：跳出主任务先回答插入问题（可在设置里切换）\n│\n├── 4. 写项目规范文件（Agent STANDARDS）\n│   ├── 项目类型：Expo 移动应用\n│   ├── 技术栈说明\n│   ├── 开发方式：本地优先，不上云\n│   └── 输出语言：全程中文\n│\n└── 5. Codex 首次使用设置\n    ├── 常规工作模式\n    ├── 权限安全访问（默认关闭）\n    ├── 批准策略（Auto-approve）\n    ├── 作用范围（Workspace-wide）\n    └── 个性化自定义指引","concepts":"#### 概念一：Expo Blank TypeScript 模板\n\n**是什么**：Expo 是一个专门用来开发手机 APP 的工具框架，Blank TypeScript 是它提供的一个最简单的空白起步模板，使用 TypeScript 语言。\n\n**为什么重要**：\n用这个模板初始化项目，可以让 Codex 在一个标准、干净的结构里开始写代码，避免从零手动配置环境的麻烦。\n\n**详细解释**：\n\n| 术语 | 含义 |\n|---|---|\n| Expo | 做手机 APP 的开发工具，支持 iOS 和 Android |\n| Blank | 空白模板，没有多余的预置页面和功能 |\n| TypeScript | JavaScript 的加强版，有类型检查，适合正式项目 |\n| 初始化后生成的内容 | APP 入口文件、配置文件、依赖声明、脚本 |\n\n**实际应用场景**：\n在 Codex 对话框里发送一句话——\"请用 Expo Blank TypeScript 模板初始化这个空目录\"——Codex 就会自动执行命令，把整个项目骨架生成好，不需要自己手动敲命令行。\n\n---\n\n#### 概念二：Codex 的任务排队 vs 插队机制\n\n**是什么**：当 Codex 正在执行一个任务时，你又发了一条新消息，Codex 有两种处理方式：排队（等主任务完成再回答）或插队（暂停主任务先回答你）。\n\n**为什么重要**：\n理解这个机制，可以避免在 Codex 干活的时候误操作打断任务，也可以主动利用插队功能随时问问题。\n\n**详细解释**：\n\n| 模式 | 行为 |\n|---|---|\n| 排队模式 | 主任务执行完毕后，再处理你插进来的问题 |\n| 插队模式 | 跳出主任务，先回答插入的问题，再继续主任务 |\n| 如何切换 | 在 Codex 设置里直接配置 |\n\n**实际应用场景**：\n视频中，作者在 Codex 初始化项目的同时，插了一条\"请用通俗语言解释 Expo\"，Codex 可以根据设置决定是先解释还是等初始化完再解释。\n\n---\n\n#### 概念三：项目规范文件（Agent STANDARDS）\n\n**是什么**：一个放在项目里的简短说明文件，告诉 Codex 这个项目的基本规则，比如项目类型、技术栈、开发原则、输出语言。\n\n**为什么重要**：\n有了这个文件，Codex 在整个项目过程中都会遵守这些规则，不会乱用云服务、不会突然切换语言，保持行为一致。\n\n**详细解释**：\n\n视频中生成的 Agent STANDARDS 只有五行核心内容：\n\n| 字段 | 内容 |\n|---|---|\n| 项目类型 | Expo 移动应用 |\n| 技术栈 | （按实际项目填写） |\n| 开发方式 | 本地优先，不上云 |\n| 依赖原则 | 不依赖外部云服务 |\n| 输出语言 | 全程中文 |\n\n**实际应用场景**：\n项目初始化完成后，让 Codex 自动生成这个文件，后续所有任务都会以此为基准执行，不需要每次都重复说明规则。\n\n---\n\n#### 概念四：Codex 首次使用的关键设置\n\n**是什么**：第一次打开 Codex 时需要完成的基础配置，决定 Codex 的工作方式和权限范围。\n\n**为什么重要**：\n设置不对，Codex 可能会在没有确认的情况下执行危险操作，或者每次都要手动审批，影响效率。\n\n**详细解释**：\n\n| 设置项 | 推荐值 | 说明 |\n|---|---|---|\n| 常规工作模式 | 按需选择 | 决定 Codex 主动程度 |\n| 权限安全访问 | 默认关闭 | 防止 Codex 随意访问系统 |\n| 批准策略 | Auto-approve | 减少每步手动确认 |\n| 作用范围 | Workspace-wide | 限定在当前工作区内操作 |\n| 个性化自定义指引 | 填写核心偏好 | 先填重要的，后续慢慢补充 |\n\n**实际应用场景**：\n第一次打开 Codex 时先把这几项配好，后续跟 Codex 磨合的过程中再逐步调整，不需要一次性全部设置完美。","table":"| 步骤 | 操作 | 关键指令或说明 |\n|---|---|---|\n| 1. 新建项目 | 右键新建空白文件夹 | 命名为 Speak to Note |\n| 2. 选择模型 | 在对话框右下角选择 | 选定后不要中途换模型 |\n| 3. 初始化项目 | 发送指令给 Codex | \"请用 Expo Blank TypeScript 模板初始化这个空目录\" |\n| 4. 不懂就问 | 直接在对话框插入问题 | \"请用通俗语言解释 Expo 并解释这句话的含义\" |\n| 5. 生成规范文件 | 让 Codex 写 Agent STANDARDS | 说明项目类型、技术栈、本地优先、全程中文 |\n| 6. 首次设置 | 进入 Codex 设置页 | 权限关闭、Auto-approve、Workspace-wide |","thinking":"1. **模型一致性的代价是什么？** 视频中提到项目确定用哪个模型后就不要换，但如果新模型能力更强，中途换模型会带来哪些具体风险？代码风格不一致、上下文丢失，还是其他问题？\n\n2. **Agent STANDARDS 只有五行够用吗？** 视频里的规范文件非常精简，随着项目复杂度增加，什么时候需要扩充这个文件？哪些内容值得加进去，哪些又会变成噪音干扰 Codex？\n\n3. **插队和排队机制背后的效率权衡是什么？** 插队可以随时得到解释，但会打断主任务；排队保证任务连续，但你得等。在实际项目开发中，什么情况下应该用插队，什么情况下应该让 Codex 专心把任务跑完？","remember":"用一句话给 Codex 搭框架，再用五行写清楚规则——项目的骨架就立起来了，后面的事交给 AI 去跑。","is_new":true},{"id":"7637956797097378737","title":"用AI生成像素Boss帧序列动画","cat":"vibecoding","video_url":"https://www.douyin.com/video/7637956797097378737","audience":"对独立游戏开发感兴趣、想用AI工具快速生成游戏素材的开发者或爱好者","summary":"主播用AI在约6小时内为自己的独立游戏生成了一个像素风格Boss（大树守卫）的完整帧序列动画，并成功落地到游戏中，展示了AI工具在独立游戏素材制作上的高效可行性。","raw_preview":"哈喽大家好，主播这次整个大活哈哈。上期说的主播用AI生成了战斗动作帧序列动画，并且还实现了武器替换系统。这期用AI生成了一个老头环的大树守卫风格，放到了主播自己的独立游戏里作为新手关卡Boss，花了大约五六十件素材，现在已经可以打了。\n\n那么废话不多说，主播先来演示一下游戏里的战斗，作为新手关卡的战斗动作……OK，成功拿下大树老师。别看土包这么轻松，其实是用了开发者权限给自己改到三十级，另外还有了","knowledge_map":"AI生成像素Boss帧序列动画\n├── 素材生成\n│   ├── AI生成像素风格Boss形象（参考老头环大树守卫）\n│   ├── 生成帧序列动画（战斗动作帧）\n│   └── 素材处理工具（冰魔龙工具）\n├── 游戏集成\n│   ├── 将Boss导入独立游戏\n│   ├── 设定为新手关卡Boss\n│   └── 配置战斗逻辑\n├── 已有系统（上期基础）\n│   ├── 战斗动作帧序列动画系统\n│   └── 武器替换系统\n└── 开发周期\n    └── 约6小时完成Demo级Boss落地","concepts":"#### 概念一：AI生成帧序列动画\n\n**是什么**：通过AI工具生成角色动作的逐帧图像序列，用于驱动游戏中的动画表现。\n\n**为什么重要**：\n独立开发者通常缺乏美术资源，手绘帧序列动画耗时极长。AI生成可以大幅压缩素材制作时间，让开发者专注于游戏逻辑本身。\n\n**详细解释**：\n- 帧序列动画即将角色动作拆解为多张连续图片（帧），快速播放形成动画效果\n- 主播上期已实现战斗动作帧序列，本期将同样方法应用于Boss角色\n- 生成后需借助专门工具（如冰魔龙工具）对素材进行处理和整理\n\n**实际应用场景**：\n为独立游戏快速生成敌人、Boss、NPC等角色的行走、攻击、受击等动画帧。\n\n---\n\n#### 概念二：以参考IP为原型生成像素素材\n\n**是什么**：以知名游戏中的角色（如老头环大树守卫）为风格参考，用AI生成像素化的类似形象，用于自己的游戏项目。\n\n**为什么重要**：\n有明确的参考原型可以让AI生成方向更聚焦，生成结果更符合预期，同时借助成熟IP的设计语言快速建立角色辨识度。\n\n**详细解释**：\n- 主播以老头环大树守卫为灵感来源，生成像素风格Boss\n- 最终呈现的是\"像素版大树守卫\"，风格上致敬原作，但为独立游戏原创内容\n- 主播评价：作为Demo级别，效果\"虽然有点粗糙，但是很不错的开头\"\n\n**实际应用场景**：\n独立开发者在原型阶段快速搭建Boss或敌人，用知名角色做风格锚点，降低AI生成的不确定性。\n\n---\n\n#### 概念三：快速原型开发（Demo落地）\n\n**是什么**：在短时间内将一个想法从零做到可运行的游戏Demo，验证可行性。\n\n**为什么重要**：\n独立游戏开发最怕想法停留在脑子里。快速落地Demo可以让开发者直观感受游戏体验，发现问题，决定是否继续深化。\n\n**详细解释**：\n\n| 项目 | 详情 |\n|------|------|\n| 触发时机 | 主播摸鱼时突发灵感，想给游戏加Boss |\n| 参考来源 | 老头环大树守卫 |\n| 使用工具 | AI生成素材 + 冰魔龙素材处理工具 |\n| 完成时间 | 约6小时 |\n| 完成程度 | Demo级，可进入游戏实际战斗 |\n| 自我评价 | 有点粗糙，但作为开头很不错 |\n\n**实际应用场景**：\n独立开发者在灵感爆发时，借助AI工具快速验证新系统或新角色的可行性，避免过度设计。","table":"| 维度 | 内容 |\n|------|------|\n| 本期新增内容 | 像素版大树守卫Boss + 帧序列动画 |\n| 上期已有基础 | 战斗动作帧序列系统、武器替换系统 |\n| 素材生成方式 | AI生成 |\n| 素材处理工具 | 冰魔龙工具（可自行搜索） |\n| 开发耗时 | 约6小时 |\n| 完成程度 | Demo级，可实际战斗 |\n| 灵感来源 | 老头环大树守卫 |\n| Boss定位 | 新手关卡Boss |\n| 开发者自评 | 有点粗糙，但作为Demo开头不错 |","thinking":"1. **AI生成的帧序列动画在质量和一致性上有哪些局限？** 主播提到成果\"有点粗糙\"，这种粗糙具体体现在哪些方面，是否有系统性的解决思路？\n\n2. **独立开发者在使用他人IP形象作为灵感参考时，如何把握原创与侵权之间的边界？** 像素化改造是否足以形成独立的原创性？\n\n3. **\"摸鱼时突发灵感、6小时落地Demo\"这种开发节奏是否可持续？** AI工具的介入是否真正改变了独立游戏开发的瓶颈所在，还是只是转移了瓶颈？","remember":"有了AI工具，独立开发者一个下午的灵感，六小时就能变成游戏里真实可打的Boss。","is_new":true},{"id":"7638197919229542053","title":"备孕期父亲咖啡因的跨代影响","cat":"vibecoding","video_url":"https://www.douyin.com/video/7638197919229542053","audience":"适合备孕期或计划备孕的男性及其伴侣，以及关注生殖健康的普通大众。","summary":"备孕期父亲长期大量摄入咖啡因，会通过升高皮质醇、改变精子表观遗传的方式，影响下一代大脑的应激系统，增加子代焦虑风险。","raw_preview":"爸爸孕前长期大量摄入咖啡因，会通过精子表观遗传修饰改变，跨代遗传至子代大脑，导致子代在面对压力时，HPA轴出现过度的应激反应，增加焦虑行为的风险。\n\n我们来看《Advanced Science》上的研究。咖啡因作为全球最广泛消费的中枢神经兴奋剂，长期大量的摄入可以让血液皮质醇水平持续升高，这是一种慢性的应激源。而且在育龄男性中，摄入量为女性的1.5倍。\n\n实验发现，爸爸孕前过量摄入咖啡因，会使子代","knowledge_map":"备孕期父亲咖啡因摄入的跨代影响\n├── 起点：父亲孕前长期大量摄入咖啡因\n│   ├── 育龄男性摄入量是女性的 1.5 倍\n│   └── 咖啡因 = 全球最广泛消费的中枢神经兴奋剂\n│\n├── 中间机制：体内发生了什么\n│   ├── 血液皮质醇水平持续升高\n│   ├── 形成慢性应激状态\n│   └── 精子表观遗传修饰发生改变\n│       └── （咖啡因不直接作用于精子，而是通过皮质醇间接影响）\n│\n└── 终点：对子代的影响\n    ├── 子代 HPA 轴出现过度应激反应\n    ├── 表现：焦虑、抑郁行为增加\n    └── 雄性子代受影响更为严重","concepts":"#### 概念一：表观遗传修饰\n\n**是什么**：不改变 DNA 序列本身，但通过化学修饰影响基因表达方式的遗传机制。\n\n**为什么重要**：\n它解释了\"环境和生活方式如何影响下一代\"——父亲的饮食、压力、习惯可以通过这条路径传递给孩子。\n\n**详细解释**：\n咖啡因并不直接损伤精子的 DNA 序列，而是通过以下路径间接影响：\n\n```\n大量摄入咖啡因\n    → 皮质醇水平持续升高（慢性应激）\n    → 精子的表观遗传修饰发生改变\n    → 受精后，这些修饰信息传递给子代\n    → 子代大脑发育受到影响\n```\n\n**实际应用场景**：\n备孕期的男性不仅需要关注精子数量和形态，还需要关注自身的生活方式（压力、饮食、咖啡因摄入），因为这些都可能通过表观遗传影响孩子。\n\n---\n\n#### 概念二：HPA 轴（下丘脑-垂体-肾上腺轴）\n\n**是什么**：人体调节应激反应的核心神经-内分泌系统，负责控制皮质醇等应激激素的分泌。\n\n**为什么重要**：\nHPA 轴的功能决定了一个人面对压力时的反应模式。如果这个系统在发育期被\"调校\"得过于敏感，会导致终身的焦虑和抑郁风险升高。\n\n**详细解释**：\n\n| 状态 | HPA 轴表现 | 行为结果 |\n|------|-----------|---------|\n| 正常 | 面对压力时适度激活，压力过后恢复平静 | 情绪稳定，应对能力正常 |\n| 过度激活（受影响子代） | 面对压力时反应过度，难以平复 | 焦虑、抑郁行为明显增加 |\n\n**实际应用场景**：\n视频中指出，父亲孕前过量摄入咖啡因的子代，在面临压力时 HPA 轴会出现过度应激反应，且雄性子代比雌性子代受影响更严重。\n\n---\n\n#### 概念三：慢性应激源\n\n**是什么**：长期持续存在、使身体保持应激状态的因素，区别于短暂的急性压力。\n\n**为什么重要**：\n慢性应激会持续升高皮质醇水平，进而影响多个系统，包括视频中提到的精子表观遗传。\n\n**详细解释**：\n- 咖啡因长期大量摄入 → 皮质醇水平**持续**升高（不是一过性的）\n- 这种\"慢性\"状态让身体长期处于应激模式\n- 积累效应最终影响到精子的表观遗传状态\n\n**实际应用场景**：\n备孕男性如果同时面临工作压力大、长期大量喝咖啡两种慢性应激源叠加，对精子表观遗传的潜在影响可能更值得关注。","table":"| 维度 | 关键信息 |\n|------|---------|\n| 研究来源 | 《Advanced Science》 |\n| 影响对象 | 备孕/孕前阶段的父亲 |\n| 风险行为 | 长期**大量**摄入咖啡因 |\n| 性别差异 | 育龄男性咖啡因摄入量约为女性的 **1.5 倍** |\n| 作用机制 | 咖啡因 → 皮质醇升高 → 精子表观遗传修饰改变 → 跨代遗传 |\n| 对子代的影响 | HPA 轴过度激活，焦虑、抑郁行为风险增加 |\n| 哪类子代更易受影响 | **雄性**子代受影响更为严重 |\n| 咖啡因作用方式 | **间接**（通过皮质醇），非直接作用于精子 |","thinking":"1. **剂量边界在哪里？** 视频强调的是\"长期大量\"摄入，那么每天多少毫克咖啡因才算\"过量\"？偶尔喝一杯咖啡的备孕男性是否也需要担心？\n\n2. **这种表观遗传改变可逆吗？** 如果备孕男性在计划要孩子前提前几个月戒断或减少咖啡因，精子的表观遗传修饰能否恢复正常？需要多长时间？\n\n3. **母亲的咖啡因摄入是否有类似的跨代机制？** 视频聚焦于父亲，但母亲孕前或孕期的咖啡因摄入，是否也会通过类似的表观遗传路径影响子代的 HPA 轴发育？","remember":"备孕不只是妈妈的事——爸爸孕前长期大量喝咖啡，可能通过改变精子的\"遗传开关\"，让孩子天生更容易焦虑。","is_new":true},{"id":"7638447340403166499","title":"lesson_7638447340403166499.md","cat":"vibecoding","video_url":"https://www.douyin.com/video/7638447340403166499","audience":"","summary":"","raw_preview":"","knowledge_map":"","concepts":"","table":"","thinking":"","remember":"","is_new":false},{"id":"7639300730813156659","title":"lesson_7639300730813156659.md","cat":"vibecoding","video_url":"https://www.douyin.com/video/7639300730813156659","audience":"","summary":"","raw_preview":"","knowledge_map":"","concepts":"","table":"","thinking":"","remember":"","is_new":false},{"id":"7639591804182023470","title":"用AI从零搭建个人网站的最高效实践","cat":"vibecoding","video_url":"https://www.douyin.com/video/7639591804182023470","audience":"想用AI工具快速搭建并上线个人网站、但没有编程基础的产品、设计或开发从业者","summary":"用Codex（AI编程工具）通过自然语言对话，三步完成个人网站的搭建、部署和域名绑定，让零编程基础的人也能快速上线一个高质量的个人作品集网站。","raw_preview":"我发现现在用AI做个人网站的最佳方式就是用Codex从头做到尾。这是我第一次做个人网站，我是用Codex从头做到尾，用自然语言来给他表述的。这是已经做好的一个效果，你会发现里面的动态效果、交互效果往往都能达到我的预期，满足我的需求。\n\n所以我们今天就分三步给大家上教程，手把手教大家做出自己风格的个人网站。\n\n**第一步：给Codex提需求。**\n\n很多人找人做个人网站都是直接告诉他我想要什么样的风","knowledge_map":"用AI做个人网站（全流程）\n├── 第一步：用Codex本地搭建网站\n│   ├── 核心方法：用自然语言提需求，而非直接让AI生成\n│   ├── 关键动作1：要求AI每次找你确认，不要直接生成\n│   ├── 关键动作2：回答AI的需求问题（定位/风格/内容）\n│   │   ├── 你的身份（产品/设计/开发）\n│   │   ├── 你的目的（找工作/接项目/展示作品）\n│   │   └── 你想传达的第一印象\n│   ├── 关键动作3：确认框架后再让AI开始生成\n│   ├── 后续修改：用自然语言描述细节调整\n│   └── 效率技巧：多线程对话（首页/作品集/项目分开做）\n│\n├── 第二步：上线部署\n│   ├── 工具1：GitHub（存储代码）\n│   │   └── 可授权Codex直接上传，一句话完成\n│   └── 工具2：Vercel（部署上线）\n│       ├── 连接GitHub账户\n│       ├── 一键部署\n│       └── 自动生成可分享的网站链接\n│\n└── 第三步：绑定自定义域名（可选）\n    ├── 平台：阿里云 / 腾讯云\n    ├── 步骤：起名 → 查重 → 选后缀 → 注册\n    └── 最终：将自定义域名绑定到Vercel","concepts":"#### 概念一：需求确认优先原则\n\n**是什么**：在让AI生成网站之前，先通过多轮对话让AI充分理解你的需求，并要求AI主动找你确认，而不是直接生成结果。\n\n**为什么重要**：\n跳过这一步，AI会直接给你一个通用模板，和你真正想要的效果差距很大，后期修改成本反而更高。\n\n**详细解释**：\n\n提需求时要明确告诉AI三件事：\n1. **你是谁**：身份（产品经理/设计师/开发者）\n2. **你要什么**：目的（找工作/接项目/展示作品）\n3. **你想给人什么感觉**：第一印象（专业感/创意感/技术感）\n\n同时，在第一句话里就加上：**\"每次找我确认我想要展现的内容，再开始做\"**，这句话是关键触发词。\n\n**实际应用场景**：\n- 想找工作的开发者 → 强调专业感和项目能力展示\n- 想接自由项目的设计师 → 强调审美和作品集呈现\n- 想展示AI工具的创作者 → 强调创意感和工具链接\n\n---\n\n#### 概念二：GitHub + Vercel 部署组合\n\n**是什么**：GitHub负责存储和管理网站代码，Vercel负责将代码部署成可访问的网站，两者配合完成从本地到上线的全流程。\n\n**为什么重要**：\n本地做好的网站别人无法访问，必须借助这两个工具才能让网站真正\"上线\"，而且两者都有免费版本，对个人网站完全够用。\n\n**详细解释**：\n\n| 工具 | 作用 | 操作方式 |\n|------|------|----------|\n| GitHub | 代码仓库，存储你的网站文件 | 可授权Codex直接上传，一句话完成 |\n| Vercel | 自动部署，生成可访问的网址 | 连接GitHub账户后一键部署 |\n\n**实际应用场景**：\n代码改动后，Vercel会自动同步更新，不需要每次手动重新部署，后续维护也很方便。\n\n---\n\n#### 概念三：自定义域名\n\n**是什么**：用阿里云、腾讯云等平台注册一个属于自己的网址（如 yourname.com），替换掉Vercel自动生成的默认域名。\n\n**为什么重要**：\n自定义域名更专业，更容易被人记住，也更能体现个人品牌，尤其是在求职或接项目时发给对方，第一印象完全不同。\n\n**详细解释**：\n- Vercel免费生成的域名格式通常是 `xxx.vercel.app`，不够个性化\n- 自定义域名可以是 `yourname.com` 或任何你喜欢的后缀\n- 注册前先搜索该域名是否已被他人注册\n\n**实际应用场景**：\n注册完成后，在Vercel后台绑定自定义域名，整个流程10分钟以内可以完成。\n\n---\n\n#### 概念四：个人网站的求职价值\n\n**是什么**：个人网站作为简历的深度补充，能展示简历无法呈现的思考方式、审美风格和项目细节。\n\n**为什么重要**：\n视频中引用了一位猎头的数据：**有个人网站的求职者，90%以上会从简历堆里脱颖而出**。\n\n**详细解释**：\n\n| 对比维度 | 简历 | 个人网站 |\n|----------|------|----------|\n| 信息密度 | 高度压缩，快速筛选 | 深度展示，充分了解 |\n| 展示内容 | 经历、技能列表 | 作品、思考过程、风格 |\n| 第一印象 | 格式化、趋同 | 个性化、差异化 |\n| 适合阶段 | 初步筛选 | 深度了解 |\n\n**实际应用场景**：\n- 发给面试官：让对方在面试前就对你有深度了解\n- 发给潜在合作方：快速建立信任感\n- 发给身边朋友：帮助你进行口碑传播","table":"| 步骤 | 目标 | 用到的工具 | 关键动作 |\n|------|------|------------|----------|\n| 第一步：本地搭建 | 做出符合需求的网站 | Codex | 先让AI问你需求，确认框架后再生成；多线程对话提效率 |\n| 第二步：上线部署 | 让网站可以被访问 | GitHub + Vercel | 授权Codex上传GitHub → Vercel连接GitHub → 一键部署 |\n| 第三步：绑定域名 | 用自己的专属域名 | 阿里云 / 腾讯云 + Vercel | 注册域名 → 在Vercel后台绑定 |\n\n| 常见误区 | 正确做法 |\n|----------|----------|\n| 直接让AI生成网站 | 先让AI问你需求，逐步确认后再生成 |\n| 只用Vercel默认域名 | 注册自定义域名，提升专业度 |\n| 一个对话框做所有页面 | 多线程并行，首页/作品集/项目分开做 |\n| 认为个人网站只适合设计师/程序员 | AI时代，任何有作品的人都值得有个人网站 |","thinking":"1. **视频强调\"让AI找你确认\"是核心步骤，但在实际操作中，哪些需求信息是你最难清晰表达的？如何在对话中逐步澄清这些模糊需求？**\n\n2. **猎头数据显示\"有个人网站的申请者90%以上会脱颖而出\"，这个优势会随着越来越多人用AI做网站而缩小吗？个人网站的差异化竞争力未来会体现在哪里？**\n\n3. **视频介绍的是\"展示型\"个人网站，如果你的目标不是求职而是持续输出内容（如写作、工具分享），同样的三步流程还适用吗？需要做哪些调整？**","remember":"用AI做个人网站，不是让AI直接生成，而是先让AI问清楚你是谁、要什么、给谁看，再三步完成从本地到上线的全流程。","is_new":true},{"id":"7640047982642348790","title":"AI 长对话高效管理方法","cat":"vibecoding","video_url":"https://www.douyin.com/video/7640047982642348790","audience":"频繁使用 AI 工具完成工作任务、被长对话失忆和额度消耗困扰的职场人","summary":"用一段\"交接提示词\"，让 AI 在长对话结束前自动打包关键信息，实现跨窗口、跨模型、跨用户的无缝任务续接，解决长对话变笨、耗额度、难交接三大痛点。","raw_preview":"用 AI 久了，大家有没有发现一个问题——同一个对话聊太长，它就开始变笨。前面明明说好的条件和要求，越到后面就越容易忘，回答开始出错，废话还变多。\n\n而且长对话后，AI 每次回复都需要分析之前大段的上下文，响应速度明显变慢，算力消耗也越来越大。免费用户容易触顶，就算付费用户也得多花不少额度。\n\n有时候任务做到一半，额度用完了，想换模型或者让别人接手，结果没法同步任务背景、要求和进展情况，只能重新来","knowledge_map":"AI 长对话管理\n├── 核心问题（为什么需要管理）\n│   ├── 质量下降：越聊越忘，回答出错，废话增多\n│   ├── 效率下降：上下文过长，响应速度变慢\n│   ├── 成本上升：算力消耗大，免费/付费额度加速耗尽\n│   └── 协作困难：无法同步背景，换模型/换人只能重来\n│\n├── 触发场景（什么时候需要交接）\n│   ├── 场景一：额度用完，需要换模型或换人接手\n│   └── 场景二：主线任务中冒出新想法，需开新窗口\n│\n└── 解决方案：长对话交接提示词\n    ├── 使用时机：任务未完成、对话需要中断时\n    ├── 操作方式：在长对话末尾发送提示词\n    ├── 输出内容\n    │   ├── 当前任务目标\n    │   ├── 必要背景信息\n    │   ├── 已完成内容\n    │   └── 下一步待办事项\n    └── 配套使用：与\"对话价值提炼提示词\"组合，覆盖完整对话管理","concepts":"#### 概念一：AI 长对话退化\n\n**是什么**：同一对话窗口内，随着聊天轮次增加，AI 的回答质量逐渐下滑的现象。\n\n**为什么重要**：这是用 AI 做长周期任务时最常踩的坑，很多人误以为是模型本身变差，实际是对话管理的问题。\n\n**详细解释**：\n- AI 每次回复都要重新处理从头到尾的全部上下文，对话越长，\"记忆负担\"越重\n- 超出一定长度后，早期设定的条件和要求容易被稀释或遗忘\n- 同时带来废话增多、回答跑偏两个明显症状\n\n**实际应用场景**：写一篇长报告、做多轮代码调试、持续推进一个复杂项目时，对话进行到中后期往往开始出现这些问题。\n\n---\n\n#### 概念二：算力额度消耗与上下文长度的关系\n\n**是什么**：AI 处理的上下文越长，每次回复消耗的算力额度越多。\n\n**为什么重要**：直接影响使用成本，对免费用户和按量付费用户都有实际经济影响。\n\n**详细解释**：\n\n| 用户类型 | 长对话带来的影响 |\n|---|---|\n| 免费用户 | 更快触达每日/每月使用上限 |\n| 付费用户 | 同样的任务消耗更多额度，增加费用 |\n| 团队协作 | 无法共享上下文，换人接手需重新输入，额外消耗 |\n\n**实际应用场景**：在额度快用完时提前做对话交接，把精炼后的信息带入新窗口，可以显著减少无效的上下文重复消耗。\n\n---\n\n#### 概念三：长对话交接提示词\n\n**是什么**：一段预先设计好的提示词，发送后让 AI 自动将当前对话的关键信息结构化打包输出。\n\n**为什么重要**：解决了任务中途中断时\"信息断层\"的问题，让对话可以像文件一样被保存和传递。\n\n**详细解释**：发送该提示词后，AI 输出的内容包含四个模块：\n\n| 输出模块 | 作用 |\n|---|---|\n| 当前任务目标 | 明确\"我们在做什么\" |\n| 必要背景信息 | 保留关键前提和约束条件 |\n| 已完成内容 | 记录进度，避免重复劳动 |\n| 下一步待办事项 | 新窗口打开即可无缝继续 |\n\n**实际应用场景**：\n- 额度用完需切换模型时，用交接提示词导出摘要，粘贴进新窗口继续\n- 主线任务进行中突然要开新窗口探索新想法时，先导出交接摘要再开窗\n\n---\n\n#### 概念四：对话管理的两个提示词组合\n\n**是什么**：视频提到两个配套使用的提示词——①对话结束后的\"价值提炼提示词\"（上期内容）；②任务未完成时的\"长对话交接提示词\"（本期内容）。\n\n**为什么重要**：两种场景覆盖了对话管理的完整闭环，一个管\"收尾\"，一个管\"续接\"。\n\n**详细解释**：\n\n| 提示词类型 | 使用时机 | 核心目的 |\n|---|---|---|\n| 价值提炼提示词 | 任务已完成，对话结束后 | 提炼对话中的知识和经验 |\n| 长对话交接提示词 | 任务未完成，对话需中断时 | 保存进度，支持无缝续接 |\n\n**实际应用场景**：两个提示词配合使用，无论对话是\"做完了\"还是\"做到一半\"，都能把有价值的信息留下来。","table":"| 问题 | 原因 | 解决方式 |\n|---|---|---|\n| AI 越聊越笨、出错变多 | 上下文过长，早期指令被稀释 | 定期用交接提示词刷新上下文 |\n| 响应速度变慢 | 每次回复需处理大量历史上下文 | 开新窗口，粘贴精炼摘要而非完整记录 |\n| 额度消耗过快 | 长上下文占用大量算力 | 中断后新窗口续接，减少冗余上下文 |\n| 换模型/换人无法交接 | 对话背景无法迁移 | 用交接提示词生成结构化摘要再迁移 |\n| 开新窗口背景全丢失 | 不同窗口上下文不互通 | 先导出交接摘要，粘贴进新窗口 |","thinking":"1. **提示词本身的质量决定了交接摘要的质量**——如果交接提示词设计得不够精准，AI 可能遗漏关键信息或输出冗余内容。什么样的交接提示词结构才能保证\"四个模块\"都被准确提取？\n\n2. **这个方法依赖用户主动触发**，但很多人往往在对话已经\"变笨\"之后才意识到问题。有没有办法设定一个主动提醒机制，让自己在对话质量下降之前就做交接？\n\n3. **视频提到\"让别人接手任务\"的场景**——在团队协作中，除了对话摘要，还需要哪些信息才能让新接手的人真正无缝续接，而不只是了解进度？","remember":"长对话变笨不是模型的错，在对话中断前发一段交接提示词，让 AI 把任务目标、背景、进度、下一步打包好，新窗口粘贴即用，信息一条不丢。","is_new":true},{"id":"7642656300443593897","title":"判断AI场景值不值得做的五个指标","cat":"vibecoding","video_url":"https://www.douyin.com/video/7642656300443593897","audience":"正在推进企业AI落地、需要筛选优先场景的产品经理、AI项目负责人或业务决策者","summary":"用\"业务价值、高频度、可落地、见效快、可复制\"五个指标，帮你快速筛选出真正值得优先推进的企业AI场景，避免在错误方向上浪费资源。","raw_preview":"判断一个企业AI场景是不是值得优先做，我会先看这五个指标。\n\n第一个是他有没有业务价值。这个是最基础的，一个场景他到底是在解决什么问题？比如说收入问题、成本问题、分析问题，还是关于效率问题？面对用户提的需求，我会问他这三个问题：他具体替谁干活？他可以解决什么问题？如果做好了会怎么样？如果这些答不上来，那他大概率不是第一优先级。\n\n第二个问题是他够不够高频。企业做AI特别适合先找高频动作，因为高频才","knowledge_map":"企业AI场景筛选框架\n├── 指标一：业务价值\n│   ├── 解决什么问题（收入/成本/效率/分析）\n│   ├── 替谁干活\n│   ├── 能解决什么\n│   └── 做好了会怎样\n├── 指标二：高频度\n│   ├── 高频才有放大效应\n│   └── 典型高频动作：查/写/回复/整理/判断\n├── 指标三：当前可落地性\n│   ├── 有没有可用资料\n│   ├── 有没有明确流程\n│   ├── 有没有负责人\n│   ├── 有没有使用者\n│   └── 有没有质量判断标准\n├── 指标四：见效速度\n│   ├── 30天内能否看到真实变化\n│   └── 变化信号：团队开始用/时间变短/输出稳定/经验复用\n└── 指标五：可复制性\n    ├── 只对一人有用 → 个人玩具\n    └── 能跨岗位/团队/客户复用 → 企业级价值","concepts":"#### 概念一：业务价值三问法\n\n**是什么**：在评估一个AI场景时，用三个问题快速验证其业务价值的方法。\n\n**为什么重要**：很多AI场景听起来很酷，但说不清楚解决了谁的什么问题，落地后没有人用，浪费资源。\n\n**详细解释**：\n| 问题 | 目的 |\n|------|------|\n| 具体替谁干活？ | 明确使用者，避免无主需求 |\n| 可以解决什么问题？ | 锁定价值类型（收入/成本/效率/分析） |\n| 做好了会怎样？ | 验证结果是否可衡量 |\n\n**实际应用场景**：产品经理收到业务部门的AI需求时，先用这三问过滤，答不上来的需求直接降低优先级。\n\n---\n\n#### 概念二：高频放大效应\n\n**是什么**：AI场景的价值与其使用频率正相关，高频动作产生的复利效益远大于低频场景。\n\n**为什么重要**：企业AI资源有限，高频场景投入产出比最高，最容易被团队感知到价值。\n\n**详细解释**：\n- 典型高频动作：每天都要查的信息、每天都要写的报告、每天都要回复的消息、每天都要整理的数据、每天都要做的判断\n- 举例：一个员工每天做20次动作，每次省5分钟 = 每天节省100分钟\n\n**实际应用场景**：优先选择销售每日跟进记录、客服每日回复、运营每日数据整理等高频场景作为AI落地切入点。\n\n---\n\n#### 概念三：落地条件检查清单\n\n**是什么**：在启动AI场景前，评估当前基础条件是否具备的五项检查。\n\n**为什么重要**：很多AI项目失败不是因为技术不行，而是数据底座和流程根本没准备好，强行上AI等于空中楼阁。\n\n**详细解释**：\n| 检查项 | 说明 |\n|--------|------|\n| 可用资料 | 文档是否整理、是否过期、是否可检索 |\n| 明确流程 | 业务流程是否有标准化定义 |\n| 负责人 | 是否有人对AI场景的结果负责 |\n| 使用者 | 是否有明确的目标用户愿意使用 |\n| 质量标准 | 是否能判断AI输出好不好 |\n\n**实际应用场景**：在做知识库问答助手前，先用此清单评估，若资料散乱、无人维护，第一步应是整理知识底座而非直接开发助手。\n\n---\n\n#### 概念四：可复制性与企业级价值\n\n**是什么**：一个AI场景能否从单人使用扩展到岗位级、团队级乃至客户级复用，决定了其长期价值。\n\n**为什么重要**：只服务一个人的AI工具是\"个人玩具\"，无法产生企业ROI；能复制的场景才有机会形成SOP、沉淀为组织能力。\n\n**详细解释**：\n- 个人玩具：只有一个人在用，离开这个人场景就消失\n- 岗位级复用：同岗位所有人都能用\n- 团队级复用：跨部门推广\n- 客户级复用：成为产品化能力对外输出\n\n**实际应用场景**：评估一个销售话术AI时，不只看当前用户，要问\"这套逻辑能不能推给全部销售团队？\"","table":"| 指标 | 核心问题 | 合格信号 | 不合格信号 |\n|------|----------|----------|------------|\n| 业务价值 | 替谁干活？解决什么？做好了怎样？ | 三问都能答上来 | 答不上来或答案模糊 |\n| 高频度 | 每天做几次？ | 每天多次重复动作 | 一月一次或偶发需求 |\n| 可落地性 | 资料/流程/负责人是否就绪？ | 五项检查全部具备 | 资料散乱、无人负责 |\n| 见效速度 | 30天内能看到变化吗？ | 有可衡量的短期信号 | 需要半年以上才能验证 |\n| 可复制性 | 能推广给更多人吗？ | 岗位/团队/客户可复用 | 只有一个人在用 |","thinking":"1. 五个指标之间是否有权重之分？如果一个场景高频但落地条件不具备，应该先做条件建设还是换一个场景？\n\n2. 视频中提到\"30天能看到真实变化\"作为验证标准，但不同规模的企业（初创 vs 大厂）的验证周期是否应该不同？如何根据组织规模调整这个标准？\n\n3. \"可复制性\"这个指标放在最后，但作者说它是\"最容易被忽略\"的。在实际企业AI项目中，哪些常见的决策习惯会导致团队忽视这一点？","remember":"企业AI落地不是比谁的概念大，而是用\"价值大、频率高、条件够、见效快、能复制\"五问，把第一批场景选对。","is_new":true},{"id":"7643439325737369211","title":"2026年真实在用的AI工具清单","cat":"vibecoding","video_url":"https://www.douyin.com/video/7643439325737369211","audience":"想用AI提升日常工作效率、但不知道该选哪些工具的职场人和内容创作者","summary":"博主按8大使用场景拆解了自己真实在用的AI工具清单，帮你跳过试错成本，直接找到每个场景下最顺手的那一个。","raw_preview":"2026年了，我把我真正在用的AI工具重新整理了一遍，今天就给大家全部说清楚。有广告的、有国内平替的我都会去说，没有的也会直接告诉你，不强行去凑数。咱们按场景一类一类去过。\n\n第一类是文案创作，我用的是Claude 3.5。因为写文案这件事，我试过了很多模型之后还是回到了Claude。原因很简单，它写出来的AI味道是最低的。我用其他模型写出来的东西，很多时候一眼就能看出来那种机器感，那个措辞太激进","knowledge_map":"2026年AI工具清单（按场景分类）\n│\n├── 1. 文案创作\n│   └── Claude 3.5（AI味道最低，语感接近真人）\n│\n├── 2. 日常问答\n│   ├── 国外：ChatGPT 4.5（幻觉率低，回答可靠）\n│   └── 国内：豆包（快、免费、够用）\n│\n├── 3. 设计 & 开发\n│   ├── 设计：MXL品格（懂设计的AI，非图片生成）\n│   └── 开发：Claude Opus（规划）+ CodeX（执行）\n│\n├── 4. 信息转化\n│   ├── Gad笔记（视频提炼 + 会议录音）\n│   └── 通义听悟（大文件转录，免费）\n│\n├── 5. 图像生成\n│   ├── 国外：GPT image（质感强）+ Magnific Pro（高分辨率补充）\n│   └── 国内：即梦\n│\n├── 6. 知识管理\n│   ├── NotebookLM（私有知识库问答，幻觉率低）\n│   └── Obsidian（笔记 + Claude接入 + Web Clipper）\n│\n├── 7. 语音输入\n│   └── 豆包录音功能（准确率高，完全免费）\n│\n└── 8. 健康顾问\n    └── Claude（专业解读病历/药品说明，优于搜索引擎）","concepts":"#### 概念一：AI味道（AI腔）\n\n**是什么**：AI生成文本中带有的机器感，表现为措辞激进、句式雷同、读起来不像真人写的。\n\n**为什么重要**：做内容创作时，AI腔会让读者一眼识破，降低内容可信度和传播效果。\n\n**详细解释**：博主试用多个模型后发现，大多数模型写出来的文案\"一眼能看出来那种机器感，措辞太激进了\"，而Claude写出来的东西\"语感更接近真人在说话，听起来就是舒服\"。AI味道的高低直接影响文案能否被自然使用。\n\n**实际应用场景**：写公众号文章、社交媒体文案、对外沟通邮件时，优先选择AI味道低的模型（如Claude），减少二次修改成本。\n\n---\n\n#### 概念二：幻觉率（Hallucination Rate）\n\n**是什么**：AI模型在回答时编造不存在的信息或给出错误答案的概率。\n\n**为什么重要**：幻觉率高意味着回答不可靠，用在日常问答或知识管理场景中会产生误导。\n\n**详细解释**：博主在两个场景中专门提到了幻觉率——\n- ChatGPT 4.5：幻觉率低，适合日常问答\n- NotebookLM：只针对用户上传的内容回答，\"不会乱发挥，所以幻觉率非常低\"\n\n**实际应用场景**：需要准确信息的场景（查资料、解读文件、会议纪要）优先选幻觉率低的工具；创意发散场景对幻觉率要求相对低。\n\n---\n\n#### 概念三：规划与执行分工（Plan + Execute 模式）\n\n**是什么**：用语言理解能力强的模型做需求拆解和方案规划，再用执行效率高的模型做具体实现。\n\n**为什么重要**：单一工具往往在理解和执行上难以兼顾，分工协作能让两个工具都发挥最大价值。\n\n**详细解释**：博主的开发工作流：\n| 步骤 | 工具 | 做什么 | 优势 |\n|------|------|--------|------|\n| 第一步 | Claude Opus | 梳理需求，生成详细Plan | 语言理解能力强，能把模糊想法结构化 |\n| 第二步 | CodeX | 拿Plan直接执行 | 执行效率高，有清晰指令后又快又准 |\n\n**实际应用场景**：做任何有一定复杂度的开发项目时，不要直接把模糊需求丢给执行工具，先用Claude把需求想清楚再交出去，可以大幅减少返工。\n\n---\n\n#### 概念四：私有知识库问答\n\n**是什么**：把自己的文档、文章、链接上传到AI工具，让AI只在这些内容范围内回答问题，而不是调用通用知识库。\n\n**为什么重要**：通用AI回答容易跑偏或编造，私有知识库模式让AI的回答范围可控，可靠性大幅提升。\n\n**详细解释**：博主提到NotebookLM的核心价值就在于\"只针对你上传的内容去回答，不会乱发挥\"。配合Obsidian做笔记沉淀，形成个人知识管理闭环：\n- Obsidian：记录和整理笔记\n- Web Clipper：一键收藏网页内容\n- NotebookLM：对已有内容进行问答检索\n\n**实际应用场景**：研究某个专题时，把收集到的所有资料丢进NotebookLM，直接提问，比在文件堆里手动翻找效率高得多。","table":"| 场景 | 推荐工具 | 国内平替 | 是否免费 | 核心优势 |\n|------|----------|----------|----------|----------|\n| 文案创作 | Claude 3.5 | — | 部分免费 | AI味道最低，语感接近真人 |\n| 日常问答 | ChatGPT 4.5 | 豆包 | 豆包免费 | 幻觉率低 / 快速够用 |\n| 界面设计 | MXL品格 | — | — | 懂设计逻辑，非纯图片生成 |\n| 代码开发 | Claude Opus + CodeX | — | — | 规划+执行分工，各用其长 |\n| 视频/会议提炼 | Gad笔记 | 通义听悟 | 通义免费 | 信息转化，省时 |\n| 图像生成 | GPT image + Magnific Pro | 即梦 | 部分免费 | 质感强，高分辨率可补充 |\n| 知识管理 | NotebookLM + Obsidian | — | 基础免费 | 私有知识库，幻觉率低 |\n| 语音输入 | 豆包录音功能 | 豆包录音功能 | 免费 | 准确率高，完全免费 |\n| 健康咨询 | Claude | — | 部分免费 | 专业解读，优于搜索引擎 |","thinking":"1. **博主说\"Claude Opus + CodeX\"这个组合国内没有平替，这个判断的依据是什么？随着国内模型能力的提升，哪些工具有可能在规划或执行环节替代它们？**\n\n2. **NotebookLM被博主认为\"严重被低估\"，但它的核心限制是只能在上传内容范围内回答。这种\"可控性\"和通用AI的\"开放性\"分别适合哪些工作场景？两者能否结合使用？**\n\n3. **博主在健康顾问场景推荐Claude而非专门的医疗AI产品，这背后反映了什么？通用大模型在垂直专业领域的边界在哪里，什么情况下不应该依赖它？**","remember":"工具不在多，关键是每个场景有一个顺手的——这份按场景拆分的清单，帮你跳过试错，直接用对工具。","is_new":true},{"id":"7644347037009366326","title":"AI Agent全链路接管自媒体运营","cat":"vibecoding","video_url":"https://www.douyin.com/video/7644347037009366326","audience":"有自媒体运营需求、希望用 AI 工具提升效率的内容创作者","summary":"作者开源了一个名为 Hermes 的 AI Agent 项目，能够全链路接管自媒体账号的数据采集、实时监控、可视化分析和评论获客四大核心工作，帮助内容创作者降低运营成本、缓解流量焦虑。","raw_preview":"大家现在看到的是我的 AI Agent，也就是 Hermes，现在接入了我的自媒体硬于 SGO，在我的评论区对网友们进行回复，并且委婉地推荐我的财富自由团。自从我用上他之后，我的专属会员入群率猛增，所以这应该也是一个自媒体获客的一把好手。\n\n他除了这个功能以外，还有其他几个核心功能，从数据获取，到数据可视化，再到数据分析、选题分析，再到平台获客，这全链路他现在都做得非常好。他把自媒体平台 40% ","knowledge_map":"Hermes AI Agent —— 自媒体全链路自动化\n│\n├── 功能一：数据采集与本地数据库\n│   ├── 自动下载作品列表数据\n│   ├── 本地建立数据库\n│   ├── 连接手机，每小时推送关键数据\n│   └── 支持对话式横向对比分析\n│       └── 示例：分析16条破10万视频 → 总结3条规律\n│\n├── 功能二：最新视频实时监控 + 预测模型\n│   ├── 每30分钟监控一次\n│   ├── 同期横向对比（相同发布时长）\n│   ├── 预测最终播放量级\n│   └── 模型随样本增长自动校准（自主学习）\n│\n├── 功能三：飞书数据可视化仪表盘\n│   ├── 数据上传飞书多维表格\n│   ├── 三张核心表格\n│   │   ├── 近14天视频数据总览\n│   │   ├── 最新视频数据总览\n│   │   └── 涨粉数据总览\n│   └── 仪表盘核心指标\n│       ├── 总播放量 & 每小时增速\n│       ├── 完播率 & 平均播放时长\n│       ├── 点赞 & 评论数量\n│       └── 最新粉丝数 & 近期视频涨粉排名\n│\n└── 功能四：评论区自动回复 + 定制获客\n    ├── 自动回复网友评论\n    └── 可定制获客话术（如引导加入会员）","concepts":"#### 概念一：AI Agent（智能体）\n\n**是什么**：一个能够自主执行多步骤任务的 AI 程序，视频中的具体实例是作者自研的 Hermes。\n\n**为什么重要**：普通 AI 工具需要人逐条指令驱动，而 Agent 可以自主完成\"获取数据 → 分析 → 推送 → 回复\"这一整条链路，真正替代人工重复劳动。\n\n**详细解释**：Hermes 在视频中承担的不是单一任务，而是一套连续的自动化流程——它可以定时拉取数据、写入数据库、调用飞书 API 更新表格、在评论区发起对话，整个过程无需人工干预。\n\n**实际应用场景**：作者让 Hermes 在评论区自动回复粉丝，并在回复中委婉引导粉丝加入付费会员，实现了评论区的自动获客，会员入群率明显提升。\n\n---\n\n#### 概念二：横向对比分析与爆款规律提炼\n\n**是什么**：将当前视频的数据与历史同类视频数据进行结构化比对，从中提炼出可复用的内容规律。\n\n**为什么重要**：内容创作者通常凭感觉做选题，横向对比分析让\"什么样的内容更容易爆\"有了数据支撑，可以指导后续创作决策。\n\n**详细解释**：作者通过 Hermes 分析了 16 条破 10 万播放的视频，得出以下规律：\n\n| 规律编号 | 核心结论 |\n|--------|--------|\n| 规律一 | 完播率低于 40%，基本无缘 10 万播放 |\n| 规律二 | 10 万与百万爆款的分水岭在于**分享量**和**收藏量** |\n| 规律三 | 作者最强内容组合是 **AI 教程 + 商业案例**，两者结合数据最佳 |\n\n**实际应用场景**：基于上述规律，作者可以在选题阶段优先选择\"AI 教程结合商业案例\"的方向，并在剪辑时重点优化前几秒以提升完播率。\n\n---\n\n#### 概念三：实时预测模型（自主学习机制）\n\n**是什么**：一个根据视频发布后同一时间节点的历史数据，预测该视频最终播放量级的模型，且会随数据库扩充持续校准。\n\n**为什么重要**：内容创作者发布视频后往往陷入\"刷数据\"的焦虑，预测模型可以在发布后几小时内给出量级判断，帮助创作者提前决策（是否加推、是否调整发布策略）。\n\n**详细解释**：\n- 模型逻辑：取当前视频\"发布第 X 小时\"的数据，与数据库中所有历史视频\"发布第 X 小时\"的数据做比对，输出最终播放量预测区间。\n- 自学习机制：每发布一条新视频，样本库增加，模型校准精度随之提升，形成正向循环。\n\n**实际应用场景**：视频发布 4 小时后，Hermes 自动比对历史数据并给出预测，作者可以据此判断这条视频是否值得继续投入资源做二次传播。\n\n---\n\n#### 概念四：飞书多维表格仪表盘\n\n**是什么**：以飞书多维表格为载体，由 Hermes 实时写入数据并自动生成的可视化运营仪表盘。\n\n**为什么重要**：自媒体运营数据分散在平台后台的多个页面，仪表盘将核心指标集中呈现，避免频繁切换页面，提升决策效率。\n\n**详细解释**：仪表盘由三张底层数据表驱动，汇总展示以下核心指标：\n\n| 指标类别 | 具体指标 |\n|--------|--------|\n| 最新视频表现 | 总播放量、每小时播放增速、完播率、平均播放时长、点赞数、评论数 |\n| 账号粉丝动态 | 最新粉丝总数、近期各视频涨粉量排名 |\n| 历史视频总览 | 近 14 天发布视频的整体数据汇总 |\n\n**实际应用场景**：作者无需打开抖音后台，直接在飞书仪表盘上即可掌握账号全貌，尤其适合判断某条视频是否在发布数天后出现延迟爆发（符合抖音推荐机制的常见现象）。","table":"| 功能模块 | 核心能力 | 关键参数/特点 |\n|--------|--------|------------|\n| 数据采集 & 数据库 | 自动拉取作品数据，本地存储，手机推送 | 每小时推送一次最新数据 |\n| 实时监控 & 预测 | 同期横向对比，预测最终播放量级 | 每 30 分钟监控一次；模型随样本自动校准 |\n| 飞书可视化仪表盘 | 数据自动写入飞书，生成多维表格仪表盘 | 覆盖近 14 天视频；含播放、涨粉、完播率等核心指标 |\n| 评论区自动回复 & 获客 | 自动回复评论，可定制获客话术 | 支持个性化定制，如引导加入付费社群 |\n| 项目开放程度 | 全代码开源，发布于 GitHub | 支持接入 OpenAI / Claude / Cursor 等主流工具 |","thinking":"1. **预测模型的边界在哪里？** 视频中提到模型依赖历史样本校准，但抖音的推荐算法会随平台策略调整而变化——当外部环境发生大幅波动时（如平台规则更新、热点事件冲击），基于历史数据的预测模型是否仍然可靠？应如何设计容错机制？\n\n2. **评论区自动获客的尺度如何把握？** Hermes 在回复中会委婉引导粉丝加入付费会员，这在提升转化率的同时，是否可能让部分粉丝感到被\"套路\"而产生反感？如何在自动化获客效率与用户体验之间找到平衡点？\n\n3. **\"全链路 AI 接管\"之后，人的核心价值在哪里？** 视频中提到 40% 的自媒体工作已交给 AI，那剩下 60% 哪些是 AI 暂时无法替代的？随着 Agent 能力持续提升，内容创作者应该将精力聚焦在哪些不可替代的环节上？","remember":"与其每天刷后台、盯数据、回评论，不如用一个开源 AI Agent 把这些重复工作全部自动化，让自己只做真正需要创造力的事。","is_new":true},{"id":"7644947494979374351","title":"三步打造 OpenClaude 自我进化系统","cat":"vibecoding","video_url":"https://www.douyin.com/video/7644947494979374351","audience":"已经在用 Claude 但停留在\"对话问答\"层面、想进阶到自动化工作流的 AI 工具探索者","summary":"用 Standing Orders、Heartbeat/Cron、外接工具三步，把 Claude 从\"聊天工具\"升级成能自动运转的个人 AI 操作系统。","raw_preview":"大家好，我是奔走。在各种 AI 软件神仙打架的时代，Claude 好像在慢慢被大家遗忘了。很多人对它的印象还停留在几个老问题上：记忆烂、上下文短、文件管理像个垃圾堆。事实是大家的认知已经配不上它的进化速度了。\n\n上期视频我们讲了 Claude 的一些使用技巧，今天我用三条干货手把手带你打造自我进化的 Claude。来，走着学着进化。\n\n**第一步：学会用 Standing Orders 长驻指令*","knowledge_map":"打造自我进化的 Claude 系统\n│\n├── 第一步：Standing Orders 长驻指令\n│   ├── 是什么：把重复 Prompt 升级为持久化指令\n│   ├── 怎么做\n│   │   ├── 1. 给目标（告诉 Claude 要做什么）\n│   │   ├── 2. 给资料（提供工具文档链接）\n│   │   └── 3. 看成品（复用模式写新指令）\n│   └── 案例：Humanizer Standing Order（文档去 AI 化）\n│\n├── 第二步：Heartbeat & Cron 自动干活机制\n│   ├── Heartbeat：定时轮询，最短30分钟，可多任务并行\n│   ├── Cron：精确到秒的定时触发，单任务专用\n│   └── 使用方式：用自然语言告诉 Claude，让它自己写配置\n│\n└── 第三步：外接专业软件\n    ├── MCP（标准接口）→ Notion / GitHub / Airtable / Figma 等\n    ├── CLI 工具（网页抓取）→ OpenCLI，适合自媒体数据/热榜/评论\n    ├── Harness（Agent 编排）→ Claude 拆任务，Codex 执行代码\n    └── 内置工具 → 浏览器 / 文件读写 / 终端命令 / 搜索","concepts":"#### 概念一：Standing Orders（长驻指令）\n\n**是什么**：把你反复对 Claude 说的同类要求，提前写成一条结构化的持久指令，让 Claude 每次都自动遵守，不需要重复交代。\n\n**为什么重要**：每次重新写 Prompt 既低效又容易遗漏细节，Standing Orders 相当于给 Claude 做了一次\"岗前培训\"，之后它就记住规则了。\n\n**详细解释**：\n\n| 步骤 | 操作 | 说明 |\n|------|------|------|\n| 1. 给目标 | 用自然语言描述需求 | 例：\"帮我写一个 Standing Order，用 OpenCLI 收集多平台 AI 资讯\" |\n| 2. 给资料 | 提供工具官方文档链接 | Claude 自动抓取、消化文档，提炼关键命令 |\n| 3. 看成品 | 审核 Claude 生成的 Standing Order | 可作为模板，复用到其他类似指令 |\n\n**实际应用场景**：写作风格规范（如\"去 AI 味\"检查清单）、每日信息收集任务、固定格式的内容输出要求。\n\n---\n\n#### 概念二：Heartbeat 与 Cron 自动调度机制\n\n**是什么**：Claude 内置的两种定时自动执行机制，让任务无需人工触发、按计划自动运行。\n\n**为什么重要**：把 Claude 从\"被动回答\"变成\"主动执行\"，实现真正的自动化工作流。\n\n**详细解释**：\n\n| 对比维度 | Heartbeat | Cron |\n|----------|-----------|------|\n| 触发方式 | 间隔轮询（有事处理，没事等待） | 精确时间点触发（闹钟式） |\n| 最小间隔 | 30 分钟 | 精确到秒 |\n| 任务并行 | 支持多任务叠加运行 | 一条任务一个坑 |\n| 适用场景 | 监控类、汇总类任务 | 需要精确时间响应的任务 |\n\n**实际应用场景**：用 Heartbeat 每天自动统计自媒体账号播放量和点赞数；用 Cron 在每天固定时刻触发内容发布或数据抓取。\n\n---\n\n#### 概念三：四种外接工具接入方式\n\n**是什么**：Claude 连接外部软件和服务的四条通道，让它能真正\"操作\"而不只是\"回答\"。\n\n**为什么重要**：绝大多数真实工作不是问答，而是操作——读文件、改代码、抓数据、管项目。外接工具是 Claude 从聊天机器人变成工作系统的关键。\n\n**详细解释**：\n\n| 接入方式 | 适用对象 | 典型软件/场景 |\n|----------|----------|---------------|\n| MCP | 有标准接口的主流软件 | Notion、GitHub、Airtable、Figma、Canva、Slack、GitLab |\n| CLI 工具 | 无开放接口的平台（自媒体/实时数据） | OpenCLI：抓评论、热榜、字幕、创作者数据、英文趋势 |\n| Harness | 专业 Agent 编排 | Claude 拆任务 → Codex 进仓库改代码跑测试 → 结果回 Claude |\n| 内置工具 | 通用操作 | 浏览器、文件读写、终端命令、搜索 |\n\n**实际应用场景**：做视频选题时，用 OpenCLI 抓平台数据 + 浏览器读官方文档 + Airtable 管理选题状态 + Codex 处理代码 Demo，Claude 统筹全流程。","table":"| 功能需求 | 用哪个 | 关键特点 |\n|----------|--------|----------|\n| 固化重复 Prompt | Standing Orders | 一次训练，永久生效 |\n| 定时监控/轮询任务 | Heartbeat | 最短30分钟，可并行多任务 |\n| 精确时间点触发任务 | Cron | 精确到秒，单任务专用 |\n| 对接 Notion/GitHub 等主流软件 | MCP | 需软件支持 MCP 服务 |\n| 抓取自媒体平台数据 | CLI 工具（OpenCLI） | 把手动操作变成可调用命令 |\n| 代码任务自动化 | Harness + Codex | Claude 拆任务，Codex 执行 |\n| 读文件/开网页/跑终端 | 内置工具 | Claude 原生支持，无需额外配置 |","thinking":"1. **Standing Orders 的边界在哪里？** 长驻指令能覆盖的是\"规则固定\"的重复任务，但如果业务需求经常变化，频繁修改 Standing Orders 的成本是否会超过直接写 Prompt？什么类型的任务最适合沉淀成 Standing Orders？\n\n2. **Heartbeat 和 Cron 的可靠性如何保障？** 自动化任务一旦出错（比如平台接口变化、网络超时），Claude 能否自动检测并告警？在没有人工监督的情况下，如何设计\"自我纠错\"机制？\n\n3. **四种外接方式如何组合才最高效？** 视频展示了多工具协作的理想状态，但实际搭建中，MCP、CLI、Harness、内置工具之间的数据如何流转？上下文长度限制会不会成为多工具协作的瓶颈？","remember":"别用 Claude 回答问题——用 Standing Orders 训练它，用 Heartbeat/Cron 驱动它，用外接工具武装它，让它替你主动干活。","is_new":true},{"id":"7616293509246520595","title":"LangChain、LangFlow、LangGraph区别详解","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7616293509246520595","audience":"大模型应用开发者和AI产品经理，尤其是正在准备技术面试或选型的从业者","summary":"LangChain是工具箱（线性链条）、LangFlow是低代码可视化入口、LangGraph是智能体大脑（循环+状态），三者定位完全不同，只要涉及循环和复杂决策就选LangGraph。","raw_preview":"面试官问你，讲讲LangChain、LangFlow和LangGraph这三个看起来名字差不多的东西到底有啥区别？很多同学听到这可能心里就开始打鼓了，坏了，这三个我不都是混着用吗？不就是调接口的吗？如果这时候你支支吾吾，大概率就要被刷掉了。但这其实是一个非常好的展示你架构能力的机会。大家好，我是大余，我们往下讲，今天我带大家把这三个概念彻底理清楚。\n\n好，大家看这张图，这三个东西其实在同一个生态里","knowledge_map":"LangChain生态三件套\n├── LangChain（地基/工具箱）\n│   ├── 核心：链条，线性流水线\n│   ├── 适合：简单文档问答、一条路走到黑的任务\n│   └── 特点：封装大模型、向量数据库、提示词等组件\n├── LangFlow（低代码可视化层）\n│   ├── 核心：拖拽连线，LangChain的可视化外衣\n│   ├── 适合：快速原型、演示、小白入门\n│   └── 特点：不需要写代码\n└── LangGraph（智能体大脑）\n    ├── 核心：循环+状态，非线性\n    ├── 适合：自动写代码、多智能体协作、复杂决策\n    ├── 核心机制\n    │   ├── 条件分支（if-else自我修正）\n    │   ├── Global State Schema（全局状态共享）\n    │   ├── Reducer（信息追加不覆盖）\n    │   └── Checkpoint（断点续传/人机协同）\n    └── 三大痛点解决\n        ├── 痛点A：线性逻辑无法回头 → 条件分支\n        ├── 痛点B：多智能体状态混乱 → 全局状态模式\n        └── 痛点C：人机协同 → Checkpoint暂停机制","concepts":"#### LangChain：线性链条工具箱\n\n**是什么**：将大模型、向量数据库、提示词等组件封装成标准接口的框架，以线性链条方式组织工作流。\n\n**为什么重要**：是整个生态的基础，适合绝大多数简单的AI应用场景，学习成本低、上手快。\n\n**详细解释**：核心思维是\"流水线\"，第一步做什么、第二步做什么，一条路走到黑，不会回头。\n\n**实际应用场景**：上传PDF文档，然后问它某章的内容——这种单次问答、无需迭代的任务首选LangChain。\n\n---\n\n#### LangGraph：循环与状态的智能体框架\n\n**是什么**：专为构建智能体（Agent）设计的框架，核心是循环（Loop）和状态（State），让大模型拥有\"大脑回路\"。\n\n**为什么重要**：现实中的复杂任务往往需要反复尝试、自我纠错、多智能体协作，普通链条无法处理这类场景。\n\n**详细解释**：\n\n| 机制 | 作用 |\n|------|------|\n| 条件分支（if-else） | 模型自我评估，答得不好就重试，答得好就结束 |\n| Global State Schema | 多智能体共享全局状态，信息不丢失 |\n| Reducer | 保证信息追加而非覆盖，防止状态混乱 |\n| Checkpoint | 暂停执行，等待人工确认后继续，实现人机协同 |\n\n**实际应用场景**：全自动写代码助手——模型写代码→运行→报错→拿报错重新修改→再运行，这个循环只有LangGraph能处理。\n\n---\n\n#### 三种场景的选型公式\n\n**是什么**：根据任务复杂度选择合适工具的决策框架。\n\n**为什么重要**：技术选型错误会导致开发效率低下甚至项目失败，清晰的选型思路是工程师和产品经理的必备能力。\n\n**详细解释**：\n\n| 场景 | 选择 | 理由 |\n|------|------|------|\n| 简单问答、线性任务 | LangChain | 简单直接，无需复杂架构 |\n| 快速演示、低代码 | LangFlow | 拖拽即可，无需写代码 |\n| 循环、复杂决策、多智能体 | LangGraph | 唯一能处理循环和状态的框架 |\n\n**实际应用场景**：面试官问\"你做这个项目用了什么框架，为什么选它\"——用这个选型逻辑回答，直接拿高分。","table":"| 工具 | 定位 | 核心特征 | 适用场景 |\n|------|------|----------|----------|\n| LangChain | 地基/工具箱 | 线性链条 | 简单文档问答 |\n| LangFlow | 低代码可视化 | 拖拽连线 | 快速原型/演示 |\n| LangGraph | 智能体大脑 | 循环+状态 | 复杂决策/多智能体 |\n\n| LangGraph机制 | 解决的痛点 |\n|---------------|-----------|\n| 条件分支 | 线性逻辑无法回头 |\n| Global State Schema + Reducer | 多智能体状态混乱 |\n| Checkpoint | 人机协同/敏感操作确认 |","thinking":"1. 视频说\"只要涉及循环和复杂决策，无脑选LangGraph\"——但LangGraph的学习成本更高，在什么情况下你会坚持用LangChain而不升级到LangGraph？\n\n2. LangGraph的Checkpoint机制实现了\"人机协同\"，但这意味着任务会在某个节点暂停等待人工——在高并发场景下，大量任务同时挂起等待确认，系统应该如何设计才能保证稳定性？\n\n3. 视频提到LangGraph用Global State Schema解决多智能体状态共享问题——如果多个智能体同时修改状态，Reducer机制能否完全避免冲突？还有哪些潜在的状态一致性问题？","remember":"LangChain是流水线、LangFlow是流程图、LangGraph是有记忆会反思的大脑——任务一旦需要\"回头想想\"，就该换LangGraph上场。","is_new":true},{"id":"7618515523780840747","title":"Agent性能量化评估专家级指标体系","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7618515523780840747","audience":"准备大模型/Agent方向面试的产品经理和工程师，尤其是需要展示实战经验的求职者","summary":"量化Agent性能需要三层指标（结果/过程/系统）、三种评测手段（代码断言/状态比对/LLM裁判）、三大工程坑（级联错误/非确定性/裁判偏见），只说\"任务成功率\"是面试的最大减分项。","raw_preview":"面试官问：你如何量化一个Agent的性能？大家注意啊，这道题可是现在大模型Agent面试里真正的分水岭。如果你开口只会说\"看他任务成功率\"，面试官心里肯定在想，这个人估计还没真正做过复杂的业务落地。AI大模型学习资料可以在主页置顶群里。大家好，我是彭宇。\n\n为啥呢？因为传统的大模型评估只是说，你只要看他生成的文本质量就行。但Agent是要做事的，他涉及到了多轮交互、工具调用还有环境的反馈，所以咱绝","knowledge_map":"Agent性能量化体系\n├── 三层指标\n│   ├── 结果维度（Task Level）\n│   │   ├── 任务成功率\n│   │   └── 状态匹配（数据库/环境状态是否正确）\n│   ├── 过程维度（轨迹评估）\n│   │   ├── 工具调用准确率（API选对了吗？参数对吗？）\n│   │   ├── 轨迹效率（有没有走弯路）\n│   │   └── 自我纠错率（self-refine能力）\n│   └── 系统维度\n│       ├── 端到端延迟\n│       └── token消耗量\n├── 三种评测手段\n│   ├── 代码断言（基于规则，最客观）\n│   ├── 状态机比对（环境变化验证）\n│   └── LLM as Judge（模型裁判，解决无标准答案场景）\n└── 三大工程坑\n    ├── 级联错误 → 模块化拆解 + mock API\n    ├── 非确定性 → 沙盒容器 + 环境快照\n    └── 裁判偏见 → 多路裁判 + 人工抽检","concepts":"#### 三层立体化指标体系\n\n**是什么**：从结果、过程、系统三个维度全面衡量Agent性能的指标框架。\n\n**为什么重要**：Agent不是聊天机器人，它要完成多步骤任务，单一的\"准确率\"无法反映真实性能，三层指标才能全面评估。\n\n**详细解释**：\n\n| 维度 | 指标 | 说明 |\n|------|------|------|\n| 结果 | 任务成功率 | 最终任务是否完成 |\n| 结果 | 状态匹配 | 数据库/环境状态是否符合预期 |\n| 过程 | 工具调用准确率 | API选对了吗？参数传对了吗？ |\n| 过程 | 轨迹效率 | 有没有走弯路、冗余步骤 |\n| 过程 | 自我纠错率 | 遇到报错能否self-refine重试成功 |\n| 系统 | 端到端延迟 | 完成任务的速度 |\n| 系统 | token消耗量 | 成本控制 |\n\n**实际应用场景**：A和B两个Agent都订到了票（结果相同），但A用3步、B用50步——过程维度的轨迹效率让你看清真正的性能差距。\n\n---\n\n#### 三种自动化评测手段\n\n**是什么**：实现Agent评测自动化的三种方法，适用于不同类型的任务场景。\n\n**为什么重要**：人工评测成本极高，自动化评测才能支撑大规模、持续性的质量保障。\n\n**详细解释**：\n\n| 方法 | 适用场景 | 优点 | 局限 |\n|------|----------|------|------|\n| 代码断言 | 逻辑确定的任务（如代码生成） | 最客观，0/1判定 | 无法处理主观任务 |\n| 状态机比对 | RPA、数据库操作类Agent | 真实还原外部影响 | 需要可观测的环境状态 |\n| LLM as Judge | 无标准答案的任务（如写邮件） | 解决主观评估难题 | 存在裁判偏见风险 |\n\n**实际应用场景**：评测一个客服Agent写安抚邮件的质量，没有标准答案，用LLM as Judge从逻辑、语气、安全性维度打分。\n\n---\n\n#### 三大工程坑与填坑方案\n\n**是什么**：Agent评测在实际落地中最常遇到的三个难题及对应解决方案。\n\n**为什么重要**：这是面试官区分\"说过\"和\"做过\"的核心问题，能说出具体坑和解法才是真正的实战经验。\n\n**详细解释**：\n\n| 坑 | 问题描述 | 解决方案 |\n|----|----------|----------|\n| 级联错误 | 第一步错了导致后续全崩，难以归因 | 模块化拆解 + mock API固化环境反馈 |\n| 非确定性 | 同样输入不同输出，测试结果不稳定 | 沙盒容器 + 每次测试前还原环境快照 |\n| 裁判偏见 | LLM裁判被Agent欺骗或自身判断出错 | 多路裁判交叉验证 + 人工定期抽检校准 |\n\n**实际应用场景**：用沙盒容器保证每次评测环境一致，让Agent永远在\"同一条起跑线\"上，测出来的数据才有可比性。","table":"| 类别 | 关键点 |\n|------|--------|\n| 结果指标 | 任务成功率 + 状态匹配 |\n| 过程指标 | 工具调用准确率 + 轨迹效率 + 自我纠错率 |\n| 系统指标 | 延迟 + token成本 |\n| 评测手段1 | 代码断言（逻辑确定任务首选） |\n| 评测手段2 | 状态机比对（环境操作类任务） |\n| 评测手段3 | LLM as Judge（无标准答案任务） |\n| 坑1 | 级联错误 → 模块化 + mock API |\n| 坑2 | 非确定性 → 沙盒 + 环境快照 |\n| 坑3 | 裁判偏见 → 多路裁判 + 人工抽检 |","thinking":"1. 视频提到\"自我纠错率\"是过程维度的关键指标——但Agent的自我纠错有时候会陷入死循环，如何在评测中设计合理的\"最大重试次数\"机制，同时还能准确衡量纠错能力？\n\n2. LLM as Judge的\"裁判偏见\"问题，除了多路裁判和人工抽检，还有没有其他更系统化的校准方法？比如如何设计裁判模型的提示词来减少偏见？\n\n3. 视频中的三层指标（结果/过程/系统）在实际产品中如何加权？不同类型的Agent（如客服Agent vs 代码Agent）权重应该如何调整？","remember":"量化Agent性能就像给运动员打分：不能只看终点（结果），还要看跑姿（过程）和体能消耗（系统）——三层指标缺一不可，工程坑才是面试的真正分水岭。","is_new":true},{"id":"7621098948450618633","title":"AI产品经理常用Skill工作流实战","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7621098948450618633","audience":"希望用AI提升产品工作效率的产品经理，尤其是正在学习大模型工具应用的从业者","summary":"一位产品经理分享了6个覆盖产品全流程的专属Skill（方案设计→PRD撰写→研发对齐→埋点→AB实验→Aha Moment），核心价值不是替代人，而是在每个关键节点成为\"懂行的追问者\"。","raw_preview":"这位产品经理在日常工作当中常用的Skill，有一份保障架构、数据流、测试策略的完整设计文档。这个技能特别适合有明确方向但不知道如何落地的产品。比如之前我们计划做一款AI写作助手，初期思路比较乱，通过该技能沟通半个小时之后，产品的形态就基本清晰了。它会主动模拟平省追问，把我们提前规避掉潜在的漏洞。\n\n在方案确定之后，进入PRD的撰写阶段，我会使用WritePRD这个技能。和普通的文档模板不同，这个模","knowledge_map":"产品经理AI Skill全流程\n├── 阶段1：方案设计\n│   └── 架构设计Skill（追问式澄清，暴露潜在漏洞）\n├── 阶段2：PRD撰写\n│   └── WritePRD Skill（层层追问，精确理解设计意图）\n├── 阶段3：研发对齐\n│   └── Lighting Plan Skill（颗粒度极细的执行计划，开发者视角）\n├── 阶段4：上线筹备\n│   ├── 埋点体系Skill（业务决策导向的数据体系）\n│   └── AB Test Skill（样本量/假设检验/防早停）\n└── 阶段5：用户增长\n    └── Aha Moment Skill（挖掘核心价值时刻，设计新用户引导）","concepts":"#### WritePRD Skill：追问式PRD生成\n\n**是什么**：一种通过层层追问来生成高质量PRD的AI技能，而非简单的文档模板填充。\n\n**为什么重要**：传统写PRD方式是\"先想清楚再动笔\"，容易遗漏逻辑漏洞；追问式方式能在对话过程中主动暴露未察觉的问题。\n\n**详细解释**：\n- 先引导说清楚核心问题和解决方案\n- 对每个设计分支层层追问，直到精确理解设计意图\n- 最终输出包含：用户故事、功能设计、接口设计、测试策略\n\n**实际应用场景**：产品经理在撰写AI写作助手PRD时，Skill会主动追问\"这个功能在哪种用户场景下会失败\"，帮助提前发现边界条件。\n\n---\n\n#### Lighting Plan Skill：研发对齐执行计划\n\n**是什么**：将产品需求拆解为颗粒度极细（每步2-5分钟）的开发执行计划的AI技能。\n\n**为什么重要**：产品和研发之间的沟通鸿沟往往来自\"颗粒度不够细\"，从开发者视角拆解需求能大幅提升对齐效率。\n\n**详细解释**：\n- 每个步骤预计执行时长：2-5分钟\n- 明确文件路径、操作命令和关键信息\n- 研发人员可直接在计划基础上评估和调整\n\n**实际应用场景**：需求评审会上，产品经理提前用Lighting Plan生成执行计划，研发团队直接对计划标注工作量，省去大量来回沟通。\n\n---\n\n#### 埋点体系Skill + AB Test Skill：数据驱动上线\n\n**是什么**：两个配套的上线筹备Skill，分别负责数据采集方案和实验设计方案。\n\n**为什么重要**：没有严谨的埋点和实验设计，产品上线后的数据形同虚设，无法支撑真正的业务决策。\n\n**详细解释**：\n\n| Skill | 核心能力 | 解决的痛点 |\n|-------|----------|-----------|\n| 埋点体系Skill | 业务决策导向的埋点方案，含命名规范、漏斗追踪、UTM参数、隐私合规 | 埋点只收集数据但无法指导决策 |\n| AB Test Skill | 样本量计算、假设检验、核心指标选定、防早停 | 样本量不足就过早下结论 |\n\n**实际应用场景**：产品上线前，用埋点Skill规划每个关键节点的数据采集，用AB Test Skill设计实验方案，确保上线后数据能真正回答业务问题。","table":"| Skill名称 | 使用阶段 | 核心价值 |\n|-----------|----------|----------|\n| 架构设计Skill | 方案设计 | 追问暴露潜在漏洞 |\n| WritePRD Skill | PRD撰写 | 层层追问，精确理解设计意图 |\n| Lighting Plan Skill | 研发对齐 | 开发者视角的颗粒度执行计划 |\n| 埋点体系Skill | 上线筹备 | 业务决策导向的数据体系 |\n| AB Test Skill | 上线筹备 | 严谨实验设计，防止早停 |\n| Aha Moment Skill | 用户增长 | 挖掘核心价值时刻，设计引导流程 |","thinking":"1. 视频强调Skill的价值是\"主动追问、暴露思考盲点\"而非\"替代人\"——如果AI的追问方向出现偏差（比如追问了不重要的细节），产品经理应该如何引导？这说明使用Skill也需要什么能力？\n\n2. Lighting Plan Skill生成的执行计划颗粒度在2-5分钟/步——这个粒度是否适合所有类型的需求？对于探索性强、不确定性高的需求，过细的拆解会不会反而限制研发的发挥空间？\n\n3. 视频介绍的6个Skill覆盖了产品全流程，但每个Skill都需要一定的上下文输入——在实际使用中，如何设计Skill之间的信息传递，让前一个Skill的输出自然成为下一个Skill的输入，形成真正的流水线？","remember":"好的Skill不是帮你省事的模板，而是在每个关键节点帮你追问\"你有没有想清楚\"的专业顾问。","is_new":true},{"id":"7621494197849365169","title":"OpenClaw实现原理面试答题解析","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7621494197849365169","audience":"准备AI产品经理面试、希望深入理解智能体操作框架架构的求职者","summary":"OpenClaw不是聊天机器人，而是\"网关调度+任务队列+智能体运行器+工具系统+混合记忆\"五层架构的智能体操作框架，核心价值是让模型从\"会聊天\"变成\"会干活\"。","raw_preview":"按照你的理解说一下OpenClaw的实现原理。\n\n好的，面试官。我觉得OpenClaw它本质上不是一个简单的聊天机器人，而是一个以大模型为大脑、以工具系统为手脚、以及用记忆系统为长期上下文的智能体操作框架。\n\n它整体的信息流，我理解是可以拆成一个比较清晰的链路。最前面是我们的通道层，比如接入不同的平台作为我们的消息入口。然后消息就会进入网关服务，这个网关就像一个交通枢纽，它负责连接管理、鉴权、消息","knowledge_map":"OpenClaw实现原理\n├── 整体定位\n│   └── 智能体操作框架（大模型为脑，工具为手，记忆为上下文）\n├── 信息流链路\n│   ├── 通道层（消息入口，接入不同平台）\n│   ├── 网关服务（连接管理、鉴权、消息校验、事件分发）\n│   ├── 任务队列（默认串行，避免任务互相打架）\n│   └── 智能体运行器（核心模块）\n│       ├── 模型选择（根据任务类型动态选择）\n│       ├── 系统提示词动态拼装（工具列表、风格、环境等）\n│       ├── 上下文窗口防护+滚动压缩\n│       └── Agent Loop（思考→工具调用→推理→反馈）\n├── 工具系统\n│   ├── 执行能力\n│   ├── 文件系统读写\n│   ├── 浏览器工具\n│   └── 进程管理\n│   └── 运行环境（沙箱/本地/远程）\n└── 记忆系统\n    ├── 短期：会话记录落文件\n    ├── 长期：MEMORY.md等文件\n    └── 检索：混合检索（关键词+向量）","concepts":"#### 智能体运行器（Agent Runner）\n\n**是什么**：OpenClaw的核心调度模块，负责模型选择、提示词动态拼装、上下文管理和Agent Loop执行。\n\n**为什么重要**：它不只是转发请求，而是做运行时治理——正是这层\"治理\"让系统在长任务中保持稳定，而不是跑着跑着就崩。\n\n**详细解释**：\n- **模型选择**：根据任务类型和配置动态决定用哪个模型\n- **系统提示词动态拼装**：包含当前可用工具列表、工具调用风格、工作目录、运行环境等，不是写死的\n- **上下文窗口防护+滚动压缩**：避免历史太长把token撑爆，保证长任务稳定性\n- **Agent Loop**：模型思考→决定是否调用工具→执行工具→推理→反馈，循环执行\n\n**实际应用场景**：用户发起一个需要多步骤执行的任务，Agent Loop会持续循环，直到任务完成，而不是一问一答就结束。\n\n---\n\n#### 工具系统：操作系统接口层\n\n**是什么**：为大模型提供\"手脚\"的工具集合，让模型能够执行代码、读写文件、操作浏览器、管理进程。\n\n**为什么重要**：没有工具系统，大模型只能\"说\"，有了工具系统才能\"做\"——这是从聊天机器人到智能体的本质跨越。\n\n**详细解释**：\n\n| 工具类型 | 能力 |\n|----------|------|\n| 执行 | 运行命令和脚本 |\n| 文件系统 | 读写、创建、删除文件 |\n| 浏览器工具 | 打开网页、交互操作 |\n| 进程管理 | 启动、监控、终止进程 |\n\n运行环境支持：沙箱（更安全）、本地、远程环境\n\n**实际应用场景**：同一个Agent可以同时查看文件内容、打开网页查资料、运行代码测试，不再局限在纯文本对话。\n\n---\n\n#### 混合记忆系统\n\n**是什么**：结合短期会话记录和长期知识存储，采用关键词+向量混合检索的本地优先记忆方案。\n\n**为什么重要**：纯关键词检索会漏掉语义相关内容，纯向量检索会漏掉精确匹配——混合检索取两者之长，同时本地化保证隐私。\n\n**详细解释**：\n- **短期记忆**：会话记录落成文件，保留近期上下文\n- **长期记忆**：MEMORY.md等文件，存储跨会话的重要知识\n- **混合检索**：关键词检索（精确）+ 向量检索（语义），两者结合不漏信息\n\n**实际应用场景**：用户上周提到的项目背景，Agent在新会话中依然能通过记忆系统召回，不需要重复解释。","table":"| 层次 | 组件 | 核心职责 |\n|------|------|----------|\n| 入口层 | 通道层 | 接入不同平台的消息 |\n| 调度层 | 网关服务 | 鉴权、消息校验、事件分发 |\n| 执行层 | 任务队列 | 串行执行，避免任务冲突 |\n| 核心层 | 智能体运行器 | 模型选择、提示词拼装、Agent Loop |\n| 能力层 | 工具系统 | 执行/文件/浏览器/进程 |\n| 记忆层 | 混合记忆 | 短期会话+长期知识+混合检索 |","thinking":"1. 视频说任务队列\"默认串行执行\"以避免任务互相打架——在什么业务场景下需要改为并行？并行执行会带来哪些新的状态一致性问题？\n\n2. 系统提示词\"动态拼装\"包含了工具列表、环境信息等大量内容——当工具数量很多时，提示词会变得很长，如何在\"给模型足够上下文\"和\"控制token成本\"之间找到平衡？\n\n3. 混合记忆系统采用本地优先方案——在多设备、多用户场景下，本地记忆如何同步？这对产品的设计边界有什么影响？","remember":"OpenClaw的本质是给大模型套上了一个\"操作系统\"——网关是主板，工具是外设，记忆是硬盘，Agent Loop是CPU，让模型从会聊天变成会干活。","is_new":true},{"id":"7623087267095137587","title":"产品经理定制PRD生成Skill实战","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7623087267095137587","audience":"希望用AI提升PRD写作效率的产品经理，尤其是有原型图设计需求的从业者","summary":"通过定制专属PRD生成Skill，将\"读原型→匹配模板→确认范围→生成PRD→自检\"的5步工作流固化，让AI按照产品经理自己的规范标准输出直接可用的PRD文档。","raw_preview":"大家好，我是陆人亦。上期视频，很多朋友问视频里PRD生成的Skill，这期视频我就来详细拆解一下。\n\nSkill可以把它理解成AI的技能库，通过接入Skill，我们能让AI处理更多重复性的体力活，比如帮我们写PRD、生成操作手册这类文档。GitHub上其实有很多现成的优秀Skill，后面可以专门开个专题和大家聊聊。今天我们先聚焦如何结合自己的工作场景，动手写一个专属的Skill。\n\n关于怎么写好S","knowledge_map":"PRD生成Skill设计\n├── Skill是什么\n│   └── AI的技能库，处理重复性文档工作\n├── PRD生成Skill工作流（5步）\n│   ├── 第1步：AI读原型（关注关键点）\n│   ├── 第2步：自动匹配PRD模板\n│   │   ├── 表单编辑模板\n│   │   ├── 表单预览模板\n│   │   ├── 列表页模板\n│   │   ├── 数据看板模板\n│   │   └── 用户前台模板\n│   ├── 第3步：确认需求范围（主动告知，不等AI问）\n│   ├── 第4步：AI输出完整PRD文档\n│   └── 第5步：AI自行检查PRD与原型一致性\n├── 关键技巧\n│   ├── 必须把模板文案传给AI\n│   ├── 明确需求范围，防止AI拓展范围\n│   └── 配置Claude个人规则，原型更新时同步更新PRD\n└── 后续流程\n    ├── 人工校对PRD\n    └── PRD标注到原型（需另写Agent提示词）","concepts":"#### PRD模板分类体系\n\n**是什么**：根据工作场景预先归纳的5类PRD模板，用于指导AI按正确格式输出文档。\n\n**为什么重要**：没有模板约束，AI生成的PRD结构千变万化，无法直接用于团队协作；有了分类模板，AI能按规范输出，大幅减少返工。\n\n**详细解释**：\n\n| 模板类型 | 适用场景 |\n|----------|----------|\n| 表单编辑模板 | 数据录入、编辑类页面 |\n| 表单预览模板 | 数据展示、只读类页面 |\n| 列表页模板 | 数据列表、筛选查询类页面 |\n| 数据看板模板 | 数据统计、图表展示类页面 |\n| 用户前台模板 | 面向C端用户的前台页面 |\n\n**实际应用场景**：优惠券列表页新增审核记录功能，AI自动匹配\"列表页模板\"，生成包含筛选模块、列表模块的PRD结构。\n\n---\n\n#### 5步PRD生成工作流\n\n**是什么**：将PRD生成过程拆解为5个有序步骤的标准化工作流。\n\n**为什么重要**：没有结构化流程，AI容易\"一上来就写\"，导致理解偏差、范围蔓延、格式混乱；5步流程确保每个环节都有明确的输入和输出。\n\n**详细解释**：\n\n| 步骤 | 操作 | 关键注意点 |\n|------|------|-----------|\n| 第1步 | AI读原型 | 明确告知需要关注的关键点 |\n| 第2步 | 自动匹配PRD模板 | 预先准备好分类模板 |\n| 第3步 | 确认需求范围 | **主动告知AI，不要等AI来问** |\n| 第4步 | AI输出完整PRD | 必须把模板文案传给AI |\n| 第5步 | AI自行检查 | 检查PRD与原型一致性，防止错漏 |\n\n**实际应用场景**：第3步是最容易被忽略的——如果不明确告诉AI\"只生成审核列表相关PRD\"，AI可能会自动扩展到整个页面的需求。\n\n---\n\n#### Claude个人规则配置\n\n**是什么**：在Claude设置中配置个人规则，让AI在原型更新时自动同步更新PRD和标注。\n\n**为什么重要**：产品迭代过程中原型频繁修改，如果每次都要手动更新PRD，效率极低；配置个人规则后，原型更新时AI会自动同步，保持文档一致性。\n\n**详细解释**：\n- 路径：Claude设置 → 规则和技巧选项 → 配置个人规则\n- 规则内容：更新页面时同步更新PRD，包括页面的标注\n- 效果：多人协作修改原型后，无需手动再次调整PRD\n\n**实际应用场景**：需求评审后研发提出修改意见，原型调整后AI自动更新对应的PRD内容，保持文档与原型始终一致。","table":"| 要素 | 关键点 |\n|------|--------|\n| Skill定义 | AI的技能库，处理重复性文档工作 |\n| 模板数量 | 5类（表单编辑/预览/列表/数据看板/用户前台） |\n| 第3步核心技巧 | 主动告知需求范围，不等AI来问 |\n| 传模板的原因 | 不传模板AI不会严格按模板格式输出 |\n| 第5步作用 | AI自检PRD与原型一致性 |\n| 人工校对目的 | 补充AI遗漏的业务规则 |\n| Claude个人规则 | 原型更新时自动同步PRD和标注 |","thinking":"1. 视频说\"不要等AI来问，一定要主动告诉AI需求范围\"——这说明AI在处理PRD任务时有\"范围蔓延\"的倾向，这个问题的根本原因是什么？除了在提示词中明确范围，还有哪些方法可以控制AI的输出边界？\n\n2. 视频介绍了5类PRD模板，但现实中产品类型远不止这5种——如何设计一套模板管理机制，让Skill能够随着业务发展持续扩展新模板，而不需要每次都重写Skill？\n\n3. \"AI自行检查PRD与原型的一致性\"（第5步）——AI检查的可靠性有多高？哪些类型的错漏是AI容易发现的，哪些是AI容易遗漏的？人工校对应该重点关注哪些方面？","remember":"好的PRD Skill不是让AI自由发挥，而是给它一套规范模板、一个明确范围、一个自检机制——把产品经理的经验固化进Skill，AI才能输出直接能用的文档。","is_new":true},{"id":"7624133540704722937","title":"文科生入局AI漫剧的机会与路径","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7624133540704722937","audience":"对AI副业感兴趣的文科生、内容创作者，以及希望了解AI漫剧行业机会的从业者","summary":"文科生在AI漫剧赛道最大的优势在于剧本创作——通过三条核心AI指令（生成剧本→人物设定→分镜脚本）可以低成本跑通内容生产第一步，行业目前仍处于内容稀缺阶段。","raw_preview":"我花了一个下午用AI从零做出来一个漫剧剧本，说实话，他比我想象中的要简单，但是也比我想象中的要麻烦。欢迎来到摇光的副业体验第17集，AI漫剧篇。\n\n如果你在2023年前听说过短剧将会是下一个风口但错过了，那么在2026年真的可以给AI漫剧一些关注。我从去年就断断续续关注到了AI漫剧的相关消息，今年上半年各平台更是真心给出了更大的扶持力度，让我觉得这个场景非常之熟悉，很像前几年短剧刚火那会儿。接着有","knowledge_map":"AI漫剧入局指南\n├── 行业背景\n│   ├── 定义：AI工具生成的动画微短剧，每集3-8分钟\n│   ├── 市场规模：2025年约191亿，增长近三倍\n│   └── 类比：类似短剧刚火时的机会窗口\n├── 完整生产流程（5步）\n│   ├── 写剧本（文科生优势区）\n│   ├── 分镜\n│   ├── 生图\n│   ├── 生视频\n│   └── 加配音\n├── 剧本创作三步AI指令\n│   ├── 第1条：生成完整动画剧本（含镜头分镜）\n│   ├── 第2条：生成人物形象设定（服装/外型/性格/行为）\n│   └── 第3条：将剧本转化为分镜脚本（最难，需细化）\n├── 变现方式\n│   ├── 平台合作分成（主流，爆款率1%）\n│   ├── 独立创作跑通从零到一\n│   └── 给团队供稿/做编辑（薪资五位数以上）\n└── 文科生核心优势\n    └── 剧本（行业最稀缺的内容部分）","concepts":"#### AI漫剧的五步生产流程\n\n**是什么**：用AI工具完成一部漫剧从创意到成片的完整制作流程。\n\n**为什么重要**：了解全流程才能判断自己的优势在哪个环节，避免盲目入局或放弃自己真正有优势的部分。\n\n**详细解释**：\n\n| 步骤 | 内容 | 技术门槛 | 文科生优势 |\n|------|------|----------|-----------|\n| 写剧本 | 故事、人物、情节 | 低 | ★★★★★ |\n| 分镜 | 镜头语言、画面设计 | 中 | ★★★ |\n| 生图 | AI图像生成 | 中高 | ★ |\n| 生视频 | AI视频生成 | 高 | ★ |\n| 加配音 | 配音、音效 | 中 | ★★ |\n\n**实际应用场景**：文科生可以专注剧本和分镜脚本环节，将成品交给有技术能力的团队完成后续生产，或直接给AI漫剧团队供稿。\n\n---\n\n#### 剧本创作的三条核心AI指令\n\n**是什么**：用AI辅助完成剧本创作的三个关键提示词，分别解决剧本框架、人物设定、分镜转化三个问题。\n\n**为什么重要**：直接对着空白屏幕想剧本很难启动，三条指令提供了清晰的创作路径，降低入门门槛。\n\n**详细解释**：\n\n| 指令 | 目的 | 关键要点 |\n|------|------|----------|\n| 第1条：生成剧本 | 快速出一个完整剧本框架 | 指定角色类型、时长要求、包含镜头分镜 |\n| 第2条：人物形象设定 | 固化人物外观，保证生图一致性 | 要求包含服装、外型、性格、行为等维度 |\n| 第3条：分镜脚本转化 | 将文字转化为可生图的具体画面词 | 最难，需要细化指令，文科生在此有感觉优势 |\n\n**实际应用场景**：第2条（人物设定）是容易被跳过但非常关键的一步——没有固定的人物外观描述，后续AI生图时人物形象会不一致，影响整体观感。\n\n---\n\n#### 变现路径与文科生定位\n\n**是什么**：AI漫剧个人创作者的三种主要变现方式，以及文科生最适合的切入点。\n\n**为什么重要**：明确变现路径才能判断投入产出比，避免花大量时间学技术却忽略了自己真正的竞争优势。\n\n**详细解释**：\n\n| 变现方式 | 特点 | 适合人群 |\n|----------|------|----------|\n| 平台分成 | 主流，爆款率1%，量博质难 | 有持续创作能力的团队 |\n| 独立创作 | 全流程自己跑，门槛高 | 有想法+渠道+技术的斜杠战士 |\n| 供稿/编辑 | 专注剧本，薪资五位数 | 文科背景、擅长内容的人 |\n\n文科生核心竞争力：剧本是目前AI漫剧行业最稀缺的内容，而这恰恰是文科生的天然优势。\n\n**实际应用场景**：有编辑背景的文科生，可以搜索\"AI漫剧编辑\"相关职位，薪资基本在五位数以上，不需要掌握AI生图/生视频的技术能力。","table":"| 要素 | 关键信息 |\n|------|----------|\n| AI漫剧定义 | AI工具生成的动画微短剧，每集3-8分钟 |\n| 市场规模 | 2025年约191亿，增长近三倍 |\n| 生产流程 | 写剧本→分镜→生图→生视频→加配音 |\n| 文科生优势环节 | 剧本（行业最稀缺） |\n| 剧本AI指令步骤 | ①生成剧本 ②人物设定 ③分镜转化 |\n| 主流变现方式 | 平台分成（爆款率1%） |\n| 低门槛入局方式 | 给团队供稿/做编辑 |\n| 编辑薪资参考 | 五位数以上 |","thinking":"1. 视频说AI漫剧的爆款率只有1%，很多团队在\"以量博爆款\"——这和短视频行业的内卷逻辑非常相似。对于个人创作者来说，\"质量差异化\"和\"量的积累\"应该如何取舍？\n\n2. 视频提到第3步\"将剧本转化为分镜脚本\"是最难的部分，因为需要将文字转化为具体的画面词——这个能力本质上是影视语言的翻译能力，文科生通过什么方式可以快速提升这个能力？\n\n3. 视频中提到\"人物形象设定\"是保证后续生图一致性的关键——但即使有了详细的人物设定，AI生图在人物一致性上仍然是一个难题，这个技术瓶颈对AI漫剧的内容质量有多大影响？","remember":"AI漫剧就像早期短剧——剧本是稀缺品，文科生的故事感恰好是这个赛道最缺的东西，与其学技术，不如先把剧本写好。","is_new":true},{"id":"7626368559887892337","title":"Agent Skill 与 MCP 的本质差异","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7626368559887892337","audience":"准备 AI 产品经理面试、希望深入理解 Agent 架构的产品人和开发者","summary":"Agent Skill 是教 Agent 怎么做事的方法论层，MCP 是让 Agent 连接外部世界的基础设施协议层，两者分工不同，配合使用才能构建完整的 AI 产品能力。","raw_preview":"请你说一下 Agent Skill 和 MCP 根本的差异是什么。\n\n好的，面试官。我觉得这两个东西表面上看都像是在增强 Agent 能力，但是如果我们深层看的话，它解决的其实不是同一个问题。Agent Skill 更像是在教 Agent 怎么去做事，而 MCP 更像是给 Agent 接触外部世界的接口。\n\n也就是说，Skill 解决的是能力、策略和行为范式的问题，MCP 解决的是标准化连接工具、","knowledge_map":"Agent Skill vs MCP\n├── 表面相似\n│   └── 都在增强 Agent 能力\n├── 本质差异\n│   ├── Agent Skill\n│   │   ├── 定位：方法论 / 认知层 / 决策策略层\n│   │   ├── 解决：能力、策略、行为范式\n│   │   ├── 作用：注入经验/工作流/行业 know-how\n│   │   └── 特点：无需外部系统也能发挥作用\n│   └── MCP\n│       ├── 定位：基础设施协议 / 连接层 / 能力共击层\n│       ├── 解决：标准化连接工具、数据、系统\n│       ├── 作用：统一接入文档/数据库/日历/钉钉等外部能力\n│       └── 特点：需要对应服务器，强调安全边界和权限控制\n└── 配合使用\n    └── MCP 接入外部能力 → Skill 组织成稳定可复用工作流","concepts":"#### Agent Skill（技能层）\n\n**是什么**：注入给模型的经验、工作流和行业 know-how，让模型在某类任务上表现更稳定、更专业、更可复用。\n\n**为什么重要**：模型本身是通用的，Skill 让它在特定领域按照最优路径执行，避免每次都从零摸索。\n\n**详细解释**：\n\n| 维度 | 说明 |\n|---|---|\n| 本质 | 对模型行为的约束和增强 |\n| 解决的问题 | 能力、策略、行为范式 |\n| 层次定位 | 认知层 / 决策策略层 |\n| 依赖条件 | 无需外部系统也能工作 |\n| 典型例子 | 协作写 PRD 的 Skill：按固定步骤/结构/标准执行 |\n\n**实际应用场景**：给客服 Agent 注入一个\"投诉处理 Skill\"，它就会按照\"先安抚→核实信息→给出方案→跟进确认\"的固定流程处理，而不是每次随机发挥。\n\n---\n\n#### MCP（Model Context Protocol，模型上下文协议）\n\n**是什么**：一套开放的连接协议，让模型能够统一、安全、标准化地接入外部工具和系统（文档、数据库、日历、钉钉等）。\n\n**为什么重要**：模型本身无法直接访问外部世界，MCP 解决的是\"连接\"问题，而不是\"思考\"问题。\n\n**详细解释**：\n\n| 维度 | 说明 |\n|---|---|\n| 本质 | 开放的连接协议 / 基础设施 |\n| 解决的问题 | 标准化连接工具、数据和系统 |\n| 层次定位 | 连接层 / 能力共击层 |\n| 依赖条件 | 需要对应的 MCP 服务器运行 |\n| 核心强调 | 安全边界、权限控制、能力协调 |\n| 典型例子 | 通过 MCP 让 Agent 读取数据库、操作钉钉、访问文档系统 |\n\n**实际应用场景**：企业内部 Agent 通过 MCP 接入 OA 系统、CRM、知识库，实现跨系统的数据读取和操作，而不需要为每个系统单独开发接口。\n\n---\n\n#### Skill + MCP 的配合模式\n\n**是什么**：先用 MCP 把外部能力接进来，再用 Skill 把这些能力组织成稳定、可复用、可交付的工作流。\n\n**为什么重要**：单独使用任何一个都不完整——MCP 给了能力但没有策略，Skill 有策略但没有外部数据源。\n\n**实际应用场景**：\n- MCP：接入公司数据库、日历系统、钉钉\n- Skill：定义\"每日工作汇报\"的生成流程（查日历→查任务→整合数据→按模板输出）\n- 结果：Agent 每天自动生成符合规范的工作汇报，稳定可复用","table":"| 对比维度 | Agent Skill | MCP |\n|---|---|---|\n| 本质 | 方法论 / 行为约束 | 连接协议 / 基础设施 |\n| 层次 | 认知层 / 决策策略层 | 连接层 / 能力共击层 |\n| 解决问题 | 怎么做（能力/策略/行为范式） | 连什么/调什么（工具/数据/系统） |\n| 依赖 | 无需外部系统 | 需要 MCP 服务器 |\n| 类比 | 给员工培训 SOP | 给员工开通系统访问权限 |\n| 配合关系 | 组织能力成工作流 | 接入外部能力 |","thinking":"1. 视频中说 Skill 是\"对模型行为的约束和增强\"，那么当 Skill 中定义的流程与实际业务场景不匹配时，Agent 应该如何处理？Skill 的灵活性边界在哪里？\n2. MCP 强调\"安全边界和权限控制\"，在企业级部署中，如何设计 MCP 的权限体系，既能让 Agent 高效访问数据，又不引入安全风险？\n3. 随着 MCP 协议逐渐标准化，Skill 的设计是否也会走向标准化？行业通用 Skill 库和企业私有 Skill 库应该如何分工？","remember":"Skill 教 Agent 怎么做事，MCP 给 Agent 通外部世界——先接能力，再组流程，两者缺一不可。","is_new":true},{"id":"7626633653111541028","title":"用 AI Skill 半小时写出可用 PRD","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7626633653111541028","audience":"没有产品背景但想用 AI 实现产品想法的创业者、独立开发者和初级产品人","summary":"通过 PRDWRITER Skill 将 AI 写 PRD 的流程拆成\"概念稿+落地版\"两步，让没有产品背景的人也能在半小时内产出可直接开发的需求文档。","raw_preview":"如果你现在有一个绝妙的产品点子，想用 Vibe Code 做出来，但又没有产品经验，让 AI 帮你写个需求文档，结果发现它写的东西看起来很长很专业，但其实压根就没 get 到你的意思，里面的细节也漏掉了很多，根本没有办法直接拿去开发。\n\n我之前视频也讲过，Vibe Code 无步法，第一步需求细化其实就已经决定了 80% 的结果。所以我就把我自己和 AI 沟通的经验以及做产品这几年的思路整理成了一","knowledge_map":"PRDWRITER Skill 方法论\n├── 核心问题\n│   └── AI 直接写 PRD → 看起来专业但细节缺失，无法直接开发\n├── 核心逻辑\n│   └── 不让 AI 一上来就写完整 PRD → 拆成两步走\n├── 第一步：概念稿（10 分钟）\n│   ├── 用户视角（痛点 / 伪需求排除）\n│   ├── 商业视角（可持续性 / 商业模式）\n│   └── 技术视角（产品形态 / 开发成本）\n├── 第二步：落地版（30 分钟）\n│   ├── 交互细节（异常情况补充）\n│   ├── 状态机（字段/按钮所有状态及转换）\n│   ├── 字段规范（必填/长度/校验规则）\n│   ├── 文案规范（统一对外文案）\n│   └── 流程图 + 线框图\n└── 三种使用模式\n    ├── 从零生成 PRD\n    ├── 优化已有文档\n    └── 增加新需求","concepts":"#### 两步走的 PRD 生成逻辑\n\n**是什么**：将 AI 写 PRD 的过程拆成\"概念稿（对齐方向）\"和\"落地版（补完细节）\"两个阶段，而不是一步到位。\n\n**为什么重要**：AI 一步到位写 PRD 往往流于表面，遗漏关键细节；两步走让方向对齐先于细节展开，大幅提升最终文档质量。\n\n**详细解释**：\n\n| 阶段 | 时间 | 目标 | 核心动作 |\n|---|---|---|---|\n| 概念稿 | 10 分钟 | 对齐方向，排除伪需求 | AI 从用户/商业/技术三角度提问 |\n| 落地版 | 30 分钟 | 补完细节，可直接开发 | 按预设结构补充 5 类关键细节 |\n\n**实际应用场景**：想做一个自媒体账号定位工具，先通过概念稿确认\"目标用户是谁、数据从哪来\"，再在落地版中补充异常处理、状态机、字段规范等开发所需细节。\n\n---\n\n#### 落地版的五大必备要素\n\n**是什么**：在 Skill 中预设的 PRD 结构，强制 AI 补充五类容易被遗漏的细节，确保文档可直接用于开发。\n\n**为什么重要**：大多数人写需求只写\"正常流程\"，忽略异常情况、状态转换等开发必需内容，导致开发阶段频繁返工。\n\n**详细解释**：\n\n| 要素 | 内容 | 典型遗漏示例 |\n|---|---|---|\n| 交互细节 | 异常情况处理（报错/加载/空状态） | \"点击提交\"但未说明提交失败怎么办 |\n| 状态机 | 字段/按钮的所有状态及转换关系 | 按钮只写了\"点击\"，未定义 loading/disabled 状态 |\n| 字段规范 | 必填/长度限制/校验规则 | 输入框没有字数限制或格式要求 |\n| 文案规范 | 对外展示文案统一 | 同一功能在不同页面文案不一致 |\n| 流程图/线框图 | 核心用户流程图 + 关键页面线框 | 只有文字描述，开发无法确认交互逻辑 |\n\n**实际应用场景**：在 PRDWRITER 生成的 PRD 中，\"提交按钮\"会自动包含：正常状态/loading 状态/成功状态/失败状态的描述，以及失败时的错误提示文案规范。\n\n---\n\n#### 三角度提问法（概念稿阶段）\n\n**是什么**：在概念稿阶段，AI 从用户视角、商业视角、技术视角三个角度提问，帮助创作者梳理和验证产品方向。\n\n**为什么重要**：很多产品想法是\"自嗨\"的伪需求，三角度提问法在早期就能暴露问题，避免在错误方向上浪费时间。\n\n**详细解释**：\n\n| 视角 | 核心问题 | 目的 |\n|---|---|---|\n| 用户视角 | 用户现在怎么解决？痛在哪？你的产品真的帮到他了吗？ | 排除伪需求，验证真实痛点 |\n| 商业视角 | 一次性需求还是长期需求？买断还是订阅？ | 评估商业可持续性 |\n| 技术视角 | 产品形态是什么？能快速做出来吗？开发成本能接受吗？ | 评估可行性和资源匹配度 |\n\n**实际应用场景**：想做\"AI 帮我写朋友圈文案\"的工具，通过三角度提问发现：用户痛点是真实的（用户视角✓），但商业模式不清晰（商业视角✗），需要先想清楚再开始写 PRD。","table":"| 维度 | 传统 AI 写 PRD | PRDWRITER Skill |\n|---|---|---|\n| 流程 | 一步到位，直接输出 | 两步走：概念稿 → 落地版 |\n| 方向对齐 | 依赖用户描述准确性 | AI 主动三角度提问对齐 |\n| 细节完整性 | 容易遗漏异常/状态/规范 | 预设 5 类结构强制补充 |\n| 开发可用性 | 通常需要大量补充 | 可直接拿去开发 |\n| 使用门槛 | 需要有产品经验才能 review | 无产品背景也能用 |\n| 支持模式 | 从零生成 | 从零生成 / 优化已有 / 增加需求 |","thinking":"1. PRDWRITER 的核心价值是\"把产品经验固化成 Skill\"，那么不同行业、不同类型的产品（ToB vs ToC、工具型 vs 内容型）是否需要不同的 Skill 模板？\n2. 视频中提到\"状态机\"是容易遗漏的关键细节，在实际开发中，AI 生成的状态机描述是否足够精确，还是仍然需要产品经理和开发者共同确认？\n3. 随着 AI 能力提升，未来 PRD 本身是否会被\"可执行规范\"替代，让 AI 直接从需求描述生成代码，而不再需要中间的 PRD 文档？","remember":"别让 AI 一步到位写 PRD——先 10 分钟对齐方向，再 30 分钟补完细节，PRDWRITER 让模糊想法变成可直接开发的需求文档。","is_new":true},{"id":"7627068418029554995","title":"多Agent协作机制解析","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7627068418029554995","audience":"准备大模型岗位面试、希望深入理解多Agent系统协作原理的开发者和AI产品经理。","summary":"通过模拟面试场景，系统讲解多Agent协作的四大核心环节——任务拆解、角色匹配、信息同步、模式选择，帮助求职者在面试中给出有深度的结构化回答。","raw_preview":"嗯，我和你简单聊了熟悉多Agent的协作，那你能聊一聊Agent具体是怎么样来协作的吗？\n\n就本质，我理解的多Agent的协作本质是用一组专业化的智能体替代单一模型，通过结构化分工与协同完成复杂多步骤、跨领域的复杂任务。\n\n实际落地时会围绕四个核心环节展开：\n\n首先就是任务拆解与规划。通常由一个中枢调度Agent接收用户的需求，通过规划能力把目标拆成有先后依赖的子任务。比如做一份行业报告，会拆成检","knowledge_map":"多Agent协作\n├── 本质定义\n│   └── 专业化智能体替代单一模型，结构化分工完成复杂任务\n├── 四大核心环节\n│   ├── 1. 任务拆解与规划\n│   │   ├── 中枢调度Agent接收需求\n│   │   ├── 拆解为有依赖关系的子任务\n│   │   └── 明确每步输入/输出/验收标准\n│   ├── 2. 角色与能力匹配\n│   │   ├── 按任务类型设定专属职能\n│   │   └── 系统提示限定边界和格式\n│   ├── 3. 通信与信息同步\n│   │   ├── 消息传递（适合流水线）\n│   │   └── 共享记忆（统一上下文）\n│   └── 4. 协作模式选择\n│       ├── 中枢调度模式（流程明确）\n│       ├── 并行协作模式（多角度决策）\n│       └── 流水线模式（步骤固定）\n└── 核心价值\n    └── 专精团队 > 全能单体，提升可靠性/专业性/可扩展性","concepts":"#### 中枢调度Agent\n\n**是什么**：多Agent系统中负责接收用户需求、拆解任务、分配子任务给各专业Agent并监控执行的\"大脑\"角色。\n\n**为什么重要**：没有中枢调度，多个Agent就是一盘散沙，无法保证任务有序推进和结果质量。\n\n**详细解释**：\n- 接收用户原始需求\n- 通过规划能力将需求拆解为有先后依赖关系的子任务序列\n- 明确每个子任务的输入、输出和验收标准\n- 监控执行进度，必要时纠偏\n\n**实际应用场景**：生成行业报告时，中枢Agent将任务拆成\"检索数据→整理信息→撰写正文→格式校验\"四步，逐步分配给对应Agent执行。\n\n---\n\n#### Agent间通信方式\n\n**是什么**：多Agent系统中，各智能体之间交换信息的两种机制：消息传递和共享记忆。\n\n**为什么重要**：通信方式决定了信息是否能准确、及时地在Agent之间流转，直接影响任务协作的效率和准确性。\n\n**详细解释**：\n\n| 通信方式 | 特点 | 适合场景 |\n|---------|------|---------|\n| 消息传递 | 上一节点结果直接传给下一节点 | 流水线式、步骤明确的任务 |\n| 共享记忆 | 所有Agent读写统一上下文 | 需要多Agent共享进度、中间结果的复杂任务 |\n\n**实际应用场景**：流水线任务（如文档处理）用消息传递；需要多Agent协同决策的复杂任务（如跨部门审批）用共享记忆避免信息孤岛。\n\n---\n\n#### 三种协作模式\n\n**是什么**：根据任务特点选择的多Agent工作组织方式，包括中枢调度、并行协作、流水线三种模式。\n\n**为什么重要**：选错模式会导致资源浪费或任务失控，合理选型是多Agent系统落地的关键工程决策。\n\n**详细解释**：\n\n| 模式 | 适用场景 | 核心特点 |\n|------|---------|---------|\n| 中枢调度模式 | 流程明确的任务 | 中枢统一分配、监控、纠偏 |\n| 并行协作模式 | 需要多角度决策 | 多Agent独立输出后汇总决策 |\n| 流水线模式 | 步骤固定的任务 | 依次流转，一步接一步 |\n\n**实际应用场景**：生成报告用流水线；多专家评审用并行协作；复杂业务流程用中枢调度。","table":"| 环节 | 核心动作 | 关键点 |\n|------|---------|-------|\n| 任务拆解与规划 | 中枢Agent拆解需求为子任务 | 明确输入/输出/验收标准 |\n| 角色与能力匹配 | 按任务类型设定专属职能 | 系统提示限定边界，避免越权 |\n| 通信与信息同步 | 消息传递 or 共享记忆 | 避免信息孤岛 |\n| 协作模式选择 | 中枢调度/并行协作/流水线 | 按任务复杂度和结构选型 |","thinking":"1. 当中枢调度Agent本身出错或规划失误时，多Agent系统应该如何设计容错和回退机制？\n\n2. 消息传递和共享记忆两种通信方式各有哪些工程上的实现挑战？在高并发场景下如何保证一致性？\n\n3. 并行协作模式中，多个Agent给出不同甚至相互矛盾的输出时，汇总决策的策略应该如何设计？","remember":"多Agent协作不是让AI变得更聪明，而是让一群\"专科医生\"替代一个\"全科大夫\"——分工越清晰，系统越可靠。","is_new":true},{"id":"7627168048558285425","title":"让AI产品界面变好看的4个工具","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7627168048558285425","audience":"正在用 AI coding 工具做产品 demo、但苦于前端界面难看的产品经理或独立开发者","summary":"推荐4个让 AI vibe coding 产品界面快速变好看的工具，帮助产品经理和开发者解决\"功能有了但界面很丑\"的痛点。","raw_preview":"你是不是经常觉得自己做出来的 AI 产品 demo 的前端界面特别的丑，然后特别的 low？因为给大家分享一下我日常在用的几种优化前端美观度的工具，让大家参考。\n\n第一个的话就是 Design Prompt Dev，这个里面有非常非常非常多的一些风格，然后它使用起来也非常简单，就是这里点 Get Prompt，你就把 Prompt 复制下来，然后发到你的 Windsurf 或者是 Cursor 或","knowledge_map":"让 AI 产品界面变好看的 4 个工具\n├── 快速验证场景（轻量、直接给 AI 用）\n│   ├── Design Prompt Dev\n│   │   ├── 大量前端风格模板\n│   │   └── 一键 Get Prompt → 发给 AI coding 工具\n│   └── Design MD（designmd.ai）\n│       ├── 前端模板 + MD 文件下载\n│       ├── 复制 prompt 直接给 AI 改界面\n│       └── 提供 MCP 接口（可接 Claude Code / Windsurf）\n├── 专业设计场景（规范严格、适合正式产品）\n│   └── M3 Material IO（material.io）\n│       ├── 谷歌开源设计系统\n│       ├── 完整配色、组件、设计规范\n│       └── 适合需要符合谷歌设计标准的产品\n└── 深度 AI coding 场景（自己做完整产品）\n    └── UI UI Pro Max（GitHub）\n        ├── 专业前端 UI 组件库\n        └── 下载后按需设计前端界面","concepts":"#### 概念一：Design Prompt Dev\n\n**是什么**：一个聚合了大量前端 UI 风格 Prompt 的网站，可以一键复制风格描述 Prompt。\n\n**为什么重要**：AI coding 工具（Claude Code、Cursor 等）需要明确的 Prompt 才能生成好看的界面，Design Prompt Dev 省去了自己描述风格的麻烦。\n\n**详细解释**：\n- 网站内提供多种前端视觉风格（极简、科技感、卡片式等）\n- 点击\"Get Prompt\"直接复制该风格的描述 Prompt\n- 将 Prompt 粘贴到 AI coding 工具中，让 AI 按该风格渲染前端界面\n\n**实际应用场景**：做产品 demo 时想快速换一个好看的风格，不想自己写样式描述，直接用这个网站取 Prompt 扔给 AI。\n\n---\n\n#### 概念二：M3 Material IO（material.io）\n\n**是什么**：谷歌官方开源的设计系统 Material Design 3，包含完整的设计规范、配色方案和 UI 组件。\n\n**为什么重要**：设计规范是专业产品的基础，M3 是业界公认的成熟体系，用它做出来的产品自带专业感。\n\n**详细解释**：\n- 提供完整的颜色系统（Color Scheme）、排版规范、间距规则\n- 包含大量标准组件（Button、Card、Navigation 等）\n- 可以将设计规范文档或组件截图提供给 AI，让 AI 按谷歌规范生成界面\n\n**实际应用场景**：做面向企业或需要专业形象的 AI 产品时，用 M3 规范约束 AI 生成的界面风格，避免五花八门的样式。\n\n---\n\n#### 概念三：Design MD（designmd.ai）\n\n**是什么**：类似 Design Prompt Dev 的前端模板网站，额外支持下载 MD 文件和 MCP 接口连接。\n\n**为什么重要**：除了 Prompt 模式，还支持 MCP 协议，可以让 Claude Code / Windsurf 直接调用，实现设计到代码的自动化打通。\n\n**详细解释**：\n- 提供多种前端模板，可下载为 Markdown 文件\n- 复制模板内容（即一段 Prompt）发给 AI，让 AI 修改前端界面\n- 支持 MCP 接口，AI coding 工具可直接连接，无需手动复制粘贴\n\n**实际应用场景**：想要更自动化的工作流时，通过 MCP 让 Claude Code 直接读取 Design MD 的模板并应用到项目中。\n\n---\n\n#### 概念四：UI UI Pro Max（GitHub）\n\n**是什么**：GitHub 上的一个专业前端 UI 组件库，适合深度 AI coding 场景下的产品界面设计。\n\n**为什么重要**：当你认真做一个完整的 AI 产品（而不只是 demo）时，需要一套可复用、可扩展的 UI 体系，而不是一次性的 Prompt 风格。\n\n**详细解释**：\n- 下载后可在本地使用\n- 根据产品需求选取对应组件，设计前端界面\n- 适合长期迭代的 AI coding 产品\n\n**实际应用场景**：自己在做一个完整的 AI 工具产品，需要统一的 UI 组件体系支撑多个页面和功能模块。","table":"| 工具 | 使用场景 | 使用方式 | 适合程度 |\n|------|----------|----------|----------|\n| Design Prompt Dev | 快速验证、换风格 | Get Prompt → 粘贴给 AI | ⭐⭐⭐ 轻量快速 |\n| Design MD | 快速验证 + 自动化 | 复制 Prompt 或接 MCP | ⭐⭐⭐⭐ 推荐 |\n| M3 Material IO | 专业产品、谷歌规范 | 提供规范文档给 AI 参考 | ⭐⭐⭐⭐ 专业场景 |\n| UI UI Pro Max | 完整 AI 产品开发 | GitHub 下载，本地使用 | ⭐⭐⭐⭐⭐ 深度开发 |","thinking":"1. **Prompt 驱动设计的边界在哪里？** 用 Prompt 控制 UI 风格，和真正的 UI 设计能力之间差距有多大？在什么产品阶段，你需要从\"Prompt 驱动\"升级到\"设计系统驱动\"？\n\n2. **MCP 接口对 AI coding 工作流意味着什么？** Design MD 提供 MCP 接口，说明设计工具正在主动接入 AI 工作流。这个趋势会如何改变产品经理和设计师的协作方式？\n\n3. **界面美观度对 AI 产品 demo 的说服力影响有多大？** 在向用户或投资人展示 AI 产品时，界面颜值和功能本身，哪个更影响第一印象？你会如何分配精力？","remember":"做 AI 产品不会设计没关系——Design Prompt、Design MD、M3、UI UI Pro Max，4 个工具让你的界面从\"程序员审美\"直接升级到\"产品经理水准\"。","is_new":true},{"id":"7627482803596384442","title":"AI产品经理的Vibe Coding能力","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7627482803596384442","audience":"正在准备AI产品经理面试、想提升Vibe Coding能力的产品经理和转型者。","summary":"AI产品经理的Vibe Coding核心不是会写代码，而是具备需求成型、规范驱动开发、基础技术判断三层能力，成为真正的产品Owner。","raw_preview":"AI产品经理里面有90%的人都会在这道题上翻车。面试官问你什么是Vibe Coding，要是你一开口就说\"AI写代码做页面省时间\"，那么面试官基本上就能判定你不懂，也没有真正落地过这一块。所以我今天就用几分钟时间来给大家讲解，作为AI产品经理，什么样的Vibe Coding能力是有竞争力的。\n\nAI产品经理最强的Vibe Coding，它不是更像程序员，而是更像产品Owner。很多人会误以为AI时","knowledge_map":"AI产品经理的Vibe Coding能力\n├── 核心定位：产品Owner，而非程序员\n│   └── AI放大执行半径，让想法快速变成可验证产品\n├── 三层能力结构\n│   ├── 第一层：需求成型能力\n│   │   ├── 明确产品目标（内部工具/Demo/MVP）\n│   │   ├── 定义用户是谁\n│   │   └── 拆解核心流程（入口/动作/异常处理）\n│   ├── 第二层：规范驱动开发\n│   │   ├── 精简PRD\n│   │   ├── 信息框架和页面结构\n│   │   ├── 数据结构与存储状态\n│   │   └── 验收标准\n│   └── 第三层：基础技术判断能力\n│       ├── 前后端分层意识\n│       ├── 组件化意识\n│       └── 调试能力\n└── 常见误区\n    ├── 以为Vibe Coding = 让AI写几个页面\n    ├── 以为不需要懂技术\n    └── 用聊天驱动开发（导致项目不可维护）","concepts":"#### 需求成型能力\n\n**是什么**：在使用AI辅助开发前，将模糊想法转化为清晰、结构化需求的能力。\n\n**为什么重要**：AI执行速度快，但它只会在给定的空间里发挥——需求不清晰，AI输出的就是垃圾。需求成型能力是Vibe Coding的地基。\n\n**详细解释**：\n- **产品目标**：明确是内部工具、纯Demo还是对外MVP，决定做什么\n- **用户定义**：同一功能面向C端用户、运营、销售、老板，页面结构和交互完全不同\n- **核心流程**：用户从哪里进入、点击后发生什么、异常如何处理\n\n**实际应用场景**：在让AI开始写代码之前，先写清楚\"这是给谁用的、核心流程是什么、异常怎么处理\"，AI才能给出有价值的输出。\n\n---\n\n#### 规范驱动开发\n\n**是什么**：用文档和规范（PRD、页面结构、数据结构、验收标准）来驱动AI开发，而不是靠聊天随意发指令。\n\n**为什么重要**：聊天驱动开发会导致项目\"改到哪算哪\"，代码混乱、不可维护，只能停留在玩具阶段。\n\n**详细解释**：\n\n| 规范文档 | 作用 |\n|---------|------|\n| 精简PRD | 明确功能边界和核心需求 |\n| 信息框架和页面结构 | 定义页面、模块及跳转逻辑 |\n| 数据结构与存储状态 | 确保前后端数据一致 |\n| 验收标准 | 判断AI输出是否达标 |\n\n**实际应用场景**：即使只是做Demo，也要先写一份最精简的PRD，让AI按规范而非随意发挥来生成代码。\n\n---\n\n#### 基础技术判断能力\n\n**是什么**：能够判断AI生成代码是否正确、合理的基础技术素养，包括前后端分层意识、组件化意识和调试能力。\n\n**为什么重要**：AI降低了写代码的门槛，但同时暴露了一个更大的问题——没有技术判断力，你不知道AI写的东西是不是垃圾。\n\n**详细解释**：\n- **前后端分层意识**：哪些逻辑在前端，哪些在后端\n- **组件化意识**：哪些是通用组件，哪些是一次性页面\n- **调试能力**：能定位和理解AI代码出错的位置\n\n**实际应用场景**：AI生成一段代码后，产品经理需要能判断\"这段逻辑放在前端合理吗\"\"这个组件可以复用吗\"，而不是完全盲信AI输出。","table":"| 能力层次 | 核心内容 | 常见误区 |\n|---------|---------|---------|\n| 需求成型 | 目标/用户/流程/异常 | 需求模糊，让AI自由发挥 |\n| 规范驱动 | PRD/页面结构/数据结构/验收标准 | 聊天驱动，项目不可维护 |\n| 技术判断 | 前后端分层/组件化/调试 | 以为不需要懂技术 |","thinking":"1. 视频说AI产品经理应该成为\"产品Owner\"而非\"程序员\"，那么在实际团队中，产品经理用Vibe Coding做出的原型和工程师交付的代码之间，边界和交接点应该如何界定？\n\n2. \"规范驱动开发\"要求写PRD、定义页面结构，这在快速迭代的早期阶段是否会拖慢验证速度？如何在规范性和敏捷性之间找到平衡？\n\n3. 视频提到没有技术判断能力\"会越来越危险\"，对于零技术背景的产品经理，应该优先补哪些技术知识才能具备最基础的AI代码判断力？","remember":"Vibe Coding不是让AI帮你写代码，而是让你从\"只会写文档的产品经理\"升级为\"能把想法快速变成可验证产品的产品Owner\"。","is_new":true},{"id":"7628550856543161626","title":"AI数据类问题幻觉与滞后的解决方案","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7628550856543161626","audience":"准备AI产品经理或大模型方向面试、关注AI产品数据准确性问题的从业者。","summary":"针对AI回答数据类问题时的幻觉和知识滞后两大痛点，从工具调用、强制拒绝、RAG知识库、界面确定性设计到用户反馈闭环，给出了完整的产品解决方案思路。","raw_preview":"用户反馈我们的AI在回答数据类实时问题的时候会出现幻觉，大模型本身知识会有滞后性，那你对于这个产品的解决方案思路是什么样子的？\n\n不要到我，其实有两个核心想法，就是首先是大模型的幻觉问题，然后就是知识的滞后性，我给从两个方向来给出产品方案。\n\n这两个来说，大模型的幻觉问题吧。就是幻觉问题，我的核心逻辑就是不要让它去凭空生成这一时间的方法，就是理路工具调用。比如说当用户问今天的股价是什么，或者一个销","knowledge_map":"AI数据类问题解决方案\n├── 问题一：大模型幻觉（凭空生成错误数字）\n│   ├── 解法1：工具调用\n│   │   ├── 数据问题先发起查询任务\n│   │   └── 调用预定义API/数据库接口拿真实数据\n│   └── 解法2：强制拒绝\n│       ├── 系统提示中明确：无把握必须拒绝\n│       └── 直接说\"抱歉，无法确认\"\n├── 问题二：知识滞后（实时/企业内部数据搜不到）\n│   ├── 联网搜索（仅适合公开信息）\n│   └── 企业知识库（RAG）\n│       ├── 整理财报/文档/业务数据为知识源\n│       └── 通过事实检索注入上下文\n├── 用户体验优化\n│   ├── 数据来源标注（图标/来源链接）\n│   ├── 高风险数据加可点击来源\n│   └── 显示查询时间\n└── 长期闭环\n    ├── 用户反馈按钮（标记不准确内容）\n    ├── 定期分析Bad Case\n    └── 高频问题自动创建工单推动迭代","concepts":"#### 工具调用（Tool Calling）解决幻觉\n\n**是什么**：当用户提问数据类问题时，AI不直接生成答案，而是先调用预定义的API或数据库接口获取真实数据，再组织输出。\n\n**为什么重要**：大模型的训练数据有截止日期，对实时数据和精确数字天然不可靠。工具调用让AI从\"猜测\"变成\"查询\"，从根本上消除数字幻觉。\n\n**详细解释**：\n- 用户提问：\"今天的股价是多少？\"\n- AI不直接回答，而是：发起查询 → 调用股价API → 拿到真实数据 → 组织语言输出\n- 若工具不可用：系统提示强制要求拒绝，说\"抱歉，无法确认\"，而不是猜测\n\n**实际应用场景**：销售数据查询、股价查询、实时库存查询等涉及精确数字的场景。\n\n---\n\n#### RAG（检索增强生成）解决知识滞后\n\n**是什么**：将企业内部最新文档、财报、业务数据整理成知识源，通过检索技术在模型回答前注入相关上下文，使模型能基于最新事实作答。\n\n**为什么重要**：联网搜索只能覆盖公开信息，企业内部的数据、最新财报、业务指标外网根本搜不到。RAG是解决企业级知识滞后的标准方案。\n\n**详细解释**：\n- 构建知识源：整理公司财报、业务文档、产品数据\n- 检索阶段：用户提问时先检索相关知识片段\n- 生成阶段：将检索到的事实注入上下文，模型基于事实回答\n\n**实际应用场景**：企业内部AI助手回答\"我们上季度的GMV是多少\"\"最新的产品政策是什么\"等问题。\n\n---\n\n#### 数据确定性设计与用户反馈闭环\n\n**是什么**：通过界面设计增强用户对数据来源的信任感，并建立用户反馈机制持续优化数据准确性。\n\n**为什么重要**：即使技术上做了工具调用和RAG，用户如果不知道数据是\"查出来的\"还是\"生成的\"，信任感依然很低。界面设计和闭环机制是产品体验的最后一公里。\n\n**详细解释**：\n- **数据来源标注**：加图标区分\"查询数据\"和\"生成内容\"\n- **高风险数据**：涉及金额、KPI等加可点击的数据来源链接，显示查询时间\n- **用户反馈按钮**：让用户标记不准确内容\n- **Bad Case分析**：定期分析，定位是工具调用失败、知识库未更新还是提示词问题\n- **高频问题自动工单**：推动数据源或策略迭代\n\n**实际应用场景**：企业AI助手的数据回答界面设计，以及数据质量持续改进机制。","table":"| 问题类型 | 解决方案 | 核心逻辑 |\n|---------|---------|---------|\n| 数字幻觉 | 工具调用 | 先查询再回答，不猜测 |\n| 数字幻觉（工具不可用） | 强制拒绝 | 系统提示强制说\"无法确认\" |\n| 实时公开信息滞后 | 联网搜索 | 覆盖公开信息 |\n| 企业内部数据滞后 | RAG知识库 | 整理内部文档为知识源 |\n| 用户信任感低 | 数据来源标注 | 图标+来源链接+查询时间 |\n| 长期数据质量 | 用户反馈闭环 | 标记→分析Bad Case→迭代 |","thinking":"1. 工具调用方案依赖预定义的API，但实际业务中数据源可能非常分散（CRM、ERP、数据库各不相同），如何设计一个可扩展的工具调用架构来覆盖多数据源场景？\n\n2. RAG知识库的时效性本身也是个问题——如果财报更新了但知识库没有同步，依然会出现滞后。如何设计知识库的自动更新和版本管理机制？\n\n3. 视频提到\"强制拒绝\"比\"猜测性回答\"更专业，但在实际用户场景中，频繁的\"无法确认\"会不会损害用户体验和产品价值感？如何在拒绝率和用户满意度之间找到平衡？","remember":"AI回答数据问题，宁可说\"我不知道\"，也不能说一个看起来像真的错误数字——工具调用让AI从\"猜测者\"变成\"查询者\"。","is_new":true},{"id":"7628955177269103923","title":"AI产品经理Vibe Coding掌握层次","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7628955177269103923","audience":"想转型或入行AI产品经理、对Vibe Coding能力要求有疑惑的产品从业者。","summary":"系统讲解Vibe Coding的定义、AI产品经理需要掌握它的原因，以及从\"精准提需求\"到\"调试\"的四个能力层次，帮助产品经理找准学习目标。","raw_preview":"对于Vibe Coding，AI产品经理到底要掌握到什么程度？我们今年能看到AI圈子里面一个明显的趋势，就是对AI产品经理要求Vibe Coding能力最激进的，当初基本上效招在招AI产品的岗位时，Vibe Coding变成了必考项。那到底什么是Vibe Coding，AI产品经理需要掌握到什么程度？我们一篇内容给大家讲清楚。\n\n首先先讲什么是Vibe Coding。Vibe Coding这个概念","knowledge_map":"AI产品经理的Vibe Coding\n├── 什么是Vibe Coding\n│   ├── 卡帕西（OpenAI创始人之一）提出\n│   ├── 用自然语言描述需求，AI完成编程/调试/迭代\n│   └── 本质：编程语言 → 自然语言，门槛大降\n├── 为什么产品经理要学\n│   ├── 短期：工作提效（自己做数据产品、工具）\n│   └── 长期：全栈角色趋势（懂商业/产品/代码/设计）\n└── 四个掌握层次\n    ├── 第一级：精准提需求（拆解想法为系统需求）\n    ├── 第二级：复杂任务拆解与上下文治理\n    │   └── 先搭框架→写组件→连数据库\n    ├── 第三级：调试（理解基础技术结构）\n    │   └── 前端/后端/数据库/分层/日志/断点\n    └── 第四级：依赖外部库的复杂集成（进阶，非必须）","concepts":"#### Vibe Coding的定义\n\n**是什么**：用自然语言描述需求，让AI完成大量编程代码的修改、调试和迭代，最终产出可交付产品的开发模式。\n\n**为什么重要**：它将编程语言的门槛替换为自然语言，让非技术背景的产品经理也能独立产出可运行的产品，改变了产品经理的工作边界。\n\n**详细解释**：\n- 传统AI辅助编程：人还需要理解和消化代码\n- Vibe Coding：人只需用提示词明确意图，其他全部由AI完成\n- 本质变化：编程语言（Python/Go/Java）→ 自然语言\n\n**实际应用场景**：产品经理自己Vibe Coding一个数据报表工具，不需要等数据分析师帮忙。\n\n---\n\n#### 四个掌握层次\n\n**是什么**：Vibe Coding能力从低到高的四个阶段，对应不同的技能要求和能够完成的任务复杂度。\n\n**为什么重要**：明确层次帮助产品经理找到自己的当前位置和学习路径，避免盲目学习或低估/高估要求。\n\n**详细解释**：\n\n| 层次 | 核心能力 | 关键挑战 |\n|------|---------|---------|\n| 第一级：精准提需求 | 把模糊想法拆解为系统需求 | 提示词不能模糊跳跃 |\n| 第二级：复杂任务拆解 | 任务分步、上下文治理 | 上下文窗口限制导致崩溃 |\n| 第三级：调试 | 理解前后端/数据库/日志/断点 | 无技术基础定位不了问题 |\n| 第四级：外部库集成 | 复杂依赖管理 | 进阶，当前非必须 |\n\n**实际应用场景**：多数AI产品经理目标是达到第三级，能独立做出可运行的应用和产品。","table":"| 维度 | 内容 |\n|------|------|\n| 概念来源 | 卡帕西（OpenAI创始人之一）提出 |\n| 核心变化 | 编程语言 → 自然语言 |\n| 短期价值 | 工作提效，自主做数据产品/工具 |\n| 长期价值 | 全栈角色，一人团队落地业务 |\n| 多数PM目标层次 | 第三级（调试能力） |\n| 第三级需掌握 | 前端/后端/数据库/分层/日志/断点 |","thinking":"1. 视频提到Vibe Coding让\"一人团队\"成为可能，但在实际企业中，产品经理用Vibe Coding做出的产品能否真正替代工程团队的交付？它的适用边界在哪里？\n\n2. 第二级\"上下文治理\"是很多人卡住的地方——上下文窗口限制导致Vibe Coding在复杂项目中容易崩溃，有哪些具体的工程实践可以有效管理上下文？\n\n3. 视频说第一级\"精准提需求\"对产品经理难度不大，因为会写PRD就能写提示词，但Prompt Engineering和PRD写作在结构上有什么本质区别？产品经理需要额外学习哪些提示词技巧？","remember":"Vibe Coding不是让产品经理变成程序员，而是让自然语言成为新的编程语言——掌握到第三级调试能力，你就能独立把想法变成可运行的产品。","is_new":true},{"id":"7629670432777503610","title":"LangChain vs LangGraph 选型指南","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7629670432777503610","audience":"正在做大模型 Agent 开发或架构选型的工程师和技术产品经理","summary":"LangChain 是单向流水线，适合固定流程的 RAG 和工具调用；LangGraph 是循环状态机，适合需要纠错、人机协同和多 Agent 协作的复杂工作流——选对框架直接决定 Agent 能不能落地。","raw_preview":"为什么同样是大模型开发框架，有的项目用 LangChain 跑得飞快，有的项目却非要用 LangGraph 才能落地？大家有没有想过这背后的底层架构逻辑到底差在哪儿？\n\n大家好，我是大鱼，咱们今天不来虚的，直接来一场硬核的技术分享。\n\n主题就是 LangChain 对比 LangGraph——流水线对上流程图。\n\n到了现在这个时候，咱们大模型行业已经全面进入了工业级 Agent 的爆发期。如果你现","knowledge_map":"LangChain vs LangGraph 选型\n├── LangChain：单向流水线（DAG 模式）\n│   ├── 特点：有向无环图，单向执行，无循环\n│   ├── 优点：快，无循环损耗\n│   ├── 缺点：难以实现回退/纠错，记忆需手动管理\n│   └── 适合：RAG / 文本翻译 / 固定流程任务\n├── LangGraph：循环状态机（图计算）\n│   ├── 核心：全局持久化状态（存档点）\n│   ├── 关键特性\n│   │   ├── Checkpoint 机制（随时暂停/恢复）\n│   │   ├── 时间旅行（回到任意历史节点重跑）\n│   │   ├── 循环纠错（发现报错自动重新规划）\n│   │   └── 人机协同断点（需人类确认才继续）\n│   └── 适合：代码修复 / 跨部门审批 / 多 Agent 协作 / 长任务\n├── 行业现状\n│   └── 多 Agent 协作成标配，LangGraph 成工业落地关键\n└── 选型口诀\n    ├── 线性/明确/一次性 → LangChain\n    ├── 纠错/循环/长时间跨度 → LangGraph\n    └── 涉及人工审批/干预 → LangGraph 断点持久化","concepts":"#### LangChain 的 DAG 流水线模式\n\n**是什么**：LangChain 采用有向无环图（DAG）模式，数据单向流动，每一步执行完就进入下一步，不会回头。\n\n**为什么重要**：对于流程固定的任务（如 RAG），这种模式是最高效的——没有循环开销，执行速度快。\n\n**详细解释**：\n\n| 特性 | 说明 |\n|---|---|\n| 数据流向 | 单向，不回头 |\n| 状态管理 | 每步执行完即消耗，需手动管理记忆 |\n| 适用场景 | 固定流程：RAG / 文本翻译 / 简单工具调用 |\n| 局限性 | 难以实现纠错回退、复杂分支、长任务持久化 |\n\n**实际应用场景**：企业知识问答系统——用户提问→向量检索→模型生成→返回答案，流程固定，LangChain 是最优选择。\n\n---\n\n#### LangGraph 的全局状态机\n\n**是什么**：LangGraph 引入图计算和全局持久化状态，支持循环执行、随时暂停恢复、时间旅行回滚和人机协同断点。\n\n**为什么重要**：复杂 Agent 任务（代码修复、跨部门审批、多 Agent 协作）需要\"能回头、能暂停、能让人介入\"的能力，这是 LangChain 无法提供的。\n\n**详细解释**：\n\n| 特性 | 说明 | 典型场景 |\n|---|---|---|\n| 全局持久化状态 | 像游戏存档点，任务可随时暂停恢复 | 长任务中途断电后继续执行 |\n| 时间旅行 | 手动回到任意历史节点重跑 | 发现某步骤有问题，从该步重新执行 |\n| 循环纠错 | 发现报错自动转回重新规划 | 代码执行失败后 Agent 自动修复重试 |\n| 人机协同断点 | AI 执行到关键节点停下，等待人类确认 | 金融/法律场景：AI 出结果后人类审批才继续 |\n\n**实际应用场景**：跨部门审批 Agent——AI 整理审批材料→发给 HR 审核（断点）→HR 点击确认→发给财务审核（断点）→财务确认→流程完成。\n\n---\n\n#### 选型口诀\n\n**是什么**：一套简洁的架构选型判断标准，帮助开发者在 LangChain 和 LangGraph 之间快速做出正确选择。\n\n**为什么重要**：错误的框架选型会导致要么过度设计（简单任务用了 LangGraph），要么能力不足（复杂任务用了 LangChain），都会影响落地效果。\n\n**详细解释**：\n\n| 任务特征 | 推荐框架 | 原因 |\n|---|---|---|\n| 线性、明确、一次性 | LangChain | 无需循环，流水线最高效 |\n| 需要纠错、循环执行 | LangGraph | 图计算支持循环和回退 |\n| 时间跨度长（长任务） | LangGraph | Checkpoint 保证任务可恢复 |\n| 涉及人工审批/干预 | LangGraph | 断点持久化机制支持人机协同 |\n\n**实际应用场景**：评估一个新的 Agent 项目时，先问三个问题：任务流程固定吗？需要纠错回退吗？需要人类审批吗？有一个\"是\"就考虑 LangGraph。","table":"| 对比维度 | LangChain | LangGraph |\n|---|---|---|\n| 架构模式 | DAG（有向无环图）/ 单向流水线 | 图计算 / 循环状态机 |\n| 状态管理 | 每步消耗，手动管理 | 全局持久化，自动管理 |\n| 纠错能力 | 弱（难以回退） | 强（循环 + 时间旅行） |\n| 人机协同 | 不支持 | 支持断点暂停 |\n| 多 Agent 协作 | 有限 | 原生支持 |\n| 开发复杂度 | 低 | 中（节点定义稍繁琐） |\n| 最优场景 | RAG / 文本翻译 / 固定流程 | 代码修复 / 审批流 / 复杂中台 |\n| 计算效率 | 高（无循环损耗） | 中（有状态管理开销） |","thinking":"1. 视频中说 LangGraph 的人机协同断点是\"大模型进入核心生产线的最后一关\"，随着模型能力提升，这个\"必须人类确认\"的边界会如何变化？哪些场景会永远需要人类介入？\n2. LangChain 和 LangGraph 都在快速迭代，LangGraph 已经在 LangChain 生态内，两者的边界是否会越来越模糊？未来是否会出现统一框架？\n3. 视频提到\"时间旅行\"功能（回到任意历史节点重跑），在实际生产环境中，如何处理\"回跑\"时已经产生的副作用（如已发送的邮件、已写入的数据库）？","remember":"LangChain 是流水线，给固定流程用；LangGraph 是状态机，给复杂任务、需要纠错和人工审批的场景用——技术选型没有最好，只有最合适。","is_new":true},{"id":"7631049617357999386","title":"lesson_7631049617357999386.md","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7631049617357999386","audience":"","summary":"","raw_preview":"","knowledge_map":"","concepts":"","table":"","thinking":"","remember":"","is_new":false},{"id":"7633447835778003579","title":"AI 产品经理的 Vibe Coding 能力要求","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7633447835778003579","audience":"正在转型或求职 AI 产品经理方向、想了解 Vibe Coding 能力边界的产品人","summary":"AI 产品经理的 Vibe Coding 能力不是学写代码，而是能用 AI 把模糊想法快速变成可验证的原型，并用工程化思维管理整个过程。","raw_preview":"很多 AI 产品经理面试都会被问到 Vibe Coding 能力，那么作为 AI 产品经理，我们的 Vibe Coding 能力到底要达到一个什么样的程度呢？今天我就来详细展开跟大家讲一下。\n\n首先我们要知道，我们作为 AI 产品经理，并不是需要去成为一个程序员，而是要把我们的 AI 快速变成可以验证的产品。所以我们更重要的不是说去替代研发，而是借助 AI 去完成我们从需求成型、原型实现到解决方案","knowledge_map":"AI 产品经理的 Vibe Coding 能力\n├── 常见误区\n│   └── Vibe Coding ≠ 瞎写代码 / 替代研发\n├── 正确定位\n│   └── 借助 AI 把想法快速推进到\"可验证和可讨论的状态\"\n├── 为什么需要这个能力\n│   ├── 研发节奏变了：早期最大问题是\"想法靠不靠谱\"\n│   └── 停留在文档层面无法快速验证\n├── 能力四层次（从低到高）\n│   ├── 第一层：AI 做出可交互原型（基础交互 + 完整产品逻辑）\n│   ├── 第二层：理解前后端基本逻辑（接口/数据/状态变化）\n│   ├── 第三层：用 AI 搭建跑通核心链路的小单元（输入→处理→输出）\n│   └── 第四层：工程化思维管理 AI Coding（AI 驱动而非完全替代）\n└── 核心原则\n    └── AI 驱动开发 ≠ AI 完全代替开发","concepts":"#### Vibe Coding 对 AI 产品经理的真正含义\n\n**是什么**：AI 产品经理的 Vibe Coding 能力，是指能用 AI 工具将产品想法快速变成可交互、可验证的原型，而不是学习编程本身。\n\n**为什么重要**：AI 时代产品验证的瓶颈从\"文档写得好不好\"变成了\"想法能不能快速跑起来验证\"，Vibe Coding 能力直接决定产品经理的验证速度。\n\n**详细解释**：\n\n| 维度 | 传统产品经理 | AI 时代产品经理 |\n|---|---|---|\n| 核心交付物 | PRD / 原型图 / 需求文档 | 可交互的可验证原型 |\n| 验证方式 | 依赖开发团队实现后测试 | 自己用 AI 快速跑通验证 |\n| Vibe Coding 要求 | 无 | 能用 AI 做原型，懂前后端基本逻辑 |\n| 核心价值 | 文档完整性 | 想法快速可验证 |\n\n**实际应用场景**：产品经理有一个 AI 推荐功能的想法，不需要等开发排期，用 Vibe Coding 在几小时内做出可交互原型，直接拿给用户测试，验证核心假设。\n\n---\n\n#### Vibe Coding 能力的四个层次\n\n**是什么**：AI 产品经理 Vibe Coding 能力的进阶路径，从\"能做原型\"到\"能用工程化思维管理 AI Coding\"。\n\n**为什么重要**：很多人停留在第一层（能做出来就行），但随着项目复杂度增加，缺乏工程化管理会导致代码和交互全部乱掉。\n\n**详细解释**：\n\n| 层次 | 能力要求 | 关键技能 |\n|---|---|---|\n| 第一层 | 用 AI 做出可交互原型 | 基础交互设计、完整产品逻辑 |\n| 第二层 | 理解前后端基本逻辑 | 接口数据流、状态变化、前后端联动 |\n| 第三层 | 搭建跑通核心链路的小单元 | 主链路设计（输入→处理→输出）、异常 case 和兜底策略 |\n| 第四层 | 工程化思维管理 AI Coding | AI 驱动开发而非完全替代，保持代码可控 |\n\n**实际应用场景**：\n- 第一层：做一个 AI 写文案的工具原型，能输入、能输出、交互流畅\n- 第二层：能看懂接口返回的数据结构，知道为什么某个状态没有更新\n- 第三层：设计\"用户输入→模型调用→结构化输出→展示\"的完整链路，并考虑模型超时的兜底\n- 第四层：拆分功能模块，用 AI 逐步开发，避免一次性生成大量代码导致失控\n\n---\n\n#### AI 驱动开发 vs AI 完全替代开发\n\n**是什么**：核心原则——用 AI 加速开发过程，但产品经理仍需主导方向、设计逻辑、审查结果，而不是完全甩手给 AI。\n\n**为什么重要**：AI 写代码的最大问题是\"一开始很爽，后面全乱\"——一旦失去人工把控，代码结构和交互逻辑会迅速失控。\n\n**详细解释**：\n- **AI 驱动开发（正确）**：产品经理设计模块拆分和核心逻辑 → AI 生成具体实现 → 产品经理审查和调整 → 迭代\n- **AI 完全替代（错误）**：把所有需求一次性丢给 AI → AI 生成大量代码 → 出问题不知道怎么修 → 代码和交互全乱\n\n**实际应用场景**：开发一个 AI 总结工具，先让 AI 做输入框组件，确认无误后再做总结功能，再做历史记录，分步开发而不是一次性生成全部功能。","table":"| 能力层次 | 具体能力 | 重要性 |\n|---|---|---|\n| 第一层：可交互原型 | 用 AI 做出有完整产品逻辑的可交互界面 | 基础门槛 |\n| 第二层：前后端理解 | 理解接口/数据流/状态变化 | 提升调试能力 |\n| 第三层：核心链路 | 设计并跑通主链路 + 异常兜底 | 工程化思维起点 |\n| 第四层：工程化管理 | AI 驱动而非完全替代，保持代码可控 | 最关键，最容易被忽视 |\n\n| 误区 | 正确理解 |\n|---|---|\n| Vibe Coding = 写代码 | Vibe Coding = 用 AI 快速验证产品想法 |\n| 替代研发 | 借助 AI 做原型验证，不是替代研发 |\n| 一次性生成所有代码 | 分步开发，保持可控 |\n| 停留在文档层面 | 快速推进到可验证和可讨论的状态 |","thinking":"1. 视频中说\"越来越多的团队才会看 AI 产品的 Vibe Coding 能力\"，这是否意味着未来 AI 产品经理和前端开发的边界会越来越模糊？两个角色的核心差异会保留在哪里？\n2. \"工程化思维管理 AI Coding\"是第四层也是最重要的一层，对于没有工程背景的产品经理，如何系统地建立这种思维？有哪些具体的实践方法？\n3. 视频中提到的能力层次是从\"做原型\"到\"管工程\"，但在实际工作中，产品经理应该把多少时间投入到 Vibe Coding，多少时间投入到传统的需求分析和用户研究？如何平衡？","remember":"AI 产品经理的 Vibe Coding 不是学写代码，而是能用 AI 把想法快速变成可验证原型，并用工程化思维管好整个过程。","is_new":true},{"id":"7634077115813465354","title":"多 Agent 路由架构语义路由与固定规则选型","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7634077115813465354","audience":"正在构建多 Agent 系统、需要做路由架构选型的 AI 工程师和技术产品经理","summary":"多 Agent 路由架构中，固定规则保下线稳定、LLM 语义路由提上线能力，最优解是\"静态匹配→向量相似→LLM 裁决\"的三层漏斗模型。","raw_preview":"在构建多 Agent 的协同架构时，任务分发是一个核心环节。你如何评价基于 LLM 的语义路由与基于固定规则的确定性路由？在实际复杂场景中你又是如何权衡和选型的？\n\n好的，面试官，这是一个工程实际的问题。在分布式 Agent 架构中，路由层的设计直接决定了系统的鲁棒性与生产性。\n\n先说我的核心观点：固定规则决定系统的下线，而 LLM 路由决定系统的上线。在生产级环境下，我们追求的既不是纯粹的灵活性","knowledge_map":"多 Agent 路由架构选型\n├── 核心观点\n│   ├── 固定规则 → 决定系统下线（稳定性保障）\n│   └── LLM 路由 → 决定系统上线（泛化能力上限）\n├── 两种路由方式对比\n│   ├── 固定规则路由\n│   │   ├── 本质：业务逻辑的结构化投影\n│   │   ├── 优点：低延迟、幂等、无随机性\n│   │   └── 缺点：语义模糊时失效，规则多则维护成本指数级上升\n│   └── LLM 语义路由\n│       ├── 本质：高维向量空间的语义映射\n│       ├── 优点：零样本泛化，处理开放意图\n│       └── 缺点：有随机性，推理延迟高，Token 成本高\n├── 三个核心对比维度\n│   ├── 稳定性与一致性\n│   ├── 系统工程维护成本\n│   └── 计算效能（延迟 + 成本）\n└── 三层漏斗分发模型（最优实践）\n    ├── 第一层：静态匹配（正则/关键词哈希，拦截高频标准指令）\n    ├── 第二层：向量相似度（余弦相似度，准语义路由）\n    └── 第三层：LLM 裁决（调度 Agent + 上下文 + Agent 元数据）","concepts":"#### 固定规则路由 vs LLM 语义路由\n\n**是什么**：两种完全不同的 Agent 任务分发策略——前者用确定性规则（正则/关键词）匹配，后者用大模型理解语义后路由。\n\n**为什么重要**：路由层的设计直接决定整个多 Agent 系统的鲁棒性和生产可用性，选错了要么系统不稳定，要么无法处理复杂意图。\n\n**详细解释**：\n\n| 对比维度 | 固定规则路由 | LLM 语义路由 |\n|---|---|---|\n| 本质 | 业务逻辑的结构化投影 | 高维向量空间的语义映射 |\n| 稳定性 | 无抖动，确定性强 | 有随机性 |\n| 泛化能力 | 弱（语义模糊时失效） | 强（零样本学习，处理开放意图） |\n| 延迟 | 常数级/对数级 | 高（推理延迟） |\n| 成本 | 低 | 高（Token 成本） |\n| 维护成本 | 规则越多越难维护（指数级上升） | 集中在 Prompt 调优 |\n\n**实际应用场景**：\n- 固定规则：用户说\"查订单\"→直接路由到订单查询 Agent（高频、明确）\n- LLM 语义：用户说\"我上周买的那个东西到哪了\"→LLM 理解意图后路由到物流追踪 Agent\n\n---\n\n#### 三层漏斗分发模型\n\n**是什么**：大厂落地实践中推荐的多 Agent 路由架构——静态匹配→向量相似度→LLM 裁决，三层依次兜底，兼顾效率和泛化能力。\n\n**为什么重要**：纯规则路由无法处理复杂意图，纯 LLM 路由成本高且不稳定；三层漏斗让高频简单任务走最快的路，只有真正复杂的任务才调用 LLM。\n\n**详细解释**：\n\n| 层次 | 技术方案 | 处理对象 | 特点 |\n|---|---|---|---|\n| 第一层：静态匹配 | 正则 / 关键词哈希 | 高频标准化指令 | 最快，零延迟，确定性强 |\n| 第二层：向量相似度 | 余弦相似度（用户请求 vs Agent 能力描述） | 中等复杂度意图 | 高性能准语义路由 |\n| 第三层：LLM 裁决 | 调度 Agent + 上下文 + Agent 元数据 | 前两层置信度不足的复杂意图 | 最强泛化，成本最高，作为兜底 |\n\n**实际应用场景**：\n- 第一层拦截：\"帮我查余额\"→余额查询 Agent（直接命中关键词）\n- 第二层路由：\"我想了解一下我的账户情况\"→向量相似度匹配到账户管理 Agent\n- 第三层裁决：\"上个月我花了多少，感觉有点多，能不能帮我分析一下\"→LLM 理解复杂意图后分发给账单分析 Agent\n\n---\n\n#### 技术哲学：规则是骨架，LLM 是神经\n\n**是什么**：多 Agent 系统设计的核心原则——规则保稳定性下限，LLM 提泛化能力上限，两者不是替代关系而是协同关系。\n\n**为什么重要**：很多工程师走极端，要么全用规则（上线能力有限），要么全用 LLM（系统不稳定且成本高）；这个原则给出了正确的协同框架。\n\n**实际应用场景**：\n- 支付场景：核心支付链路用固定规则（绝对不能出错）\n- 客服场景：标准问题用规则，复杂投诉用 LLM（需要理解情绪和上下文）\n- 原则：用 LLM 覆盖传统逻辑覆盖不到的边界，而不是替代所有逻辑","table":"| 对比维度 | 固定规则路由 | LLM 语义路由 |\n|---|---|---|\n| 延迟 | 常数/对数级（极快） | 高（推理延迟） |\n| 成本 | 低 | 高（Token 费用） |\n| 稳定性 | 高（无随机性） | 中（有随机性） |\n| 泛化能力 | 低（语义模糊失效） | 高（零样本学习） |\n| 维护成本 | 随规则数量指数级上升 | 集中在 Prompt 调优 |\n| 适用场景 | 高频标准化指令 | 开放意图、复杂语义 |\n\n| 三层漏斗 | 技术 | 适用对象 |\n|---|---|---|\n| 第一层 | 正则/关键词哈希 | 高频标准化 |\n| 第二层 | 向量余弦相似度 | 中等复杂度 |\n| 第三层 | LLM 调度 Agent | 复杂开放意图 |","thinking":"1. 三层漏斗模型中，第一层和第二层的\"置信度阈值\"如何设定？阈值过高会导致太多请求落到 LLM 层（成本高），阈值过低会导致误路由（准确率低），实际工程中如何动态调整？\n2. 视频中提到\"要做 Agent 的 Retry 水动态维护各个 Agent 的元数据\"，如果某个 Agent 频繁失败，路由系统应该如何自动降级或切换到备用 Agent？\n3. 随着 LLM 推理成本持续下降，固定规则路由的成本优势会逐渐缩小，未来是否会出现\"全 LLM 路由\"的可行方案？固定规则路由会消失吗？","remember":"多 Agent 路由不选边站——规则是骨架保稳定，LLM 是神经提泛化，三层漏斗让对的请求走最快的路。","is_new":true},{"id":"7638946971037879571","title":"Agent Memory 面试工程细节拆解","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7638946971037879571","audience":"正在准备 AI Agent / 大模型方向技术面试的产品经理、算法工程师或后端开发者。","summary":"通过美团 AI 二面真题，系统讲解 Agent Memory 的工程实现细节——从记忆写入、去重、冲突处理到上下文压缩，帮你把\"懂概念\"升级为\"能落地\"。","raw_preview":"美团这场 AI 二面专门挑那种你以为懂了、其实没做过的点来问。Memory 这类题最容易答虚——你说长期记忆、短期记忆，面试官下一句就会问：怎么写入？怎么去重？冲突了谁生效？\n\n我是小哲，这期重点看你能不能把记忆系统讲到工程细节。\n\n**第一道题**：用一个例子解释 Memory 是怎么做的，以及怎么插入上下文的？\n\n可以举过敏信息这个例子。用户说\"我对花生过敏\"，系统先抽取成结构化记忆，比如 `","knowledge_map":"Agent Memory 面试工程细节\n├── 记忆的基本流程\n│   ├── 抽取结构化记忆（如 allergy = peanut）\n│   ├── 写入长期存储\n│   └── 检索后插入上下文 Memory 区\n├── 上下文长度管理\n│   ├── 按场景 + 时间过滤\n│   ├── 向量 / 关键词召回\n│   └── 按重要性 + 新鲜度排序\n├── 记忆类型区分\n│   ├── 结构化记忆（稳定字段：过敏、偏好、等级）\n│   └── 文本记忆（长描述：风格、背景、目标）\n├── 记忆冲突处理\n│   ├── 保留历史版本\n│   ├── 按可信度 / 时间 / 来源判断生效\n│   └── 高风险信息追问确认\n├── 上下文结构设计\n│   ├── System prompt → 开发者指令 → Memory → 检索文档\n│   ├── 短期摘要 → 工具调用记录 → 当前任务状态\n│   └── Conversation → Tool result → 当前问题\n└── 上下文压缩策略\n    ├── 分层压缩（原文 / 摘要 / 结论 / 检索注入）\n    └── 工具状态持久化（避免重复调用）","concepts":"#### 记忆写入与检索注入\n\n**是什么**：将用户信息抽取为结构化或文本记忆，存入长期存储，在需要时检索并注入上下文。\n\n**为什么重要**：模型本身无状态，Memory 机制是 Agent 实现个性化、跨会话连贯性的核心基础设施。\n\n**详细解释**：\n- 抽取阶段：将自然语言（\"我对花生过敏\"）转为键值对（`allergy = peanut`）\n- 存储阶段：写入向量数据库或结构化存储\n- 注入阶段：在用户提问前，检索相关记忆，插入上下文 Memory 区块，并标明来源和约束强度\n\n**实际应用场景**：餐厅推荐、健康管理、写作助手等需要跨会话记住用户偏好的场景。\n\n---\n\n#### 上下文结构设计\n\n**是什么**：定义上下文各区块的内容、顺序和边界，确保模型能正确理解优先级和信息来源。\n\n**为什么重要**：上下文结构混乱会导致模型混淆来源、忽略约束，直接影响生成质量和安全性。\n\n**详细解释**：\n\n| 区块 | 内容 | 位置建议 |\n|------|------|----------|\n| System prompt | 全局规则、角色定义 | 最前 |\n| 开发者指令 | 业务流程、安全约束 | 靠前 |\n| Memory | 用户长期信息（单独成块） | 中前 |\n| 检索文档 / 短期摘要 | 相关知识、历史摘要 | 中 |\n| Tool result | 工具返回结论 | 中后 |\n| Conversation | 最近几轮对话 | 后 |\n| 当前问题 | 用户本次输入 | 最后 |\n\n**实际应用场景**：任何多轮对话 Agent 的 prompt 工程设计。\n\n---\n\n#### 记忆冲突处理\n\n**是什么**：当用户前后提供矛盾信息时，系统决定哪条记忆生效的策略机制。\n\n**为什么重要**：冲突处理不当会导致错误约束持续生效（如已解除的过敏限制仍影响推荐），甚至产生安全风险。\n\n**详细解释**：\n- 保留历史版本，不直接覆盖删除\n- 生效判断维度：可信度（明确声明 > 隐含推断）、时间（新 > 旧）、来源（用户直接说 > 系统推断）\n- 高风险信息（如过敏、医疗）在关键场景主动追问确认\n\n**实际应用场景**：健康类 Agent、个人助理、电商推荐系统。\n\n---\n\n#### 上下文压缩与工具状态持久化\n\n**是什么**：在上下文超长时，通过分层压缩减少 Token 消耗，并通过工具状态记录避免重复调用。\n\n**为什么重要**：简单截断会丢失关键决策链；重复工具调用会增加成本和延迟，甚至导致逻辑错误。\n\n**详细解释**：\n- 分层压缩策略：\n  - 最近几轮：原文保留\n  - 较早对话：压成任务摘要\n  - 工具结果：只保留结论 + 参数 + 关键证据\n  - 长期记忆：检索注入（不全量放入）\n- 工具状态持久化：记录\"查过什么、用了什么参数、结果是什么、是否还有效\"，写入任务状态区，模型重复调用前先检查状态\n\n**实际应用场景**：长任务 Agent、多步骤工作流、需要工具调用的复杂对话系统。","table":"| 面试题 | 核心要点 |\n|--------|----------|\n| Memory 基本流程 | 抽取结构化记忆 → 写入存储 → 检索后注入 Memory 区 |\n| 上下文长度控制 | 场景/时间过滤 → 向量召回 → 重要性+新鲜度排序 |\n| 结构化 vs 文本记忆 | 稳定字段用结构化；长描述用文本；同事实 ID 去重归并 |\n| 记忆冲突策略 | 保留历史版本；按可信度/时间/来源判断生效；高风险追问 |\n| 上下文区块顺序 | 规则靠前 → Memory/检索 → 工具结果 → 对话 → 当前问题 |\n| 压缩策略 | 原文/摘要/结论/检索注入分层处理 |\n| 避免重复工具调用 | 工具历史写成状态区，调用前先检查状态 |","thinking":"1. **Memory 的去重和归并在工程上应该发生在写入时还是检索时？** 两个时机各有什么优缺点，实际系统中如何权衡？\n\n2. **上下文中 Memory 区块\"标明来源、时间和约束强度\"，模型真的能利用这些元信息吗？** 有没有更可靠的工程手段来确保约束被遵守？\n\n3. **高风险信息（如过敏）在关键场景追问确认，这个\"关键场景\"如何识别？** 是规则判断还是模型判断，各自的风险点是什么？","remember":"回答 Memory 面试题，别停在\"长期/短期\"概念层——面试官真正想听的是：你怎么写入、怎么去重、冲突了谁生效、超长了怎么压。","is_new":true},{"id":"7639302834722196751","title":"字节 AI Agent 实习二面面经拆解","cat":"ai-pm-career","video_url":"https://www.douyin.com/video/7639302834722196751","audience":"正在准备 AI Agent 相关岗位面试、有一定大模型基础知识的求职者或在校生","summary":"通过拆解字节 AI Agent 实习二面的 11 道真题，帮你搞清楚面试官真正想考察的不是概念背诵，而是 Agent 工程落地的实战能力。","raw_preview":"一起来看看字节的 AI Agent 实习二面面经，看看你能答上来几道。这套题整体难度偏难，但是前面是基础，后面才是真正区分水平的地方。我是小哲，点赞收藏加关注，我们马上开始。\n\n**第一道题：项目被整体拷打时应该怎么讲？**\n不要只备业务背景，核心是讲清楚你解决了什么问题、系统链路怎么走、指标怎么衡量、线上遇到过什么坑。面试官更想听实质内容，比如延迟、成本、稳定性、可观测性，你有没有真的做过。\n\n","knowledge_map":"字节 AI Agent 二面考察体系\n│\n├── 项目表达能力\n│   └── 系统链路 / 指标 / 线上踩坑 / 工程细节\n│\n├── 大模型核心技术\n│   ├── 多模态大模型\n│   │   └── 输入预处理 / 推理成本 / 结果校验\n│   ├── LoRA 微调\n│   │   └── 数据质量 / Rank参数 / 过拟合处理\n│   └── 记忆机制与多轮对话\n│       └── 上下文窗口 / 摘要 / 向量库 / 用户画像\n│\n├── Agent 系统设计\n│   ├── Skills 设计\n│   │   └── 封装 / 传参 / 兜底 / 权限隔离\n│   ├── 多 Agent 调度\n│   │   └── 路由器 / 角色拆分 / 退出条件 / 重试机制\n│   └── MCP vs Function Calling\n│       └── 调用格式 vs 生态连接\n│\n├── RAG 工程\n│   ├── 动态知识更新\n│   │   └── 流水线 / 版本时间戳 / 缓存一致性\n│   └── 评估方案\n│       └── 召回率 / 上下文相关性 / 忠实度 / 端到端满意度\n│\n└── 工程通信协议\n    └── SSE vs WebSocket\n        └── 单向流 / 打字机效果 / 双向通信局限","concepts":"#### 概念一：Agent Skills 设计\n\n**是什么**：将可复用的能力封装成标准化工具，供 Agent 在执行任务时按需调用。\n\n**为什么重要**：Skills 是 Agent 能力边界的核心载体，设计质量直接决定 Agent 能不能稳定完成任务。\n\n**详细解释**：\n\n| 设计维度 | 关键要点 |\n|--------|--------|\n| 封装内容 | 参数说明、约束条件、执行逻辑 |\n| 调用时机 | 让模型明确知道什么场景触发 |\n| 传参规范 | 参数结构化，避免歧义 |\n| 失败兜底 | 明确失败后的降级或重试策略 |\n| 工程保障 | 权限隔离、调用日志、结果校验 |\n\n**实际应用场景**：Agent 调用搜索工具时，Skills 定义了\"输入关键词、返回 Top-K 结果、超时后降级到缓存\"的完整逻辑。\n\n---\n\n#### 概念二：RAG 的评估体系\n\n**是什么**：对检索增强生成系统进行分层拆解评估，而不是只看最终答案质量。\n\n**为什么重要**：RAG 出问题可能发生在检索层或生成层，不拆开评估就无法定位根因、无法针对性优化。\n\n**详细解释**：\n\n| 评估维度 | 评估内容 | 定位问题 |\n|--------|--------|--------|\n| 检索召回率 | 相关文档有没有被召回 | 检索层问题 |\n| 上下文相关性 | 召回内容和问题是否匹配 | 检索层问题 |\n| 答案忠实度 | 生成答案有没有幻觉 | 生成层问题 |\n| 端到端满意度 | 用户最终是否满意 | 整体问题 |\n\n**实际应用场景**：准备标准问题集，记录每次命中的文档片段和模型输出，对比改动前后各层指标变化。\n\n---\n\n#### 概念三：多 Agent 调度机制\n\n**是什么**：通过路由器根据任务特征动态分配和切换不同 Agent 角色，协同完成复杂任务。\n\n**为什么重要**：单 Agent 处理复杂任务容易出错，多 Agent 分工可以提升准确率，但如果没有调度机制，容易陷入循环讨论，成本高且不稳定。\n\n**详细解释**：\n\n- **角色拆分**：规划 Agent、执行 Agent、校验 Agent 各司其职\n- **路由依据**：任务类型、当前置信度、历史失败次数\n- **核心约束**：必须设定退出条件和重试上限，否则多 Agent 会无限循环\n\n**实际应用场景**：复杂代码生成任务中，规划 Agent 拆解需求，执行 Agent 写代码，校验 Agent 跑测试，路由器根据测试结果决定是否重试或终止。\n\n---\n\n#### 概念四：MCP 与 Function Calling 的区别\n\n**是什么**：两种让大模型连接外部能力的不同协议，定位和适用场景不同。\n\n**为什么重要**：面试高频考点，混淆两者会暴露对 Agent 工程架构理解不深。\n\n**详细解释**：\n\n| 对比维度 | Function Calling | MCP |\n|--------|----------------|-----|\n| 定位 | 模型调用单个函数的协议 | 连接外部工具和资源的上下文协议 |\n| 核心重点 | 参数结构化 | 生态连接与统一暴露 |\n| 适用场景 | 单次工具调用 | 文件、数据库、服务能力统一接入 Agent |\n| 一句话 | 偏调用格式 | 偏生态连接 |\n\n**实际应用场景**：让 Agent 查询数据库用 MCP 统一暴露数据源；让模型在对话中调用计算函数用 Function Calling。","table":"| 题目 | 核心考点 | 关键答题要素 |\n|-----|--------|-----------|\n| 项目拷打 | 工程实战深度 | 链路 + 指标 + 踩坑 + 延迟/成本/稳定性 |\n| 多模态大模型 | 落地边界意识 | 预处理 + 推理成本 + 结果校验 |\n| Agent Skills | 工具封装设计 | 参数/约束/兜底/权限隔离/日志 |\n| 记忆机制 | 长短期记忆架构 | 上下文窗口 + 摘要 + 向量库 + 用户画像 |\n| 多 Agent 调度 | 系统稳定性设计 | 路由器 + 角色拆分 + 退出条件 + 重试机制 |\n| SSE 局限性 | 通信协议理解 | 单向流 / 无双向 / 超时断线 → WebSocket |\n| LoRA 排查 | 微调调试能力 | 数据质量 → 基座匹配 → Rank/学习率/轮数 |\n| RAG 知识更新 | 工程一致性 | 流水线 + 版本时间戳 + 缓存一致性 |\n| RAG 评估 | 分层评估思维 | 召回率 + 相关性 + 忠实度 + 端到端满意度 |\n| 复杂任
