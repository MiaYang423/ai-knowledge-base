AI直接还原视觉信息 |\n| ❌ 描述抽象身体状态 | \"八块腹肌\" | 效果夸张，像在炫耀 |\n| ✅ 描述视觉观感 | \"尖腰窄肩，透过衣服能看出好身材\" | 自然且有效 |\n\n**实际应用场景**：构图、角度、人物姿态的控制，都应优先用\"画面里能看到什么\"来描述，而不是用摄影术语或动作动词。","table":"| 问题场景 | 错误提示词 | 正确提示词 | 原因 |\n|---------|-----------|-----------|------|\n| 男生打游戏手机方向错误 | 男生打游戏 | 男生双手握着手机 | 去除\"游戏\"联想触发词 |\n| 修图场景屏幕朝向观众 | 男生看向显示器正面 | 男生看向显示器背面 | 反向利用联想陷阱 |\n| 宇航员背对镜头却给正脸 | 宇航员背对镜头望向地球 | 宇航员背影，远方太空悬浮地球 | 描述可见元素替代抽象动作 |\n| 俯拍角度不准确 | 宇航员俯视角拍摄 | 描述俯拍时可见的头顶、肩膀、氧气罐顶部 | 用视觉元素代替角度词汇 |\n| 想拉近镜头 | 特写镜头 | 大量描述面罩、头盔细节 | 利用视觉代偿机制控制占比 |\n| 想展示好身材 | 八块腹肌 | 尖腰窄肩，透过衣服可见身材 | 描述视觉观感而非身体部位 |","thinking":"1. **视觉代偿机制是否可以被完全消除？** 视频提到AI目前没有完善的空间模型，那么随着多模态模型的进化，未来AI是否能真正理解\"背对\"\"望向\"这类抽象空间关系？还是说这种\"词块化理解\"是大模型的结构性局限？\n\n2. **关键词联想陷阱的本质是训练数据的偏差吗？** \"护士帽\"几乎总是和医院共同出现在训练图片里，这说明AI的联想其实是对真实世界数据分布的忠实反映。那么对于那些在现实中本就高度绑定的概念组合，我们是否永远无法用提示词彻底解绑，只能用绕道的方式规避？\n\n3. **\"描述画面可见元素\"这套方法论，是否适用于视频生成（如Sora类模型）？** 静态图片的视觉代偿逻辑在视频生成中会更复杂，因为还涉及时间维度上的动作连贯性。视频生成中是否存在类似的\"时间代偿\"机制？","remember":"别告诉AI\"发生了什么\"，要告诉AI\"你能看到什么\"——这是让AI生图从抽卡变成精准控图的核心开关。","is_new":true},{"id":"7629284339998632778","title":"普通人四周入门AI动漫创作","cat":"vibecoding","video_url":"https://www.douyin.com/video/7629284339998632778","audience":"想利用业余时间自学AI绘画和AI动漫视频制作的零基础或初级学习者","summary":"给想利用业余时间入门AI动漫创作的普通人，提供一套可落地执行的四周学习路线图。","raw_preview":"下班后再加做AI漫剧，今天，到手期版老师被追问的AI动漫教学分享来了！普通人想要从零开始做AI视频，请疯狂按照这个学习计划去执行：\n\n1. 第一周：完全熟悉AI软件的界面和工具使用，AI提示词逻辑一定要牢牢记住。\n2. 第二周：认识AI的各种风格动态运镜，给我练得滚瓜烂熟。\n3. 第三周：拉片学习，拆解大佬的视频，学习正确的AI逻辑和AI节奏。\n4. 第四周：实战练习，创造出属于自己的AI作品。\n","knowledge_map":"AI动漫自学四周计划\n├── 第一周：工具基础\n│   ├── AI软件界面熟悉\n│   ├── 工具使用上手\n│   └── AI提示词逻辑（核心）\n├── 第二周：风格与运镜\n│   ├── AI各种画面风格认知\n│   ├── 动态运镜练习\n│   └── 反复练习至熟练\n├── 第三周：拉片拆解\n│   ├── 学习优秀AI视频作品\n│   ├── 拆解AI叙事逻辑\n│   └── 学习AI视频节奏感\n└── 第四周：实战创作\n    ├── 综合运用前三周所学\n    └── 产出属于自己的AI作品","concepts":"#### 概念一：AI提示词逻辑\n\n**是什么**：用文字指令引导AI生成图像或视频内容的底层规则与表达方式。\n\n**为什么重要**：提示词是人与AI沟通的唯一桥梁，逻辑不对，生成结果就会跑偏，是整个学习体系的地基。\n\n**详细解释**：\n- 视频强调提示词逻辑要\"牢牢记住\"，说明它不是随便输入文字，而是有规律可循\n- 放在第一周优先学习，说明它是后续所有练习的前提条件\n\n**实际应用场景**：在AI绘画或AI视频工具中输入描述，控制画面风格、人物动作、场景氛围等。\n\n---\n\n#### 概念二：AI风格与动态运镜\n\n**是什么**：AI生成视频中，画面呈现的视觉风格（如动漫、写实、赛博朋克等）以及镜头运动方式（推、拉、摇、移等）。\n\n**为什么重要**：风格和运镜决定了视频的视觉质感，是从\"能用\"到\"好看\"的关键跨越。\n\n**详细解释**：\n- 视频要求第二周专门用来认识和练习各种风格与运镜\n- 强调\"滚瓜烂熟\"，说明需要大量重复练习，不能只是了解概念\n\n**实际应用场景**：制作AI动漫短片时，根据剧情需要选择合适的画面风格，并用运镜语言增强叙事张力。\n\n---\n\n#### 概念三：拉片学习法\n\n**是什么**：逐帧或逐段拆解优秀视频作品，分析其制作逻辑、节奏安排和创作思路的学习方法。\n\n**为什么重要**：AI动漫创作不只是技术问题，还涉及叙事逻辑和节奏感，而这些只能通过拆解真实作品来内化。\n\n**详细解释**：\n- 视频明确提到\"学习正确的AI逻辑和AI节奏\"，说明AI视频有其特有的叙事节奏规律\n- 拉片的对象是\"大佬的视频\"，即已经被验证过的优质作品\n\n**实际应用场景**：找到一条喜欢的AI动漫视频，暂停逐段分析：这一段用了什么风格、镜头怎么动、转场怎么处理、整体节奏如何把控。","table":"| 周次 | 学习重点 | 关键词 | 目标状态 |\n|------|----------|--------|----------|\n| 第一周 | 软件界面 + 工具使用 + 提示词逻辑 | 基础、提示词 | 能独立操作工具，理解提示词规则 |\n| 第二周 | AI风格认知 + 动态运镜练习 | 风格、运镜 | 各类风格和运镜练到滚瓜烂熟 |\n| 第三周 | 拉片拆解优秀AI视频 | 拉片、节奏、逻辑 | 能看懂并分析大佬作品的创作逻辑 |\n| 第四周 | 实战创作 | 实战、原创 | 产出一个属于自己的AI动漫作品 |","thinking":"1. **提示词逻辑为什么被放在第一周而不是穿插在后续学习中？** 它和后面的风格练习、拉片学习之间是什么关系？\n\n2. **拉片学习法本是传统影视行业的训练方式，用在AI视频学习上有哪些相同点和不同点？** AI视频的\"节奏\"和真人拍摄视频的节奏有何差异？\n\n3. **四周计划结束后产出\"属于自己的AI作品\"，这个\"属于自己\"的边界在哪里？** 在大量使用AI生成内容的情况下，创作者的个人风格如何体现？","remember":"入门AI动漫不靠天赋靠计划：一周打基础、一周练风格、一周拆大佬、一周出作品。","is_new":true},{"id":"7629293801504718437","title":"用 AI 做滚动叙事网页","cat":"vibecoding","video_url":"https://www.douyin.com/video/7629293801504718437","audience":"想用 AI 工具实现创意网页、但没有编程基础的设计师或内容创作者","summary":"一个没有写过代码的设计师，借助 AI 生图、生视频和 Vibe Coding，独立做出了一个滚动叙事网页——这说明\"技术门槛\"不再是普通人表达创意的障碍。","raw_preview":"我用 AI 给我的电子小猫做了一个网页，它不是普通的网页，而是那种你往下滑一点，猫咪的动作、画面构图、文案都会一起跟着进入下一幕的 scrolling telling，也就是滚动叙事的网页。我是设计师，完成它没有写一行代码。\n\n一开始其实只是想给电子猫猫做一个特别一点的主页，但我不想做成那种很普通的模块信息排版。我想要它更像一个故事，以目间以目的方式组织内容，打开它就像在看一只可以互动的小短片，它","knowledge_map":"用 AI 做滚动叙事网页\n├── 是什么\n│   ├── Scrolling Telling（滚动叙事网页）\n│   │   ├── 向下滑动触发画面切换\n│   │   ├── 动作 / 构图 / 文案同步变化\n│   │   └── 每一屏节奏独立，整体像短片\n│   └── 与普通网页的区别\n│       ├── 普通网页：模块化信息排版\n│       └── 滚动叙事：故事化、沉浸式体验\n├── 为什么做\n│   ├── 内容不缺，缺的是\"让人看下去的表达方式\"\n│   └── 网页可以是一种沉浸式媒介\n├── 适合哪些场景\n│   ├── 个人网站\n│   ├── 产品介绍\n│   └── 科普类内容\n└── 怎么实现（工具组合）\n    ├── AI 生图\n    ├── AI 生视频\n    └── Vibe Coding（无代码 AI 编程）","concepts":"#### 概念一：Scrolling Telling（滚动叙事）\n\n**是什么**：一种网页交互形式，用户每向下滚动一段，页面就触发新的画面、动作和文案，像翻动一本动态绘本。\n\n**为什么重要**：\n普通网页的问题不是\"内容不够\"，而是\"表达方式不够吸引人\"。滚动叙事把浏览行为变成一种主动参与的叙事体验，显著提升用户停留意愿。\n\n**详细解释**：\n\n| 对比维度 | 普通网页 | 滚动叙事网页 |\n|----------|----------|--------------|\n| 内容组织方式 | 模块堆叠、信息排版 | 场景化、故事化分屏 |\n| 用户行为 | 被动浏览 | 滚动触发，主动推进 |\n| 视觉节奏 | 各模块相对独立 | 每屏构图/节奏各异 |\n| 情感体验 | 信息获取 | 沉浸式互动感 |\n\n**实际应用场景**：\n- 个人网站（展示作品或品牌故事）\n- 产品介绍页（引导用户逐步了解产品）\n- 科普内容（用动态画面讲解知识）\n\n---\n\n#### 概念二：Vibe Coding（氛围编程）\n\n**是什么**：一种借助 AI 辅助、以自然语言描述需求来生成代码的开发方式，创作者不需要手动写代码。\n\n**为什么重要**：\n它把\"实现技术效果\"的门槛从\"会写代码\"降低到\"能描述想法\"，让设计师、创作者可以独立完成以前需要前端工程师才能做的事。\n\n**详细解释**：\n视频作者是设计师，全程没有写一行代码，却完成了包含动态猫咪、分屏切换、动画过渡的复杂网页。Vibe Coding 是这个过程的核心工具之一。\n\n**实际应用场景**：\n- 设计师独立实现交互原型\n- 创作者快速把创意做成可打开的真实作品\n- 个人项目从\"想法\"到\"上线\"的全流程独立完成\n\n---\n\n#### 概念三：AI 生图 + 生视频（内容素材生成）\n\n**是什么**：用 AI 工具生成网页所需的图片和视频素材，包括不同姿态、角度、情绪状态下的角色画面。\n\n**为什么重要**：\n滚动叙事网页需要大量连贯的、风格统一的视觉素材（比如猫咪在不同屏的不同动作）。传统方式需要设计师逐帧绘制或拍摄，成本极高；AI 生成大幅压缩了这个环节的时间和门槛。\n\n**详细解释**：\n\n| 素材类型 | 在视频中的用途 |\n|----------|----------------|\n| AI 生图 | 各屏静态构图、猫咪不同姿态 |\n| AI 生视频 | 首页动态猫咪、场景过渡动效 |\n\n**实际应用场景**：\n- 生成风格统一的角色在不同场景下的表现\n- 快速产出首页动态主视觉\n- 制作最后一屏\"吃到猫粮很幸福\"等情绪化画面","table":"| 维度 | 内容 |\n|------|------|\n| 网页类型 | Scrolling Telling 滚动叙事网页 |\n| 创作者背景 | 设计师，零代码基础 |\n| 核心工具组合 | AI 生图 + AI 生视频 + Vibe Coding |\n| 代码量 | 零（没有写一行代码） |\n| 适用场景 | 个人网站 / 产品介绍 / 科普内容 |\n| 核心优势 | 把\"想法\"快速变成可打开、可看见的真实作品 |\n| 解决的本质问题 | 内容表达方式不够吸引人，而非内容本身不够 |","thinking":"1. **滚动叙事的边界在哪里？** 这种形式非常适合\"故事性强\"的内容，但如果是工具类、查询类的网页，强行套用滚动叙事会不会反而增加用户负担？什么类型的内容最适合、什么类型最不适合？\n\n2. **\"零代码\"的代价是什么？** Vibe Coding 让创作者不用写代码，但 AI 生成的代码质量、性能、可维护性如何？当作品需要迭代或出现 bug 时，不懂代码的创作者该怎么办？\n\n3. **工具民主化之后，竞争优势在哪里？** 当 AI 让每个人都能做出\"技术上复杂\"的网页，真正拉开差距的还是创意和叙事能力本身——你有没有一个值得被讲述的故事？","remember":"AI 不是在帮你\"写代码\"，而是在帮你把脑子里的故事，变成别人真的能打开、能感受到的东西。","is_new":true},{"id":"7629348383958253455","title":"程序员借助 AI 工具独立完成全栈开发","cat":"vibecoding","video_url":"https://www.douyin.com/video/7629348383958253455","audience":"有一定编程基础、希望借助 AI 工具提升独立开发能力的程序员或技术学习者","summary":"用 VS Code + GPT + Cursor 这套 AI 工具链，一个程序员可以独立完成从设计、前后端开发到测试的全栈项目交付。","raw_preview":"当我们一不小心走来，为 VS Code，然后要一不小心装上这个 GPT 4.5 和 Opus 4.6。好，这个时候，那么没有一不小心，为什么认上这个实体器。\n\n然后我们这个时候想做，想想什么？这个可以帮我们解决设计和前端的问题，然后这个可以帮我们解决代码编写和各种文档的编写，然后测试实现的问题，各种事情，功能实现。\n\n好，这个时候我们可以试一下，比如说我们要做一个——给我做一个二手交易平台。好，然","knowledge_map":"AI 辅助全栈开发工作流\n├── 工具配置\n│   ├── 编辑器：VS Code\n│   ├── AI 模型：GPT 4.5 / Opus 4.6\n│   └── AI 编程助手：Cursor\n│\n├── 开发阶段\n│   ├── 1. 需求定义\n│   │   └── 示例：做一个二手交易平台\n│   │\n│   ├── 2. UI 设计\n│   │   ├── 向 AI 描述需求，生成 App 设计稿\n│   │   ├── 第一版（英文）→ 提示修改 → 中文版\n│   │   └── 导出设计资产（全选导出）\n│   │\n│   ├── 3. 前端开发\n│   │   └── 将设计稿导入 Cursor，让 AI 实现前端\n│   │\n│   ├── 4. 后端开发\n│   │   └── 在 Cursor 中继续让 AI 实现后端逻辑\n│   │\n│   └── 5. 测试与文档\n│       ├── AI 自动生成测试用例\n│       ├── AI 说明验证方法\n│       └── AI 生成使用文档\n│\n└── 核心价值\n    └── 一人完成原本需要团队协作的全栈交付","concepts":"#### 概念一：AI 辅助 UI 设计\n\n**是什么**：通过自然语言描述需求，让 AI 直接生成 App 界面设计稿，并支持迭代修改。\n\n**为什么重要**：\n程序员通常缺乏专业设计能力，过去需要配合 UI 设计师，现在可以用 AI 快速出图，大幅压缩设计环节的时间成本。\n\n**详细解释**：\n- 向 AI 输入需求描述，例如\"做一个二手交易平台的 App 设计\"\n- AI 在约 3 分钟内生成设计稿\n- 若结果不满意（如语言为英文），追加一句提示即可修正：\"把英文改成中文版\"\n- 满意后全选导出设计资产，供后续开发使用\n\n**实际应用场景**：\n个人开发者在立项初期，快速验证产品界面方向，无需等待设计师介入。\n\n---\n\n#### 概念二：Cursor 实现前后端代码\n\n**是什么**：Cursor 是一款内置 AI 的代码编辑器，可以根据设计稿和需求描述，自动生成前端页面和后端逻辑代码。\n\n**为什么重要**：\n代码编写是全栈开发中最耗时的环节，Cursor 可以将设计稿直接\"翻译\"成可运行代码，让一个人同时承担前端工程师和后端工程师的工作。\n\n**详细解释**：\n- 将导出的设计资产路径告知 Cursor\n- 用自然语言描述需求：\"帮我把前端实现，并且把后端实现\"\n- Cursor 根据需求文档逐一实现所有功能\n- 全程在同一个工具内完成，无需频繁切换环境\n\n**实际应用场景**：\n接到一个新项目后，把需求和设计稿喂给 Cursor，让它直接生成可运行的前后端代码框架。\n\n---\n\n#### 概念三：AI 自动化测试与文档生成\n\n**是什么**：在功能开发完成后，AI 自动生成测试用例、执行验证，并输出使用文档，无需人工手写。\n\n**为什么重要**：\n测试和文档是开发流程中容易被个人开发者忽略的环节，AI 的介入让这两个环节的成本几乎为零，交付质量更有保障。\n\n**详细解释**：\n\n| 环节 | AI 做了什么 |\n|------|------------|\n| 测试用例生成 | 根据已实现的功能自动生成测试方法 |\n| 验证说明 | 告知开发者每个方法如何验证、验证什么 |\n| 文档输出 | 生成完整的功能使用说明文档 |\n\n**实际应用场景**：\n功能开发完毕后，直接让 AI 跑一遍测试并输出文档，可以直接交付给客户或上线使用。","table":"| 开发阶段 | 使用工具 | AI 能做什么 | 人需要做什么 |\n|----------|----------|------------|------------|\n| 需求定义 | 任意 AI 对话 | 理解需求、拆解功能点 | 描述清楚要做什么 |\n| UI 设计 | AI 设计工具 | 生成 App 设计稿、支持迭代 | 审核效果、提出修改意见 |\n| 设计导出 | 设计工具导出功能 | 全选打包导出 | 选择导出格式和路径 |\n| 前端开发 | Cursor | 根据设计稿生成前端代码 | 确认路径、描述需求 |\n| 后端开发 | Cursor | 实现后端逻辑和接口 | 补充业务规则说明 |\n| 测试 | Cursor / AI | 生成测试用例、自动验证 | 查看验证报告 |\n| 文档 | AI | 生成使用说明文档 | 核对内容准确性 |","thinking":"1. **AI 生成的代码质量如何保障？** 视频中 AI 可以自动测试，但测试用例本身由 AI 生成，是否存在\"自己测自己\"的盲区？人工复核应该介入在哪个环节？\n\n2. **这套工作流对\"需求描述能力\"的要求是否更高了？** 当编码门槛降低，程序员的核心竞争力是否正在从\"写代码\"转向\"精准描述需求和拆解问题\"？\n\n3. **一人全栈的边界在哪里？** 视频展示的是一个二手交易平台这类相对标准的项目，如果是高并发、高安全性要求的系统，AI 辅助全栈的模式是否依然适用？","remember":"当 AI 能帮你设计、写代码、做测试、出文档，程序员最值钱的能力变成了：**知道要做什么，并且说清楚它。**","is_new":true},{"id":"7629368066282949938","title":"TRAE SOLO 扣的模式构建简历网站","cat":"vibecoding","video_url":"https://www.douyin.com/video/7629368066282949938","audience":"想用 AI 编程工具独立完成产品开发的个人开发者、独立创业者或设计师","summary":"用 TRAE Solo 的\"扣的模式\"，一个人在十几分钟内完成从需求到可用产品的全流程开发，验证了 AI 时代超级个体独立交付产品的可行性。","raw_preview":"哎呀，AI 变成工具越来越像是个超级个体和一人公司了。十分钟不到，我就用 AI 做出了一个简历网站生成器。上传任意一个 PDF 简历，这个工具就会把简历做成一个单独好看的简历网站，并且支持切换风格和分享，非常适合在现在精简隐私招聘季帮助用户成为 offer 收割机。\n\n在之前，完整做一个项目主要配置产品经理、设计师、架构师、程序员、测试，但在 AI 时代，我们完全可以一人搞定。\n\n我这次是怎么做的","knowledge_map":"TRAE Solo 新版本实战：简历网站生成器\n│\n├── 产品功能目标\n│   ├── 上传 PDF 简历 → 生成个人简历网站\n│   ├── 支持风格切换（布局 / 颜色 / 字体）\n│   └── 支持链接分享\n│\n├── TRAE Solo 核心模式\n│   ├── 扣的模式（本视频主角）\n│   │   ├── 自然语言对话驱动开发\n│   │   ├── 自动担任产品经理 → 生成 PRD\n│   │   ├── 自动担任架构师 → 输出技术栈 / 路由树\n│   │   └── 右侧实时预览窗口\n│   └── MTC 模式（Multi-task Code）\n│       ├── 整理文件\n│       ├── 创建 PPT\n│       └── 生成报告\n│\n├── 开发迭代流程\n│   ├── 第一版：基础页面生成（发现解析问题）\n│   ├── 第二版：接入大模型配置区（解决解析准确性）\n│   └── 后续优化\n│       ├── 评论功能：可视化精准指定修改区域\n│       └── Skill 技能市场：调用 Anthropic Frontend Design 包\n│\n└── 超级个体视角\n    ├── 传统团队：产品经理 + 设计师 + 架构师 + 程序员 + 测试\n    ├── AI 时代：一人 + TRAE Solo 搞定全流程\n    └── 产品延伸方向：登录 / 付费模块 / 分享解锁","concepts":"#### 概念一：扣的模式（Solo 模式）\n\n**是什么**：TRAE Solo 新版本中的核心开发模式，用户通过自然语言对话框描述需求，AI 自动完成从需求分析到代码实现的全流程。\n\n**为什么重要**：\n它把原本需要多角色协作的软件开发流程，压缩成一个人与 AI 的对话，大幅降低了独立开发者的门槛和时间成本。\n\n**详细解释**：\n\n| 传统开发流程 | 扣的模式中由 AI 承担 |\n|---|---|\n| 产品经理写 PRD | Solo 自动生成产品需求文档 |\n| 架构师设计技术栈 | Solo 自动输出技术栈、路由树、数据模型 |\n| 程序员写代码 | Solo 自动安装依赖并编写代码 |\n| 测试人员验收 | 用户通过右侧预览窗口实时查看 |\n\n**实际应用场景**：\n本视频中，作者输入\"做一个简历网站生成器\"的需求后，Solo 依次完成了 PRD 撰写、架构设计、代码编写，全程无需手动写一行代码。\n\n---\n\n#### 概念二：评论功能（可视化精准修改）\n\n**是什么**：在预览页面中直接点选某个 UI 元素并留下评论，AI 可以精准定位到该元素并执行修改，无需用文字描述位置。\n\n**为什么重要**：\n在传统提示词交互中，描述 UI 位置往往含糊（如\"最上面那个最大的标题\"），容易导致 AI 理解偏差。评论功能通过直接选中元素，消除了定位歧义。\n\n**详细解释**：\n- 操作步骤：点选页面元素 → 输入评论内容 → 将评论添加到对话框 → 回车执行\n- 适合场景：视觉细节调整，如颜色、字体、动效等\n\n**实际应用场景**：\n作者想把标题改成渐变色，直接点选标题元素留言\"用更酷炫的渐变色\"，AI 精准修改，没有跑偏到其他区域。\n\n---\n\n#### 概念三：Skill 技能市场\n\n**是什么**：TRAE Solo 内置的技能扩展市场，提供由第三方或官方发布的专项能力包，可通过斜杠命令在对话中调用。\n\n**为什么重要**：\n成熟的 Skill 包经过专业打磨，能让 AI 输出质量显著高于普通提示词，相当于给 AI 装上了\"专业插件\"。\n\n**详细解释**：\n\n| Skill 名称 | 来源 | 作用 |\n|---|---|---|\n| Frontend Design | Anthropic 官方出品 | 提升前端页面的审美细节和设计完整度 |\n| （市场内其他 Skill） | 各方发布 | 覆盖不同垂直场景 |\n\n**实际应用场景**：\n作者安装 Frontend Design Skill 后，用斜杠调用并要求\"增加更多简历风格样式\"，AI 新增了粗野、优雅、深色赛博风三种风格，视觉效果明显提升。\n\n---\n\n#### 概念四：超级个体产品交付路径\n\n**是什么**：借助 AI 工具，单人完成从零到一的产品交付，并具备持续迭代为商业产品的能力。\n\n**为什么重要**：\n过去一个完整产品需要五种角色协作，现在一个人加上 AI 工具可以在十几分钟内拿到可运行的出发版本，大幅压缩了从想法到产品的周期。\n\n**详细解释**：\n- 起点：一句需求描述\n- 终点：可分享链接的运行中网站\n- 延伸方向：登录功能 → 付费模块 → 分享解锁 → 对外收费产品\n\n**实际应用场景**：\n本视频的简历网站生成器，十几分钟内完成，后续可叠加付费功能，做成真正的 SaaS 产品。","table":"| 功能 | 作用 | 使用方式 |\n|---|---|---|\n| 扣的模式 | 自然语言驱动全流程开发 | 在对话框输入需求，确认 PRD 和架构后自动执行 |\n| MTC 模式 | 办公场景任务处理 | 整理文件、创建 PPT、生成报告等 |\n| 实时预览窗口 | 开发过程中查看页面效果 | 右侧窗口自动同步，无需手动刷新 |\n| 评论功能 | 精准指定 UI 修改位置 | 点选元素 → 留评论 → 添加到对话 → 回车 |\n| Skill 技能市场 | 扩展 AI 专项能力 | 安装 Skill → 斜杠命令调用 |\n| Frontend Design Skill | 提升前端审美和细节完整度 | Anthropic 官方出品，安装后斜杠调用 |","thinking":"1. **扣的模式自动生成的 PRD 和架构，准确率和专业度能达到什么水平？** 对于复杂业务逻辑（如多角色权限、支付流程），AI 自动产出的方案是否还需要人工深度介入，边界在哪里？\n\n2. **评论功能解决了\"定位歧义\"问题，但如果修改涉及多个关联组件的联动变化，AI 能否自动识别影响范围，还是仍需用户逐一指出？**\n\n3. **视频中提到可以把简历网站做成\"对外收费的产品\"，但从 demo 到商业产品还需要解决安全、稳定性、用户数据隐私等问题——这些非功能性需求，目前扣的模式能主动识别并处理吗？**","remember":"在 AI 时代，TRAE Solo 的扣的模式让\"一句话需求\"直接变成\"可分享的产品\"，超级个体不再需要一支团队。","is_new":true},{"id":"7629692012107445157","title":"Claude 发一句话后到底发生了什么","cat":"vibecoding","video_url":"https://www.douyin.com/video/7629692012107445157","audience":"刚开始用 Claude 或 AI 编程工具、想搞清楚\"软件\"和\"模型\"区别的初学者","summary":"Claude 客户端是\"手脚\"、模型是\"大脑\"，一次请求从发出到返回结果，中间经历了 System Prompt 加载、Memory 读取、Tools 调用、模型 Thinking 四个关键步骤。","raw_preview":"大家好，我是小鑫。在之前的分享中，很多朋友没分清楚 Claude 客户端跟 Claude 模型的区别。本期视频主要讲他们之间的区别，以及当你让 Claude 跑一个任务——比如竞品分析——这个词进来之后，Claude 客户端跟模型分别都会做什么事情。以这个东西为例，去解释一下这次调用过程中都发生了什么。\n\n那么简单来说，Claude 的 Anthropic、Sonnet、Haiku，他们就是大脑，","knowledge_map":"Claude 一次请求的完整链路\n│\n├── 1. 客户端 vs 模型 的基本关系\n│     ├── Claude 客户端（软件）= 手脚，负责执行\n│     └── Anthropic 模型（Sonnet/Haiku等）= 大脑，负责思考\n│\n├── 2. 请求进来后，客户端做的事（打包上下文）\n│     ├── 加载 System Prompt（静态指令：语言/风格/详细程度）\n│     ├── 加载 Memory（跨会话记忆：之前的竞品、产品信息）\n│     └── 加载预定义 Tools（三四十种工具，如 Web Search）\n│\n├── 3. 上下文打包 → 发给模型\n│     └── 用户请求 + System Prompt + Memory + Tools 列表 = 完整上下文\n│\n├── 4. 模型做的事（Thinking）\n│     ├── 分析任务目标\n│     ├── 查看 Memory 中的历史信息\n│     ├── 决定调用哪个 Tool\n│     └── 发出工具调用指令（如：Web Search）\n│\n├── 5. 客户端执行工具 → 结果回传模型\n│     └── 模型生成最终结果 → 客户端保存/展示\n│\n└── 6. 模型适配性问题\n      ├── Claude 原生模型：训练时已适配这些 Tools，效果最好\n      └── 第三方模型（如 Gemini）：未必经过 Tools 训练，可能有效果损失","concepts":"#### 概念一：客户端 vs 模型\n\n**是什么**：Claude 客户端是运行在你电脑上的软件（手脚），Claude 模型（如 Sonnet、Haiku）是 Anthropic 训练的 AI 大脑，两者分工不同、协同工作。\n\n**为什么重要**：很多人以为\"Claude\"是一个整体，搞不清楚出问题时是软件的问题还是模型的问题，也不知道为什么换了第三方模型效果会变差。\n\n**详细解释**：\n\n| 维度 | Claude 客户端（软件） | Claude 模型（大脑） |\n|------|----------------------|-------------------|\n| 本质 | 应用程序 | AI 参数/权重 |\n| 比喻 | 手脚 | 大脑 |\n| 负责什么 | 打包上下文、调用工具、保存结果 | 理解任务、推理、决策、生成内容 |\n| 可替换吗 | 固定（Claude 客户端） | 可以换成 Gemini 等第三方模型 |\n\n**实际应用场景**：你在 Claude 客户端里换成 Gemini 模型，工具还是那些工具，但 Gemini 可能不知道怎么用这些工具，导致效果变差。\n\n---\n\n#### 概念二：System Prompt（系统提示词）\n\n**是什么**：在用户发消息之前，Claude 客户端预先注入给模型的一段静态指令，定义模型的行为规则。\n\n**为什么重要**：它决定了模型的\"性格\"和\"工作方式\"，是每次对话的隐形基础设置。\n\n**详细解释**：\n\n- 可以设定语言（如：必须用中文回答）\n- 可以设定风格（如：简洁 / 详细）\n- 可以设定行为规则（如：不要省略步骤，把所有内容都写完整）\n\n**实际应用场景**：你希望 Claude 每次都用中文、回答详细不省略，就在 System Prompt 里写好，之后每次对话都会自动生效，不用反复提醒。\n\n---\n\n#### 概念三：Memory（跨会话记忆）\n\n**是什么**：Claude 客户端保存的历史信息，可以在新的对话中自动加载，让模型\"记得\"之前发生过的事。\n\n**为什么重要**：AI 模型本身没有记忆，每次对话都是全新的。Memory 机制让客户端帮模型\"补上\"历史背景，实现跨会话的连续性。\n\n**详细解释**：\n- 比如你之前做过竞品分析，记录了竞品 A、竞品 B 的信息以及你自己产品的定位\n- 下次新对话再让它做竞品分析，Memory 会把这些背景信息自动打包进上下文\n- 模型就能基于之前的信息继续工作，而不是从零开始\n\n**实际应用场景**：做持续性项目时（如长期竞品追踪），Memory 让每次对话都能接续上次的结论，不用重复粘贴背景信息。\n\n---\n\n#### 概念四：Tools 工具调用\n\n**是什么**：Claude 客户端预定义的三四十种工具（如 Web Search、文件保存等），模型可以在 Thinking 过程中决定调用哪个，由客户端负责实际执行。\n\n**为什么重要**：模型只能\"想\"，不能直接上网搜索或保存文件。Tools 是连接模型思维和真实世界操作的桥梁。\n\n**详细解释**：工具调用的完整流程：\n\n```\n模型 Thinking\n  → 决定需要 Web Search\n  → 发出工具调用指令给客户端\n  → 客户端执行 Web Search\n  → 搜索结果回传给模型\n  → 模型基于结果继续生成\n  → 生成完毕后指令客户端保存到文件\n```\n\n**实际应用场景**：你让 Claude 做竞品分析，它会自动搜索网上最新信息，而不是只靠训练数据里的旧知识，最后还能把报告保存成文件。","table":"| 环节 | 执行者 | 具体内容 | 类比 |\n|------|--------|----------|------|\n| 加载 System Prompt | 客户端 | 语言、风格、行为规则等静态指令 | 给员工的岗位说明书 |\n| 加载 Memory | 客户端 | 跨会话历史信息（竞品、产品等） | 员工的工作笔记本 |\n| 加载 Tools 列表 | 客户端 | 三四十种可用工具清单 | 工具箱目录 |\n| 打包上下文 | 客户端 | 以上三项 + 用户当前请求 | 把所有材料装进一个文件夹 |\n| Thinking（推理） | 模型 | 分析任务、查看记忆、决定用哪个工具 | 大脑思考 |\n| 工具调用 | 客户端执行 / 模型决策 | 如 Web Search、文件保存 | 大脑指挥手脚干活 |\n| 生成结果 | 模型 | 基于工具返回结果生成最终输出 | 大脑整合信息写报告 |\n| 保存/展示结果 | 客户端 | 存入文件夹或展示给用户 | 手脚把报告递给你 |\n\n**模型选择对效果的影响：**\n\n| 模型类型 | 对 Claude Tools 的适配 | 预期效果 |\n|----------|----------------------|----------|\n| Claude 原生模型（Sonnet/Haiku） | 训练时已包含 Tools 使用 | 效果最好 |\n| 第三方模型（如 Gemini） | 未必经过相同训练 | 可能有效果损失 |","thinking":"1. **Memory 的边界在哪里？** 如果 Memory 里存了大量历史信息，打包进上下文后会不会超出模型的上下文窗口限制？Claude 客户端是如何取舍哪些 Memory 值得被加载的？\n\n2. **换第三方模型到底损失多少？** 视频提到 Gemini 等模型可能没有针对 Claude Tools 做过训练，那在实际使用中，这种\"效果损失\"会体现在哪些具体场景？是完全不会用工具，还是只是用得不够准确？\n\n3. **System Prompt 和 Memory 都是\"背景信息\"，区别是什么？** 两者都会被打包进上下文，但一个是静态规则、一个是动态历史，在实际使用中应该把什么信息放 System Prompt、什么信息交给 Memory 管理？","remember":"Claude 客户端是手脚，模型是大脑，你发的每一句话背后，是一套\"加载记忆→打包上下文→模型思考→调用工具→返回结果\"的完整流水线在默默运转。","is_new":true},{"id":"7630293932447363264","title":"设计师 Vibe Coding 高级感咒语","cat":"vibecoding","video_url":"https://www.douyin.com/video/7630293932447363264","audience":"用 AI 工具做产品或界面设计、但总觉得生成结果不够高级的设计新手或独立开发者。","summary":"掌握 4 组英文设计关键词，就能精准指挥 AI 生成真正高级的 UI 界面，而不是停留在\"好看一点\"这种无效提示。","raw_preview":"所以学会这几个词，让你的 vibe coding 作品立刻高级感拉满。如果每次你都不满足于 AI 给的一些视觉效果，但是当你跟它说\"你能不能做得好看一点、高级感一点\"，它生出来的东西又还是让你非常失望的话，那你一定要来学会这几个设计师们都在用的 magic words。\n\n首先，颜色上：**Muted and Pastoral**。我觉得颜色就像音乐的配乐一样，定了整体感觉就有了。如果你也喜欢那样","knowledge_map":"让 AI vibe coding 作品有高级感\n│\n├── 颜色层面\n│   ├── Muted and Pastoral（低饱和度配色）\n│   │   ├── Pastoral：纯色 + 大量白色 → 轻盈、清嫩\n│   │   └── Muted：纯色 + 大量灰色/中性色 → 成熟、有质感\n│   │\n│   └── Monochromatic（单色系配色）\n│       ├── 避免渐变色的突兀感\n│       └── 与 Muted 结合 → 层次丰富又和谐统一\n│\n├── 布局层面\n│   └── Card-based design with layered elements（卡片式分层布局）\n│       ├── 模块化 → 信息清晰可扫读\n│       └── 有纵深感 → 界面上档次\n│\n└── 风格/哲学层面\n    ├── Neo-minimalism（新极简主义）\n    │   ├── 极简主义基础：去掉一切非必要元素\n    │   └── 新极简主义加回：适量阴影 + 克制色彩点缀\n    │\n    └── Approachable sophistication（平易近人的高级感）\n        ├── 有品质、有格调\n        └── 无压力、无距离感","concepts":"#### 概念一：Muted & Pastoral（低饱和度配色）\n\n**是什么**：两种以\"降低饱和度\"为核心思路的配色方向，是高端品牌和文艺品牌最常用的颜色语言。\n\n**为什么重要**：AI 默认倾向于生成高饱和度的鲜艳配色，视觉上刺激但廉价感强；而低饱和度颜色天然显高级，是大多数人\"说不清但就是喜欢\"的那类设计的底层逻辑。\n\n**详细解释**：\n\n| 词汇 | 做法 | 视觉感受 | 适合场景 |\n|------|------|----------|----------|\n| Pastoral | 纯色 + 大量白色 | 轻盈、清嫩、柔和 | 健康、生活方式、女性向产品 |\n| Muted | 纯色 + 大量灰色/中性色 | 成熟、有质感、克制 | 高端品牌、工具类、内容平台 |\n\n**实际应用场景**：在给 AI 下提示词时，把\"好看的颜色\"换成 `muted color palette` 或 `pastoral tones`，AI 就会生成低饱和度的柔和配色，而不是默认的鲜艳渐变。\n\n---\n\n#### 概念二：Monochromatic（单色系配色）\n\n**是什么**：整个界面只使用同一色相，通过明度和灰度的变化制造层次感。\n\n**为什么重要**：AI 喜欢用渐变色来\"显高级\"，但渐变看多了腻，且容易和其他元素打架。Monochromatic 既避免了单调，又保持了视觉统一，是最省力的高级配色策略。\n\n**详细解释**：\n- 同一色相（比如全蓝）+ 不同明度/灰度 → 五个色块都是蓝色，但不会觉得\"乱\"\n- 与 Muted 结合使用效果最强：每个色块都被灰色\"压住\"，整体沉稳有质感\n- 可应用于：背景色、卡片色、边框色、文字色、图标色——整套从同一色系取色\n\n**实际应用场景**：提示词中加入 `monochromatic blue palette with muted tones`，AI 会生成一套蓝灰系的协调配色，颜色之间天然不打架。\n\n---\n\n#### 概念三：Card-based Design with Layered Elements（卡片式分层布局）\n\n**是什么**：用卡片作为信息容器，并通过阴影、层叠等方式制造纵深感的布局方式。\n\n**为什么重要**：信息堆叠、长列表是\"一眼看出老气\"的最大原因。卡片式布局让信息模块化，用户可以快速扫读，同时纵深感让界面从\"平\"变\"立体\"，显著提升档次感。\n\n**详细解释**：\n\n| 布局方式 | 视觉效果 | 可读性 | 高级感 |\n|----------|----------|--------|--------|\n| 信息堆叠 / 长列表 | 拥挤、平面 | 差 | 低 |\n| 卡片式 + 分层 | 模块清晰、有纵深 | 强 | 高 |\n\n**实际应用场景**：在提示词中直接写 `card-based design with layered elements and subtle depth`，AI 会自动采用卡片布局并添加阴影层次，而不是生成一张信息密集的平铺页面。\n\n---\n\n#### 概念四：Neo-minimalism & Approachable Sophistication（新极简主义与平易近人的高级感）\n\n**是什么**：\n- **Neo-minimalism**：在极简主义（去掉一切非必要）基础上，加回适量阴影和克制色彩点缀，解决\"太冷、太单调、缺乏引导\"的问题。\n- **Approachable sophistication**：产品看起来有品质有格调，同时不让用户产生距离感或压力感。\n\n**为什么重要**：\n- 纯极简（如 iOS 7 时代）容易让用户迷失，不知道信息层级；Neo-minimalism 是当下最流行的平衡点。\n- 很多产品要么做得太廉价，要么做得太\"高冷\"让用户望而却步；Approachable sophistication 是两者之间的终极解法。\n\n**详细解释**：\n\n| 风格 | 特点 | 问题 |\n|------|------|------|\n| 极简主义 | 去掉阴影、纹理、装饰 | 太冷、太单调、层级不清 |\n| 新极简主义 | 极简基础 + 适量阴影 + 克制色彩 | （当下流行，问题较少）|\n| 过度高级 | 奢侈品式疏离感 | 用户进不来、转化差 |\n| Approachable sophistication | 高品质 + 无压力 | （目标状态）|\n\n**实际应用场景**：整体风格提示词可以写 `neo-minimalist UI with approachable sophistication`——这一句话就能让 AI 理解你要的不是炫技式的复杂，也不是廉价的简陋，而是克制、有质感、让人舒服的高级。","table":"| 关键词 | 中文含义 | 解决的问题 | 用在提示词哪里 |\n|--------|----------|------------|----------------|\n| `Muted tones` | 低饱和度（加灰） | AI 默认配色太艳太廉价 | 颜色描述 |\n| `Pastoral tones` | 低饱和度（加白） | 界面颜色太重太压抑 | 颜色描述 |\n| `Monochromatic palette` | 单色系 | 渐变色突兀、颜色打架 | 颜色描述 |\n| `Card-based design with layered elements` | 卡片式分层布局 | 信息堆叠、界面太平 | 布局描述 |\n| `Neo-minimalism` | 新极简主义 | 界面太冷/太乱，层级不清 | 整体风格 |\n| `Approachable sophistication` | 平易近人的高级感 | 太廉价 or 太高冷，用户进不来 | 设计哲学/整体基调 |","thinking":"1. **视频说\"Muted + Monochromatic\"组合威力最强，那如果产品本身需要强调活力感和年轻感（比如运动类 App），这套配色逻辑还适用吗？应该如何调整提示词？**\n\n2. **\"Approachable sophistication\"在不同产品类型中的边界在哪里？** 奢侈品品牌刻意保持距离感是一种商业策略，那什么情况下\"高冷\"反而是正确的设计选择？\n\n3. **视频中的这些词都是给 AI 用的提示词，但如果你是在和真人设计师沟通需求，用这些词能直接对话吗？** 设计行业的专业术语和 AI 提示词之间有多大的重叠度？","remember":"与其跟 AI 说\"好看一点\"，不如直接说 `muted monochromatic palette, card-based layout with layered elements, neo-minimalist, approachable sophistication`——精准的词是最短的捷径。","is_new":true},{"id":"7630640462772753103","title":"AI Agent 框架设计核心解析","cat":"vibecoding","video_url":"https://www.douyin.com/video/7630640462772753103","audience":"对 AI Agent 开发感兴趣、想了解如何从零构建自己 Agent 系统的技术学习者或产品人","summary":"Agent = Model + Harness，模型是大脑，Harness 是工具箱，搞清楚这个公式，你就知道该怎么设计自己的 AI Agent 系统。","raw_preview":"大家好，今天给大家解读一篇来自 LangChain 的文章。\n\nAgent 等于 Model 加 Harness。换个说法，如果你不是模型本身，那你就属于 Harness。模型只是大脑，Harness 才是让大脑干活的工具箱。光有模型只能输出文本，有了 Harness 才能变成 Agent。\n\n从模型的角度看，还有三个无法自己解决的问题：第一，无法持久记忆，对话结束就忘了；第二，无法执行代码，只能","knowledge_map":"Agent 系统设计\n├── 核心公式\n│   └── Agent = Model + Harness\n│       ├── Model：负责智能（输出文本）\n│       └── Harness：负责让智能有用（执行、记忆、管理）\n│\n├── 模型的三大天生缺陷\n│   ├── 无法持久记忆（对话结束即遗忘）\n│   ├── 无法执行代码（只能说，不能做）\n│   └── 知识有时效性（训练截止后一概不知）\n│\n├── 六大核心 Harness 组件\n│   ├── 基础三件套\n│   │   ├── 文件系统（持久存储基石）\n│   │   ├── Bash + 代码执行（实用工具杀手锏）\n│   │   └── 沙箱环境（安全隔离）\n│   └── 进阶三件套\n│       ├── 记忆与搜索（持续学习）\n│       ├── 上下文管理（对抗腐蚀）\n│       └── 长期自主执行（复杂任务终极目标）\n│\n├── 飞轮效应与过度耦合\n│   ├── 飞轮：有用原语 → 加入Harness → 训练新模型 → 循环\n│   └── 风险：模型与特定工具过度耦合，改工具性能下降\n│\n└── 未来三大开放问题\n    ├── 并行编排（多 Agent 协作）\n    ├── 自我整顿（分析执行轨迹自修复）\n    └── 动态组装（按任务实时组装工具）","concepts":"#### 概念一：Harness（框架/工具箱）\n\n**是什么**：围绕模型搭建的一套工具和机制，让模型从\"只会说话\"变成\"能干活\"的 Agent。\n\n**为什么重要**：模型本身有三个天生缺陷——不记事、不执行、知识过期。没有 Harness，模型永远只是个聊天机器人，无法完成真实任务。\n\n**详细解释**：\n\n| 模型单独能做的 | 加上 Harness 之后能做的 |\n|---|---|\n| 输出文本回答 | 读写文件、持久保存工作成果 |\n| 描述如何写代码 | 真正执行代码并返回结果 |\n| 回忆训练数据内容 | 检索实时信息、调用记忆文件 |\n| 一次性对话 | 跨会话持续推进复杂任务 |\n\n**实际应用场景**：构建一个能自动写代码、跑测试、修 Bug 的编程 Agent，就需要给模型配上文件系统 + 代码执行环境 + 记忆模块，缺一不可。\n\n---\n\n#### 概念二：六大核心 Harness 组件\n\n**是什么**：LangChain 文章梳理出的六个关键工具模块，覆盖 Agent 完成复杂任务所需的全部能力。\n\n**为什么重要**：这六个组件是从\"想要什么行为\"反推出来的，是构建 Agent 的最小必要工具集，可以直接作为设计清单使用。\n\n**详细解释**：\n\n| 组件 | 核心作用 | 解决的问题 |\n|---|---|---|\n| 文件系统 | 持久存储工作台 | 工作成果不丢失，可增量推进 |\n| Bash + 代码执行 | 给模型接上电脑 | 从\"说\"到\"做\" |\n| 沙箱环境 | 安全隔离 | 危险代码不在本地跑，可动态创建销毁 |\n| 记忆与搜索 | 持续学习 | 注入历史记忆（如 AGENTS.md），检索实时信息 |\n| 上下文管理 | 对抗上下文腐蚀 | 防止上下文填满后推理能力下降 |\n| 长期自主执行 | 处理复杂任务 | 跨会话跟踪进度、失败自动重试 |\n\n**实际应用场景**：上下文管理的三种策略——压缩摘要、卸载冗余内容、工具输出卸载——可以直接用于解决长任务中模型\"越说越乱\"的问题。\n\n---\n\n#### 概念三：飞轮效应与过度耦合\n\n**是什么**：模型和 Harness 在训练时共同参与，形成正向循环，但也带来模型与特定工具深度绑定的副作用。\n\n**为什么重要**：这解释了为什么现有 Agent 产品改一个工具的逻辑，整体性能就会下降——不是 Bug，是训练机制决定的结构性问题。\n\n**详细解释**：\n\n```\n飞轮正向循环：\n发现有用原语 → 加入 Harness → 用新 Harness 训练下一代模型 → 模型更擅长用这套工具 → 发现更多有用原语 → 循环\n\n过度耦合风险：\n模型被训练成只会用特定方式操作特定工具\n→ 换工具或改工具逻辑\n→ 模型不适应，性能下降\n```\n\n**实际应用场景**：在设计自己的 Agent 系统时，要注意工具接口的稳定性，不要频繁改变工具的调用方式，否则会破坏模型已有的\"操作习惯\"。\n\n---\n\n#### 概念四：长期自主执行的三个关键模式\n\n**是什么**：让 Agent 能跨会话、长时间自主完成复杂任务的三种设计模式。\n\n**为什么重要**：单次对话的 Agent 能力有限，真正有价值的 Agent 需要能持续工作、自我纠错，这三个模式是实现这一目标的具体方法。\n\n**详细解释**：\n\n| 模式 | 做什么 | 解决什么问题 |\n|---|---|---|\n| 文件系统 + Git | 跟踪跨会话工作进度 | Agent 重启后知道做到哪了 |\n| Restart Loop | 退出后用新上下文重新注入原始任务 | 上下文满了还能强制继续 |\n| 规划与自验证 | 分阶段目标、检查中间结果、失败反亏重试 | 复杂任务不跑偏、出错能自救 |\n\n**实际应用场景**：让 Agent 自动完成一个需要几小时的数据分析任务，就需要 Git 记录进度 + Restart Loop 保证不中断 + 自验证保证结果质量。","table":"| 维度 | 内容 |\n|---|---|\n| **核心公式** | Agent = Model + Harness |\n| **模型三大缺陷** | 无持久记忆 / 无法执行代码 / 知识有时效性 |\n| **基础三件套** | 文件系统 / Bash+代码执行 / 沙箱环境 |\n| **进阶三件套** | 记忆与搜索 / 上下文管理 / 长期自主执行 |\n| **上下文管理策略** | 压缩摘要 / 卸载冗余内容 / 工具输出卸载 |\n| **长期执行三模式** | 文件系统+Git / Restart Loop / 规划与自验证 |\n| **未来三大问题** | 并行编排 / 自我整顿 / 动态组装 |\n| **设计方法论** | 先想清楚要什么行为，再反推需要什么 Harness |","thinking":"1. **视频提到\"过度耦合\"是飞轮的副作用**，那在设计自己的 Agent 时，如何在\"让模型充分适应工具\"和\"保持工具灵活可替换\"之间找到平衡？\n\n2. **上下文管理的三种策略各有取舍**，在一个需要长时间运行的编程 Agent 场景里，你会优先选择哪种策略？在什么情况下需要组合使用？\n\n3. **视频末尾提到三个开放问题**（并行编排、自我整顿、动态组装），这三个问题中哪一个一旦被解决，会对 Agent 的实际能力产生最大的跃升？为什么？","remember":"模型是大脑，Harness 是手脚，想清楚要什么行为再反推需要什么工具，好的设计能把一的智能放大成十的生产力。","is_new":true},{"id":"7631224955607548598","title":"AI时代两款必备效率工具","cat":"vibecoding","video_url":"https://www.douyin.com/video/7631224955607548598","audience":"日常使用AI工具、需要获取海外信息或进行Vibe Coding的中文用户","summary":"推荐两款免费工具——沉浸式翻译和Typeless，帮助中文用户丝滑获取海外AI信息、并用语音代替打字高效与AI沟通。","raw_preview":"分享两个AI时代必备的软件。\n\n第一个是因为我们日常很多的AI资讯和AI工具都是海外的，都是英文的，在它没有中文的情况下，你怎么能够丝滑和流畅地使用呢？就是用这个沉浸式翻译。它会把这些网站从英文翻译成双语的。比如说Cody这个，就是双语的一个版本。然后比如说我平时看YouTube，有了这个沉浸式翻译，它就会同时显示中文和英文字幕。本身YouTube是带中文字幕的，但有的时候它其实翻译得并不准确，比","knowledge_map":"AI时代必备效率工具\n├── 工具一：沉浸式翻译\n│   ├── 解决的问题：海外AI工具/资讯全是英文，使用门槛高\n│   ├── 核心功能：网页内容实时双语对照显示\n│   └── 适用场景\n│       ├── 看YouTube（中英字幕对照，弥补机器翻译不准）\n│       ├── 刷推特\n│       └── 阅读海外博客\n│\n└── 工具二：Typeless\n    ├── 解决的问题：边想边敲字效率低，口头思路难整理\n    ├── 核心功能一：精准语音识别（支持Claude、Gemini等AI专业词汇）\n    ├── 核心功能二：自动整理逻辑结构（标点、小标题、顺序）\n    └── 适用场景\n        ├── 写周报 / 会议记录\n        ├── Vibe Coding / 复杂项目\n        └── 头脑风暴","concepts":"#### 沉浸式翻译\n\n**是什么**：一款浏览器插件/网页工具，能将英文网页实时翻译为中英双语对照显示。\n\n**为什么重要**：\nAI领域的前沿资讯、工具文档、社区讨论大多以英文为主，没有顺手的翻译工具会造成严重的信息差。\n\n**详细解释**：\n\n| 使用场景 | 具体效果 |\n|---|---|\n| YouTube视频 | 同时显示中文和英文字幕，可互相校对，弥补自动翻译错误 |\n| 推特/X | 推文实时双语显示，方便跟踪海外AI动态 |\n| 海外博客/文档 | 整页中英对照，读不懂的地方可参考原文 |\n| AI工具网站（如Cody） | 界面和文档双语化，降低上手门槛 |\n\n**实际应用场景**：\n看到一篇英文AI教程，不确定某个技术词汇的翻译是否准确，可以直接看左右对照的原文，避免因翻译失真而误解内容。\n\n---\n\n#### Typeless\n\n**是什么**：一款跨平台（电脑+手机）语音输入软件，不只是转文字，还能自动整理输入内容的逻辑结构。\n\n**为什么重要**：\n人说话的速度远快于打字，而且在做Vibe Coding、头脑风暴时思维是跳跃的、非线性的，Typeless可以让你先把想法\"倒出来\"，再由它来整理成结构化文字。\n\n**详细解释**：\n\nTypeless的三个关键能力：\n\n| 能力 | 说明 |\n|---|---|\n| 精准识别AI专业词汇 | Claude、Gemini等词能正确识别，不会出现普通语音识别的乱码 |\n| 自动整理逻辑顺序 | 把散乱口述内容重新排列成有逻辑的段落 |\n| 自动补全格式 | 自动加标点符号、分段、生成1234小标题 |\n\n**触发方式**：电脑端按下`Fn`键即开始录音。\n\n**实际应用场景**：\n- **写周报**：脑子里有一堆零散的工作进展，对着Typeless一口气说完，它直接输出带小标题的结构化周报草稿。\n- **Vibe Coding**：向AI描述需求时，不用边想边打字，直接口述，Typeless整理好后再粘贴给Claude/Gemini。\n- **头脑风暴**：想到哪说到哪，事后得到一份有逻辑的思路文档。","table":"| 对比维度 | 沉浸式翻译 | Typeless |\n|---|---|---|\n| **核心功能** | 网页双语对照翻译 | 语音输入 + 逻辑整理 |\n| **解决的痛点** | 海外信息看不懂 | 边想边打字效率低 |\n| **使用平台** | 浏览器（网页版为主） | 电脑 + 手机 |\n| **触发方式** | 打开网页自动生效 | 电脑端按`Fn`键 |\n| **AI场景适配** | 支持AI工具网站双语化 | 识别Claude、Gemini等专业词汇 |\n| **额外亮点** | 弥补YouTube自动翻译不准 | 自动生成标点、标题、逻辑顺序 |\n| **费用** | 免费 | 免费 |","thinking":"1. **沉浸式翻译的双语对照模式，和直接用AI（如ChatGPT）翻译全文相比，各有什么优劣？什么场景下哪种方式更合适？**\n\n2. **Typeless的\"自动整理逻辑\"功能，本质上是在做结构化写作的辅助。这对于那些本来就擅长结构化表达的人来说，是否还有价值？还是说它更适合某类特定用户？**\n\n3. **视频提到Typeless在Vibe Coding场景下很有用——用语音描述需求比打字更快。但AI对自然语言描述的理解质量，和经过精心打磨的文字Prompt相比，会有差距吗？语音输入会影响最终的代码生成质量吗？**","remember":"沉浸式翻译打破语言墙，Typeless打破打字瓶颈——两个免费工具，让你在AI时代的信息获取和表达效率直接升一个档次。","is_new":true},{"id":"7631240906314063537","title":"用VibeCoding把歌单蒸馏成AI电台","cat":"vibecoding","video_url":"https://www.douyin.com/video/7631240906314063537","audience":"对AI工具有基础认知、想用VibeCoding做个人化应用的内容创作者或音乐爱好者","summary":"作者用 Claude Code 把自己14年的歌单\"蒸馏\"成一个懂自己品味的个人 AI 电台 Claudio，并分享了这个 AI Agent 的构建思路——告诉你 VibeCoding 不只能做生产力工具，也能做滋养日常生活的东西。","raw_preview":"她叫 Claudio。她的前端就是一个播放器和简洁的界面，我的 Claude Code 和音乐 API，一会儿我讲一下原理。你可以把它理解成一个24小时在线的 AI 电台主播。\n\n可以给大家看一下它的主脑——这应该算是我的音乐品味本体吧。我把最近14年里不同平台上的三十多个歌单，每个阶段的音乐回忆都结构化地喂给了它。它可能比我自己都懂我爱听什么歌。\n\n除了这些音乐数据，它还可以根据每天的天气、日程","knowledge_map":"把歌单蒸馏成 AI 电台（Claudio）\n│\n├── 是什么\n│   ├── 名字：Claudio（Claude + Audio）\n│   ├── 形态：24小时在线的个人 AI 电台主播\n│   └── 界面：前端播放器 + 聊天窗口\n│\n├── 数据基础（\"音乐品味本体\"）\n│   ├── 来源：14年 × 多平台 × 30+ 歌单\n│   └── 处理方式：结构化喂给模型\n│\n├── 核心能力\n│   ├── 按时间段自动规划歌单（早上/上午/晚上）\n│   ├── 结合天气、日程、心情定制\n│   ├── 连接智能音响播放\n│   ├── 主动判断何时\"说话\"\n│   └── 实时聊天响应（如推荐 BGM）\n│\n├── 技术结构（三部分）\n│   ├── 前端：播放器界面\n│   ├── 后端：本地服务器\n│   └── 接口：多个 API 协同（音乐平台 + 智能设备）\n│\n├── 制作方式\n│   ├── 工具：Claude Code（VibeCoding）\n│   └── 方法：截图结构图发给 Claude，让它理解并生成代码\n│\n└── 背后的动机与理念\n    ├── 个人动机：对抗多线程 AI 协作带来的注意力消耗\n    ├── 使用场景：等待 Claude Code 跑代码时的\"反消耗\"缓冲\n    └── 更大愿景：Karpathy 的观点——传统数据在 AI 时代都能成为接口","concepts":"#### 概念一：音乐品味本体（个人数据结构化喂给模型）\n\n**是什么**：把自己多年积累的歌单数据，按结构化方式整理后输入给 AI，让模型真正\"理解\"你的音乐品味，而不只是随机推荐。\n\n**为什么重要**：\nAI 的推荐质量取决于它对你的了解程度。用自己的真实历史数据训练上下文，远比用通用推荐算法更贴近个人偏好。\n\n**详细解释**：\n\n| 数据维度 | 具体内容 |\n|---|---|\n| 时间跨度 | 14年 |\n| 数据来源 | 多个音乐平台 |\n| 数据量 | 30+ 个歌单 |\n| 组织方式 | 按人生阶段结构化整理 |\n| 喂给对象 | Claude（作为长上下文/系统提示） |\n\n**实际应用场景**：\n早上 Claudio 自动播放粤语歌（因为它从歌单里学到作者早晨的偏好），工作时切换纯音乐，晚上能根据聊天内容推荐合适的 BGM。\n\n---\n\n#### 概念二：AI Agent 的\"反消耗\"设计思路\n\n**是什么**：专门用来对抗高强度 AI 协作带来的注意力损耗，而不是追求更高生产力的 AI 应用设计方向。\n\n**为什么重要**：\n当我们大量使用 AI 提升效率时，多线程、不断切换任务本身会带来认知负担。作者提出，AI 也可以反过来做\"减压阀\"，而不只是\"加速器\"。\n\n**详细解释**：\n- 作者每天同时开多个 Claude Code 会话协作（多线程 VibeCoding）\n- 等待 AI 跑代码的碎片时间，原本是\"空转焦虑\"\n- Claudio 把这段时间变成：听歌 + 和 AI 聊音乐 → 主动切换到低耗能状态\n- 放在侧屏幕，不需要主动操作，降低切换成本\n\n**实际应用场景**：\n等 Claude Code 输出结果时，侧屏幕的 Claudio 自动播放音乐，作者可以短暂脱离紧绷状态，而不是刷手机或继续盯着代码。\n\n---\n\n#### 概念三：传统数据变成 AI 接口（Karpathy 的观点）\n\n**是什么**：Andrej Karpathy 在2025年2月提出的观点——在 AI 时代，所有传统数据（歌单、日历、健康数据等）都可以变成大语言模型可以原生调用的接口。\n\n**为什么重要**：\n这个观点给出了一个框架：我们手边已有的数据和设备，不需要等大公司整合，个人就可以通过 VibeCoding 把它们连接起来，创造新体验。\n\n**详细解释**：\n\n| 传统形态 | AI 时代的接口形态 |\n|---|---|\n| 歌单（静态列表） | AI 可读取并推理的音乐品味数据库 |\n| 智能音响（独立设备） | 被 AI Agent 调度的播放终端 |\n| 日历/天气（工具数据） | 影响 AI 决策的上下文输入 |\n| 聊天记录（碎片信息） | AI 实时响应的情绪/需求信号 |\n\n**实际应用场景**：\nClaudio 就是这个理念的一个小实验：歌单数据 + 音响设备 + 天气日程 + 聊天交互，四类\"传统数据\"被 AI 统一调度，产生了原来不存在的\"个人电台\"体验。\n\n---\n\n#### 概念四：VibeCoding 构建 AI Agent 的基本结构\n\n**是什么**：用 Claude Code 快速搭建一个有前端界面、本地服务器、多 API 集成的个人 AI Agent 的通用方法。\n\n**为什么重要**：\n作者明确说\"原理很简单\"，并给出了可复用的三段式结构，降低了普通人自己做类似项目的门槛。\n\n**详细解释**：\n\n```\nClaudio 的技术结构（三部分）\n\n┌─────────────────────────────────┐\n│  前端：播放器 + 聊天界面         │  ← 用户交互层\n├─────────────────────────────────┤\n│  后端：本地服务器                │  ← 运行环境\n├─────────────────────────────────┤\n│  接口层：多个 API 协同           │  ← 音乐平台 API + 智能设备 API\n└─────────────────────────────────┘\n```\n\n**实际应用场景**：\n- 把这个三段式结构截图发给 Claude，让它帮你生成代码框架\n- 申请对应平台的 API Token 和权限\n- 替换成自己的数据（歌单、设备、偏好）即可复用","table":"| 维度 | 内容 |\n|---|---|\n| 项目名称 | Claudio（Claude + Audio） |\n| 核心功能 | 个人 AI 电台：自动规划歌单 + 实时聊天推荐 + 智能设备联动 |\n| 数据基础 | 14年 × 30+ 歌单，结构化喂给 Claude |\n| 技术工具 | Claude Code（VibeCoding）|\n| 技术结构 | 前端播放器 / 本地服务器 / 多 API 集成 |\n| 构建方式 | 截图结构图发给 Claude → 让它生成代码 → 配置 API Token |\n| 使用场景 | 等待 Claude Code 跑代码时的侧屏幕伴侣 |\n| 设计理念 | 反消耗：用 AI 对抗 AI 协作带来的注意力损耗 |\n| 思想来源 | Karpathy：传统数据在 AI 时代都能成为大模型的接口 |\n| 更大愿景 | 排列组合设备与数据（音响、灯光、音乐），创造原来没有的体验 |","thinking":"1. **\"反消耗\"AI 应用还有哪些可能？** 作者用音乐对抗多线程协作的注意力损耗，那么其他高强度 AI 使用场景（如长时间提示词调试、反复迭代设计稿）是否也需要类似的\"缓冲层\"？这类应用和生产力工具在设计逻辑上有什么本质区别？\n\n2. **个人数据的\"蒸馏\"边界在哪里？** Claudio 用14年歌单来理解音乐品味，那么如果把日记、购物记录、浏览历史也结构化喂给模型，AI 对\"你是谁\"的理解会更准确，还是会产生新的问题？个人数据蒸馏的收益和风险如何权衡？\n\n3. **Karpathy 说的\"传统数据变成接口\"，普通人能做到什么程度？** 作者用 VibeCoding 实现了音乐+音响+日程的联动，但更复杂的数据（如健康数据、财务数据）要变成 AI 接口，技术门槛和数据安全门槛是否还在普通人可触达的范围内？","remember":"与其让 AI 不断消耗你，不如也让 AI 来滋养你——把你最私人的数据蒸馏成一个真正懂你的 AI，这才是 VibeCoding 更有意思的方向。","is_new":true},{"id":"7631434950810668457","title":"Obsidian 与 AI 工具协作方法论","cat":"vibecoding","video_url":"https://www.douyin.com/video/7631434950810668457","audience":"正在使用或想用 AI 编程工具提效、但常常纠结\"换不换工具\"的开发者或知识工作者","summary":"用\"硬盘—大脑—手\"三层框架理解 AI 工具协作，告诉你为什么积累在 Obsidian 里的个人知识库，才是跨越工具迭代的真正复利。","raw_preview":"换工具不换脑。最近有人在评论区问我，到底是用 Codex 还是用 Claude Code？我以前也会特别纠结这一类问题——哪个工具更新了我就想试一下，哪个模型变强了我就怕自己错过，别人说某个工具效率高，我就开始怀疑自己是不是又落后了。\n\n那我现在想明白了一件事情。很多人问的其实不是工具的问题，你问 Codex 可不可以、Claude Code 到底行不行，这些问题都属于同一类问题——属于\"手\"的问","knowledge_map":"换工具不换脑\n│\n├── 核心问题：为什么总纠结\"哪个工具更强\"？\n│   └── 本质：把\"手\"的问题当成了全部\n│\n├── 三层框架\n│   ├── 硬盘（Obsidian）\n│   │   ├── 存：判断、踩坑记录、项目经验、写过的稿子\n│   │   └── 作用：跨工具迁移的核心资产\n│   │\n│   ├── 大脑（大模型，如 Claude）\n│   │   ├── 负责：理解、推理、生成\n│   │   └── 作用：重新组织硬盘里的内容\n│   │\n│   └── 手（执行工具，如 Claude Code / Codex）\n│       ├── 负责：写代码、改文件、跑任务\n│       └── 特点：可以随时替换\n│\n├── 核心结论\n│   ├── 工具没有复利，方法论和上下文才有复利\n│   └── 硬盘越厚，换工具成本越低\n│\n└── 行动建议\n    └── 每天花 2 分钟，记录与 AI 沟通的内容\n        └── 两个月后形成可复用的个人风格与上下文","concepts":"#### 概念一：硬盘—大脑—手 三层框架\n\n**是什么**：把 AI 工作流拆解为三个角色——Obsidian 作为个人知识硬盘，大模型作为推理大脑，执行工具（Claude Code / Codex 等）作为执行的手。\n\n**为什么重要**：\n大多数人纠结\"换不换工具\"，是因为没有区分这三层的职责。一旦分清楚，就会发现\"手\"是最不重要的那一层，可以随时替换。\n\n**详细解释**：\n\n| 层级 | 对应工具 | 职责 | 可替换性 |\n|------|----------|------|----------|\n| 硬盘 | Obsidian | 存储判断、经验、上下文、踩坑记录 | ❌ 不换，是核心资产 |\n| 大脑 | Claude 等大模型 | 理解、推理、重新组织内容 | ⚠️ 可换，但有切换成本 |\n| 手 | Claude Code / Codex 等 | 写代码、改文件、跑任务、执行 | ✅ 随时可换 |\n\n**实际应用场景**：\n视频中演示了把 Claude Code 里的对话记录迁移到 Codex，由于 Obsidian 里已有完整上下文，Codex 可以直接接手整理内容、增加注音、做整体更新，几乎没有重新上手的成本。\n\n---\n\n#### 概念二：工具没有复利，上下文才有复利\n\n**是什么**：花时间学一个工具，工具本身不会随时间增值；但花时间积累的工作方法、判断标准、踩坑记录，会随时间持续发挥价值。\n\n**为什么重要**：\nAI 工具迭代极快，几个月就会出现新工具。如果把精力全押在\"学工具\"上，每次迭代都要从零开始；如果把精力押在\"建硬盘\"上，换工具只是换一个手。\n\n**详细解释**：\n- 学会一个工具 ≠ 沉淀可迁移的能力\n- 踩坑记录、判断标准、个人风格 = 可以带走的资产\n- Obsidian 硬盘越丰富，新工具的上手速度越快，因为 AI 已经\"认识你\"\n\n**实际应用场景**：\n作者从 Claude Code 切换到 Codex，因为 Obsidian 里已有积累，上手非常快，不需要重新向工具解释自己的背景和偏好。\n\n---\n\n#### 概念三：每日两分钟记录习惯\n\n**是什么**：每天花两分钟，把和 AI 沟通做了什么事情简单记录下来，不需要写得漂亮，只要留下痕迹。\n\n**为什么重要**：\n这是建立\"硬盘\"的最低成本方式。两个月的积累，会让 AI 逐渐读懂你的风格、品味和偏好，形成真正个性化的工作流。\n\n**详细解释**：\n- 不要求格式，只要记录\"做了什么、干了什么\"\n- 目标是让 AI 能读懂你的风格\n- 时间成本极低，但复利效应在两个月后开始显现\n\n**实际应用场景**：\n把每次和 AI 协作的结果、调整过程、踩过的坑，简单记在 Obsidian 里，形成个人的\"AI 使用日志\"，这些内容未来可以作为上下文喂给任何新工具。","table":"| 问题 | 答案 |\n|------|------|\n| Obsidian 在工作流里是什么角色？ | 硬盘，存个人判断、经验、上下文 |\n| 大模型（如 Claude）是什么角色？ | 大脑，负责理解、推理、生成 |\n| Claude Code / Codex 是什么角色？ | 手，负责执行，可随时替换 |\n| 换工具会不会从零开始？ | 硬盘有积累就不会；硬盘空则必然从零 |\n| 真正有复利的是什么？ | 工作方法、判断标准、踩坑记录、个人上下文 |\n| 建硬盘的最低成本方式？ | 每天 2 分钟记录与 AI 沟通的内容 |\n| 多久能看到效果？ | 约两个月后，AI 开始读懂个人风格 |","thinking":"1. **\"硬盘\"的质量如何衡量？** 记录在 Obsidian 里的内容，什么样的才算真正有价值的上下文，什么样的只是噪音？有没有办法在记录时就做好筛选？\n\n2. **三层框架是否适用于非编程场景？** 如果你是设计师、写作者或产品经理，\"手\"对应的工具是什么？\"硬盘\"里应该存什么类型的内容？\n\n3. **当大模型本身也在快速迭代时，\"大脑\"层是否也面临同样的替换焦虑？** 如何判断什么时候值得切换大模型，而不只是切换执行工具？","remember":"工具是手，手可以换；Obsidian 是硬盘，硬盘越厚，换手的代价越小。","is_new":true},{"id":"7631503451452804379","title":"抄大佬路径转码进大厂","cat":"vibecoding","video_url":"https://www.douyin.com/video/7631503451452804379","audience":"想转行做程序员、但不知道从哪里开始学的零基础或自学人群","summary":"外网有一份被验证过的转码学习路线图，照着抄就能系统备战谷歌、亚马逊等大厂，零基础的人用它能少走大量弯路。","raw_preview":"有个外网大佬整理了他整个转码的学习路径，一开始是笨的，正在谷歌工作，结果走着走着转进了亚马逊。这个学习计划现在在圈子里几乎成了转码必抄的模板。\n\n内容涵盖了计算机科学的核心知识，不局限于特定的编程语言，提供了详细的学习路线图。涉及的知识范围有：数据结构与算法、计算机科学基础，以及大量的书籍、视频课程等限时资源，同时还有面试相关的编程题目和技巧，一些知名大学的计算机科学视频也都给你列出来方便观看。\n","knowledge_map":"转码进大厂的学习路线图\n├── 路线图来源\n│   ├── 外网大佬本人经历（从谷歌到亚马逊）\n│   └── 已在转码圈成为公认模板\n│\n├── 核心学习内容\n│   ├── 数据结构与算法\n│   ├── 计算机科学基础\n│   ├── 书籍 & 视频课程资源\n│   ├── 知名大学 CS 课程视频\n│   └── 面试编程题目与技巧\n│\n├── 路线图特点\n│   ├── 不绑定特定编程语言\n│   ├── 有详细学习顺序\n│   └── 瞄准谷歌/亚马逊级别大厂\n│\n└── 适用人群 & 预期效果\n    ├── 零基础 / 半路转行\n    ├── 学到七八成 → 够应对国内大多数互联网公司\n    └── 坚持一年 → 显著成长","concepts":"#### 概念一：转码学习路线图\n\n**是什么**：一份由在谷歌、亚马逊工作过的外网大佬整理的、系统性的转行程序员学习计划。\n\n**为什么重要**：\n零基础转码最大的问题不是\"不努力\"，而是\"不知道学什么、按什么顺序学\"。有一份经过验证的路线图，可以直接省掉自己瞎摸索的时间。\n\n**详细解释**：\n\n| 模块 | 具体内容 |\n|------|----------|\n| 核心知识 | 数据结构与算法、计算机科学基础 |\n| 学习资源 | 书籍、视频课程、知名大学 CS 课程 |\n| 面试准备 | 编程题目练习、面试技巧 |\n| 语言要求 | 不限定特定编程语言 |\n\n**实际应用场景**：\n适合完全零基础想转行的人，按顺序跟着计划走，不需要自己拼凑学习资料。\n\n---\n\n#### 概念二：\"抄\"的学习策略\n\n**是什么**：直接复用已被验证成功的他人学习路径，而不是自己从零设计学习计划。\n\n**为什么重要**：\n这位大佬的路径有真实结果背书（从谷歌到亚马逊），说明这套方法是跑通过的，跟着抄可以大幅降低试错成本。\n\n**详细解释**：\n视频的核心逻辑是：与其花时间研究\"我该怎么学\"，不如直接用一个已经成功的人的方案。\"抄\"不是走捷径，而是站在别人的经验上起跑。\n\n**实际应用场景**：\n拿到路线图后，不做修改，按照它规定的顺序和资源老老实实执行，坚持一年。\n\n---\n\n#### 概念三：\"七八成\"标准\n\n**是什么**：不需要把路线图学到极致，掌握七八成内容就已经足够应对大多数公司。\n\n**为什么重要**：\n给转码学习者一个心理预期——目标不是\"完美掌握所有内容\"，而是\"达到够用的水平\"，降低了心理压力，让人更容易坚持。\n\n**详细解释**：\n- 路线图本身瞄准的是谷歌、亚马逊这种顶级大厂标准\n- 对于国内大多数互联网公司，达到七八成就已经足够\n- 这意味着即使学习过程中有遗漏，也不影响最终结果\n\n**实际应用场景**：\n在学习过程中遇到某个知识点卡壳时，不必死磕到100%，可以先往下推进，整体完成度比局部完美更重要。","table":"| 维度 | 内容 |\n|------|------|\n| 路线图来源 | 外网大佬，有谷歌、亚马逊工作经历 |\n| 覆盖内容 | 数据结构与算法、CS基础、书籍课程、大学视频、面试题 |\n| 语言限制 | 无，不绑定特定编程语言 |\n| 目标大厂 | 谷歌、亚马逊（国外顶级），国内大厂同样适用 |\n| 适合人群 | 零基础 / 半路转行想做程序员的人 |\n| 学习周期 | 约一年 |\n| 及格线 | 掌握七八成即可应对国内大多数互联网公司 |","thinking":"1. **\"抄路线图\"解决了方向问题，但执行中最容易卡在哪个环节？** 数据结构与算法、CS基础、面试题这三块，哪一块对零基础的人来说是真正的拦路虎，应该怎么分配时间？\n\n2. **这份路线图瞄准的是谷歌、亚马逊的标准，国内互联网大厂的面试侧重点和它有哪些差异？** 直接套用是否需要做本地化调整？\n\n3. **\"坚持一年\"是一个很长的周期，如何设计阶段性里程碑来验证自己是否走在正确的轨道上？** 三个月、六个月、一年分别应该达到什么水平？","remember":"不要自己瞎摸索，找一个已经成功转码进大厂的人，把他的学习路径完整地抄一遍。","is_new":true},{"id":"7631552987017530643","title":"重新学AI必做的三件事","cat":"vibecoding","video_url":"https://www.douyin.com/video/7631552987017530643","audience":"想系统入门AI工具、但还没找到正确学习路径的普通用户","summary":"作者用亲身经验总结出重新学AI必做的三件事——上手Claude Code建立体感、彻底解决基础设施、把资料和能力结构化——帮助观众少走弯路、真正用上最先进的AI工具。","raw_preview":"如果我重新来过，重新开始学AI，那么我一定会做这三件事。其实之前我在星球内都有反复说过，那本期视频我来完整表述一遍。\n\n**第一，使用Claude Code。即使没用两天就被封号，也要用。**\n\n今天我们已经进入到Agentic AI阶段，那在这个阶段，最先进最有代表性的工具就是Claude Code。它跟之前的一些聊天机器人是完全不一样的，完全是天壤之别。聊天机器人输出的是文字和图片，这个很好理","knowledge_map":"重新学AI必做的三件事\n├── 第一件：使用 Claude Code，建立真实体感\n│   ├── 背景：已进入 Agentic AI 阶段\n│   ├── 与聊天机器人的本质区别：能通过代码/命令创造和控制\n│   ├── 核心逻辑：光看视频无法建立体感，必须亲自上手\n│   └── 延伸判断：AI 将从标准化工作开始蚕食设计师份额\n│\n├── 第二件：彻底解决基础设施问题\n│   ├── 背景：国外 AI 领先国内约一年，使用需要一套基础设施\n│   ├── 支付方案层级\n│   │   ├── 初级：国内 Visa / Mastercard（招商、建行）\n│   │   ├── 中级：美区 iOS 账户 + 礼品卡\n│   │   └── 进阶：Capital One 实体信用卡（需 ITIN）\n│   └── 核心逻辑：基础设施不通，其他一切免谈\n│\n└── 第三件：资料 Markdown 化 + 能力 Skill 化\n    ├── 衡量标准：个体与 AI 能否成为\"认知共同体\"\n    │   ├── 个体侧：清楚 AI 的边界和不同模型差异\n    │   └── AI 侧：能基于对个体的了解进行动态预判\n    ├── 资料 Markdown 化\n    │   ├── 原因：AI 可读，人类也可读\n    │   └── 淘汰对象：Word / PDF / PPT（AI 难以解析）\n    └── 能力 Skill 化\n        ├── 形式：明确的 SOP，AI 可理解的文字\n        ├── 目标：赋能自己的 AI 系统\n        └── 副产品：梳理和提升自身工作流","concepts":"#### 概念一：Agentic AI 与 Claude Code\n\n**是什么**：Agentic AI 是指能够通过代码和命令主动创造、控制事物的AI形态，Claude Code 是作者认为当前阶段最具代表性的工具。\n\n**为什么重要**：\n它和聊天机器人有本质区别，仅靠看视频或听描述根本无法建立真实认知，必须亲自上手才能理解其能力边界。\n\n**详细解释**：\n\n| 维度 | 聊天机器人（如早期 ChatGPT） | Agentic AI（如 Claude Code） |\n|------|----------------------------|-----------------------------|\n| 输出形式 | 文字、图片 | 代码、可执行操作、控制指令 |\n| 交互方式 | 对话式问答 | 命令式任务执行 |\n| 能力边界 | 生成内容 | 创造和控制更多事物 |\n| 体感获取方式 | 看描述可理解 | 必须亲自上手 |\n\n**实际应用场景**：\n作者举例，Google Stitch 和 Claude Code 已经开始进入设计领域，从最标准化的设计工作开始替代人工。作者认为这一趋势会持续扩展。\n\n---\n\n#### 概念二：学AI的基础设施\n\n**是什么**：指稳定使用国外先进AI工具所需的一整套支付、账户、网络等配套条件。\n\n**为什么重要**：\n基础设施问题是作者观察到阻止大多数人真正用上先进AI的最主要障碍，不解决这个问题，其他学习计划都是空谈。\n\n**详细解释**：\n\n| 层级 | 方案 | 适用场景 |\n|------|------|---------|\n| 初级 | 国内 Visa / Mastercard（如招商、建行） | 订阅 Gemini、Copilot 等 |\n| 中级 | 美区 iOS 账户 + 礼品卡 | 无法用国内卡订阅的 AI 服务 |\n| 进阶 | Capital One 实体信用卡（需 ITIN） | 更广泛的国外服务订阅 |\n\n**实际应用场景**：\n作者自己用招商 Mastercard 订阅 Gemini，用建行 Visa 订阅 Copilot，并申请了 ITIN 以便办理国外信用卡。\n\n---\n\n#### 概念三：认知共同体——学AI的衡量标准\n\n**是什么**：作者提出的判断AI学习是否到位的标准——个体与AI能否形成\"认知共同体\"，即双方能够相互理解、协同工作。\n\n**为什么重要**：\n\"要学AI\"这个目标太模糊，没有衡量标准就不知道学到哪里算够。这个标准给出了一个具体的终点。\n\n**详细解释**：\n\n认知共同体需要满足两个条件：\n\n- **个体侧**：清楚知道AI的边界，包括不同模型的能力差异、各工具的适用范围和限制\n- **AI侧**：AI能基于对个体的充分了解，进行动态预判，而不是每次都从零开始\n\n要让AI了解你，前提是你得把自己的信息、资料、能力整理成AI能读懂的形式。\n\n**实际应用场景**：\n这是作者建议做\"资料Markdown化\"和\"能力Skill化\"的根本原因——只有把自己结构化，AI才能真正了解你，双方才能形成认知共同体。\n\n---\n\n#### 概念四：资料 Markdown 化与能力 Skill 化\n\n**是什么**：将个人积累的资料转为 Markdown 格式，将个人能力整理为明确的 SOP（标准操作流程），使AI能够读取和理解。\n\n**为什么重要**：\nAI无法有效解析 Word、PDF、PPT 等复杂格式，这些格式会越来越被边缘化。只有结构化的信息，才能真正赋能AI系统。\n\n**详细解释**：\n\n| 类型 | 做什么 | 为什么 | 难度 |\n|------|--------|--------|------|\n| 资料 Markdown 化 | 把存量资料转为 .md 格式 | AI 可读，人类也可读 | 相对容易 |\n| 能力 Skill 化 | 把脑子里的经验写成明确 SOP | 让 AI 理解并复现你的工作方式 | 有一定难度，但本身是自我提升 |\n\n**实际应用场景**：\n作者在自己的社群中建议成员今年完成三个 Skill 的整理，目的是既赋能自己的AI系统，又借此机会梳理和优化自身工作流。","table":"| 建议 | 核心行动 | 关键原因 | 常见误区 |\n|------|---------|---------|---------|\n| 使用 Claude Code | 亲自上手，哪怕被封号也要用 | 光看描述无法建立体感 | 看几个视频就以为懂了 |\n| 解决基础设施 | 按层级逐步解决支付和账户问题 | 用不了工具，其他都是空谈 | 懒得解决，反复被卡住 |\n| 资料 Markdown 化 | 把存量资料转为 .md 格式 | AI 读不懂 Word/PDF/PPT | 继续用传统文档格式 |\n| 能力 Skill 化 | 把经验写成明确 SOP | 让 AI 真正了解你的工作方式 | 只用AI，从不让AI了解自己 |\n| 衡量学习进度 | 问自己：我和AI是否成为认知共同体 | 没有标准就不知道学到哪里算够 | 学了很多但没有方向 |","thinking":"1. **\"认知共同体\"的标准是否适用于所有人？** 作者提出个体和AI相互了解、能够动态预判，但不同职业、不同使用深度的人，达到这个标准所需的投入差异巨大——对于普通用户来说，这个标准是否过高，还是说本身就应该有门槛？\n\n2. **基础设施问题是一次性解决还是持续挑战？** 作者建议优先彻底解决基础设施，但国外AI服务的支付规则、封号风险、政策变化都在持续变动——\"彻底解决\"究竟意味着什么，这套方案的稳定性有多高？\n\n3. **能力 Skill 化的过程本身就是学习——那AI在这个过程中扮演什么角色？** 作者说把经验写成SOP是\"自我提升的过程\"，那么在整理Skill的过程中，是否可以反过来让AI参与提问、追问、帮助结构化？这个双向过程会带来什么不同的效果？","remember":"学AI不是看懂了就行，要上手用、能连上、让AI真正了解你——这三件事不做，其他都是白搭。","is_new":true},{"id":"7631838315565908315","title":"跟着书籍感受世界地理与人文","cat":"vibecoding","video_url":"https://www.douyin.com/video/7631838315565908315","audience":"喜欢阅读、对文学地理感兴趣、或正处于人生迷茫期想从书中寻找方向的年轻人。","summary":"作者用\"跟着书籍去旅行\"这个应用，串联起文学与地理的关系，同时分享了自己离开大厂、用阅读走出迷茫、选择创作之路的真实心路历程。","raw_preview":"你有没有忽然想看某个国家地区的书籍呢，感受那里的风土人情？于是我做了这个应用。比如我想感受中东的，就可以点击查看这部《耶路撒冷三千年》，或者我想感受阿富汗的，就可以查看《追风筝的人》。\n\n之前有位老师和我提过，世界的文学是地理的。我们读一本书的时候，有时候会真切地感受到那片海域、那座山风、那条街道，就像马尔克斯的《霍乱时期的爱情》，我们能够感受到那种加勒比海的氛围。\n\n在结束了大厂的一段经历后，对","knowledge_map":"跟着书籍去旅行\n├── 1. 应用功能\n│   ├── 按地区检索书籍（中东、阿富汗……）\n│   └── 沿丝绸之路串联文学地图\n│       └── 敦煌→撒马尔罕→巴格达→君士坦丁堡→威尼斯→巴黎\n│\n├── 2. 核心理念：世界的文学是地理的\n│   ├── 读书=感受那片土地（海域、山川、街道）\n│   └── 代表作：《霍乱时期的爱情》→加勒比海氛围\n│\n└── 3. 作者个人叙事（书籍如何陪伴迷茫）\n    ├── 离开大厂 → 怀疑自我 → 读书+跑步\n    ├── 《阿勒泰的角落》：感受自然陪伴\n    ├── 《我与地坛》：接受苦难的意义\n    ├── 《项塔兰》：痛恨还是原谅的抉择\n    ├── 《卡拉马佐夫兄弟》：爱人类与爱具体的人\n    └── 《约翰·克利斯朵夫》：把灵感压榨到极致\n        └── 结语：《杀死一只知更鸟》→义无反顾的勇敢","concepts":"#### 概念一：世界的文学是地理的\n\n**是什么**：文学作品与其诞生的地理环境深度绑定，读一本书就是在感受一片土地。\n\n**为什么重要**：\n这个视角把\"读书\"和\"认识世界\"合并成一件事，让阅读不再是抽象的文字消费，而是有温度的空间体验。\n\n**详细解释**：\n- 《耶路撒冷三千年》→ 中东的历史厚度\n- 《追风筝的人》→ 阿富汗的社会创伤\n- 《霍乱时期的爱情》→ 加勒比海的潮湿与热烈\n- 《阿勒泰的角落》→ 新疆草原的辽阔与孤寂\n\n**实际应用场景**：\n想去某个地方旅行前，先找一本那里的文学作品读；或者反过来，读完某本书后，真正去那片土地走走，验证文字里的感受。\n\n---\n\n#### 概念二：在书中寻找问题，而非答案\n\n**是什么**：作者最初带着\"找答案\"的目的去读书，后来发现书给的是更多问题，以及更多可以追寻的方向。\n\n**为什么重要**：\n这个认知转变决定了一个人和阅读的关系——把书当工具书会失望，把书当对话者才会受益。\n\n**详细解释**：\n\n| 阶段 | 读书目的 | 实际收获 |\n|------|----------|----------|\n| 初期（大厂离职后） | 找到答案，解决迷茫 | 发现更多问题 |\n| 中期 | 在问题中寻找方向 | 有了可以追寻的路 |\n| 现在 | 汲取养分，创作输出 | 珍惜创作时光 |\n\n**实际应用场景**：\n处于人生转折期时，不要指望某本书\"告诉你该怎么做\"，而是让它帮你想清楚\"自己在意什么\"。\n\n---\n\n#### 概念三：文学中的人生选择题\n\n**是什么**：作者在迷茫期读到的几段书摘，每一段都对应一个真实的人生困境，给出了不同的思考框架。\n\n**为什么重要**：\n好的文学不提供答案，但提供\"提问的方式\"，帮助人在困境中重新定位自己。\n\n**详细解释**：\n\n| 书名 | 核心命题 | 对应的人生困境 |\n|------|----------|----------------|\n| 《我与地坛》史铁生 | 苦难是世界存在的条件 | 对前路没有勇气 |\n| 《项塔兰》 | 痛恨还是原谅，决定人一生的记忆 | 放不下的遗憾 |\n| 《卡拉马佐夫兄弟》陀思妥耶夫斯基 | 爱人类 vs 爱具体的人 | 理想与现实的落差 |\n| 《杀死一只知更鸟》 | 知道会输还是义无反顾 | 是否要走创作这条路 |\n\n**实际应用场景**：\n遇到某个具体困境时，可以用这些命题反问自己：我现在的状态更像哪一句话？我选择痛恨还是原谅？我选择回去还是继续？\n\n---\n\n#### 概念四：把灵感放进压榨机\n\n**是什么**：引自罗曼·罗兰《约翰·克利斯朵夫》——灵感来得快去得也快，要趁灵感在时把思想中的所有东西全部榨出来，一滴不剩。\n\n**为什么重要**：\n这是作者解释自己创作方式的核心方法论——推掉广告、减少干扰，只为最大化压榨自己的创作能力。\n\n**详细解释**：\n- 灵感≠无限资源，它有时效性\n- \"压榨\"不是消耗，而是在状态最好时彻底输出\n- 作者的实践：推掉广告，保持创作纯粹性\n\n**实际应用场景**：\n当你进入创作状态（写作、设计、编程）时，不要分心去刷手机或处理杂务，把这段时间完全交给当下的创作冲动。","table":"| 维度 | 内容 |\n|------|------|\n| 应用核心功能 | 按地区/文化路线检索对应文学书籍 |\n| 核心理念 | 世界的文学是地理的 |\n| 丝绸之路文学路线 | 中国→敦煌→撒马尔罕→巴格达→君士坦丁堡→威尼斯→巴黎 |\n| 作者人生转折 | 大厂离职→读书跑步→选择创作 |\n| 陪伴迷茫的书 | 《阿勒泰的角落》《我与地坛》《项塔兰》《卡拉马佐夫兄弟》 |\n| 创作方法论来源 | 《约翰·克利斯朵夫》——把灵感放进压榨机 |\n| 结语精神来源 | 《杀死一只知更鸟》——知道会输也义无反顾 |","thinking":"1. **文学地理学的边界在哪里？** 一本书能真实还原一片土地的感受，还是它只能还原作者眼中的那片土地？读《追风筝的人》感受到的\"阿富汗\"，和真实的阿富汗之间有多大的距离？这个距离是问题还是文学的价值所在？\n\n2. **\"找答案\"和\"找问题\"哪个更难？** 作者说读书让他找到更多问题而非答案，但大多数人读书是为了找答案。你有没有经历过某本书让你原本清晰的想法变得更复杂？那种感受是让你更迷茫，还是更清醒？\n\n3. **义无反顾和莽撞之间的区别是什么？** 《杀死一只知更鸟》说的勇敢是\"知道会输还是去做\"，但现实中很多人\"义无反顾\"地做了错误的选择。作者选择离开大厂走创作这条路，他是怎么判断这是\"勇敢\"而不是\"逃避\"的？","remember":"文学是地理，书是你去不了的地方的船票，也是你走不出来的迷茫里的一盏灯。","is_new":true},{"id":"7631904764309146931","title":"转码进大厂的学习路线图","cat":"vibecoding","video_url":"https://www.douyin.com/video/7631904764309146931","audience":"想从非计算机专业或零基础转行做程序员、目标进大厂的学习者","summary":"外网有一份大佬亲测有效、直接对标谷歌/亚马逊的转码学习路线图，零基础的人照着抄就能大幅缩短摸索时间、提升进大厂的概率。","raw_preview":"你就不停地抄这个人，怎么都能抄进大厂。有个外网大佬整理了他的整个转码学习路径，一开始是奔着进谷歌去的，结果走着走着拐进了亚马逊。这个学习计划现在在圈子里几乎成了转码照抄母版。内容涵盖了计算机科学的核心知识，不仅限于特定的编程语言，提供了详细的学习路线图。涉及的知识范围有数据结构与算法、计算机科学基础，以及大量的书籍、视频、课程、在线资源，同时还有面试相关的编程题目和技巧。一些知名大学的计算机课程视","knowledge_map":"转码进大厂学习路线图\n├── 路线图来源\n│   ├── 作者：外网大佬（个人实测）\n│   └── 目标：原定谷歌 → 实际入职亚马逊\n│\n├── 内容覆盖\n│   ├── 计算机科学核心知识\n│   │   ├── 数据结构与算法\n│   │   └── 计算机科学基础\n│   ├── 学习资源\n│   │   ├── 书籍\n│   │   ├── 视频课程（含知名大学免费课）\n│   │   └── 在线平台资源\n│   └── 面试专项\n│       ├── 编程题目练习\n│       └── 面试技巧\n│\n├── 路线图特点\n│   ├── 不限定特定编程语言\n│   ├── 对标大厂（谷歌/亚马逊）门槛\n│   └── 圈子内公认的\"照抄母版\"\n│\n└── 适用人群\n    ├── 零基础转码者\n    └── 半路出家的学习者","concepts":"#### 概念一：转码学习路线图\n\n**是什么**：一份由外网大佬根据自身转码经历整理的、系统性的计算机科学自学计划，涵盖知识点、学习资源和面试准备。\n\n**为什么重要**：\n转码最大的难题不是努力不够，而是不知道该学什么、先学什么。有了现成路线图，相当于站在过来人的肩膀上，省去大量试错时间。\n\n**详细解释**：\n\n| 模块 | 具体内容 |\n|------|----------|\n| 核心知识 | 数据结构与算法、计算机科学基础 |\n| 学习资源 | 书籍、视频、在线课程、知名大学公开课（免费） |\n| 面试准备 | 编程题目练习、面试技巧 |\n| 语言限制 | 无，不绑定特定编程语言 |\n\n**实际应用场景**：\n零基础或非科班出身的人，拿到这份路线图后可以直接按顺序学习，不需要自己规划学什么，降低启动门槛。\n\n---\n\n#### 概念二：对标大厂门槛的\"够用原则\"\n\n**是什么**：这份路线图的设计目标是谷歌、亚马逊等顶级大厂的入职标准，但即便只完成七八成，对大多数公司而言已经足够。\n\n**为什么重要**：\n很多人因为觉得\"学不到顶尖水平\"而放弃，这个原则告诉你：高标准学习，哪怕不完美，性价比依然极高。\n\n**详细解释**：\n\n| 学习完成度 | 对应结果 |\n|------------|----------|\n| 100%（极致） | 具备冲击谷歌/亚马逊的竞争力 |\n| 70%~80% | 对大多数公司已足够用 |\n| 低于一半 | 视频未提及，不做评估 |\n\n**实际应用场景**：\n适合给自己设定阶段性目标——不必追求完美，先把核心模块啃完，边学边投简历，逐步迭代。\n\n---\n\n#### 概念三：免费公开课资源\n\n**是什么**：路线图中包含知名大学的计算机课程视频，且可以免费观看。\n\n**为什么重要**：\n大学级别的课程质量有保障，覆盖系统性基础知识，对于自学者来说是高性价比的学习入口，降低了转码的经济成本。\n\n**详细解释**：\n- 视频内容提到这些课程被整合进路线图，作为学习资源的一部分\n- 适合用来补计算机科学基础，尤其是数据结构与算法等核心科目\n\n**实际应用场景**：\n没有预算报付费课程的同学，可以优先从路线图中的免费大学课程入手，系统建立基础知识框架。","table":"| 维度 | 详情 |\n|------|------|\n| 路线图作者 | 外网大佬（个人转码经历总结） |\n| 作者结果 | 目标谷歌 → 实际入职亚马逊 |\n| 对标目标 | 谷歌、亚马逊等顶级大厂 |\n| 核心知识模块 | 数据结构与算法、计算机科学基础 |\n| 资源类型 | 书籍、视频、在线课程、大学公开课（免费）、面试题 |\n| 语言限制 | 无，不绑定特定语言 |\n| 最低有效完成度 | 约70%~80%，对大多数公司已够用 |\n| 最适合人群 | 零基础、半路出家的转码者 |\n| 核心价值 | 省去自己摸索路线的时间成本 |","thinking":"1. **路线图的局限性在哪里？** 这份路线图对标的是谷歌/亚马逊，但不同公司、不同岗位的面试侧重点差异很大——对于目标是国内中小厂或特定方向（如前端、算法岗）的人，是否需要在此基础上做裁剪或补充？\n\n2. **\"抄七八成就够用\"的边界在哪？** 视频说完成70%~80%对大多数公司足够，但\"数据结构与算法\"和\"计算机科学基础\"这两个模块，哪些部分是必须完成的硬核心，哪些可以后置？优先级如何判断？\n\n3. **照抄路线图 vs. 自己摸索，真正的差距有多大？** 转码成功的关键变量究竟是学习路线的选择，还是执行力和学习时长？一份好的路线图能解决多少问题，又有哪些问题是路线图解决不了的？","remember":"转码不用从零摸索，有人已经用自己的经历蹚出了一条直通大厂的路，你要做的只是照着抄、持续啃。","is_new":true},{"id":"7632548423916342538","title":"用 Claude 交互式学习法提速读书","cat":"vibecoding","video_url":"https://www.douyin.com/video/7632548423916342538","audience":"想提高读书效率、希望用 AI 工具辅助学习的自学者和知识工作者","summary":"用 Claude 搭建\"交互式学习框架\"，通过学习上下文、书籍骨架、个人学习地图三件套，把读书效率提升5到10倍，且真正读懂、真正用上。","raw_preview":"但是我用 Claude 的交互式学习法一周读了五本书，而且并不是一个速读的方法那种，而是真的读懂了，并且真正用到了我的生活中。最后先想一想，我是如何用 Claude 进行一个交互式学习，并且提高了大概5到10倍左右的学习速度。\n\n那首先我讲说一下关于读书和学习的这个事情。首先我们读书一定是带着一个目的去读，就是我们需要先有一个问题，比如这个问题可能是我们生活中遇到的问题，或者我们的学习工作中遇到一","knowledge_map":"Claude 交互式学习法\n├── 核心前提：带着问题去读书\n│   ├── 问题来源：生活/工作中真实遇到的困境\n│   └── 目的：用书解决具体问题，而非泛读\n│\n├── 传统读书的问题\n│   ├── 按作者顺序读 ≠ 按学习者需求读\n│   └── 例：《原子习惯》前三讲是脑科学，实用内容在后面\n│\n├── 好的学习三要素\n│   ├── 1. 学习上下文（记录进度 + 理解程度）\n│   ├── 2. 书籍骨架（拆解全书结构）\n│   └── 3. 学习地图（学习者自己的顺序，非书的顺序）\n│\n├── 为什么用 Claude\n│   └── 自己做三要素太耗时 → Claude 辅助生成\n│\n├── Claude 课程包结构\n│   ├── 主入口（问题收集：工作背景 + 想解决的问题）\n│   ├── 书籍骨架规范模版\n│   ├── AI 提示词母版\n│   ├── 课程地图母版\n│   ├── 学习单元母版\n│   └── 格式转换工具（PDF/Word → 纯文本）\n│\n└── 适用范围（不只是读书）\n    ├── 网课\n    ├── 播客\n    ├── 论文\n    └── 会议记录","concepts":"#### 概念一：带着问题读书\n\n**是什么**：在拿起一本书之前，先明确自己生活或工作中具体想解决的问题，再去读书。\n\n**为什么重要**：没有问题意识的阅读容易变成\"读完就忘\"，知识无法落地到实际场景。\n\n**详细解释**：视频中提到，读书的出发点应该是\"我有一个解决不了的问题\"，而不是\"我想读这本书\"。问题先行，才能筛选出书中真正对自己有用的部分。\n\n**实际应用场景**：打开 Claude，在读书前先回答两个问题——\"我现在的工作/生活状态是什么？\"\"我希望这本书帮我解决什么问题？\"\n\n---\n\n#### 概念二：给书重新排序（按需重构阅读顺序）\n\n**是什么**：不按作者写书的章节顺序读，而是按照自己的学习需求重新安排阅读顺序。\n\n**为什么重要**：作者写书的顺序是\"普世性\"的，面向所有读者；而每个读者的需求不同，强行按原顺序读会浪费大量时间在无关内容上。\n\n**详细解释**：\n\n| 书的原始顺序 | 学习者的需求顺序 |\n|---|---|\n| 作者逻辑，面向大众 | 个人问题导向，面向自己 |\n| 例：《原子习惯》第1-3讲讲脑科学 | 实用方法在后面，可以先读后面 |\n| 按部就班，耗时长 | 跳跃阅读，效率高 |\n\n**实际应用场景**：让 Claude 先生成书籍骨架，再根据自己的问题，和 Claude 一起决定先读哪些章节、跳过哪些章节。\n\n---\n\n#### 概念三：学习三要素（上下文 + 骨架 + 地图）\n\n**是什么**：支撑高效学习的三个基础结构——学习上下文、书籍骨架、学习地图。\n\n**为什么重要**：这三个东西决定了\"你知道自己在哪、书讲了什么、你该怎么走\"，缺一会让学习变得混乱低效。\n\n**详细解释**：\n\n| 要素 | 作用 | 如果没有 |\n|---|---|---|\n| 学习上下文 | 记录学习进度和当前理解程度 | 不知道自己学到哪了，重复低效 |\n| 书籍骨架 | 拆解全书结构，看清知识全貌 | 只见树木不见森林，抓不住重点 |\n| 学习地图 | 规划学习者自己的阅读顺序 | 被作者顺序牵着走，浪费时间 |\n\n**实际应用场景**：用 Claude 课程包中的三个对应模版，在开始读书前自动生成这三样东西，而不是自己手动整理。\n\n---\n\n#### 概念四：交互式学习法的适用范围\n\n**是什么**：只要能转化为文字的内容，都可以用 Claude 交互式学习法来学。\n\n**为什么重要**：这个方法不局限于读书，极大扩展了使用场景。\n\n**详细解释**：\n\n| 内容类型 | 转化方式 |\n|---|---|\n| 纸质书 / 电子书 | PDF/Word 转纯文本 |\n| 网课视频 | 转录成文字 |\n| 播客音频 | 转录成文字 |\n| 学术论文 | 直接导入 |\n| 会议记录 | 直接导入 |\n\n**实际应用场景**：听完一期播客，把转录文字丢给 Claude，同样走一遍\"问题 → 骨架 → 学习地图 → 追问理解\"的流程。","table":"| 维度 | 传统读书方式 | Claude 交互式学习法 |\n|---|---|---|\n| 出发点 | 想读这本书 | 有一个具体问题要解决 |\n| 阅读顺序 | 作者定的章节顺序 | 学习者自己的需求顺序 |\n| 结构梳理 | 自己手动做笔记 | Claude 生成骨架 + 地图 |\n| 进度追踪 | 靠记忆或手写 | 学习上下文持续记录 |\n| 适用内容 | 主要是书 | 书、网课、播客、论文、会议记录 |\n| 效率提升 | 基准 | 约5到10倍 |\n| 核心工具 | 无 | Claude + 课程包（提示词模版） |","thinking":"1. **\"带着问题读书\"和\"系统性学习一个领域\"是否矛盾？** 如果每次只解决眼前的问题，会不会导致知识体系碎片化，缺乏深度？如何用交互式学习法兼顾\"问题驱动\"和\"系统构建\"？\n\n2. **学习上下文由 Claude 来记录，是否存在依赖风险？** 如果对话被清空或换了工具，积累的上下文是否会丢失？怎样设计一套既依托 AI 又能独立存在的个人知识管理系统？\n\n3. **\"给书重新排序\"需要学习者对全书内容有一定了解才能判断跳读哪里。** 对于完全陌生的领域，在没有任何背景知识的情况下，如何让 Claude 帮助做出合理的顺序决策，而不是盲目跳读？","remember":"读书不是从第一页读到最后一页，而是带着问题让 Claude 帮你重建一张只属于你的学习地图。","is_new":true},{"id":"7632950325049676910","title":"AI正在抹平游戏制作门槛","cat":"vibecoding","video_url":"https://www.douyin.com/video/7632950325049676910","audience":"对游戏开发或AI工具感兴趣、想了解AI如何改变创意行业门槛的普通人和独立开发者","summary":"AI 工具（GPT Image 2 + Claude 2.0）正在让独立开发者和小团队具备媲美大厂的游戏视觉制作能力，创意和提示词将取代资金与人力成为核心竞争力。","raw_preview":"感谢各位，你们认为渲染出像这样的游戏画面需要多少人力和时间？而现在，一位 AI 设计师在一天时间里，借助 GPT Image 2 和 Claude 2.0，就做出了一款 3A 级游戏的完整概念视频。\n\n想想过去，少说也需要 3D 艺术家和程序员配合，然后在渲染农场完成海量画面输出，才能最终呈现出像样的画面质感。而现在，AI 把\"不可能\"变成了\"今天就能出片\"。小型工作室甚至是独立开发者，也突然拥有","knowledge_map":"AI 抹平游戏制作门槛\n├── 过去的门槛（传统路径）\n│   ├── 需要 3D 艺术家 + 程序员协作\n│   └── 依赖渲染农场完成大量画面输出\n│\n├── 现在的变化（AI 路径）\n│   ├── 工具：GPT Image 2 + Claude 2.0\n│   ├── 效率：一人一天完成 3A 级概念视频\n│   └── 受益者：小型工作室 / 独立开发者\n│\n└── 未来的竞争逻辑\n    ├── 旧逻辑：钱多 → 人多 → 赢\n    └── 新逻辑：创意强 + 提示词强 → 赢","concepts":"#### 概念一：渲染农场\n\n**是什么**：由大量高性能计算机组成的集群系统，专门用于批量处理 3D 画面渲染任务，是传统游戏和影视制作的基础设施。\n\n**为什么重要**：它代表了过去游戏视觉制作的高门槛——没有大量资金和硬件资源，就无法输出高质量画面，直接把小团队和个人挡在门外。\n\n**详细解释**：传统流程中，一帧高质量 3D 画面可能需要数小时乃至数天渲染，完整概念视频的制作周期以周或月计算，且需要专业团队分工协作。\n\n**实际应用场景**：大型游戏公司（如育碧、EA）制作宣传 CG、游戏内过场动画时，通常需要调用渲染农场资源。\n\n---\n\n#### 概念二：3A 级游戏概念视频\n\n**是什么**：用于展示游戏世界观、美术风格和玩法方向的高质量演示视频，通常是大预算游戏项目立项或宣传的核心物料。\n\n**为什么重要**：它是衡量游戏制作门槛的标志性产物——过去只有顶尖大厂才有能力制作，现在成为 AI 工具能力的参照基准。\n\n**详细解释**：视频中提到，一位 AI 设计师独自一人、用一天时间，借助 AI 工具完成了传统上需要多人团队数周才能完成的同等质量内容。\n\n**实际应用场景**：独立开发者可以用 AI 生成概念视频，向投资人展示项目愿景，或在社交媒体上验证市场反应，大幅降低试错成本。\n\n---\n\n#### 概念三：提示词（Prompt）作为核心竞争力\n\n**是什么**：用户向 AI 工具输入的文字指令，决定 AI 生成内容的质量、风格和精准度。\n\n**为什么重要**：视频明确指出，未来游戏开发的竞争逻辑将从\"资金和人力\"转向\"创意和提示词\"，提示词能力直接决定 AI 工具的输出上限。\n\n**详细解释**：\n- 同样的 AI 工具，不同的提示词会产生天壤之别的结果\n- 提示词能力 = 创意表达能力 + 对 AI 工具特性的理解\n- 这意味着个人的审美、想象力和表达能力将成为新时代的生产力\n\n**实际应用场景**：独立开发者通过精心设计提示词，引导 GPT Image 2 生成符合游戏世界观的概念美术，替代传统外包原画师的工作。","table":"| 对比维度 | 传统游戏制作路径 | AI 辅助制作路径 |\n|---|---|---|\n| **所需人员** | 3D 艺术家 + 程序员等多人团队 | 1 名 AI 设计师即可 |\n| **制作周期** | 数周至数月 | 1 天 |\n| **核心资源** | 资金、硬件（渲染农场）、人力 | 创意 + 提示词能力 |\n| **门槛高低** | 高（大公司才能负担） | 低（个人/小团队可参与） |\n| **代表工具** | 渲染农场、专业 3D 软件 | GPT Image 2、Claude 2.0 |\n| **竞争优势来源** | 规模和预算 | 创意和提示词质量 |","thinking":"1. **视觉门槛降低之后，游戏的核心竞争力会转移到哪里？** 当所有人都能用 AI 做出好看的概念视频，\"好看\"本身还是优势吗？玩法设计、叙事深度、情感共鸣会不会成为新的稀缺资源？\n\n2. **提示词能力可以被系统性学习和训练吗？** 如果可以，它会不会形成新的专业分工，出现专门的\"AI 提示词设计师\"职业，从而在另一个层面重建门槛？\n\n3. **大型游戏公司会如何应对这一变化？** 他们的优势（IP、渠道、发行资源）是否足以抵消 AI 带来的规模优势消失？还是说他们会更快地拥抱 AI 工具，进一步拉大与小团队的差距？","remember":"过去做游戏拼的是钱和人，现在拼的是创意和提示词——AI 让每个有好想法的人都站上了同一条起跑线。","is_new":true},{"id":"7633122652282334803","title":"别只用AI聊天，要让事情落盘","cat":"vibecoding","video_url":"https://www.douyin.com/video/7633122652282334803","audience":"已经开始使用AI工具、但感觉效果不明显、停留在对话框聊天阶段的普通用户","summary":"大多数人用AI只是在\"聊天替换\"，真正会用的人会把AI的输出变成可落盘、可复用、可交接的东西，从而实现流程自动化和注意力节省。","raw_preview":"我突然意识到一件事，很多人把AI用得很忙，但结果不明显，往往不是模型不行，是路径选错了。这期就讲一个对照——真正会用的人用法，跟你哪里不一样。你听完可以只回答自己一个问题：我更像在聊天，还是在把事做成能带走的东西？\n\n先把这件事说透，后面才好解。所谓对话框逻辑，就是你在窗口里要图、要稿、要分析，它很顺手，但常常停在单点替换——换一张、换一段、换一版。问题不在它聪不聪明，而在于你有没有进交付格式、口","knowledge_map":"别只用AI聊天\n├── 1. 问题诊断：你在哪个层级？\n│   ├── 低效用法：对话框单点替换（换图/换段/换版）\n│   └── 高效用法：命令与文件，输出可落盘\n│\n├── 2. 对话框的机制误区\n│   ├── 聊得久 ≠ 模型变强\n│   ├── 上下文越长，输出越容易糊\n│   └── 建议：砍掉无效堆料，精简对话\n│\n├── 3. 核心升级：从聊天切到交付\n│   ├── 关键问题：这件事该不该\"落盘\"？\n│   ├── 落盘标准：可跑 · 能复用 · 能交接\n│   └── 最小示例：一句口令生成一批文件夹\n│\n├── 4. 自动化判断标准\n│   ├── 动作越重复，越值得自动化\n│   ├── 前提：流程先想清楚\n│   └── 翻车点：结构不稳时不要整个交给机器\n│\n├── 5. 对话即资产：沉淀你的上下文\n│   ├── 写好\"我是谁/写作风格\"→减少重复自我介绍\n│   ├── 口径文件化→换模型不用从头讲\n│   └── 核心：可复用 · 可叠加\n│\n└── 6. 减法内容链（以做内容为例）\n    └── 选题 → 抓素材 → 封轨 → 转写 → 入库\n        先搭骨架，再抠细节","concepts":"#### 概念一：对话框逻辑 vs 交付逻辑\n\n**是什么**：两种截然不同的AI使用姿态——前者停留在窗口内单点替换，后者把输出变成可带走、可运行的成果。\n\n**为什么重要**：\n大多数人感觉\"用了AI但没什么用\"，根本原因不是模型不行，而是一直停在\"聊天替换\"层，没有进入\"交付\"层。\n\n**详细解释**：\n\n| 维度 | 对话框逻辑（低效） | 交付逻辑（高效） |\n|------|-------------------|-----------------|\n| 典型动作 | 换一张图、换一段话、换一版方案 | 输出脚本、文件、可运行流程 |\n| 结果形态 | 停在窗口里，用完即走 | 落盘、可复跑、能交接 |\n| 核心问题 | 有没有进交付格式、口径、边界 | 流程是否稳定、结构是否清晰 |\n| 比喻 | 热了一下，没变成能带走的菜 | 做好了一道菜，打包带走 |\n\n**实际应用场景**：\n- 用AI生成文件夹结构脚本，一句口令批量创建，而不是每次手动问它\"帮我想想怎么分类\"\n- 把常用工作流写成固定脚本，能反复跑，而不是每次重新描述需求\n\n---\n\n#### 概念二：上下文越长，输出越容易糊\n\n**是什么**：AI每次对话都要重新读取整段上下文，对话越长，模型注意力越分散，输出质量越容易下降。\n\n**为什么重要**：\n很多人误以为\"跟AI聊得越久，它越了解我、越聪明\"，实际上机制上并非如此，反而会带来质量损耗。\n\n**详细解释**：\n- AI不会因为聊得久而在训练层面变强，每次对话更像\"把整包力气拿出来重读一遍\"\n- 上下文堆得越长，无效信息越多，模型越容易在关键处输出模糊结果\n- 解法：定期砍掉无效堆料，保持对话精简，或者把关键信息沉淀成文件而非靠聊天记录\n\n**实际应用场景**：\n- 不要在一个超长对话里反复追加需求，关键信息另存为文档，新对话直接粘贴核心口径\n\n---\n\n#### 概念三：对话即资产——沉淀你的上下文\n\n**是什么**：把你和AI说过的关键信息（身份、风格、口径）整理成可复用的文件，作为每次对话的\"配置文件\"。\n\n**为什么重要**：\n每次换模型或开新对话，如果没有沉淀，就要从头自我介绍，浪费时间；沉淀成文件后，改的是文件，像改配置一样高效。\n\n**详细解释**：\n\n| 沉淀内容 | 作用 | 使用方式 |\n|---------|------|---------|\n| 我是谁（背景/身份） | 减少重复自我介绍 | 每次对话开头粘贴 |\n| 写作风格/口径 | 保持输出风格一致 | 作为系统提示或首条消息 |\n| 常用流程脚本 | 可反复跑，省注意力 | 固定后直接调用 |\n\n**实际应用场景**：\n- 写一份\"我的写作风格说明\"文档，每次让AI帮写内容时直接附上，不用每次重新解释\n\n---\n\n#### 概念四：自动化的判断标准——动作越重复，越值得自动化\n\n**是什么**：判断一件事是否值得交给机器自动化的核心标准：重复频率高 + 流程已想清楚。\n\n**为什么重要**：\n很多人翻车，是在流程还没想清楚时就整个交给机器，导致结构不稳、结果混乱。\n\n**详细解释**：\n- ✅ 值得自动化：动作高度重复、流程稳定清晰、结构已经验证过\n- ❌ 不适合自动化：还在探索想法、流程不稳定、结构未经验证\n- 节省的层级：一分钟省的是时间 → 一个想法省的是弯路 → 一整天省的是结构\n\n**实际应用场景**：\n- 做内容的流程链：选题 → 抓素材 → 封轨 → 转写 → 入库。先把这条链跑通、跑稳，再考虑哪些环节交给机器","table":"| 对比维度 | 低效用法 | 高效用法 |\n|---------|---------|---------|\n| **使用姿态** | 聊天替换 | 命令与文件 |\n| **输出形态** | 停在窗口，用完即走 | 落盘、可跑、能交接 |\n| **上下文管理** | 越聊越长，堆料不剪 | 精简对话，关键信息文件化 |\n| **身份/口径** | 每次重新介绍 | 沉淀成文档，像改配置 |\n| **自动化时机** | 流程没想清楚就交给机器 | 流程稳定后再自动化 |\n| **核心问题意识** | 我在聊天 | 这件事该不该落盘？ |\n| **省的是什么** | 无明显节省 | 注意力 · 弯路 · 结构 |","thinking":"1. **\"落盘\"的边界在哪里？** 并不是所有AI对话都需要变成文件或脚本，那么你怎么判断一件事值得落盘、哪些事聊完就算？有没有一套自己的筛选标准？\n\n2. **流程稳定是自动化的前提——但流程怎么才算\"稳定\"？** 视频提到结构不稳时不要整个交给机器，那在实际工作中，你如何知道一个流程已经稳定到可以自动化，而不是还在变动期？\n\n3. **\"对话即资产\"的沉淀成本和维护成本是什么？** 把口径、风格、身份都写成文档听起来很好，但文档本身也需要更新和维护。当你的工作方向或风格发生变化时，这套\"配置文件\"会不会反过来成为束缚？","remember":"用AI聊天是热了一下，让输出落盘、可跑、能复用，才是真的把事做成了。","is_new":true},{"id":"7633447835778003579","title":"AI产品经理的Vibe Coding能力要求","cat":"vibecoding","video_url":"https://www.douyin.com/video/7633447835778003579","audience":"想转型或提升竞争力、需要了解Vibe Coding能力要求的AI产品经理","summary":"AI产品经理不需要变成程序员，但必须具备用AI快速将产品想法变成可验证原型的Vibe Coding能力，本视频系统拆解了这一能力的本质、必要性和具体层级要求。","raw_preview":"很多AI产品经理面试都会被问到Vibe Coding能力，那么作为AI产品经理，我们的Vibe Coding能力到底要达到一个什么样的程度呢？今天我就来详细地展开跟大家讲一下。\n\n首先我们要知道，我们作为AI产品经理，并不是需要去成为一个程序员，而是要把我们的想法快速变成可以验证的产品。所以我们更重要的不是说去替代研发，而是借助AI去完成我们从需求承接、原型实现，到跑通流程，到具体一些单独验证。所","knowledge_map":"AI产品经理的Vibe Coding能力\n│\n├── 1. 是什么（正确认知）\n│   ├── 不是：瞎写代码 / 替代研发 / 建立开发意识\n│   └── 是：借助AI把产品想法快速推进到可验证状态\n│       ├── 知道功能为什么要做\n│       ├── 设计具体流程\n│       └── 定义验证方式\n│\n├── 2. 为什么需要\n│   ├── 研发节奏已变化\n│   ├── 早期AI产品核心问题不是PRD完整性\n│   │   ├── 想法能不能用？\n│   │   ├── 用户能不能用？\n│   │   └── 模型调用靠不靠谱？\n│   └── 文档层面无法快速验证 → 团队需要会Vibe Coding的PM\n│\n└── 3. 要达到什么程度（四个层级）\n    ├── 第一层：用AI做出可交互原型\n    │   └── 具备基础交互设计能力，前后端内容展现，完整产品逻辑\n    ├── 第二层：理解前后端基本逻辑\n    │   └── 观察接口、数据传递、状态变化，挖掘核心交互逻辑\n    ├── 第三层：用AI快速搭建小demo\n    │   ├── 跑通核心主链路（输入→模型处理→输出）\n    │   └── 设计异常case和兜底策略\n    └── 第四层：用工程化思维管理AI coding\n        ├── 问题：越写越乱（代码乱、交互乱）\n        └── 原则：AI驱动开发，而非AI完全代替开发","concepts":"#### 概念一：Vibe Coding（对AI产品经理而言）\n\n**是什么**：AI产品经理借助AI工具，将产品想法快速转化为可交互、可验证原型的工作方式，而非自己手写代码。\n\n**为什么重要**：\n面试中越来越多被考察；团队评估AI产品经理的核心标准之一正在从\"PRD写得好不好\"转向\"能不能快速出可验证的东西\"。\n\n**详细解释**：\n\n| 常见误解 | 正确理解 |\n|---|---|\n| Vibe Coding = 学会写代码 | Vibe Coding = 用AI驱动产品验证 |\n| 目标是替代研发 | 目标是加速从想法到验证的过程 |\n| 只要会用工具就够了 | 核心是懂功能逻辑、流程设计和验证标准 |\n| PRD写完整就是交付 | 想法能否跑通才是早期最大问题 |\n\n**实际应用场景**：\n早期AI产品立项阶段，不等研发排期，产品经理自己用AI快速搭出一个能跑通主流程的demo，拿去和用户验证或和团队讨论。\n\n---\n\n#### 概念二：可验证原型 vs 传统PRD交付\n\n**是什么**：可验证原型是指能够实际运行、让用户或团队操作体验的产品雏形；传统PRD交付是以文档、原型图为核心的交付方式。\n\n**为什么重要**：\nAI产品早期最大的不确定性不是需求写没写清楚，而是\"这个想法到底能不能用、模型调用靠不靠谱\"，文档无法回答这些问题，只有跑起来才能验证。\n\n**详细解释**：\n\n| 维度 | 传统PRD交付 | 可验证原型 |\n|---|---|---|\n| 核心产物 | 文档、原型图 | 可运行的demo |\n| 验证方式 | 评审会讨论 | 实际操作体验 |\n| 验证速度 | 慢，依赖研发排期 | 快，PM自己用AI搭建 |\n| 能回答的问题 | 需求是否完整 | 想法是否可行、用户能否使用 |\n| 适用阶段 | 需求明确后 | 早期探索阶段 |\n\n**实际应用场景**：\n产品经理有一个AI功能新想法，不写PRD，而是直接用Cursor等工具让AI搭出一个能跑的小demo，当天拿给用户试用，第二天拿到反馈再迭代。\n\n---\n\n#### 概念三：主链路优先原则\n\n**是什么**：在用AI搭建demo时，优先保证核心主链路跑通（用户输入→模型处理→结果输出），而非追求功能完整或生产级别的质量。\n\n**为什么重要**：\ndemo不需要达到生产级别，但必须能跑通核心流程，否则无法完成有效验证；过早追求完整会浪费时间且容易让代码陷入混乱。\n\n**详细解释**：\n\n主链路的基本结构：\n```\n用户输入 → 模型处理 → 结果输出\n    ↓\n跑通后再考虑：\n- 异常case处理\n- 兜底策略设计\n- 边界情况覆盖\n```\n\n**实际应用场景**：\n做一个AI写作助手的demo，先只做\"用户输入文本→调用模型→返回改写结果\"这条主链路，跑通后再考虑输入为空、网络超时、模型返回异常等情况的处理。\n\n---\n\n#### 概念四：工程化思维管理AI Coding\n\n**是什么**：在用AI写代码的过程中，由人来主导整体架构和开发节奏，AI负责执行具体实现，而不是把所有事情都甩给AI随意生成。\n\n**为什么重要**：\n视频明确指出，用AI写代码\"一开始特别爽，但后面全部都乱了\"是最常见的问题——代码乱、交互乱。工程化思维是避免这个问题的关键。\n\n**详细解释**：\n\n| 做法 | 结果 |\n|---|---|\n| 完全让AI代替开发，随意生成 | 代码越来越乱，交互混乱，难以维护 |\n| 由AI驱动开发，人来管理节奏和结构 | 代码可控，能持续迭代 |\n\n核心原则：**AI驱动开发 ≠ AI完全代替开发**\n\n**实际应用场景**：\n每次让AI写一个模块前，先明确这个模块的输入输出和边界，写完后做检查再进行下一个，而不是一次性让AI把整个项目都生成出来。","table":"| 维度 | 内容 |\n|---|---|\n| **Vibe Coding的本质** | 借助AI把产品想法快速推进到可验证状态 |\n| **不是什么** | 瞎写代码、替代研发、只会用工具 |\n| **为什么需要** | AI时代早期产品验证比PRD完整性更重要 |\n| **第一层能力** | 用AI做出可交互原型（含真实前后端逻辑） |\n| **第二层能力** | 理解前后端基本逻辑（接口、数据、状态） |\n| **第三层能力** | 用AI快速搭建能跑通核心主链路的小demo |\n| **第四层能力** | 用工程化思维管理AI coding，避免代码混乱 |\n| **demo的标准** | 不需要生产级别，但必须跑通核心流程 |\n| **最大风险** | 完全依赖AI生成 → 代码乱、交互乱 |\n| **核心原则** | AI驱动开发，而非AI完全代替开发 |","thinking":"1. **能力边界在哪里？** 视频提到AI产品经理不需要成为程序员，但又需要理解前后端逻辑、接口和数据传递——这个\"理解\"的深度应该到哪里？什么情况下产品经理的Vibe Coding能力会开始和初级工程师的能力产生重叠，这个边界应该如何界定？\n\n2. **工程化思维如何落地？** 视频指出\"代码越来越乱\"是Vibe Coding最大的问题，并给出了\"由AI驱动开发而非完全代替\"的原则，但具体怎么做才算工程化管理？比如是否需要版本控制、模块拆分、文档记录？产品经理在没有工程背景的情况下如何建立这套意识？\n\n3. **验证之后呢？** Vibe Coding帮助产品经理快速做出可验证原型，但原型验证通过后，这份AI生成的代码是直接交给研发继续迭代，还是推倒重来？AI产品经理用Vibe Coding做出的demo和研发团队的正式代码之间，协作和交接的边界应该怎么划？","remember":"AI产品经理的Vibe Coding不是学写代码，而是学会用AI把想法当天跑起来——因为能跑的demo比写得再好的PRD更能回答\"这个产品到底行不行\"。","is_new":true},{"id":"7633670001509223802","title":"AI生成可编辑可交互UI设计稿工作流","cat":"vibecoding","video_url":"https://www.douyin.com/video/7633670001509223802","audience":"希望用AI工具提升UI设计效率的设计师或产品经理","summary":"用GPT生图 + Figmark还原的组合工作流，可以快速产出逻辑清晰、支持编辑和交互预览的UI设计稿，并顺带生成视觉规范和宣传海报。","raw_preview":"如何用AI制作可交互预览并且可支持编辑的UI设计稿？这套工作流可以快速搞定，顺手还出了设计规范与宣传海报，下面带大家实操一下。\n\n打开GPT，让它做一套APP设计，介绍产品的核心信息，就可以让它生图了。看了下跑出的这套UI，逻辑和审美都不错，基本都满足要求了。\n\n然后打开Figmark，导入刚刚GPT做好的UI，提示让它还原设计稿，选择Gemini 3跑出来的页面，还原性还是很高的，而且支持交互预","knowledge_map":"AI生成可编辑UI设计稿工作流\n├── 第一步：GPT生成UI图\n│   ├── 输入：产品核心信息描述\n│   └── 输出：逻辑和审美达标的UI界面图\n│\n├── 第二步：Figmark还原设计稿\n│   ├── 导入GPT生成的UI图\n│   ├── 选择模型：Gemini 3\n│   ├── 输出：高还原度、可交互预览的设计稿\n│   └── 拷贝粘贴到Figmark设计面板 → 可编辑（非静态图）\n│\n├── 第三步：GPT生成视觉规范\n│   ├── 输入：设计稿\n│   └── 输出：可视化视觉规范（用于查漏补缺）\n│\n├── 第四步：GPT生成宣传海报\n│   ├── 输入：设计建议 + 尺寸 + 参考图\n│   ├── 问题：初版信息太多太杂\n│   └── 优化：给参考图 + 缩减文案 → 改善版本\n│\n└── 第五步：GPT生成PSD分层文件（待优化）\n    └── 当前问题：文字/背景/元素未单独分层，分层不够准确","concepts":"#### 概念一：GPT生成UI图\n\n**是什么**：直接向GPT描述产品核心信息，让其生成APP界面设计图。\n\n**为什么重要**：跳过手动绘制草图的环节，快速获得有逻辑、有审美基础的UI参考图，作为后续还原的素材。\n\n**详细解释**：\n- 输入内容：产品介绍、核心功能说明等文字描述\n- 输出内容：一套UI界面图，逻辑与审美基本满足要求\n- 定位：作为\"原材料\"传入Figmark进行下一步处理\n\n**实际应用场景**：产品早期概念验证阶段，快速出一版UI方向供团队讨论。\n\n---\n\n#### 概念二：Figmark + Gemini 3 还原设计稿\n\n**是什么**：Figmark是一个AI设计工具，可以将UI图还原成可编辑、可交互的设计稿；视频中选用Gemini 3作为还原模型。\n\n**为什么重要**：解决了\"AI生成图是静态图片、无法编辑\"的核心痛点，让AI输出真正进入设计工作流。\n\n**详细解释**：\n\n| 对比维度 | 传统AI生图 | Figmark还原后 |\n|---|---|---|\n| 文件类型 | 静态图片 | 可编辑设计文件 |\n| 分层质量 | 无分层 | 分层清晰 |\n| 文字可编辑 | ❌ | ✅ |\n| 图形可编辑 | ❌ | ✅ |\n| 交互预览 | ❌ | ✅ |\n| 功能扩展 | 需重新生图 | 一句话添加功能 |\n\n**实际应用场景**：将还原好的设计稿拷贝粘贴到Figmark设计面板，直接进行二次编辑和细节调整。\n\n---\n\n#### 概念三：GPT生成视觉规范\n\n**是什么**：将设计稿传给GPT，让其自动归纳整理出一份可视化视觉规范文档。\n\n**为什么重要**：视觉规范是设计交付的重要组成部分，手动整理耗时；GPT可以快速完成并覆盖较全面的内容，设计师只需对照查漏补缺。\n\n**详细解释**：\n- 输入：已完成的设计稿\n- 输出：涵盖颜色、字体、间距等的可视化规范\n- 使用方式：作为参考底稿，人工校对补充，而非直接交付\n\n**实际应用场景**：设计稿完成后，快速生成规范文档，提升与开发团队的协作效率。\n\n---\n\n#### 概念四：GPT生成宣传海报（含迭代优化）\n\n**是什么**：在设计稿基础上，让GPT根据尺寸和设计建议生成应用宣传海报，并通过给参考图、缩减文案进行多轮优化。\n\n**为什么重要**：展示了AI生成内容的典型问题（初版信息过载）和对应的优化策略（参考图引导 + 文案精简）。\n\n**详细解释**：\n- 第一版问题：海报信息太多太杂，视觉混乱\n- 优化方法：\n  1. 提供一张参考图作为风格锚点\n  2. 明确要求缩减文案信息\n- 优化结果：第二版视觉舒适度明显提升\n\n**实际应用场景**：应用上线前快速产出宣传物料，通过参考图+精准指令控制AI输出质量。","table":"| 工作流步骤 | 使用工具 | 输入 | 输出 | 注意事项 |\n|---|---|---|---|---|\n| 生成UI图 | GPT | 产品核心信息描述 | UI界面图 | 检查逻辑与审美是否达标 |\n| 还原设计稿 | Figmark + Gemini 3 | GPT生成的UI图 | 可编辑+可交互设计稿 | 拷贝粘贴到设计面板后可直接编辑 |\n| 生成视觉规范 | GPT | 设计稿 | 可视化视觉规范文档 | 用于查漏补缺，需人工校对 |\n| 生成宣传海报 | GPT | 设计建议+尺寸+参考图 | 宣传海报 | 初版易信息过载，需提供参考图+缩减文案 |\n| 生成PSD分层文件 | GPT | 设计稿 | PSD文件（待优化） | 当前分层不准确，文字/背景/元素未分离 |","thinking":"1. **Figmark的还原精度上限在哪里？** 视频中还原性\"很高\"，但复杂动效、品牌细节字体等场景下，AI还原是否还能满足交付标准？边界在哪里？\n\n2. **PSD分层问题如何破解？** 视频末尾提到GPT生成的PSD分层不够准确，文字、背景、元素未能单独区分——有没有更好的提示词策略或其他工具可以改善这个问题？\n\n3. **这套工作流适合替代设计师，还是辅助设计师？** 全流程AI直出的设计稿在品牌一致性、用户体验细节上与专业设计师的产出差距有多大？什么阶段用、什么阶段不用，边界怎么划？","remember":"GPT负责生图、Figmark负责还原，AI设计稿终于可以编辑和交互了——这套工作流让AI真正接入了设计下游。","is_new":true},{"id":"7634602899561123098","title":"用 Codex 一下午开发卡牌游戏","cat":"vibecoding","video_url":"https://www.douyin.com/video/7634602899561123098","audience":"对 AI 辅助游戏开发感兴趣、想了解 Codex 实际能力边界的开发者或独立游戏爱好者","summary":"作者用 OpenAI Codex 仅花一个下午，借助 AI 生成代码和素材，独立开发出一款功能完整的《杀戮尖塔》类卡牌 Roguelike 游戏，展示了 AI 辅助开发在复杂项目中的真实落地能力。","raw_preview":"介绍一下我用 Codex 一个下午开发的这个游戏。这是一个类似《杀戮尖塔》的游戏，我本来想试一下能不能借助 Codex 它内置的这个图片生成能力去解决游戏素材生成的随才问题，顺便看一下它能在我介入不多的情况下做一个游戏。没想到它一个下午给我整出来一个非常完整的游戏。\n\n这是一个有着完整大地图的类似《杀戮尖塔》的卡牌 Roguelike 游戏。我们开始演示，可以看到它会选择分岔路，这里边几乎所有的素","knowledge_map":"用 Codex 开发卡牌游戏\n├── 开发工具\n│   ├── Codex（核心开发 + 代码生成）\n│   ├── GPT Image（游戏素材图片生成）\n│   └── Claude 3.0（结算动画制作）\n├── 游戏功能完整度\n│   ├── 大地图系统（分岔路选择）\n│   ├── 战斗系统（卡牌对战 + 动画 + 音效）\n│   ├── Boss 系统（多 Boss + 专属动画）\n│   ├── 奖励系统（战斗后选择卡牌）\n│   ├── 首页动画\n│   └── 图标生成\n├── 素材来源\n│   ├── AI 生成（主要：Codex 调用 GPT Image）\n│   └── 人工筛选（少量：作者自找后放入文件夹）\n└── 项目结果\n    ├── 游戏名称：《夜巡》\n    └── 已开源","concepts":"#### 概念一：Codex 辅助游戏开发\n\n**是什么**：Codex 是 OpenAI 推出的 AI 编程工具，能够根据自然语言描述自动生成代码，并在本视频中承担了游戏主体逻辑的开发工作。\n\n**为什么重要**：它把\"一个人一个下午做出完整游戏\"变成了现实，大幅压缩了独立开发的时间和人力门槛。\n\n**详细解释**：\n- Codex 不只是写代码，它还能主动调用外部模型（如 GPT Image）来解决素材问题\n- 它能自行处理图片细节，例如裁剪、适配等，不需要开发者逐一干预\n- 开发者的介入程度很低，主要工作是提需求和少量素材筛选\n\n**实际应用场景**：独立开发者想快速验证一个游戏 Demo，或者想在没有美术资源的情况下先把玩法跑通。\n\n---\n\n#### 概念二：AI 生成游戏素材（GPT Image 集成）\n\n**是什么**：Codex 在开发过程中自动调用 GPT Image 图像生成模型，为游戏生成所需的视觉素材，包括角色、怪物、图标等。\n\n**为什么重要**：游戏开发中素材成本极高，AI 生成素材可以让没有美术团队的开发者也能做出视觉完整的游戏。\n\n**详细解释**：\n- 几乎所有素材均由 AI 生成，无外购资源\n- Codex 会自动处理生成图片的适配问题（如尺寸、裁剪）\n- 开发者只需将少量自选素材放入文件夹，Codex 会自行筛选调用\n\n**实际应用场景**：快速原型开发、独立游戏 Jam、Demo 展示场景下替代美术外包。\n\n---\n\n#### 概念三：多模型协作开发\n\n**是什么**：本项目并非只用一个 AI 工具，而是组合使用了 Codex、GPT Image 和 Claude 3.0 三个模型，各司其职。\n\n**为什么重要**：单一 AI 工具有能力边界，组合使用可以让每个环节都用最合适的工具，整体输出质量更高。\n\n**详细解释**：\n\n| 工具 | 负责环节 |\n|------|----------|\n| Codex | 游戏逻辑代码、整体架构、素材调用与处理 |\n| GPT Image | 游戏内所有 AI 生成图片素材 |\n| Claude 3.0 | 战斗结算动画制作 |\n\n**实际应用场景**：复杂 AI 项目开发中，根据各模型特长进行任务分配，而不是强求一个模型包揽所有工作。","table":"| 维度 | 详情 |\n|------|------|\n| 开发时长 | 一个下午 |\n| 主要工具 | Codex + GPT Image + Claude 3.0 |\n| 游戏类型 | 卡牌 Roguelike（类《杀戮尖塔》） |\n| 游戏名称 | 《夜巡》 |\n| 素材来源 | 主要 AI 生成，少量人工筛选 |\n| 完整功能 | 大地图、分岔路、战斗、卡牌奖励、Boss、动画、音效、音乐、首页动画 |\n| 开发者介入程度 | 低（主要提需求 + 少量素材筛选） |\n| 是否开源 | 是 |","thinking":"1. **Codex 在这个项目里的真实边界在哪里？** 视频展示的是最终成果，但开发过程中作者究竟介入了多少次、修了多少 Bug？\"介入不多\"的背后是否仍有大量隐性调试成本？\n\n2. **AI 生成素材的版权和商业化问题如何处理？** 这款游戏已经开源，但如果要商业发行，GPT Image 生成的素材是否存在版权风险？这是 AI 游戏开发绕不开的现实问题。\n\n3. **多模型协作的\"胶水层\"由谁来写？** Codex、GPT Image、Claude 3.0 三个工具之间的调用逻辑是 Codex 自己生成的，还是开发者手动搭建的？这个协调层的复杂度决定了这套方法能否被普通人复现。","remember":"AI 已经不只是写代码的助手——它可以同时是你的程序员、美术和动画师，一个下午交付一款完整游戏。","is_new":true},{"id":"7635486737292217635","title":"OpenAI Codex 宠物模式爆火全网","cat":"vibecoding","video_url":"https://www.douyin.com/video/7635486737292217635","audience":"对 AI 新功能和开发者文化感兴趣的科技爱好者或程序员","summary":"OpenAI Codex 上线\"宠物模式\"后，程序员掀起 AI 数字宠物养成热潮，两个聚合展示平台在一天内吸引 200 万人围观，展示了 AI 智能体的全新玩法。","raw_preview":"不到一天，200万人围观。这两个网站收集了全球程序员养的各种 Codex 宠物。OpenAI 昨天上线宠物模式后，程序员本来就封不住的各种抽象整活，写代码都卷进来了。\n\n首先这个叫 Pedex 的网站，简直就是 Codex 版宝可梦。这里聚集了程序员养的各类数字宠物，从可爱萌物到脑洞大开的奇怪物种全都有。宠物还分不同种类和个性，自带属性、技能和完整训练日志，你可以一路围观它的成长记录，看看别人家的","knowledge_map":"Codex 宠物模式爆火事件\n├── 起因\n│   └── OpenAI Codex 上线宠物模式\n│       └── 程序员大量创作 AI 数字宠物\n│\n├── 两大聚合平台\n│   ├── Pedex\n│   │   ├── 定位：Codex 版宝可梦\n│   │   ├── 内容：各类数字宠物展示\n│   │   └── 特色：属性 / 技能 / 训练日志 / 成长记录\n│   │\n│   └── Codex Patcher\n│       ├── 定位：程序员宠物秀圈\n│       ├── 内容：AI 萌宠 & 整活作品\n│       └── 特色：电子小狗 / 赛博数字生命\n│\n└── 核心本质\n    └── 每只宠物 = 会思考 + 能互动 + 可训练的小智能体","concepts":"#### 概念一：Codex 宠物模式\n\n**是什么**：OpenAI 在 Codex 中推出的一种新功能模式，允许用户用代码\"养成\"具有个性和属性的 AI 数字宠物。\n\n**为什么重要**：\n它把严肃的编程工具变成了一种创意娱乐场景，让更多人以\"玩\"的方式接触 AI 智能体开发。\n\n**详细解释**：\n宠物模式下，程序员可以为自己的 AI 宠物设定种类、个性、属性和技能，并记录完整的训练过程。这本质上是用游戏化方式包装了智能体（Agent）的创建与调教流程。\n\n**实际应用场景**：\n程序员用 Codex 编写代码，创造出各种风格的数字宠物——从可爱萌物到脑洞奇异的抽象物种，再到\"赛博数字生命\"。\n\n---\n\n#### 概念二：Pedex 平台\n\n**是什么**：一个专门收集和展示程序员所养 Codex 数字宠物的聚合网站，被称为\"Codex 版宝可梦\"。\n\n**为什么重要**：\n它是这波热潮的内容沉淀地，让围观者可以系统地浏览和追踪别人家宠物的成长轨迹。\n\n**详细解释**：\n\n| 特性 | 说明 |\n|------|------|\n| 宠物种类 | 多样，从可爱萌物到奇异物种 |\n| 宠物属性 | 自带种类、个性、技能 |\n| 训练日志 | 完整记录，可追踪成长过程 |\n| 核心玩法 | 围观 + 对比不同宠物的养成路径 |\n\n**实际应用场景**：\n普通用户可以在 Pedex 上像刷宝可梦图鉴一样，浏览全球程序员养出的各种数字宠物。\n\n---\n\n#### 概念三：Codex Patcher 平台\n\n**是什么**：一个面向全球开发者的 AI 宠物展示与交流社区，定位更偏向\"秀场\"和创作分享。\n\n**为什么重要**：\n它聚焦于创作者视角，展示的不只是宠物本身，还有开发者的整活思路和作品风格。\n\n**详细解释**：\n与 Pedex 的\"图鉴\"风格不同，Codex Patcher 更像一个开发者社群，大家在此晒出自己最有创意的 AI 宠物作品，包括：\n- **智育系电子小狗**：偏向学习与互动能力\n- **赛博数字生命**：更抽象、更具实验性的智能体形态\n\n**实际应用场景**：\n开发者在这里发布自己的宠物作品，获取社区反馈，同时也可以围观和学习他人的创作思路。\n\n---\n\n#### 概念四：AI 小智能体（Agent）\n\n**是什么**：视频中每只宠物的本质——一个能够思考、互动并接受训练的小型 AI 智能体。\n\n**为什么重要**：\n\"宠物\"只是外壳，内核是 AI Agent 技术。这波热潮本质上是 Agent 开发的大众化和游戏化。\n\n**详细解释**：\n\n| 能力维度 | 表现 |\n|----------|------|\n| 会思考 | 具备一定推理或决策能力 |\n| 能互动 | 可以与用户产生对话或行为响应 |\n| 可训练 | 通过训练日志持续迭代成长 |\n\n**实际应用场景**：\n程序员通过 Codex 编写逻辑，赋予宠物不同的\"智力\"和\"个性\"，本质上是在用娱乐化方式实践 AI Agent 开发。","table":"| 对比维度 | Pedex | Codex Patcher |\n|----------|-------|---------------|\n| 定位 | Codex 版宝可梦 / 图鉴 | 程序员宠物秀圈 / 社群 |\n| 核心内容 | 数字宠物展示 + 成长记录 | AI 萌宠作品 + 整活创作 |\n| 亮点功能 | 属性、技能、训练日志 | 电子小狗、赛博数字生命 |\n| 用户视角 | 围观者 / 收藏者 | 创作者 / 分享者 |\n| 风格类比 | 宝可梦图鉴 | 开发者作品集 |","thinking":"1. **宠物模式的边界在哪里？** Codex 宠物本质是 AI 小智能体，当\"养宠物\"变得足够复杂，它和正经的 AI Agent 开发之间的界限会消失吗？\n\n2. **游戏化能加速 AI 普及吗？** 这波热潮让大量非专业用户开始接触 AI 智能体概念，\"玩\"是否会成为 AI 技术教育最有效的入口？\n\n3. **数字宠物的价值归属问题** 程序员用 Codex 养出的宠物，训练数据和智能体本身的所有权归谁？平台、用户还是 OpenAI？","remember":"OpenAI 把写代码变成了养宠物，程序员的整活能力，正在重新定义 AI 智能体该长什么样。","is_new":true},{"id":"7635624955124561774","title":"衣柜空间利用的简易抽屉框收纳法","cat":"vibecoding","video_url":"https://www.douyin.com/video/7635624955124561774","audience":"想提升家居收纳效率、充分利用柜子零碎空间的普通家庭用户。","summary":"用五块钱一个的挂钩框，通过改变挂钩安装位置，把它变成简易抽屉，挂在衣柜、浴室柜、厨房台面、药品柜等各种柜子内侧，低成本盘活家里的零碎空间。","raw_preview":"我发现了一个超绝的收纳袜子的方法，可以很好地把衣柜下面的空间利用起来。你就买五块钱一个的这种框，它会附送两个挂钩，但是不要把它贴在篮子的两端，把其中一个贴在比较靠近中间的部分，这样子就可以做成一个简易的抽屉框。\n\n浴室柜下面也用同样的方法装着这个小框子，放打扫浴室用的小刷子，还有用的洗脸精，小小一个不占地方，而且还通风透气。\n\n装在厨房台面的内侧，葱姜蒜也有地方放了。\n\n还有这个放药品的柜子，我也","knowledge_map":"简易抽屉框收纳法\n├── 核心改造思路\n│   ├── 材料：五块钱挂钩框（附送两个挂钩）\n│   └── 关键操作：挂钩不贴两端 → 贴靠近中间位置\n│               → 形成抽屉式悬挂效果\n│\n└── 适用场景\n    ├── 衣柜下方 → 收纳袜子\n    ├── 浴室柜下方 → 放小刷子、洗脸精\n    ├── 厨房台面内侧 → 放葱姜蒜\n    └── 药品柜内侧 → 放药品，拿取更顺手","concepts":"#### 概念一：挂钩位置改变使用方式\n\n**是什么**：同一个挂钩框，因为挂钩安装位置不同，使用效果完全不同。\n\n**为什么重要**：\n产品默认的挂法（挂钩贴两端）会让框紧贴柜壁，取放不便；改变挂钩位置后，框可以像抽屉一样向外拉出，更顺手。\n\n**详细解释**：\n- 默认方式：两个挂钩分别贴在框的两端 → 框固定贴壁，开口朝外\n- 改造方式：其中一个挂钩贴在靠近中间的位置 → 框形成一定倾斜/悬挂角度，拿取时更像拉抽屉\n\n**实际应用场景**：\n衣柜内侧挂袜子框，不用弯腰翻找，直接拉出即可拿取。\n\n---\n\n#### 概念二：柜子\"死角空间\"的再利用\n\n**是什么**：柜子内侧壁面、柜门内侧、台面下方等通常被忽略的垂直空间。\n\n**为什么重要**：\n这些区域往往空着浪费，用挂钩框可以零打孔、低成本地新增储物位置。\n\n**详细解释**：\n\n| 位置 | 原本状态 | 加框后用途 |\n|------|----------|------------|\n| 衣柜下方内侧 | 空置 | 收纳袜子 |\n| 浴室柜下方 | 空置 | 放小刷子、洗脸精 |\n| 厨房台面内侧 | 空置 | 放葱姜蒜 |\n| 药品柜内侧 | 物品堆叠 | 分层收纳药品 |\n\n**实际应用场景**：\n浴室柜下方空间小，普通收纳盒放不进去，挂钩框体积小、通风透气，正好适合放洗护小物。\n\n---\n\n#### 概念三：通风透气的收纳优势\n\n**是什么**：挂钩框通常是镂空网格或线框结构，四面不封闭。\n\n**为什么重要**：\n浴室、厨房湿气重，封闭收纳容易发霉；镂空框架保持空气流通，适合存放洗护品、食材等对潮湿敏感的物品。\n\n**实际应用场景**：\n浴室柜内放洗脸精、小刷子；厨房台面内侧放葱姜蒜，不容易捂坏。","table":"| 对比维度 | 传统收纳方式 | 挂钩框改造方式 |\n|----------|-------------|----------------|\n| 成本 | 定制收纳盒，价格不定 | 约5元/个 |\n| 安装难度 | 可能需要打孔 | 直接挂，无需打孔 |\n| 占用空间 | 占用柜内底部平面 | 利用垂直侧壁，不占底面 |\n| 通风性 | 封闭盒子通风差 | 镂空结构，通风透气 |\n| 拿取便利性 | 默认挂法拿取不顺手 | 改变挂钩位置后，类似抽屉，顺手 |\n| 适用场景 | 单一场景 | 衣柜、浴室柜、厨房、药品柜均适用 |","thinking":"1. **挂钩框适合挂在哪些材质的柜壁上？** 贴片式挂钩对光滑表面（如烤漆柜门）附着力强，但对粗糙或多孔表面（如木纹贴皮）可能容易脱落，实际使用时如何判断和处理？\n\n2. **如果框里放的物品较重（如药瓶、调料瓶），挂钩的承重是否足够？** 五块钱的挂钩框在承重上有没有上限，重物收纳时需要做哪些额外加固？\n\n3. **这个方法的核心逻辑是\"改变配件的安装位置来改变产品功能\"，生活中还有哪些常见物品可以用同样的思路进行二次改造？**","remember":"挂钩不贴两端贴中间，五块钱的框就变成了抽屉，衣柜、浴室、厨房、药柜的边角空间全都盘活了。","is_new":true},{"id":"7635692430432033673","title":"用 Codex 打造专属桌面宠物","cat":"vibecoding","video_url":"https://www.douyin.com/video/7635692430432033673","audience":"对 AI 编程工具感兴趣、想了解 Codex 新功能的开发者或科技爱好者","summary":"Codex 上线了可视化桌面宠物功能，能实时显示 Agent 运行状态，还能用文字描述生成专属动画宠物形象，让 AI 编程过程更直观、更有趣。","raw_preview":"最近 Codex 这边上了一个很有意思的新功能——一个桌面上的小宠物。它不是单纯卖萌，而是一个浮在桌面上的 Codex 状态小助手。你在用 Codex 跑任务的时候，它会像一个小伙伴一样待在屏幕上，告诉你现在 Codex 在干嘛——正在运行、等待你输入，还是已经准备好像你汇报。\n\n以前你可能需要不断切回 Codex 窗口看进度，现在扫一眼小宠物就知道大概状态了。它会自动悬浮在你桌面的任意位置，不妨","knowledge_map":"Codex 桌宠新功能\n├── 核心功能：状态可视化\n│   ├── 悬浮在桌面任意位置\n│   ├── 实时显示 Agent 状态\n│   │   ├── 正在运行\n│   │   ├── 等待用户输入\n│   │   └── 已完成 / 准备汇报\n│   └── 解决的问题：无需反复切换窗口查看进度\n│\n└── 扩展功能：自定义宠物生成\n    ├── 输入：用户用文字描述宠物形象\n    ├── 输出：一套动画包（含多状态动作图集）\n    └── 实现方式\n        ├── 启动多个子代理协同工作\n        └── 结合 Gemini 模型完成设计与开发","concepts":"#### 概念一：Codex 桌面宠物（Desktop Pet / 桌宠）\n\n**是什么**：一个悬浮在桌面上的可视化小组件，作为 Codex Agent 的状态指示器存在。\n\n**为什么重要**：\nAI Agent 跑任务往往是\"黑盒\"体验，用户不知道当前进展，需要频繁切换窗口确认，打断工作节奏。桌宠把这个状态\"外化\"到桌面上，降低认知负担。\n\n**详细解释**：\n\n| 状态 | 桌宠表现 | 对应含义 |\n|------|----------|----------|\n| 正在运行 | 对应动作动画 | Codex 正在执行任务 |\n| 等待输入 | 对应动作动画 | 需要用户做出决策或补充信息 |\n| 已完成 | 对应动作动画 | 任务结束，准备向用户汇报结果 |\n\n**实际应用场景**：\n用 Codex 跑一个较长的代码生成任务时，不需要盯着终端，继续做其他工作，瞥一眼桌宠就能判断是否需要介入。\n\n---\n\n#### 概念二：文字生成专属宠物形象\n\n**是什么**：用户输入一段自然语言描述，Codex 自动生成对应的宠物角色动画包，并将其作为桌宠皮肤使用。\n\n**为什么重要**：\n这不只是\"换个皮肤\"，而是把 AI 生成能力直接集成进工具本身，用户不需要借助外部设计工具，全流程在 Codex 内完成。\n\n**详细解释**：\n- 输出物不是单张图片，而是**一套动画包**，包含多个状态下的动作图集\n- 生成过程由 **多个子代理协同完成**，分工处理设计与开发环节\n- 底层模型使用了 **Gemini 最新版本**\n\n**实际应用场景**：\n视频中演示：输入\"小龙\"的描述，Codex 生成了一个龙形角色的完整动画套装，并直接作为桌宠运行。\n\n---\n\n#### 概念三：多子代理协同（Multi-Agent）\n\n**是什么**：Codex 在完成复杂任务时，会同时启动多个子代理，各自负责不同子任务，协同完成最终目标。\n\n**为什么重要**：\n单一 Agent 处理复杂任务容易出错或效率低，多代理分工可以并行处理设计、代码生成、动画合成等不同环节。\n\n**详细解释**：\n- 生成桌宠这个任务被拆解成多个子任务\n- 不同子代理分别执行（如：形象设计、动画帧生成、集成打包）\n- 结合外部模型（Gemini）补充能力\n\n**实际应用场景**：\n桌宠生成任务：从\"描述文字\"到\"可运行的动画桌宠\"，整个流程由多代理自动流转完成，用户只需提需求。","table":"| 维度 | 内容 |\n|------|------|\n| 新功能名称 | Codex 桌面宠物（状态小助手） |\n| 核心价值 | 实时可视化 Agent 运行状态，无需切换窗口 |\n| 悬浮位置 | 桌面任意位置，不遮挡操作 |\n| 可显示状态 | 运行中 / 等待输入 / 已完成 |\n| 自定义方式 | 文字描述 → 自动生成专属动画宠物 |\n| 输出形式 | 动画包（多状态动作图集） |\n| 底层技术 | 多子代理协同 + Gemini 模型 |\n| 视频演示案例 | 输入\"小龙\"→ 生成龙形桌宠动画套装 |","thinking":"1. **桌宠的状态粒度够用吗？** 视频中展示了三种状态（运行中 / 等待 / 完成），对于复杂的多步骤任务，这种粒度是否足够让用户判断是否需要介入？还需要哪些状态信息？\n\n2. **多子代理协同的边界在哪里？** 生成桌宠用了多代理 + Gemini，那么代理之间如何分工、如何传递上下文、出错时如何回退？这套机制是否对用户透明？\n\n3. **\"工具拟人化\"会带来什么影响？** 给 AI Agent 加上有情绪感的动画宠物形象，会让用户更信任、更依赖工具，还是会模糊人机边界、产生不必要的情感投射？","remember":"Codex 把 AI Agent 的运行状态变成了一只会动的桌面宠物——你描述它长什么样，它就长什么样，还能随时告诉你它在干嘛。","is_new":true},{"id":"7636652695370404793","title":"用 Obsidian 打造个人太空操作系统","cat":"vibecoding","video_url":"https://www.douyin.com/video/7636652695370404793","audience":"想用 Obsidian 做个人生活管理、对 Vibe Coding 感兴趣的效率工具爱好者","summary":"作者用 Obsidian + Vibe Coding 打造了一套以\"太空舰\"为主题的个人生活管理系统，证明效率工具可以兼顾好看与好用，从而让人真正坚持使用。","raw_preview":"我 Vibe Coding 了一个自己的 Space OS。这是一个基于 Obsidian 搭建的属于我自己的个人太空操作系统，主要的用途就是记录和管理我们自己的生活。其实最近又重温了一下《星际迷航》，哇，这个太空舰实在太帅了，这个就是我们的人生舰桥。\n\n我把它分成了几个核心舱段：\n\n**指令舱**，记录今天要做什么；**资产舱**，记录我用了的东西；**生命舱**，记录健康和身体的数据；**行行","knowledge_map":"Space OS（个人太空操作系统）\n├── 底层工具\n│   ├── Obsidian（笔记/数据库框架）\n│   └── Vibe Coding（交互与界面定制）\n│\n├── 五大核心舱段\n│   ├── 指令舱 —— 每日 To-do List\n│   │   └── 功能：任务添加 + 首页联动划掉已完成任务\n│   ├── 资产舱 —— 个人物品管理\n│   │   └── 功能：录入设备 → 自动计算持有天数 + 入手成本\n│   ├── 生命舱 —— 身体健康数据\n│   │   ├── 数据来源：小米体脂秤导出\n│   │   └── 功能：体重趋势 + AI agent 分析体检报告异常指标\n│   ├── 行行舱 —— 旅行地点记录\n│   │   └── 功能：3D 地球仪按坐标标注 + 旅行笔记\n│   └── 记忆舱 —— 读书与自我复盘\n│       └── 功能：书籍封面 + 摘抄 + 读后感 + 随笔\n│\n└── 核心设计理念\n    └── 审美驱动长期使用：工具好看 → 愿意每天打开","concepts":"#### 概念一：Space OS（个人太空操作系统）\n\n**是什么**：以\"太空舰\"为视觉主题，在 Obsidian 中搭建的个人生活全维度管理系统。\n\n**为什么重要**：传统的表格、清单和待办工具缺乏沉浸感和个人归属感，容易让人三分钟热度放弃。Space OS 通过主题化设计，把日常记录变成\"驾驶自己的飞船\"的体验。\n\n**详细解释**：\n\n| 舱段 | 管理维度 | 核心功能 |\n|------|----------|----------|\n| 指令舱 | 时间/任务 | 每日 To-do，完成后首页联动划掉 |\n| 资产舱 | 物品/财务 | 录入设备，自动算持有天数和成本 |\n| 生命舱 | 健康/身体 | 体重趋势 + AI 分析体检报告 |\n| 行行舱 | 旅行/空间 | 3D 地球仪标注去过的地方 |\n| 记忆舱 | 阅读/思考 | 读书记录 + 自我复盘 reflection |\n\n**实际应用场景**：每天早上打开 Space OS，在指令舱确认今日任务；旅行回来后在行行舱添加坐标和旅行笔记；体检后上传报告让 AI 帮助解读异常数据。\n\n---\n\n#### 概念二：Vibe Coding（氛围编程）\n\n**是什么**：通过 AI 辅助编写代码，实现个性化交互效果和界面设计，即使不是专业程序员也能定制工具外观与功能。\n\n**为什么重要**：它让普通用户可以突破 Obsidian 原生插件的限制，做出\"指令舱进入动画\"、\"地球仪坐标标注\"这类高度定制化的交互体验，把工具从\"够用\"变成\"真的想用\"。\n\n**详细解释**：视频中 Vibe Coding 的具体产出包括：\n- 指令舱的沉浸式进入交互效果\n- 任务完成后首页实时联动划掉的动态效果\n- 资产舱自动计算持有天数和入手成本的逻辑\n- 3D 地球仪按经纬度坐标自动标注地点\n\n**实际应用场景**：用 AI 生成 Obsidian 的自定义 CSS 片段或 JavaScript 脚本，实现普通插件无法做到的视觉和交互效果。\n\n---\n\n#### 概念三：审美驱动的工具设计哲学\n\n**是什么**：工具的颜值和主题感是决定用户能否长期坚持使用的重要因素，而不仅仅是功能完整性。\n\n**为什么重要**：作者直接说——\"如果一个工具每天看起来都让我觉得很无聊，那我真的很难长期使用。\"好看的工具降低了每天打开它的心理阻力。\n\n**详细解释**：这一理念来源于作者重温《星际迷航》后受到的启发——太空舰的舰桥设计既实用又令人向往。把这种\"想要每天坐进去\"的感觉移植到个人管理工具上，就是 Space OS 的设计出发点。\n\n**实际应用场景**：在搭建个人知识库或生活管理系统时，优先选择或定制一个自己真正喜欢的视觉主题，而不是只追求功能堆砌。","table":"| 维度 | 详情 |\n|------|------|\n| 底层工具 | Obsidian + Vibe Coding |\n| 灵感来源 | 《星际迷航》太空舰舰桥 |\n| 舱段数量 | 5 个（指令、资产、生命、行行、记忆） |\n| 健康数据来源 | 小米体脂秤数据导出 |\n| AI 应用点 | AI agent 自动分析体检报告异常指标 |\n| 行行舱特色 | 3D 地球仪按经纬度坐标标注旅行地点 |\n| 资产舱特色 | 自动计算物品持有天数和入手成本 |\n| 核心设计理念 | 审美驱动长期使用 |","thinking":"1. **审美与效率的边界在哪里？** 花大量时间定制工具外观，本身会不会成为一种\"精致的拖延\"？如何判断在工具建设上的投入是值得的？\n\n2. **AI agent 分析体检报告的可靠性如何保障？** 视频中提到让 AI 自动分析身体异常指标，这类健康数据的 AI 解读应该如何与专业医疗建议配合使用，边界在哪里？\n\n3. **个人操作系统的\"舱段\"设计反映了什么价值观？** 作者选择了任务、资产、健康、旅行、阅读这五个维度来定义\"人生管理\"，如果是你来设计，你会增加或替换哪个舱段，为什么？","remember":"把个人管理工具做成你愿意每天\"登舰\"的太空舰，好看本身就是最强的执行力。","is_new":true},{"id":"7637051374321386661","title":"穷大学生买欧洲机票省钱攻略","cat":"vibecoding","video_url":"https://www.douyin.com/video/7637051374321386661","audience":"预算有限、想低成本出行欧洲的在校大学生或年轻背包客","summary":"通过\"平台切换 + 语言切换 + 信用卡优惠 + 离境退税\"四步叠加技巧，把香港出发往返欧洲的机票从3400元压到2800元，帮助预算有限的年轻人实现低成本出行。","raw_preview":"OK啊，50万人问的教程，现在更新好了。你很穷，但是你想去欧洲，去巴黎，去威尼斯，去佛罗伦萨，去米兰。你看到别人天天在朋友圈刷屏，你也很想去，但是你没钱怎么办？刷到这个视频你绝对赚了！这期视频我教你怎么样用三千块钱去欧洲，并且包含了20KG的行李额，最后你还能够退200块钱的机票税。\n\n假如你跟你朋友计划好了6月30号，也就是暑假的第一天，你们想去意大利的米兰，然后去佛罗伦萨，赚一砖，玩一个半月的","knowledge_map":"穷游欧洲机票省钱攻略\n│\n├── 第一步：换平台\n│   ├── 原始参考价：国内携程 ≈ 3400元\n│   └── 换用 Trip.com（国际版携程）→ 降至 3100元，省 200元\n│\n├── 第二步：换语言\n│   ├── 在 Trip.com 内将界面语言切换为韩语\n│   └── 同一航班再省约 100元\n│\n├── 第三步：用信用卡优惠\n│   ├── 工具：Mastercard Pay\n│   ├── 触发条件：每周五限时抢购\n│   └── 可减约 100元\n│\n└── 第四步：领离境退税\n    ├── 地点：香港机场\n    ├── 金额：约 200元人民币\n    └── 最终到手价：≈ 2800元（含 20KG 行李额）","concepts":"#### 概念一：平台差价（国内版 vs 国际版携程）\n\n**是什么**：同一家携程公司，面向不同地区用户的版本（Trip.com 为国际版），因定价策略不同，同一航班票价可能存在差异。\n\n**为什么重要**：无需任何额外操作，仅切换平台就能立省约200元，是四步中最简单的一步。\n\n**详细解释**：\n- 国内版携程搜索香港→米兰往返：约 **3400元**\n- Trip.com（国际版）搜索同一行程：约 **3100元**\n- 差价原因：不同版本面向的用户群体、货币结算及促销策略不同\n\n**实际应用场景**：订购出发地在香港的国际航班时，优先在 Trip.com 比价。\n\n---\n\n#### 概念二：语言切换定价差\n\n**是什么**：在同一平台内，切换界面显示语言（如从中文切换为韩语），可能触发该语言地区对应的定价或优惠，导致票价进一步降低。\n\n**为什么重要**：这是一个很多人不知道的\"隐藏技巧\"，在已经切换平台的基础上还能再省约100元。\n\n**详细解释**：\n- 操作方式：在 Trip.com 内将语言设置切换为**韩语**\n- 重新搜索同一航班，价格再次下降约 **100元**\n- 原理推测：平台对不同语言/地区用户有差异化定价或专属折扣\n\n**实际应用场景**：在国际版平台上搜票时，可多切换几种语言版本（如韩语、日语、英语）分别比价，取最低价。\n\n---\n\n#### 概念三：信用卡专属折扣（Mastercard Pay 周五优惠）\n\n**是什么**：使用特定信用卡（Mastercard）在指定时间（每周五）通过平台支付，可享受额外机票减免优惠。\n\n**为什么重要**：叠加前两步之后，再用这个方法可以多省约100元，且属于官方正规优惠。\n\n**详细解释**：\n- 工具：**Mastercard Pay**\n- 触发时间：**每周五**限时抢购\n- 优惠幅度：约减 **100元**\n- 注意：需要持有 Mastercard 信用卡才能使用\n\n**实际应用场景**：提前规划好购票时间，选择周五使用 Mastercard 结账，叠加平台优惠。\n\n---\n\n#### 概念四：香港离境退税\n\n**是什么**：从香港出境的旅客，可在机场申领一定金额的离境税退款（约200元人民币）。\n\n**为什么重要**：这是机票价格中已包含的税费，属于\"花了钱还能拿回来\"的部分，是最后一步的实际到手省钱。\n\n**详细解释**：\n- 领取地点：**香港机场**出境时办理\n- 退税金额：约 **200元人民币**\n- 适用条件：视频中提到从香港出发的国际航班乘客可申领\n\n**实际应用场景**：到达香港机场后，提前了解退税柜台位置，出境前完成申领手续。","table":"| 省钱步骤 | 操作方法 | 节省金额 | 累计价格 |\n|---|---|---|---|\n| 基准价（国内携程） | 直接搜索 | — | **3400元** |\n| 第一步：换平台 | 改用 Trip.com（国际版） | 省约 200元 | **3100元** |\n| 第二步：换语言 | Trip.com 内切换为韩语 | 省约 100元 | **3000元** |\n| 第三步：信用卡优惠 | 周五用 Mastercard Pay 结账 | 省约 100元 | **2900元** |\n| 第四步：离境退税 | 香港机场领离境税退款 | 退约 200元 | **≈ 2800元** |\n\n> ✅ 最终实付：约 **2800元人民币**，含 20KG 行李额，往返欧洲（香港→米兰）","thinking":"1. **语言切换定价差的本质是什么？** 平台为什么会对不同语言/地区的用户显示不同票价？这种定价策略在法律和道德层面是否存在争议？\n\n2. **这套方法的适用边界在哪里？** 视频以香港出发为例，如果出发地换成内地城市（如广州、上海），平台切换和离境退税的逻辑是否还成立？需要做哪些调整？\n\n3. **四步叠加的时机如何协调？** Mastercard 优惠只在每周五触发，而机票价格本身也在动态变化——如何在\"等待周五优惠\"和\"避免票价上涨\"之间做出最优决策？","remember":"买欧洲机票别只会用一个平台、一种语言、一张卡——四步叠加，3400元能变2800元。","is_new":true},{"id":"7637443653165665562","title":"OpenAI Codex 宠物模式玩法全览","cat":"vibecoding","video_url":"https://www.douyin.com/video/7637443653165665562","audience":"对 AI 编程工具感兴趣、想了解 Codex 宠物模式玩法的开发者或科技爱好者","summary":"OpenAI 推出 Codex 宠物模式后，程序员社区迅速涌现出 Patches 和 Codex Pets 两个爆款平台，让你可以像养宝可梦一样养一个会陪你敲代码的 AI 宠物。","raw_preview":"不到一天时间，两百万人涌入这两个网站——专门收集全球程序员养的 Codex 宠物。OpenAI 上线宠物模式之后，程序员们玩疯了，各种整合和抽象操作全来了。\n\n第一个叫 Patches，像是 Codex 版的宝可梦，里边全是大家养的数字宠物，从可爱萌物到离谱脑洞的都有，自带属性、技能和训练记录，你甚至能一路围观它的成长过程。\n\n第二个，Codex Pets，更像是程序员宠物的朋友圈，全球开发者都在","knowledge_map":"Codex 宠物模式热潮\n├── 背景\n│   └── OpenAI 上线 Codex 宠物模式\n│       └── 不到一天吸引 200 万人涌入相关平台\n│\n├── 平台一：Patches\n│   ├── 定位：Codex 版宝可梦\n│   ├── 内容：全球程序员养的数字宠物合集\n│   ├── 宠物特性\n│   │   ├── 自带属性\n│   │   ├── 自带技能\n│   │   └── 训练记录可查\n│   └── 特色：可围观宠物完整成长过程\n│\n└── 平台二：Codex Pets\n    ├── 定位：程序员宠物朋友圈\n    ├── 内容：全球开发者晒宠物 & 作品\n    ├── 宠物类型举例\n    │   ├── 电子小狗\n    │   └── 赛博生命体\n    └── 特色：每只宠物可互动 + 持续训练","concepts":"#### Codex 宠物模式\n\n**是什么**：OpenAI 为 Codex 推出的一种拟人化/宠物化交互模式，让 AI 编程助手以\"宠物\"的形态陪伴开发者写代码。\n\n**为什么重要**：\n- 把严肃的编程工具变成有情感连接的数字伴侣，大幅降低使用门槛\n- 短时间内引爆社区，说明这类玩法有强烈的社交传播潜力\n\n**详细解释**：\n宠物模式让 Codex 不再只是一个\"工具\"，而是一个有属性、有技能、能成长的数字生命体。用户可以持续训练它，围观它的成长，并在社区中分享。\n\n**实际应用场景**：\n- 程序员在写代码时有一个持续陪伴、可互动的 AI 角色\n- 在社区平台晒出自己的宠物，和其他开发者交流\n\n---\n\n#### Patches 平台\n\n**是什么**：一个专门收集全球程序员所养 Codex 数字宠物的聚合平台，定位类似\"Codex 版宝可梦图鉴\"。\n\n**为什么重要**：\n- 把个人的 AI 宠物变成可展示、可比较的公开收藏品\n- 有完整的成长记录，增强用户粘性\n\n**详细解释**：\n\n| 特性 | 说明 |\n|------|------|\n| 宠物类型 | 从可爱萌物到脑洞离谱型均有 |\n| 宠物属性 | 每只宠物自带独立属性 |\n| 技能系统 | 宠物携带可查看的技能列表 |\n| 训练记录 | 完整记录宠物被训练的历程 |\n| 成长围观 | 其他用户可全程跟进某只宠物的成长 |\n\n**实际应用场景**：\n- 开发者展示自己精心培养的 AI 宠物\n- 其他用户浏览、围观、寻找灵感\n\n---\n\n#### Codex Pets 平台\n\n**是什么**：一个以\"朋友圈\"形式运作的程序员 AI 宠物社区，全球开发者在此晒宠物和创意作品。\n\n**为什么重要**：\n- 强调社交属性，让 AI 宠物从个人玩具变成社区话题\n- 每只宠物支持互动与持续训练，形成长期留存\n\n**详细解释**：\n\n| 特性 | 说明 |\n|------|------|\n| 社区定位 | 类似朋友圈，以\"晒\"为核心动作 |\n| 宠物类型举例 | 电子小狗、赛博生命体等 |\n| 互动功能 | 每只宠物均可与其他用户互动 |\n| 训练功能 | 宠物支持持续训练迭代 |\n\n**实际应用场景**：\n- 开发者发布自己的奇特 AI 宠物作品\n- 社区用户互相互动、交流训练心得","table":"| 对比维度 | Patches | Codex Pets |\n|----------|---------|------------|\n| 核心定位 | Codex 版宝可梦图鉴 | 程序员宠物朋友圈 |\n| 主要功能 | 收集 & 展示宠物 | 晒宠物 & 社交互动 |\n| 特色亮点 | 成长过程可围观、有属性技能记录 | 支持互动 & 持续训练 |\n| 内容风格 | 图鉴式、收藏式 | 动态式、社交式 |\n| 宠物类型 | 萌物到脑洞型均有 | 电子小狗、赛博生命体等 |","thinking":"1. **Codex 宠物模式为什么能在不到一天内吸引 200 万人？** 它击中了程序员群体的哪种心理需求——是陪伴感、游戏化激励，还是社交展示欲？\n\n2. **把 AI 工具\"宠物化\"对实际编程效率有帮助吗？** 情感连接和工具效率之间，是相互促进还是相互干扰？\n\n3. **Patches 和 Codex Pets 这类围绕 AI 工具衍生出的社区平台，会成为未来 AI 产品生态的标配吗？** 还是只是一阵风潮？","remember":"Codex 宠物模式证明：当 AI 编程工具有了\"生命感\"，程序员不只是在用工具，而是在养一个会陪你写代码的伙伴。","is_new":true},{"id":"7637466159198314486","title":"用 Codex 从零搭建第一个手机 APP 项目","cat":"vibecoding","video_url":"https://www.douyin.com/video/7637466159198314486","audience":"想用 AI 编程工具做手机 APP、但还没有实际上手过项目初始化流程的初学者","summary":"用 Codex 从一个空文件夹开始，完成手机 APP 项目的初始化和规范文件搭建，帮你建立\"AI 辅助编程\"的第一个可运行项目骨架。","raw_preview":"从这集开始我们要真实使用 Codex 做项目了，整个 Codex 的分享会涉及到三个项目，第一个项目是 Speak to Note，一个能装到手机上、你按住说话 AI 就能帮你总结的一个手机本地 APP。\n\n接下来我们就来创建第一个项目，你可以在这个项目点击项目文件夹，右键新建空白项目，命名为 Speak to Note。在对话框里面的右下角我们可以看到，这里其实是有一个 model 可以选择的，","knowledge_map":"用 Codex 搭建第一个项目（Speak to Note）\n├── 1. 项目准备\n│   ├── 新建空白项目文件夹，命名为 Speak to Note\n│   └── 在对话框右下角选择模型（o4 / o3 等），确定后不要中途换模型\n│\n├── 2. 项目初始化\n│   ├── 发送指令：请用 Expo Blank TypeScript 模板初始化这个空目录\n│   ├── Expo 是什么：做手机 APP 的开发
